<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日志查看 · TindaAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff5f9;
      --surface: #ffffff;
      --surface-2: #fef0f5;
      --border: #fcd5e5;
      --text: #3d1f2f;
      --text-dim: #9b5f78;
      --accent: #ff6eb4;
      --accent-2: #ff9fd3;
      --accent-deep: #c2185b;
      --gradient: #ff6eb4;
      --gradient-lavender: #c084fc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }
    body { display: grid; grid-template-rows: auto 1fr; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1.5px solid var(--border);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      color: var(--text);
    }
    .brand-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(255,110,180,0.18);
    }
    .actions { display: inline-flex; gap: 8px; align-items: center; }
    .btn {
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover {
      border-color: var(--accent-2);
      color: var(--text);
      background: var(--surface-2);
    }
    .btn.primary {
      color: #fff;
      border-color: transparent;
      background: var(--gradient);
    }
    .wrap {
      min-height: 0;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 12px;
      padding: 12px;
    }
    .panel {
      min-height: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .files {
      min-height: 0;
      overflow: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .file-item {
      border: 1.5px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 8px 9px;
      font-size: 12px;
      cursor: pointer;
      line-height: 1.4;
    }
    .file-item:hover { border-color: var(--accent-2); }
    .file-item.active {
      border-color: var(--accent-2);
      background: rgba(255,110,180,0.06);
    }
    .file-name {
      font-weight: 800;
      color: var(--text);
      word-break: break-all;
    }
    .file-meta {
      margin-top: 3px;
      color: var(--text-dim);
      font-size: 11px;
    }
    .viewer {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .term-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(251,113,133,0.22);
      background: linear-gradient(90deg, rgba(255,110,180,0.12), rgba(192,132,252,0.10));
    }
    .term-dots {
      display: flex; gap: 6px; align-items: center; flex-shrink: 0;
    }
    .term-dot {
      width: 8px; height: 8px; border-radius: 50%;
      box-shadow: 0 1px 4px rgba(61,31,47,0.15);
    }
    .term-dot:nth-child(1) { background: #fb7185; }
    .term-dot:nth-child(2) { background: #f59e0b; }
    .term-dot:nth-child(3) { background: #34d399; }
    .term-title {
      flex: 1; text-align: center;
      font-size: 12.5px; font-weight: 700;
      color: #9d174d; letter-spacing: 0.2px;
    }
    .toolbar {
      padding: 9px 10px;
      border-bottom: 1px solid rgba(251,113,133,0.22);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: #fff9fc;
    }
    .toolbar input {
      width: 96px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
      font-family: inherit;
      color: var(--text);
      background: #fff;
    }
    .toolbar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,110,180,0.11);
    }
    #status {
      margin-left: auto;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 700;
    }
    .term-body {
      margin: 0;
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: 12px 10px 14px;
      font-family: "JetBrains Mono","Fira Code","SF Mono","Cascadia Code",Consolas,monospace;
      font-size: 12.5px;
      line-height: 1.65;
      font-weight: 500;
      color: #334155;
      white-space: pre-wrap;
      word-break: break-word;
      font-variant-ligatures: contextual;
      background:
        radial-gradient(circle at 88% -12%, rgba(255,110,180,0.14) 0%, rgba(255,110,180,0) 55%),
        radial-gradient(circle at -12% 0%, rgba(192,132,252,0.16) 0%, rgba(192,132,252,0) 58%),
        #fff9fc;
    }
    .term-body::-webkit-scrollbar { width: 6px; }
    .term-body::-webkit-scrollbar-track { background: transparent; }
    .term-body::-webkit-scrollbar-thumb {
      background: rgba(251,113,133,0.38);
      border-radius: 999px;
    }
    .term-body::-webkit-scrollbar-thumb:hover { background: rgba(251,113,133,0.56); }
    .term-line {
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 1em;
      margin: 8px 0;
      padding: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,245,249,0.9) 100%);
      border: 1.5px solid rgba(251,113,133,0.25);
      box-shadow: 0 2px 10px rgba(251,113,133,0.08);
      overflow: hidden;
    }
    .term-line-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: linear-gradient(90deg, rgba(255,110,180,0.08), rgba(192,132,252,0.06));
      border-bottom: 1px solid rgba(251,113,133,0.14);
    }
    .term-line-dots {
      display: flex; gap: 5px; flex-shrink: 0;
    }
    .term-line-dot {
      width: 7px; height: 7px; border-radius: 50%;
      box-shadow: 0 1px 3px rgba(61,31,47,0.12);
    }
    .term-line-dot:nth-child(1) { background: #fb7185; }
    .term-line-dot:nth-child(2) { background: #f59e0b; }
    .term-line-dot:nth-child(3) { background: #34d399; }
    .term-line-label {
      font-size: 10px; font-weight: 700;
      color: #9d174d; letter-spacing: 0.2px;
      opacity: 0.6;
    }
    .term-line-body {
      padding: 6px 10px 8px;
      font-family: "JetBrains Mono","Fira Code","SF Mono",Consolas,monospace;
      font-size: 12.5px; line-height: 1.65; font-weight: 500;
      display: flex;
    }
    .term-out-msg { color: #166534; }
    .term-out-err { color: #dc2626; font-weight: 600; }
    .term-out-warn { color: #f97316; font-weight: 600; }
    .empty {
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      padding: 16px;
    }
    @media (max-width: 920px) {
      .wrap { grid-template-columns: 1fr; }
      .panel.files-panel { min-height: 180px; max-height: 240px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-dot"></span>
      <span>日志查看</span>
    </div>
    <div class="actions">
      <a class="btn" href="/" onclick="event.preventDefault(); location.href='/'">主页</a>
      <a class="btn" href="/app" onclick="event.preventDefault(); location.href='/app'">聊天</a>
      <button id="refreshFilesBtn" class="btn primary" type="button">刷新列表</button>
    </div>
  </header>
  <div class="wrap">
    <section class="panel files-panel">
      <div class="panel-head">
        <span>日志文件</span>
      </div>
      <div id="filesBox" class="files">
        <div class="empty">加载中...</div>
      </div>
    </section>
    <section class="panel viewer">
      <div class="panel-head">
        <span id="title">未选择文件</span>
      </div>
      <div class="toolbar">
        <span style="font-size:12px;color:var(--text-dim);font-weight:700;">显示行数</span>
        <input id="lineLimitInput" type="number" min="20" max="2000" step="10" value="300" />
        <button id="reloadBtn" class="btn" type="button">重新读取</button>
        <span style="font-size:12px;color:var(--text-dim);font-weight:700;">审计ID</span>
        <input id="eventIdInput" type="text" placeholder="例如 tc_0000002458 或 2458" style="width:260px;" />
        <button id="findByIdBtn" class="btn" type="button">按ID查询</button>
        <span id="status"></span>
      </div>
      <div class="term-head">
        <span class="term-dots"><span class="term-dot"></span><span class="term-dot"></span><span class="term-dot"></span></span>
        <span class="term-title" id="termTitle">tinda@agent ~ log</span>
      </div>
      <div id="logText" class="term-body"><span style="color:var(--text-dim);padding:16px;">请选择左侧日志文件。</span></div>
    </section>
  </div>
<script>
  const AUTH_TOKEN_KEY = "ta_auth_token";
  const filesBox = document.getElementById("filesBox");
  const refreshFilesBtn = document.getElementById("refreshFilesBtn");
  const reloadBtn = document.getElementById("reloadBtn");
  const lineLimitInput = document.getElementById("lineLimitInput");
  const eventIdInput = document.getElementById("eventIdInput");
  const findByIdBtn = document.getElementById("findByIdBtn");
  const titleEl = document.getElementById("title");
  const termTitleEl = document.getElementById("termTitle");
  const statusEl = document.getElementById("status");
  const logTextEl = document.getElementById("logText");
  let filesCache = [];
  let activeFile = "";

  function getAuthToken() {
    return String(localStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
  }

  function authHeaders(extra) {
    const headers = Object.assign({}, extra || {});
    const token = getAuthToken();
    if (token) headers["X-User-Token"] = token;
    return headers;
  }

  async function apiFetch(url, options = {}) {
    const opts = Object.assign({}, options);
    opts.headers = authHeaders(opts.headers || {});
    return fetch(url, opts);
  }

  function classifyLine(line) {
    const s = String(line || "").trim();
    if (!s) return "msg";
    if (/(ERROR|CRITICAL|FATAL|traceback|exception|Traceback|permission denied|请求失败|执行失败|命令解析失败|未知命令|权限不足)/.test(s)) return "err";
    if (/(WARN|WARNING|警告)/i.test(s)) return "warn";
    return "msg";
  }

  function renderTermLines(text) {
    if (!text) return '<span style="color:var(--text-dim);padding:16px;">(空文件)</span>';
    const isJson = text.trim().startsWith("{") || text.trim().startsWith("[");
    const dots = '<span class="term-line-dots"><span class="term-line-dot"></span><span class="term-line-dot"></span><span class="term-line-dot"></span></span>';
    if (isJson) {
      const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      return `<div class="term-line">
        <div class="term-line-head">${dots}<span class="term-line-label">audit result</span></div>
        <div class="term-line-body"><span class="term-out-msg">${escaped}</span></div>
      </div>`;
    }
    const lines = text.split("\n");
    if (lines.length > 2000) lines.length = 2000;
    return lines.map((line, i) => {
      const cls = classifyLine(line);
      const escaped = line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const colorClass = cls === "err" ? "term-out-err" : cls === "warn" ? "term-out-warn" : "term-out-msg";
      return `<div class="term-line">
        <div class="term-line-head">${dots}<span class="term-line-label">log #${i + 1}</span></div>
        <div class="term-line-body"><span class="${colorClass}">${escaped || " "}</span></div>
      </div>`;
    }).join("");
  }

  function fmtBytes(n) {
    const num = Number(n || 0);
    if (!Number.isFinite(num) || num < 1024) return `${Math.max(0, Math.floor(num))} B`;
    if (num < 1024 * 1024) return `${(num / 1024).toFixed(1)} KB`;
    return `${(num / (1024 * 1024)).toFixed(2)} MB`;
  }

  function renderFiles(rows) {
    filesBox.innerHTML = "";
    if (!Array.isArray(rows) || rows.length === 0) {
      filesBox.innerHTML = `<div class="empty">暂无日志文件</div>`;
      return;
    }
    rows.forEach((f) => {
      const name = String(f?.name || "");
      if (!name) return;
      const el = document.createElement("button");
      el.type = "button";
      el.className = "file-item" + (name === activeFile ? " active" : "");
      el.innerHTML = `
        <div class="file-name">${name}</div>
        <div class="file-meta">大小: ${fmtBytes(f?.size_bytes)} · 更新时间: ${String(f?.updated_at || "")}</div>
      `;
      el.addEventListener("click", () => {
        activeFile = name;
        renderFiles(filesCache);
        readActiveFile();
      });
      filesBox.appendChild(el);
    });
  }

  async function ensureLoggedIn() {
    const token = getAuthToken();
    if (!token) {
      location.href = "/";
      return false;
    }
    try {
      const res = await apiFetch("/auth/status");
      if (!res.ok) {
        location.href = "/";
        return false;
      }
      const data = await res.json();
      if (!data?.logged_in) {
        location.href = "/";
        return false;
      }
      return true;
    } catch {
      location.href = "/";
      return false;
    }
  }

  async function loadFiles() {
    statusEl.textContent = "读取日志列表...";
    try {
      const res = await apiFetch("/logs/files");
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
      filesCache = Array.isArray(data?.files) ? data.files : [];
      if (!activeFile || !filesCache.some((x) => String(x?.name || "") === activeFile)) {
        activeFile = String(filesCache[0]?.name || "");
      }
      renderFiles(filesCache);
      statusEl.textContent = `日志文件 ${filesCache.length} 个`;
      if (activeFile) await readActiveFile();
      else {
        titleEl.textContent = "未选择文件";
        logTextEl.innerHTML = '<span style="color:var(--text-dim);padding:16px;">请选择左侧日志文件。</span>';
      }
    } catch (e) {
      filesCache = [];
      renderFiles([]);
      statusEl.textContent = `读取失败: ${String(e?.message || e)}`;
      logTextEl.innerHTML = '<span class="term-out-err" style="padding:16px;">读取日志列表失败。</span>';
    }
  }

  async function readActiveFile() {
    if (!activeFile) return;
    const lines = Math.max(20, Math.min(2000, Number(lineLimitInput.value || 300)));
    lineLimitInput.value = String(lines);
    statusEl.textContent = `读取 ${activeFile} ...`;
    titleEl.textContent = activeFile;
    if (termTitleEl) termTitleEl.textContent = `tinda@agent ~ ${activeFile}`;
    try {
      const params = new URLSearchParams({ file: activeFile, lines: String(lines) });
      const res = await apiFetch(`/logs/read?${params.toString()}`);
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
      const text = Array.isArray(data?.lines) ? data.lines.join("\n") : "";
      logTextEl.innerHTML = renderTermLines(text);
      statusEl.textContent = `已加载 ${data?.line_count || 0} 行` + (data?.truncated ? "（尾部截断）" : "");
      logTextEl.scrollTop = logTextEl.scrollHeight;
    } catch (e) {
      logTextEl.innerHTML = '<span class="term-out-err" style="padding:16px;">读取日志失败。</span>';
      statusEl.textContent = `读取失败: ${String(e?.message || e)}`;
    }
  }

  async function findEventById() {
    const raw = String(eventIdInput?.value || "").trim();
    if (!raw) {
      statusEl.textContent = "请输入审计ID";
      return;
    }
    statusEl.textContent = `查询审计ID ${raw} ...`;
    titleEl.textContent = `按ID查询: ${raw}`;
    if (termTitleEl) termTitleEl.textContent = `tinda@agent ~ audit #${raw}`;
    try {
      const params = new URLSearchParams({ id: raw });
      const res = await apiFetch(`/logs/by-id?${params.toString()}`);
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
      const payload = {
        id: data?.id,
        source_file: data?.source_file || "",
        source_line: data?.source_line || 0,
        source_path: data?.source_path || "",
        event: data?.event || {},
      };
      logTextEl.innerHTML = renderTermLines(JSON.stringify(payload, null, 2));
      statusEl.textContent = `查询成功: #${String(data?.id || "")}`;
      logTextEl.scrollTop = 0;
    } catch (e) {
      logTextEl.innerHTML = '<span class="term-out-err" style="padding:16px;">按ID查询失败。</span>';
      statusEl.textContent = `查询失败: ${String(e?.message || e)}`;
    }
  }

  refreshFilesBtn.addEventListener("click", loadFiles);
  reloadBtn.addEventListener("click", readActiveFile);
  findByIdBtn.addEventListener("click", findEventById);
  lineLimitInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      readActiveFile();
    }
  });
  eventIdInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      findEventById();
    }
  });

  (async () => {
    const ok = await ensureLoggedIn();
    if (!ok) return;
    await loadFiles();
  })();
</script>
</body>
</html>
