<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TindaAgent · 模型检测</title>
  <script>
    /* FOUC 预防 — 必须在 CSS 解析前同步设置 data-theme */
    (function () {
      try {
        var t = localStorage.getItem("tinda_theme");
        if (t !== "dark" && t !== "light") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      } catch (e) { document.documentElement.dataset.theme = "light"; }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff5f9;
      --surface: #ffffff;
      --surface-2: #fef0f5;
      --border: #fcd5e5;
      --border-strong: #f9a8c9;
      --text: #3d1f2f;
      --text-dim: #9b5f78;
      --text-faint: #d4a0b5;
      --accent: #ff6eb4;
      --accent-2: #ff9fd3;
      --accent-deep: #c2185b;
      --ok: #1f9d5a;
      --warn: #c98013;
      --fail: #d64040;
      --skipped: #6c6c6c;
      --gradient: linear-gradient(90deg, #ff6eb4 0%, #ff9fd3 100%);
    }

    /* ── 深色模式：夜樱玻璃 ── */
    [data-theme="dark"] {
      --bg: radial-gradient(circle at 15% 8%, rgba(255, 105, 168, 0.11), transparent 32%),
            radial-gradient(circle at 84% 10%, rgba(151, 117, 255, 0.085), transparent 34%),
            linear-gradient(180deg, #120d13 0%, #0b090d 100%);
      --surface: rgba(29, 21, 29, 0.88);
      --surface-2: rgba(40, 29, 39, 0.82);
      --border: rgba(255, 194, 219, 0.13);
      --border-strong: rgba(255, 143, 190, 0.28);
      --text: #f7edf3;
      --text-dim: #c8aebb;
      --text-faint: #8f7482;
      --accent: #ff78b7;
      --accent-2: #ffadcf;
      --accent-deep: #ff8fc4;
      --ok: #4ade80;
      --warn: #fbbf24;
      --fail: #f87171;
      --skipped: #a0a0a0;
      --gradient: linear-gradient(135deg, #ff6fae 0%, #ff98c7 100%);
    }

    /* 深色模式硬编码颜色覆盖 */
    [data-theme="dark"] body { color-scheme: dark; }
    [data-theme="dark"] header {
      background: rgba(18, 13, 18, 0.74) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.22);
    }
    [data-theme="dark"] .chip.pass        { color: #86efac; background: rgba(74, 222, 128, 0.16); border-color: rgba(74, 222, 128, 0.32); }
    [data-theme="dark"] .chip.unsupported { color: #fcd34d; background: rgba(251, 191, 36, 0.16); border-color: rgba(251, 191, 36, 0.32); }
    [data-theme="dark"] .chip.fail        { color: #fca5a5; background: rgba(248, 113, 113, 0.16); border-color: rgba(248, 113, 113, 0.32); }
    [data-theme="dark"] .chip.skipped     { color: #cbd5e1; background: rgba(160, 160, 160, 0.16); border-color: rgba(160, 160, 160, 0.32); }
    [data-theme="dark"] table  { border-color: var(--border); }
    [data-theme="dark"] thead  { background: rgba(40, 29, 39, 0.74); }
    [data-theme="dark"] tbody tr:nth-child(odd) { background: rgba(40, 29, 39, 0.40); }
    [data-theme="dark"] .note  { background: var(--surface-2); border-left-color: var(--accent); }
    [data-theme="dark"] .card {
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: 'Nunito', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
    }

    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      user-select: none;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    .deco svg {
      display: block;
      width: 1em;
      height: 1em;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.18; }
      50%  { opacity: 0.36; }
      100% { transform: translateY(-44px) rotate(18deg); opacity: 0.18; }
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1160px;
      margin: 0 auto;
      padding: 22px 16px 34px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.82);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--text-dim);
      font-size: 12.5px;
      font-weight: 700;
    }

    .btn {
      height: 34px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 0 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: transform 0.15s ease,
                  border-color 0.15s ease,
                  background 0.15s ease,
                  color 0.15s ease,
                  box-shadow 0.15s ease,
                  filter 0.15s ease;
      font-family: inherit;
    }
    .btn:hover {
      border-color: var(--accent-2);
      color: var(--accent-deep);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(255,110,180,0.16);
    }
    .btn:disabled { opacity: 0.58; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 6px 16px rgba(255,110,180,0.28);
    }
    .btn.primary:hover { color: #fff; filter: brightness(0.97); }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(255,110,180,0.10);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .manager-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .manager-grid .wide { grid-column: span 2; }

    .model-list {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .model-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 240px;
      min-height: 28px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .model-pill span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .model-pill button {
      width: 18px;
      height: 18px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 110, 180, 0.12);
      color: var(--accent-deep);
      cursor: pointer;
      font-weight: 900;
      line-height: 18px;
      padding: 0;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 700;
    }

    input, select {
      width: 100%;
      height: 36px;
      border-radius: 10px;
      border: 1.4px solid var(--border);
      padding: 0 10px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
      font-family: inherit;
    }
    input:focus, select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(255,110,180,0.12);
    }

    .actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 700;
    }

    .history {
      margin-top: 14px;
      display: grid;
      gap: 12px;
    }

    .run-card {
      background: var(--surface);
      border: 1.4px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(255,110,180,0.08);
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .run-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 2px 2px 8px;
    }

    .run-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .run-meta {
      font-size: 11.5px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 1px 8px;
      background: var(--surface-2);
      white-space: nowrap;
    }

    .run-table-wrap {
      overflow-x: auto;
      border: 1.2px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    th, td {
      text-align: left;
      padding: 9px 10px;
      border-bottom: 1px solid #f8d9e7;
      vertical-align: top;
      font-size: 12.5px;
    }

    th {
      background: var(--surface-2);
      color: var(--text-dim);
      font-weight: 800;
      font-size: 12px;
    }

    tr:last-child td { border-bottom: none; }

    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .chip.pass { color: var(--ok); background: #e8f7ee; border-color: #bfe8d0; }
    .chip.unsupported { color: var(--warn); background: #fff3df; border-color: #f7ddb0; }
    .chip.fail { color: var(--fail); background: #fee9e9; border-color: #f8c6c6; }
    .chip.skipped { color: var(--skipped); background: #f1f1f1; border-color: #dddddd; }

    .mono {
      font-family: 'JetBrains Mono', Consolas, monospace;
      font-size: 11.5px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #5c3b4c;
      background: #fffafd;
      border: 1px dashed #f1c9dc;
      border-radius: 8px;
      padding: 6px;
      max-height: 120px;
      overflow: auto;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      color: var(--text-dim);
      background: rgba(255,255,255,0.78);
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .manager-grid { grid-template-columns: 1fr; }
      .manager-grid .wide { grid-column: auto; }
      .top { flex-direction: column; align-items: flex-start; }
      .run-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <span class="deco" style="top:8%;left:4%;font-size:18px;animation-duration:4.8s;color:#f472b6;"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.8v4.2M12 17v4.2M2.8 12h4.2M17 12h4.2"></path></svg></span>
  <span class="deco" style="top:18%;right:5%;font-size:13px;animation-duration:5.6s;animation-delay:-1.4s;color:#fb7185;"><svg viewBox="0 0 24 24"><path d="M12 3.5l2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 16l-4.8 2.4.9-5.4-3.9-3.8 5.4-.8z"></path></svg></span>
  <span class="deco" style="top:68%;left:3%;font-size:14px;animation-duration:4.9s;animation-delay:-2.0s;color:#ec4899;"><svg viewBox="0 0 24 24"><path d="M12 20c-4.5-3.1-7-5.6-7-8.8a4.2 4.2 0 0 1 7-3.1 4.2 4.2 0 0 1 7 3.1c0 3.2-2.5 5.7-7 8.8z"></path></svg></span>

  <div class="wrap">
    <div class="top">
      <div>
        <h1 class="title">模型检测</h1>
        <p class="sub">与主站同主题展示，每一次检测请求都会归档到独立表格</p>
      </div>
      <div>
        <button class="btn" onclick="goApp()">返回聊天</button>
      </div>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <label for="providerSelect">模型提供商</label>
          <select id="providerSelect"></select>
        </div>
        <div>
          <label for="modelSelect">目标模型</label>
          <select id="modelSelect"></select>
        </div>
        <div>
          <label for="imageUrl">图片 URL（可选）</label>
          <input id="imageUrl" placeholder="https://example.com/a.png" />
        </div>
        <div>
          <label for="videoUrl">视频 URL（可选）</label>
          <input id="videoUrl" placeholder="https://example.com/a.mp4" />
        </div>
      </div>

      <div class="actions">
        <button id="btnRunAll" class="btn primary" onclick="runAll()">一键全部检测</button>
        <button class="btn test-btn" onclick="runSingle('connectivity')">连接测试</button>
        <button class="btn test-btn" onclick="runSingle('reasoning')">思考支持测试</button>
        <button class="btn test-btn" onclick="runSingle('image')">图片测试</button>
        <button class="btn test-btn" onclick="runSingle('video')">视频测试</button>
      </div>

      <div id="statusLine" class="status">就绪</div>

      <div class="manager-grid" aria-label="模型提供商管理">
        <div>
          <label for="providerKey">Provider Key</label>
          <input id="providerKey" placeholder="custom-openai" />
        </div>
        <div>
          <label for="providerLabel">显示名称</label>
          <input id="providerLabel" placeholder="Custom" />
        </div>
        <div>
          <label for="providerAdapter">调用链路</label>
          <select id="providerAdapter">
            <option value="openai_compatible">OpenAI-compatible</option>
            <option value="google_generate_content">Google Gemini</option>
            <option value="anthropic_messages">Anthropic Messages</option>
          </select>
        </div>
        <div class="wide">
          <label for="providerBaseUrl">Base URL</label>
          <input id="providerBaseUrl" placeholder="https://api.example.com/v1" />
        </div>
        <div>
          <label for="providerChatPath">路径</label>
          <input id="providerChatPath" placeholder="/chat/completions 或 /v1/messages 或 /models/{model}:generateContent" />
        </div>
        <div>
          <label for="providerApiKeyEnv">Key 环境变量</label>
          <input id="providerApiKeyEnv" placeholder="OPENAI_API_KEY" />
        </div>
        <div>
          <label for="providerApiKey">Key（可选）</label>
          <input id="providerApiKey" placeholder="留空则用环境变量" />
        </div>
        <div>
          <label for="newModelId">模型 ID</label>
          <input id="newModelId" placeholder="模型真实 ID" />
        </div>
        <div>
          <label for="newModelLabel">模型命名</label>
          <input id="newModelLabel" placeholder="前端显示名" />
        </div>
        <div class="actions">
          <button class="btn" type="button" onclick="saveProvider()">保存提供商</button>
          <button class="btn" type="button" onclick="addModel()">添加模型</button>
        </div>
      </div>
      <div id="modelList" class="model-list"></div>
    </div>

    <div id="historyWrap" class="history">
      <div class="empty">尚未执行检测</div>
    </div>
  </div>

  <script>
    const AUTH_TOKEN_KEY = "ta_auth_token";
    const MODEL_FALLBACK = [
      { id: "deepseek-chat", label: "deepseek-chat" },
      { id: "deepseek-v4-pro", label: "deepseek-pro" },
      { id: "deepseek-reasoner", label: "deepseek-reasoner" },
      { id: "deepseek-v4-flash", label: "deepseek-v4-flash" },
    ];

    const providerSelectEl = document.getElementById("providerSelect");
    const modelSelectEl = document.getElementById("modelSelect");
    const imageUrlEl = document.getElementById("imageUrl");
    const videoUrlEl = document.getElementById("videoUrl");
    const statusLineEl = document.getElementById("statusLine");
    const historyWrapEl = document.getElementById("historyWrap");
    const btnRunAllEl = document.getElementById("btnRunAll");
    const modelListEl = document.getElementById("modelList");
    const providerKeyEl = document.getElementById("providerKey");
    const providerLabelEl = document.getElementById("providerLabel");
    const providerAdapterEl = document.getElementById("providerAdapter");
    const providerBaseUrlEl = document.getElementById("providerBaseUrl");
    const providerChatPathEl = document.getElementById("providerChatPath");
    const providerApiKeyEnvEl = document.getElementById("providerApiKeyEnv");
    const providerApiKeyEl = document.getElementById("providerApiKey");
    const newModelIdEl = document.getElementById("newModelId");
    const newModelLabelEl = document.getElementById("newModelLabel");

    const runHistory = [];
    let providerRows = [];
    let currentProvider = "deepseek";

    function getAuthToken() {
      const current = String(sessionStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
      if (current) return current;
      const legacy = String(localStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
      if (legacy) {
        sessionStorage.setItem(AUTH_TOKEN_KEY, legacy);
        localStorage.removeItem(AUTH_TOKEN_KEY);
      }
      return legacy;
    }

    function authHeaders(extra) {
      const headers = Object.assign({}, extra || {});
      const token = getAuthToken();
      if (token) headers["X-User-Token"] = token;
      return headers;
    }

    async function apiFetch(url, options = {}) {
      const opts = Object.assign({}, options);
      opts.headers = authHeaders(opts.headers || {});
      return fetch(url, opts);
    }

    function goApp() {
      location.href = "/app";
    }

    function setStatus(text) {
      statusLineEl.textContent = String(text || "");
    }

    function testLabel(key) {
      return {
        connectivity: "连接测试",
        reasoning: "思考支持",
        image: "图片测试",
        video: "视频测试",
      }[String(key)] || key;
    }

    function providerLabel(provider) {
      return String(provider?.label || provider?.name || provider?.key || "Provider");
    }

    function selectedProvider() {
      const key = String(providerSelectEl?.value || currentProvider || "deepseek").trim();
      return providerRows.find((item) => String(item?.key || "") === key) || providerRows[0] || null;
    }

    function fillProviderForm(provider) {
      const row = provider || selectedProvider() || {};
      providerKeyEl.value = String(row.key || "");
      providerLabelEl.value = String(row.label || row.name || "");
      providerAdapterEl.value = String(row.adapter || "openai_compatible");
      providerBaseUrlEl.value = String(row.base_url || "");
      providerChatPathEl.value = String(row.chat_path || "");
      providerApiKeyEnvEl.value = String(row.api_key_env || "");
      providerApiKeyEl.value = "";
    }

    function renderProviders() {
      const rows = providerRows.length ? providerRows : [{ key: "deepseek", label: "DPSK", models: MODEL_FALLBACK }];
      providerSelectEl.innerHTML = rows.map((provider) => {
        const key = String(provider?.key || "");
        return `<option value="${escapeHtml(key)}">${escapeHtml(providerLabel(provider))}</option>`;
      }).join("");
      if (currentProvider) providerSelectEl.value = currentProvider;
      if (!providerSelectEl.value && rows[0]) providerSelectEl.value = String(rows[0].key || "deepseek");
      currentProvider = providerSelectEl.value || "deepseek";
      fillProviderForm(selectedProvider());
      renderModels();
    }

    function renderModels() {
      const provider = selectedProvider();
      const rows = Array.isArray(provider?.models) && provider.models.length ? provider.models : (provider?.key === "deepseek" ? MODEL_FALLBACK : []);
      modelSelectEl.innerHTML = rows.length
        ? rows.map((x) => {
            const id = String(x?.id || "").trim();
            const label = String(x?.label || id || "").trim();
            return `<option value="${escapeHtml(id)}">${escapeHtml(label)}</option>`;
          }).join("")
        : `<option value="">请先添加模型</option>`;
      const current = String(provider?.current_model || provider?.model || "").trim();
      if (current) modelSelectEl.value = current;
      modelListEl.innerHTML = rows.length
        ? rows.map((x) => {
            const id = String(x?.id || "").trim();
            const label = String(x?.label || id);
            return `<span class="model-pill" title="${escapeHtml(id)}"><span>${escapeHtml(label)}</span><button type="button" data-remove-model="${escapeHtml(id)}">×</button></span>`;
          }).join("")
        : `<span class="muted">当前提供商还没有模型，输入模型 ID 后添加。</span>`;
    }

    function escapeHtml(raw) {
      const s = String(raw ?? "");
      return s.replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;")
              .replaceAll("'", "&#39;");
    }

    function setRunning(flag) {
      btnRunAllEl.disabled = Boolean(flag);
      document.querySelectorAll("button.test-btn").forEach((btn) => {
        btn.disabled = Boolean(flag);
      });
    }

    function formatTime(v) {
      const s = String(v || "").trim();
      if (!s) return "-";
      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return s;
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
    }

    function renderHistory() {
      if (!Array.isArray(runHistory) || runHistory.length === 0) {
        historyWrapEl.innerHTML = `<div class="empty">尚未执行检测</div>`;
        return;
      }

      historyWrapEl.innerHTML = runHistory.map((entry, idx) => {
        const model = String(entry?.model || "unknown");
        const tests = Array.isArray(entry?.tests) ? entry.tests : [];
        const rows = Array.isArray(entry?.results) ? entry.results : [];
        const started = formatTime(entry?.started_at);
        const passCount = rows.filter((x) => String(x?.status) === "pass").length;
        const unsupportedCount = rows.filter((x) => String(x?.status) === "unsupported").length;
        const failCount = rows.filter((x) => String(x?.status) === "fail").length;
        const skippedCount = rows.filter((x) => String(x?.status) === "skipped").length;

        const tableRows = rows.length > 0
          ? rows.map((r) => {
              const status = String(r?.status || "fail");
              const latency = Number(r?.latency_ms || 0);
              const detail = String(r?.error_message || r?.raw_excerpt || "-");
              return `
                <tr>
                  <td>${escapeHtml(testLabel(String(r?.test || "")))}</td>
                  <td><span class="chip ${escapeHtml(status)}">${escapeHtml(status)}</span></td>
                  <td>${Number.isFinite(latency) ? `${latency}ms` : "-"}</td>
                  <td>${escapeHtml(String(r?.summary || ""))}</td>
                  <td><div class="mono">${escapeHtml(detail)}</div></td>
                </tr>
              `;
            }).join("")
          : `<tr><td colspan="5" style="color:#9b5f78;">无结果</td></tr>`;

        return `
          <div class="run-card">
            <div class="run-head">
              <div class="run-title">
                <span>请求 #${runHistory.length - idx}</span>
                <span class="meta-chip">模型：${escapeHtml(model)}</span>
                <span class="meta-chip">测试：${escapeHtml(tests.map(testLabel).join(" / "))}</span>
              </div>
              <div class="run-meta">
                <span class="meta-chip">时间：${escapeHtml(started)}</span>
                <span class="meta-chip">PASS ${passCount}</span>
                <span class="meta-chip">UNSUPPORTED ${unsupportedCount}</span>
                <span class="meta-chip">FAIL ${failCount}</span>
                <span class="meta-chip">SKIPPED ${skippedCount}</span>
              </div>
            </div>
            <div class="run-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th style="width: 130px;">测试项</th>
                    <th style="width: 110px;">状态</th>
                    <th style="width: 90px;">耗时</th>
                    <th style="width: 220px;">摘要</th>
                    <th>详情</th>
                  </tr>
                </thead>
                <tbody>${tableRows}</tbody>
              </table>
            </div>
          </div>
        `;
      }).join("");
    }

    async function ensureAllowed() {
      const res = await apiFetch("/auth/status");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data?.logged_in) {
        setStatus("未登录，跳转到首页...");
        setTimeout(() => { location.href = "/"; }, 500);
        return false;
      }
      const p = Number(data?.user?.perm || 0);
      const LLM_EXECUTE_PERM = 4;
      if ((p & LLM_EXECUTE_PERM) !== LLM_EXECUTE_PERM) {
        setStatus("当前账户无 LLM 权限，无法执行模型检测");
        setRunning(true);
        return false;
      }
      return true;
    }

    async function loadModels() {
      try {
        const res = await apiFetch("/model");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        providerRows = Array.isArray(data?.providers) ? data.providers : [];
        currentProvider = String(data?.current_provider || providerRows[0]?.key || "deepseek");
        renderProviders();
      } catch (e) {
        providerRows = [{ key: "deepseek", label: "DPSK", models: MODEL_FALLBACK }];
        currentProvider = "deepseek";
        renderProviders();
      }
    }

    async function saveProvider() {
      if (!(await ensureAllowed())) return;
      const key = String(providerKeyEl.value || "").trim();
      if (!key) {
        setStatus("Provider Key 不能为空");
        return;
      }
      try {
        const payload = {
          key,
          label: String(providerLabelEl.value || key).trim(),
          name: String(providerLabelEl.value || key).trim(),
          adapter: String(providerAdapterEl.value || "openai_compatible").trim(),
          base_url: String(providerBaseUrlEl.value || "").trim(),
          chat_path: String(providerChatPathEl.value || "").trim(),
          api_key_env: String(providerApiKeyEnvEl.value || "").trim(),
          api_key: String(providerApiKeyEl.value || "").trim(),
          enabled: true,
        };
        const res = await apiFetch("/model-data/providers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
        providerRows = Array.isArray(data?.providers) ? data.providers : providerRows;
        currentProvider = key;
        renderProviders();
        setStatus(`已保存提供商：${key}`);
      } catch (e) {
        setStatus(`保存提供商失败：${String(e?.message || e)}`);
      }
    }

    async function addModel() {
      if (!(await ensureAllowed())) return;
      const provider = String(providerSelectEl.value || providerKeyEl.value || "deepseek").trim();
      const modelId = String(newModelIdEl.value || "").trim();
      const label = String(newModelLabelEl.value || modelId).trim();
      if (!modelId) {
        setStatus("模型 ID 不能为空");
        return;
      }
      try {
        const res = await apiFetch("/model-data/models", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ provider, model_id: modelId, label }),
        });
        const data = await res.json();
        if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
        providerRows = Array.isArray(data?.providers) ? data.providers : providerRows;
        currentProvider = provider;
        newModelIdEl.value = "";
        newModelLabelEl.value = "";
        renderProviders();
        modelSelectEl.value = modelId;
        setStatus(`已添加模型：${modelId}`);
      } catch (e) {
        setStatus(`添加模型失败：${String(e?.message || e)}`);
      }
    }

    async function removeModel(modelId) {
      const provider = String(providerSelectEl.value || "deepseek").trim();
      if (!modelId || !(await ensureAllowed())) return;
      try {
        const res = await apiFetch(`/model-data/models?provider=${encodeURIComponent(provider)}&model_id=${encodeURIComponent(modelId)}`, {
          method: "DELETE",
        });
        const data = await res.json();
        if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
        providerRows = Array.isArray(data?.providers) ? data.providers : providerRows;
        currentProvider = provider;
        renderProviders();
        setStatus(`已删除模型：${modelId}`);
      } catch (e) {
        setStatus(`删除模型失败：${String(e?.message || e)}`);
      }
    }

    async function runByTests(tests) {
      if (!Array.isArray(tests) || tests.length === 0) return;
      if (!(await ensureAllowed())) return;

      setRunning(true);
      setStatus(`检测中：${tests.map(testLabel).join(" / ")} ...`);

      try {
        const payload = {
          provider: String(providerSelectEl.value || currentProvider || "deepseek").trim(),
          model: String(modelSelectEl.value || "").trim(),
          tests,
          image_url: String(imageUrlEl.value || "").trim(),
          video_url: String(videoUrlEl.value || "").trim(),
        };
        const res = await apiFetch("/model-diagnostics/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok || data?.ok === false) {
          throw new Error(String(data?.error || `HTTP ${res.status}`));
        }

        runHistory.unshift({
          provider: String(data?.provider || payload.provider || ""),
          model: String(data?.model || payload.model || ""),
          tests: tests.slice(),
          started_at: String(data?.started_at || ""),
          finished_at: String(data?.finished_at || ""),
          results: Array.isArray(data?.results) ? data.results : [],
        });

        if (runHistory.length > 10) runHistory.length = 10;

        renderHistory();
        setStatus(`完成：${String(data?.model || "")}`);
      } catch (e) {
        setStatus(`检测失败：${String(e?.message || e)}`);
      } finally {
        setRunning(false);
      }
    }

    async function runAll() {
      await runByTests(["connectivity", "reasoning", "image", "video"]);
    }

    async function runSingle(key) {
      await runByTests([String(key || "")]);
    }

    providerSelectEl.addEventListener("change", () => {
      currentProvider = String(providerSelectEl.value || "deepseek");
      fillProviderForm(selectedProvider());
      renderModels();
    });

    modelListEl.addEventListener("click", (event) => {
      const btn = event.target?.closest?.("button[data-remove-model]");
      if (!btn) return;
      removeModel(btn.getAttribute("data-remove-model") || "");
    });

    (async () => {
      await loadModels();
      await ensureAllowed();
      renderHistory();
    })();
  </script>
  <script src="/theme_toggle.js"></script>
</body>
</html>
