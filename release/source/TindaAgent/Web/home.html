<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TindaAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff5f9;
      --surface: #ffffff;
      --surface-2: #fef0f5;
      --border: #fcd5e5;
      --border-strong: #f9a8c9;
      --text: #3d1f2f;
      --text-dim: #9b5f78;
      --text-faint: #d4a0b5;
      --accent: #ff6eb4;
      --accent-2: #ff9fd3;
      --accent-deep: #c2185b;
      --lavender: #a78bfa;
      --gradient: #ff6eb4;
      --gradient-lavender: #c084fc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    body { display: flex; flex-direction: column; position: relative;
           animation: pageIn 0.42s cubic-bezier(0.4, 0, 0.2, 1) both; }

    /* ── 浮动装饰 ── */
    .deco {
      position: fixed; pointer-events: none;
      z-index: 0; user-select: none; opacity: 0;
      animation: floatUp linear infinite;
    }
    .deco svg {
      display: block;
      width: 1em;
      height: 1em;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);    opacity: 0.28; }
      50%  { opacity: 0.52; }
      100% { transform: translateY(-50px) rotate(20deg); opacity: 0.28; }
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1.5px solid var(--border);
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 15.5px;
    }

    .brand-logo {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(255,110,180,0.38);
      animation: wiggle 3.5s ease-in-out infinite; flex-shrink: 0;
    }
    .brand-logo svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg); }
    }

    .brand-name {
      background: var(--gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version-badge {
      font-size: 10.5px; color: var(--text-faint);
      background: var(--surface-2);
      padding: 2px 9px; border-radius: 999px;
      border: 1.5px solid var(--border); font-weight: 700;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      word-break: normal;
      line-break: auto;
      flex-shrink: 0;
    }
    .version-badge-btn {
      border: 1.5px solid var(--border);
      cursor: pointer;
      font-family: inherit;
      line-height: 1.35;
      transition: all 0.18s ease;
    }
    .version-badge-btn:hover {
      border-color: var(--accent-2);
      color: var(--accent-deep);
      background: var(--surface);
      transform: translateY(-1px);
    }
    .version-badge-btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 110, 180, 0.2);
    }

    .header-decos {
      display: flex; align-items: center; gap: 7px;
      opacity: 0.5; user-select: none;
    }
    .header-decos .dot {
      width: 6px; height: 6px; border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(255,110,180,0.12);
    }

    /* ── Main hero ── */
    main {
      position: relative; z-index: 1;
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 24px 20px;
    }

    .hero {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      text-align: center;
      animation: heroFadeIn 0.7s cubic-bezier(0.34,1.3,0.64,1) forwards;
    }
    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative; cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .avatar-wrap:hover { transform: scale(1.08); }
    .avatar-wrap:active { transform: scale(0.95); }

    .avatar-circle {
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(255,110,180,0.32);
      animation: floatAvatar 3.5s ease-in-out infinite;
    }
    .avatar-circle svg {
      width: 52px;
      height: 52px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes floatAvatar {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-10px) rotate(3deg); }
    }

    .avatar-badge {
      position: absolute; bottom: 2px; right: 2px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--gradient-lavender);
      border: 2.5px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-badge svg {
      width: 11px;
      height: 11px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Title ── */
    .hero-title {
      font-size: 28px; font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .sparkle-row {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      opacity: 0.55; user-select: none;
      margin: -6px 0;
    }
    .sparkle-row svg {
      width: 13px;
      height: 13px;
      stroke: var(--text-dim);
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hero-subtitle {
      font-size: 13.5px; color: var(--text-dim);
      font-weight: 500; max-width: 300px;
    }

    /* ── Feature tags ── */
    .tags {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      padding: 5px 14px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tag:hover {
      background: var(--surface-2);
      border-color: var(--accent-2); color: var(--accent-deep);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 6px 16px rgba(255,110,180,0.15);
    }
    .tag-icon {
      width: 13px; height: 13px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tag-icon svg {
      width: 13px; height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Open chat button ── */
    .btn-chat {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      width: 280px;
      padding: 14px 32px;
      background: var(--gradient);
      color: #fff; border: none;
      border-radius: 999px;
      font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 6px 24px rgba(255,110,180,0.35);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      letter-spacing: 0.5px;
      margin-top: 6px;
    }
    .btn-chat:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 12px 32px rgba(255,110,180,0.45);
    }
    .btn-chat:active { transform: scale(0.97); }
    .btn-chat:disabled,
    .btn-chat.disabled {
      opacity: 0.55;
      pointer-events: none;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-chat-icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    .btn-admin {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 280px;
      padding: 11px 30px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 6px 20px rgba(61,31,47,0.06);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn-admin.show { display: flex; }
    .btn-admin:hover {
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-2px);
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(61,31,47,0.25);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open {
      opacity: 1; pointer-events: auto;
    }
    .modal-overlay.login-required .modal-close { display: none; }

    .modal-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 28px;
      width: 100%; max-width: 320px;
      padding: 28px 24px 24px;
      box-shadow: 0 20px 60px rgba(255,110,180,0.18), 0 4px 20px rgba(0,0,0,0.06);
      transform: scale(0.88) translateY(16px);
      transition: transform 0.32s cubic-bezier(0.34,1.4,0.64,1);
      display: flex; flex-direction: column; gap: 20px;
      position: relative;
    }
    .modal-overlay.open .modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface-2); border: 1.5px solid var(--border);
      color: var(--text-dim);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-close svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .modal-close:hover {
      background: var(--border); color: var(--text);
      transform: rotate(90deg) scale(1.1);
    }

    .modal-avatar-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }

    .modal-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(255,110,180,0.28);
    }
    .modal-avatar svg {
      width: 36px;
      height: 36px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .modal-username {
      font-size: 17px; font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Info rows ── */
    .modal-divider {
      height: 1px; background: var(--border); margin: -4px 0;
    }

    .info-list {
      display: flex; flex-direction: column; gap: 10px;
    }

    .info-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 12px;
      background: var(--surface-2); border: 1.5px solid var(--border);
    }

    .info-icon {
      width: 16px; height: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0; opacity: 0.7;
    }
    .info-icon svg {
      width: 16px; height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .info-label {
      font-size: 11.5px; color: var(--text-faint);
      font-weight: 700; min-width: 48px;
    }

    .info-value {
      flex: 1; text-align: right;
      font-size: 12.5px; color: var(--text-faint);
      font-weight: 600;
      display: flex; align-items: center; justify-content: flex-end; gap: 5px;
      word-break: break-all;
    }
    .info-value .lock { font-size: 11px; opacity: 0.6; }
    .switch-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }
    .switch-row select {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--text);
      background: var(--surface);
      font-family: inherit;
      outline: none;
    }
    .switch-row select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 110, 180, 0.11);
    }
    .switch-btn {
      border: none;
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: var(--gradient);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .switch-btn:hover { opacity: 0.92; }
    .switch-btn:disabled { opacity: 0.58; cursor: not-allowed; }
    .login-tip {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface-2);
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      text-align: center;
      line-height: 1.45;
    }
    .auth-msg {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      min-height: 18px;
    }

    #versionModalOverlay { z-index: 120; }
    .version-modal-card {
      max-width: 760px;
      max-height: min(82vh, 760px);
      padding: 22px 20px 16px;
      gap: 10px;
    }
    .version-modal-head {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-right: 32px;
    }
    .version-modal-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    .version-modal-subtitle {
      font-size: 12px;
      color: var(--text-dim);
    }
    .version-top-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .version-current {
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      border-radius: 12px;
      padding: 9px 10px;
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.55;
      white-space: pre-line;
    }
    .version-msg {
      min-height: 20px;
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 12px;
      color: var(--text-dim);
      border: 1px solid transparent;
      background: transparent;
    }
    .version-msg[data-kind="error"] {
      color: #b42318;
      border-color: #fecaca;
      background: #fff1f2;
    }
    .version-msg[data-kind="success"] {
      color: #065f46;
      border-color: #a7f3d0;
      background: #ecfdf5;
    }
    .version-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      overflow: auto;
      padding-right: 2px;
    }
    .version-section {
      border: 1.5px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
    }
    .version-section-title {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 800;
      color: var(--text-dim);
    }
    .version-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      overflow: auto;
    }
    .version-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      padding: 8px 9px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 84px;
      max-width: 100%;
    }
    .version-item-main {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      width: 100%;
      max-width: 100%;
    }
    .version-item-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
      word-break: normal;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .version-item-meta {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.4;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      min-width: 0;
      text-align: left;
      max-width: 100%;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }
    .version-item-actions {
      display: flex;
      justify-content: flex-end;
      gap: 7px;
    }
    .version-btn {
      border: none;
      border-radius: 8px;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 800;
      color: #fff;
      background: var(--gradient);
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.18s ease;
    }
    .version-btn:hover { opacity: 0.9; }
    .version-btn.secondary {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-dim);
    }
    .version-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .version-empty {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      background: var(--surface-2);
    }

    @media (max-width: 640px) {
      .hero { gap: 13px; }
      .hero-title { font-size: 24px; }
      .btn-chat { width: 240px; font-size: 15px; }
      .header-decos { display: none; }
      .version-sections { grid-template-columns: 1fr; max-height: 44vh; }
      .version-modal-card { padding: 18px 14px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.8v4.2M12 17v4.2M2.8 12h4.2M17 12h4.2M5.3 5.3l3 3M15.7 15.7l3 3M18.7 5.3l-3 3M8.3 15.7l-3 3"></path></svg>
    </div>
    <span class="brand-name">TindaAgent</span>
    <button id="versionBadge" type="button" class="version-badge version-badge-btn" title="点击选择版本">v1.7.5</button>
  </div>
  <span class="header-decos" aria-hidden="true"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
</header>

<main>
  <div class="hero">

    <!-- 头像 -->
    <div class="avatar-wrap" onclick="openModal()" title="点击查看账户">
      <div class="avatar-circle" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M9 3h6"></path><path d="M12 3v4"></path><rect x="5" y="7" width="14" height="14" rx="3"></rect><path d="M9 12h.01M15 12h.01M9 16h6"></path></svg>
      </div>
      <div class="avatar-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="8" r="3.2"></circle></svg>
      </div>
    </div>

    <!-- 标题 -->
    <div class="hero-title">TindaAgent</div>
    <div class="sparkle-row" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
      <svg viewBox="0 0 24 24"><path d="M12 4l2.2 4.9L19 10l-4.8 2.1L12 17l-2.2-4.9L5 10l4.8-2.1z"></path></svg>
      <svg viewBox="0 0 24 24"><path d="M12 2.8v4M12 17.2v4M2.8 12h4M17.2 12h4"></path><circle cx="12" cy="12" r="3"></circle></svg>

        <div class="version-section-title">已安装版本</div>

      <section class="version-section">

<script>
  function smoothNavigate(url) {
    document.body.style.animation  = "none";
    document.body.style.transition = "opacity 0.22s ease, transform 0.22s ease";
    document.body.style.opacity    = "0";
    document.body.style.transform  = "translateY(-8px) scale(0.99)";
    setTimeout(() => { location.href = url; }, 240);
  }

  const ui = {
    name: document.getElementById("u_name"),
    uid: document.getElementById("u_uid"),
    perm: document.getElementById("u_perm"),
    token: document.getElementById("u_token"),
    switchSelect: document.getElementById("u_switch_select"),
    switchBtn: document.getElementById("u_switch_btn"),
    adminBtn: document.getElementById("adminBtn"),
    logsBtn: document.getElementById("logsBtn"),
    chatBtn: document.querySelector(".btn-chat"),
    loginTip: document.getElementById("loginTip"),
    authMsg: document.getElementById("authMsg"),
    modalOverlay: document.getElementById("modalOverlay"),
    versionBadge: document.getElementById("versionBadge"),
    versionModalOverlay: document.getElementById("versionModalOverlay"),
    versionCurrentInfo: document.getElementById("versionCurrentInfo"),
    versionModalMsg: document.getElementById("versionModalMsg"),
    versionLocalList: document.getElementById("versionLocalList"),
    versionRemoteList: document.getElementById("versionRemoteList"),
    versionSnapshotBtn: document.getElementById("versionSnapshotBtn"),
  };
  const USER_ADMIN_PERM = 511;
  let authState = { logged_in: false, user: null };
  let versionModalBusy = false;
  const AUTH_TOKEN_KEY = "ta_auth_token";

  function normalizeVersion(v) {
    const raw = String(v || "").trim();
    if (!raw) return "";
    return raw.replace(/^v/i, "");
  }

  function withV(v) {
    const n = normalizeVersion(v);
    return n ? `v${n}` : "-";
  }

  function isAdminLoggedIn() {
    return Boolean(authState?.logged_in && authState?.user && isAdminUser(authState.user));
  }

  function asDateTime(isoText) {
    const txt = String(isoText || "").trim();
    if (!txt) return "";
    try {
      const d = new Date(txt);
      if (!Number.isNaN(d.getTime())) return d.toLocaleString();
    } catch {}
    return txt;
  }

  async function readJsonSafe(res) {
    try {
      return await res.json();
    } catch {
      return {};
    }
  }

  function getAuthToken() {
    return String(localStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
  }

  function setAuthToken(token) {
    const t = String(token || "").trim();
    if (!t) {
      localStorage.removeItem(AUTH_TOKEN_KEY);
      return;
    }
    localStorage.setItem(AUTH_TOKEN_KEY, t);
  }

  function authHeaders(extra) {
    const headers = Object.assign({}, extra || {});
    const token = getAuthToken();
    if (token) headers["X-User-Token"] = token;
    return headers;
  }

  async function apiFetch(url, options = {}) {
    const opts = Object.assign({}, options);
    opts.headers = authHeaders(opts.headers || {});
    return fetch(url, opts);
  }

  async function syncVersionBadge() {
    if (!ui.versionBadge) return;
    try {
      const res = await fetch("/system/version", { method: "GET" });
      const data = res.ok ? await res.json() : {};
      const display = String(data?.display || "").trim();
      const sig = String(data?.signature_id || "").trim();
      const verified = Boolean(data?.verified);
      if (display) {
        if (sig) {
          ui.versionBadge.textContent = `${display} ${verified ? "signed" : "unsigned"}`;
          ui.versionBadge.title = `当前 ${display} (${verified ? "已签名验证" : "未验证签名"})`;
        } else {
          ui.versionBadge.textContent = display;
          ui.versionBadge.title = `当前 ${display}`;
        }
      }
    } catch {}
  }

  function setVersionModalMessage(text, kind = "") {
    if (!ui.versionModalMsg) return;
    ui.versionModalMsg.textContent = String(text || "");
    if (kind) {
      ui.versionModalMsg.dataset.kind = kind;
    } else {
      delete ui.versionModalMsg.dataset.kind;
    }
  }

  function renderVersionCurrentInfo(current) {
    if (!ui.versionCurrentInfo) return;
    const effectiveVersionText = withV(current?.effective_version || current?.running_version || current?.version || current?.display);
    const selectedVersionText = withV(current?.selected_version || current?.effective_version || current?.running_version || current?.version || current?.display);
    const selectedVersionRawText = withV(current?.selected_version_raw || current?.selected_version || current?.effective_version || current?.running_version || current?.version || current?.display);
    const consistent = Boolean(current?.version_consistent !== false);
    const verified = Boolean(current?.verified);
    const sigRaw = String(current?.signature_id || "").trim();
    const sig = sigRaw || "N/A";
    const source = String(current?.source_label || current?.source || "local");
    const verifyLabel = String(current?.verify_label || (verified ? "已验证" : "未验证"));
    const switchedAt = asDateTime(current?.switched_at) || "-";
    const mismatchLine = consistent ? "" : `\n版本一致性: 异常（原始已选 ${selectedVersionRawText}）`;
    ui.versionCurrentInfo.textContent =
      `运行版本: ${effectiveVersionText}\n已选版本: ${selectedVersionText}${mismatchLine}\n签名状态: ${verifyLabel}\n签名ID: ${sig}\n来源: ${source}\n切换时间: ${switchedAt}`;
  }

  function createVersionItem(row, mode, context = {}) {
    const item = document.createElement("div");
    item.className = "version-item";

    const verNorm = normalizeVersion(row?.version);
    const verText = withV(row?.version);
    const isCurrent = Boolean(row?.is_current) || verNorm === normalizeVersion(context?.currentVersion);
    const isInstalled = Boolean(row?.installed) || Boolean(context?.installedSet?.has(verNorm));
    const verified = Boolean(row?.verified);
    const sig = String(row?.signature_id || "").trim();
    const source = String(row?.source || "local");
    const localUnsigned = source === "local" || source === "local_snapshot";
    const canAdmin = isAdminLoggedIn();

    const main = document.createElement("div");
    main.className = "version-item-main";

    const title = document.createElement("div");
    title.className = "version-item-title";
    title.textContent = verText;

    const meta = document.createElement("div");
    meta.className = "version-item-meta";
    const metaParts = [];
    if (isCurrent) metaParts.push("当前");
    if (isInstalled && !isCurrent) metaParts.push("已安装");
    if (mode === "remote") metaParts.push(verified ? "signed" : "unsigned");
    if (mode === "local") {
      if (source === "local_snapshot") metaParts.push("本地快照");
      else if (source === "local") metaParts.push("本地源码");
      else metaParts.push(source);
      metaParts.push(verified ? "已验证" : (localUnsigned ? "未签名" : "未验证"));
    }
    if (sig) metaParts.push(`sig:${sig.slice(0, 10)}...`);
    if (mode === "remote" && row?.published_at) metaParts.push(asDateTime(row.published_at));
    if (row?.verify_error && !verified) metaParts.push(`校验: ${String(row.verify_error)}`);
    meta.textContent = metaParts.join(" | ") || "-";

    main.appendChild(title);
    main.appendChild(meta);
    item.appendChild(main);

    const actions = document.createElement("div");
    actions.className = "version-item-actions";
    if (canAdmin) {
      if (mode === "remote" && !isInstalled) {
        const installBtn = document.createElement("button");
        installBtn.className = "version-btn secondary";
        installBtn.type = "button";
        installBtn.dataset.action = "install";
        installBtn.dataset.version = verNorm;
        installBtn.textContent = verified ? "安装" : "不可安装";
        installBtn.disabled = versionModalBusy || !verified || !verNorm;
        actions.appendChild(installBtn);
      }

      // 按产品策略：前端不提供“切换版本”按钮，仅保留安装入口。
    }

    if (!actions.childNodes.length) {
      const hint = document.createElement("div");
      hint.className = "version-item-meta";
      hint.textContent = canAdmin ? "无可执行操作" : "仅管理员可安装";
      actions.appendChild(hint);
    }

    item.appendChild(actions);
    return item;
  }

  function renderVersionLists(payload) {
    if (!ui.versionLocalList || !ui.versionRemoteList) return;
    ui.versionLocalList.innerHTML = "";
    ui.versionRemoteList.innerHTML = "";

    const localRows = Array.isArray(payload?.local_versions) ? payload.local_versions : [];
    const remoteRows = Array.isArray(payload?.remote_versions) ? payload.remote_versions : [];
    const currentVersion = normalizeVersion(payload?.current?.selected_version || payload?.current?.version);
    const installedSet = new Set(localRows.map((x) => normalizeVersion(x?.version)).filter(Boolean));

    if (!localRows.length) {
      const empty = document.createElement("div");
      empty.className = "version-empty";
      empty.textContent = "暂无已安装版本";
      ui.versionLocalList.appendChild(empty);
    } else {
      localRows.forEach((row) => {
        ui.versionLocalList.appendChild(
          createVersionItem(row, "local", {
            currentVersion,
            installedSet,
          })
        );
      });
    }

    if (!remoteRows.length) {
      const empty = document.createElement("div");
      empty.className = "version-empty";
      empty.textContent = "暂无远端版本";
      ui.versionRemoteList.appendChild(empty);
    } else {
      remoteRows.forEach((row) => {
        ui.versionRemoteList.appendChild(
          createVersionItem(row, "remote", {
            currentVersion,
            installedSet,
          })
        );
      });
    }
  }

  async function loadVersionModalData() {
    renderVersionCurrentInfo({});
    if (ui.versionLocalList) ui.versionLocalList.innerHTML = `<div class="version-empty">加载中...</div>`;
    if (ui.versionRemoteList) ui.versionRemoteList.innerHTML = `<div class="version-empty">加载中...</div>`;

    try {
      const currentRes = await fetch("/system/version", { method: "GET" });
      const current = currentRes.ok ? await readJsonSafe(currentRes) : {};
      renderVersionCurrentInfo(current);
      await syncVersionBadge();
    } catch {
      renderVersionCurrentInfo({});
    }

    try {
      const res = await apiFetch("/system/versions", { method: "GET" });
      const data = await readJsonSafe(res);
      if (!res.ok) {
        if (res.status === 401) {
          setVersionModalMessage("请先登录后再查看版本列表。", "error");
        } else {
          setVersionModalMessage(`加载失败：${String(data?.error || `HTTP ${res.status}`)}`, "error");
        }
        renderVersionLists({});
        return;
      }
      renderVersionCurrentInfo(data?.current || {});
      renderVersionLists(data);
      if (data?.remote_ok === false || data?.error) {
        setVersionModalMessage(`已加载本地列表，远端获取异常：${String(data.error)}`, "error");
      } else {
        setVersionModalMessage(isAdminLoggedIn() ? "可选择版本安装。" : "当前账户可查看版本，安装需管理员权限。");
      }
    } catch (e) {
      setVersionModalMessage(`加载异常：${String(e?.message || e)}`, "error");
      renderVersionLists({});
    }
  }

  async function performVersionAction(action, version) {
    const ver = normalizeVersion(version);
    if (!ver || versionModalBusy) return;
    if (String(action || "") === "switch") {
      setVersionModalMessage("版本切换已禁用。", "error");
      return;
    }
    if (!isAdminLoggedIn()) {
      setVersionModalMessage("当前账户没有管理员权限。", "error");
      return;
    }
    versionModalBusy = true;
    const actionLabel = action === "install" ? "安装" : "切换";
    setVersionModalMessage(`${actionLabel} ${withV(ver)} 中...`);
    try {
      const endpoint = action === "install" ? "/system/version/install" : "/system/version/switch";
      const res = await apiFetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ version: ver }),
      });
      const data = await readJsonSafe(res);
      if (!res.ok || data?.ok === false) {
        throw new Error(String(data?.error || `HTTP ${res.status}`));
      }
      const restartHint = action === "switch" && data?.requires_restart ? "，请重启服务生效。" : "";
      setVersionModalMessage(`${actionLabel}成功: ${withV(ver)}${restartHint}`, "success");
    } catch (e) {
      setVersionModalMessage(`${actionLabel}失败：${String(e?.message || e)}`, "error");
    } finally {
      versionModalBusy = false;
      await loadVersionModalData();
    }
  }

  async function createVersionSnapshot() {
    if (versionModalBusy) return;
    if (!isAdminLoggedIn()) {
      setVersionModalMessage("当前账户没有管理员权限。", "error");
      return;
    }
    const seed = normalizeVersion(prompt("输入本地快照版本号（例如 1.6.6-local1）", ""));
    if (!seed) return;
    versionModalBusy = true;
    setVersionModalMessage(`创建本地快照 ${withV(seed)} 中...`);
    try {
      const res = await apiFetch("/system/version/snapshot", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ version: seed }),
      });
      const data = await readJsonSafe(res);
      if (!res.ok || data?.ok === false) {
        throw new Error(String(data?.error || `HTTP ${res.status}`));
      }
      setVersionModalMessage(`本地快照创建成功: ${withV(seed)}`, "success");
    } catch (e) {
      setVersionModalMessage(`本地快照创建失败：${String(e?.message || e)}`, "error");
    } finally {
      versionModalBusy = false;
      await loadVersionModalData();
    }
  }

  function maskToken(token) {
    const t = String(token || "");
    if (t.length <= 12) return t || "-";
    return `${t.slice(0, 8)}...${t.slice(-6)}`;
  }

  function setAuthMessage(text) {
    if (!ui.authMsg) return;
    ui.authMsg.textContent = String(text || "");
  }

  function isAdminUser(user) {
    const p = Number(user?.perm ?? 0);
    return Number.isFinite(p) && ((p & USER_ADMIN_PERM) === USER_ADMIN_PERM);
  }

  function updateAuthUI() {
    const loggedIn = Boolean(authState?.logged_in && authState?.user);
    if (ui.chatBtn) ui.chatBtn.classList.toggle("disabled", !loggedIn);
    if (ui.adminBtn) ui.adminBtn.classList.toggle("show", loggedIn && isAdminUser(authState.user));
    if (ui.logsBtn) ui.logsBtn.classList.toggle("show", loggedIn);
    if (ui.loginTip) ui.loginTip.style.display = loggedIn ? "none" : "block";
    if (ui.modalOverlay) {
      if (!loggedIn) {
        ui.modalOverlay.classList.add("open");
        ui.modalOverlay.classList.add("login-required");
      } else {
        ui.modalOverlay.classList.remove("login-required");
      }
    }
  }

  async function loadAuthStatus() {
    try {
      const res = await apiFetch("/auth/status", { method: "GET" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      authState = {
        logged_in: Boolean(data?.logged_in),
        user: data?.user || null,
      };
      updateAuthUI();
      if (authState.logged_in) await loadProfile();
    } catch (e) {
      authState = { logged_in: false, user: null };
      updateAuthUI();
      setAuthMessage(`读取登录状态失败：${String(e?.message || e)}`);
    }
  }

  async function loadProfile() {
    try {
      const res = await apiFetch("/user/profile", { method: "GET" });
      if (res.status === 401) {
        ui.name.textContent = "未登录";
        ui.uid.textContent = "-";
        ui.perm.textContent = "-";
        ui.perm.title = "";
        ui.token.textContent = "-";
        ui.token.title = "";
        return;
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      ui.name.textContent = data.name || "-";
      ui.uid.textContent = data.uid || "-";
      const permValue = Number(data.perm ?? 0);
      const permLabel = data.perm_label || "UNKNOWN";
      ui.perm.textContent = String(permValue);
      ui.perm.title = permLabel;
      ui.token.textContent = maskToken(data.token);
      ui.token.title = String(data.token || "");
    } catch (e) {
      ui.name.textContent = "加载失败";
      ui.uid.textContent = "加载失败";
      ui.perm.textContent = "加载失败";
      ui.perm.title = "";
      ui.token.textContent = "加载失败";
      ui.token.title = "";
    }
  }

  function renderUserOptions(users, currentUid) {
    if (!ui.switchSelect) return;
    ui.switchSelect.innerHTML = "";
    if (!Array.isArray(users) || users.length === 0) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "无可用账户";
      ui.switchSelect.appendChild(opt);
      ui.switchSelect.disabled = true;
      if (ui.switchBtn) ui.switchBtn.disabled = true;
      return;
    }
    users.forEach((u) => {
      const opt = document.createElement("option");
      opt.value = String(u.uid || "");
      opt.textContent = `${u.name || "-"} (${u.uid || "-"}) perm=${Number(u.perm ?? 0)}`;
      if (String(u.uid || "") === String(currentUid || "")) opt.selected = true;
      ui.switchSelect.appendChild(opt);
    });
    ui.switchSelect.disabled = false;
    if (ui.switchBtn) ui.switchBtn.disabled = false;
  }

  async function loadUsersAndSelection() {
    try {
      const res = await apiFetch("/auth/users", { method: "GET" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      window.__authUsersCache = Array.isArray(data?.users) ? data.users : [];
      const selectedUid = authState?.user?.uid || "";
      renderUserOptions(data.users || [], selectedUid);
    } catch {
      window.__authUsersCache = [];
      renderUserOptions([], "");
    }
  }

  async function switchSelectedUser() {
    if (!ui.switchSelect || !ui.switchBtn) return;
    const uid = String(ui.switchSelect.value || "").trim();
    if (!uid) return;
    const oldText = ui.switchBtn.textContent;
    ui.switchBtn.disabled = true;
    ui.switchBtn.textContent = "切换中...";
    try {
      const cachedUsers = Array.isArray(window.__authUsersCache) ? window.__authUsersCache : [];
      const target = cachedUsers.find((x) => String(x?.uid || "") === uid) || null;
      const token = String(target?.token || "").trim();
      if (!token) throw new Error("目标账户缺少 token");
      setAuthToken(token);

      const res = await apiFetch("/auth/select-user", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uid }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
      authState = {
        logged_in: Boolean(data?.logged_in),
        user: data?.user || null,
      };
      updateAuthUI();
      await loadProfile();
      await loadUsersAndSelection();
      if (ui.modalOverlay) ui.modalOverlay.classList.remove("open");
      setAuthMessage("登录成功");
    } catch (e) {
      console.error("switch user failed:", e);
      setAuthMessage(`登录失败：${String(e?.message || e)}`);
      setAuthToken("");
    } finally {
      ui.switchBtn.disabled = false;
      ui.switchBtn.textContent = oldText;
    }
  }

  function openModal() {
    document.getElementById("modalOverlay").classList.add("open");
  }

  function closeModal() {
    if (!authState.logged_in) return;
    document.getElementById("modalOverlay").classList.remove("open");
  }

  function closeModalOnBackdrop(e) {
    if (e.target === document.getElementById("modalOverlay")) closeModal();
  }

  function openVersionModal() {
    if (!ui.versionModalOverlay) return;
    ui.versionModalOverlay.classList.add("open");
    setVersionModalMessage("");
    loadVersionModalData();
  }

  function closeVersionModal() {
    if (!ui.versionModalOverlay) return;
    ui.versionModalOverlay.classList.remove("open");
  }

  function closeVersionModalOnBackdrop(e) {
    if (e.target === ui.versionModalOverlay) closeVersionModal();
  }

  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (ui.versionModalOverlay?.classList.contains("open")) {
      closeVersionModal();
      return;
    }
    closeModal();
  });
  ui.versionBadge?.addEventListener("click", openVersionModal);
  ui.versionSnapshotBtn?.addEventListener("click", createVersionSnapshot);
  ui.versionLocalList?.addEventListener("click", (e) => {
    const btn = e.target?.closest?.("button[data-action][data-version]");
    if (!btn) return;
    performVersionAction(String(btn.dataset.action || ""), String(btn.dataset.version || ""));
  });
  ui.versionRemoteList?.addEventListener("click", (e) => {
    const btn = e.target?.closest?.("button[data-action][data-version]");
    if (!btn) return;
    performVersionAction(String(btn.dataset.action || ""), String(btn.dataset.version || ""));
  });
  ui.chatBtn?.addEventListener("click", (e) => {
    if (!authState.logged_in) {
      e.preventDefault();
      setAuthMessage("请先选择账户登录");
      openModal();
      return;
    }
    e.preventDefault();
    smoothNavigate("/app");
  });
  ui.adminBtn?.addEventListener("click", (e) => {
    e.preventDefault();
    if (!authState.logged_in) {
      setAuthMessage("请先选择账户登录");
      openModal();
      return;
    }
    if (!isAdminUser(authState.user)) {
      setAuthMessage("当前账户没有管理员权限");
      return;
    }
    smoothNavigate("/user-admin");
  });
  ui.logsBtn?.addEventListener("click", (e) => {
    e.preventDefault();
    if (!authState.logged_in) {
      setAuthMessage("请先选择账户登录");
      openModal();
      return;
    }
    smoothNavigate("/logs");
  });

  ui.switchBtn?.addEventListener("click", switchSelectedUser);
  syncVersionBadge();
  loadAuthStatus();
  loadUsersAndSelection();
</script>
</body>
</html>
