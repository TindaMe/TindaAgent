<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TindaAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff5f9;
      --surface: #ffffff;
      --surface-2: #fef0f5;
      --border: #fcd5e5;
      --border-strong: #f9a8c9;
      --text: #3d1f2f;
      --text-dim: #9b5f78;
      --text-faint: #d4a0b5;
      --accent: #ff6eb4;
      --accent-2: #ff9fd3;
      --accent-deep: #c2185b;
      --lavender: #a78bfa;
      --gradient: #ff6eb4;
      --gradient-lavender: #c084fc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    body { display: flex; flex-direction: column; position: relative;
           animation: pageIn 0.42s cubic-bezier(0.4, 0, 0.2, 1) both; }

    /* ── 背景光晕 ── */
    body::before {
      content: "";
      position: fixed;
      top: -15%; right: -10%;
      width: 560px; height: 560px;
      background: rgba(255,110,180,0.08);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: "";
      position: fixed;
      bottom: -20%; left: -10%;
      width: 500px; height: 500px;
      background: rgba(167,139,250,0.06);
      pointer-events: none; z-index: 0;
    }

    /* ── 浮动装饰 ── */
    .deco {
      position: fixed; pointer-events: none;
      z-index: 0; user-select: none; opacity: 0;
      animation: floatUp linear infinite;
    }
    .deco svg {
      display: block;
      width: 1em;
      height: 1em;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);    opacity: 0.28; }
      50%  { opacity: 0.52; }
      100% { transform: translateY(-50px) rotate(20deg); opacity: 0.28; }
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1.5px solid var(--border);
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 15.5px;
    }

    .brand-logo {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(255,110,180,0.38);
      animation: wiggle 3.5s ease-in-out infinite; flex-shrink: 0;
    }
    .brand-logo svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg); }
    }

    .brand-name {
      background: var(--gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version-badge {
      font-size: 10.5px; color: var(--text-faint);
      background: var(--surface-2);
      padding: 2px 9px; border-radius: 999px;
      border: 1.5px solid var(--border); font-weight: 700;
    }

    .header-decos {
      display: flex; align-items: center; gap: 7px;
      opacity: 0.5; user-select: none;
    }
    .header-decos .dot {
      width: 6px; height: 6px; border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(255,110,180,0.12);
    }

    /* ── Main hero ── */
    main {
      position: relative; z-index: 1;
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 24px 20px;
    }

    .hero {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      text-align: center;
      animation: heroFadeIn 0.7s cubic-bezier(0.34,1.3,0.64,1) forwards;
    }
    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative; cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .avatar-wrap:hover { transform: scale(1.08); }
    .avatar-wrap:active { transform: scale(0.95); }

    .avatar-circle {
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(255,110,180,0.32);
      animation: floatAvatar 3.5s ease-in-out infinite;
    }
    .avatar-circle svg {
      width: 52px;
      height: 52px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes floatAvatar {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-10px) rotate(3deg); }
    }

    .avatar-badge {
      position: absolute; bottom: 2px; right: 2px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--gradient-lavender);
      border: 2.5px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-badge svg {
      width: 11px;
      height: 11px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Title ── */
    .hero-title {
      font-size: 28px; font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .sparkle-row {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      opacity: 0.55; user-select: none;
      margin: -6px 0;
    }
    .sparkle-row svg {
      width: 13px;
      height: 13px;
      stroke: var(--text-dim);
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hero-subtitle {
      font-size: 13.5px; color: var(--text-dim);
      font-weight: 500; max-width: 300px;
    }

    /* ── Feature tags ── */
    .tags {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      padding: 5px 14px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tag:hover {
      background: var(--surface-2);
      border-color: var(--accent-2); color: var(--accent-deep);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 6px 16px rgba(255,110,180,0.15);
    }
    .tag-icon {
      width: 13px; height: 13px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tag-icon svg {
      width: 13px; height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Open chat button ── */
    .btn-chat {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      width: 280px;
      padding: 14px 32px;
      background: var(--gradient);
      color: #fff; border: none;
      border-radius: 999px;
      font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 6px 24px rgba(255,110,180,0.35);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      letter-spacing: 0.5px;
      margin-top: 6px;
    }
    .btn-chat:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 12px 32px rgba(255,110,180,0.45);
    }
    .btn-chat:active { transform: scale(0.97); }
    .btn-chat:disabled,
    .btn-chat.disabled {
      opacity: 0.55;
      pointer-events: none;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-chat-icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    .btn-admin {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 280px;
      padding: 11px 30px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 6px 20px rgba(61,31,47,0.06);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn-admin.show { display: flex; }
    .btn-admin:hover {
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-2px);
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(61,31,47,0.25);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open {
      opacity: 1; pointer-events: auto;
    }
    .modal-overlay.login-required .modal-close { display: none; }

    .modal-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 28px;
      width: 100%; max-width: 320px;
      padding: 28px 24px 24px;
      box-shadow: 0 20px 60px rgba(255,110,180,0.18), 0 4px 20px rgba(0,0,0,0.06);
      transform: scale(0.88) translateY(16px);
      transition: transform 0.32s cubic-bezier(0.34,1.4,0.64,1);
      display: flex; flex-direction: column; gap: 20px;
      position: relative;
    }
    .modal-overlay.open .modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface-2); border: 1.5px solid var(--border);
      color: var(--text-dim);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-close svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .modal-close:hover {
      background: var(--border); color: var(--text);
      transform: rotate(90deg) scale(1.1);
    }

    .modal-avatar-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }

    .modal-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(255,110,180,0.28);
    }
    .modal-avatar svg {
      width: 36px;
      height: 36px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .modal-username {
      font-size: 17px; font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Info rows ── */
    .modal-divider {
      height: 1px; background: var(--border); margin: -4px 0;
    }

    .info-list {
      display: flex; flex-direction: column; gap: 10px;
    }

    .info-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 12px;
      background: var(--surface-2); border: 1.5px solid var(--border);
    }

    .info-icon {
      width: 16px; height: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0; opacity: 0.7;
    }
    .info-icon svg {
      width: 16px; height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .info-label {
      font-size: 11.5px; color: var(--text-faint);
      font-weight: 700; min-width: 48px;
    }

    .info-value {
      flex: 1; text-align: right;
      font-size: 12.5px; color: var(--text-faint);
      font-weight: 600;
      display: flex; align-items: center; justify-content: flex-end; gap: 5px;
      word-break: break-all;
    }
    .info-value .lock { font-size: 11px; opacity: 0.6; }
    .switch-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }
    .switch-row select {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--text);
      background: var(--surface);
      font-family: inherit;
      outline: none;
    }
    .switch-row select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 110, 180, 0.11);
    }
    .switch-btn {
      border: none;
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: var(--gradient);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .switch-btn:hover { opacity: 0.92; }
    .switch-btn:disabled { opacity: 0.58; cursor: not-allowed; }
    .login-tip {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface-2);
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      text-align: center;
      line-height: 1.45;
    }
    .auth-msg {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      min-height: 18px;
    }

    @media (max-width: 640px) {
      .hero { gap: 13px; }
      .hero-title { font-size: 24px; }
      .btn-chat { width: 240px; font-size: 15px; }
      .header-decos { display: none; }
    }
  </style>
</head>

      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.8v4.2M12 17v4.2M2.8 12h4.2M17 12h4.2M5.3 5.3l3 3M15.7 15.7l3 3M18.7 5.3l-3 3M8.3 15.7l-3 3"></path></svg>

      <span class="tag"><span class="tag-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 6h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H11l-4.5 3v-3H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"></path></svg></span>智能对话</span>
      <span class="tag"><span class="tag-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a2.8 2.8 0 1 0-4-4l-1 1a2.8 2.8 0 0 0 0 4"></path><path d="M9.3 17.7a2.8 2.8 0 1 0 4 4l1-1a2.8 2.8 0 0 0 0-4"></path><path d="M8 12h8"></path></svg></span>工具调用</span>
      <span class="tag"><span class="tag-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3l7 3v6c0 4.2-2.9 7.8-7 8.8-4.1-1-7-4.6-7-8.8V6z"></path><path d="M9.5 12.5l1.8 1.8 3.4-3.4"></path></svg></span>权限管理</span>
      <span class="tag"><span class="tag-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M16 7h3a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-3"></path><path d="M8 17H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3"></path><path d="M9 12h6"></path></svg></span>可扩展</span>
    </div>

    <!-- 打开聊天按钮 -->
    <a class="btn-chat" href="/app">
      <svg class="btn-chat-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 6h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H11l-4.5 3v-3H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"></path>
      </svg>
      打开聊天
    </a>
    <a id="adminBtn" class="btn-admin" href="/user-admin">
      <svg class="btn-chat-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3l7 3v6c0 4.2-2.9 7.8-7 8.8-4.1-1-7-4.6-7-8.8V6z"></path>
        <path d="M9.5 12.5l1.8 1.8 3.4-3.4"></path>
      </svg>
      用户管理
    </a>
    <a id="logsBtn" class="btn-admin" href="/logs">
      <svg class="btn-chat-icon" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="4" y="4" width="16" height="16" rx="2"></rect>
        <path d="M8 9h8M8 13h8M8 17h6"></path>

      日志查看
    </a>

  </div>
</main>

<!-- 账户信息弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBackdrop(event)">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" onclick="closeModal()" aria-label="关闭">
      <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"></path></svg>
    </button>

    <div class="modal-avatar-wrap">
      <div class="modal-avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.8v4.2M12 17v4.2M2.8 12h4.2M17 12h4.2M5.3 5.3l3 3M15.7 15.7l3 3M18.7 5.3l-3 3M8.3 15.7l-3 3"></path></svg>
      </div>
      <div class="modal-username">TindaAgent 用户</div>
    </div>

    <div class="modal-divider"></div>

    <div class="info-list">
      <div class="info-row">
        <span class="info-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="8" r="3.2"></circle></svg></span>
        <span class="info-label">用户名</span>
        <span class="info-value" id="u_name">加载中...</span>
      </div>
      <div class="info-row">
        <span class="info-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 4 5 20M13 4l-2 16M19 4l-2 16M4 10h16M3 16h16"></path></svg></span>
        <span class="info-label">UID</span>
        <span class="info-value" id="u_uid">加载中...</span>
      </div>
      <div class="info-row">
        <span class="info-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3l7 3v6c0 4.2-2.9 7.8-7 8.8-4.1-1-7-4.6-7-8.8V6z"></path><path d="M9.5 12.5l1.8 1.8 3.4-3.4"></path></svg></span>
        <span class="info-label">权限</span>
        <span class="info-value" id="u_perm">加载中...</span>
      </div>
      <div class="info-row">
        <span class="info-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="8" cy="12" r="3"></circle><path d="M11 12h10M17 9v6M20 10v4"></path></svg></span>
        <span class="info-label">Token</span>
        <span class="info-value" id="u_token">加载中...</span>
      </div>
      <div class="switch-row">
        <select id="u_switch_select" title="选择账户"></select>
        <button id="u_switch_btn" class="switch-btn" type="button">切换</button>
      </div>
      <div id="loginTip" class="login-tip">请先选择登录账户后再使用系统</div>
      <div id="authMsg" class="auth-msg"></div>
    </div>

  </div>
</div>

<script>
  function smoothNavigate(url) {
    document.body.style.animation  = "none";
    document.body.style.transition = "opacity 0.22s ease, transform 0.22s ease";
    document.body.style.opacity    = "0";
    document.body.style.transform  = "translateY(-8px) scale(0.99)";
    setTimeout(() => { location.href = url; }, 240);
  }

  const ui = {
    name: document.getElementById("u_name"),
    uid: document.getElementById("u_uid"),
    perm: document.getElementById("u_perm"),
    token: document.getElementById("u_token"),
    switchSelect: document.getElementById("u_switch_select"),
    switchBtn: document.getElementById("u_switch_btn"),
    adminBtn: document.getElementById("adminBtn"),
    logsBtn: document.getElementById("logsBtn"),
    chatBtn: document.querySelector(".btn-chat"),
    loginTip: document.getElementById("loginTip"),
    authMsg: document.getElementById("authMsg"),
    modalOverlay: document.getElementById("modalOverlay"),
    versionBadge: document.getElementById("versionBadge"),
  };
  const SYSTEM_WRITE_BIT = 1 << 7;
  let authState = { logged_in: false, user: null };
  const AUTH_TOKEN_KEY = "ta_auth_token";

  function getAuthToken() {
    return String(localStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
  }

  function setAuthToken(token) {
    const t = String(token || "").trim();
    if (!t) {
      localStorage.removeItem(AUTH_TOKEN_KEY);
      return;
    }
    localStorage.setItem(AUTH_TOKEN_KEY, t);
  }

  function authHeaders(extra) {
    const headers = Object.assign({}, extra || {});
    const token = getAuthToken();
    if (token) headers["X-User-Token"] = token;
    return headers;
  }

  async function apiFetch(url, options = {}) {
    const opts = Object.assign({}, options);
    opts.headers = authHeaders(opts.headers || {});
    return fetch(url, opts);
  }

  async function syncVersionBadge() {
    if (!ui.versionBadge) return;
    try {
      const res = await fetch("/system/version", { method: "GET" });
      const data = res.ok ? await res.json() : {};
      const display = String(data?.display || "").trim();
      if (display) ui.versionBadge.textContent = display;
    } catch {}
  }

  function maskToken(token) {
    const t = String(token || "");
    if (t.length <= 12) return t || "-";
    return `${t.slice(0, 8)}...${t.slice(-6)}`;
  }

  function setAuthMessage(text) {
    if (!ui.authMsg) return;
    ui.authMsg.textContent = String(text || "");
  }

  function isAdminUser(user) {
    const p = Number(user?.perm ?? 0);
    return Number.isFinite(p) && ((p & SYSTEM_WRITE_BIT) === SYSTEM_WRITE_BIT);
  }

  function updateAuthUI() {
    const loggedIn = Boolean(authState?.logged_in && authState?.user);
    if (ui.chatBtn) ui.chatBtn.classList.toggle("disabled", !loggedIn);
    if (ui.adminBtn) ui.adminBtn.classList.toggle("show", loggedIn && isAdminUser(authState.user));
    if (ui.logsBtn) ui.logsBtn.classList.toggle("show", loggedIn);
    if (ui.loginTip) ui.loginTip.style.display = loggedIn ? "none" : "block";
    if (ui.modalOverlay) {
      if (!loggedIn) {
        ui.modalOverlay.classList.add("open");
        ui.modalOverlay.classList.add("login-required");
      } else {
        ui.modalOverlay.classList.remove("login-required");
      }
    }
  }

  async function loadAuthStatus() {
    try {
      const res = await apiFetch("/auth/status", { method: "GET" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      authState = {
        logged_in: Boolean(data?.logged_in),
        user: data?.user || null,
      };
      updateAuthUI();
      if (authState.logged_in) await loadProfile();
    } catch (e) {
      authState = { logged_in: false, user: null };
      updateAuthUI();
      setAuthMessage(`读取登录状态失败：${String(e?.message || e)}`);
    }
  }

  async function loadProfile() {
    try {
      const res = await apiFetch("/user/profile", { method: "GET" });
      if (res.status === 401) {
        ui.name.textContent = "未登录";
        ui.uid.textContent = "-";
        ui.perm.textContent = "-";
        ui.perm.title = "";
        ui.token.textContent = "-";
        ui.token.title = "";
        return;
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      ui.name.textContent = data.name || "-";
      ui.uid.textContent = data.uid || "-";
      const permValue = Number(data.perm ?? 0);
      const permLabel = data.perm_label || "UNKNOWN";
      ui.perm.textContent = String(permValue);
      ui.perm.title = permLabel;
      ui.token.textContent = maskToken(data.token);
      ui.token.title = String(data.token || "");
    } catch (e) {
      ui.name.textContent = "加载失败";
      ui.uid.textContent = "加载失败";
      ui.perm.textContent = "加载失败";
      ui.perm.title = "";
      ui.token.textContent = "加载失败";
      ui.token.title = "";
    }
  }

  function renderUserOptions(users, currentUid) {
    if (!ui.switchSelect) return;
    ui.switchSelect.innerHTML = "";
    if (!Array.isArray(users) || users.length === 0) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "无可用账户";
      ui.switchSelect.appendChild(opt);
      ui.switchSelect.disabled = true;
      if (ui.switchBtn) ui.switchBtn.disabled = true;
      return;
    }
    users.forEach((u) => {
      const opt = document.createElement("option");
      opt.value = String(u.uid || "");
      opt.textContent = `${u.name || "-"} (${u.uid || "-"}) perm=${Number(u.perm ?? 0)}`;
      if (String(u.uid || "") === String(currentUid || "")) opt.selected = true;
      ui.switchSelect.appendChild(opt);
    });
    ui.switchSelect.disabled = false;
    if (ui.switchBtn) ui.switchBtn.disabled = false;
  }

  async function loadUsersAndSelection() {
    try {
      const res = await apiFetch("/auth/users", { method: "GET" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      window.__authUsersCache = Array.isArray(data?.users) ? data.users : [];
      const selectedUid = authState?.user?.uid || "";
      renderUserOptions(data.users || [], selectedUid);
    } catch {
      window.__authUsersCache = [];
      renderUserOptions([], "");
    }
  }

  async function switchSelectedUser() {
    if (!ui.switchSelect || !ui.switchBtn) return;
    const uid = String(ui.switchSelect.value || "").trim();
    if (!uid) return;
    const oldText = ui.switchBtn.textContent;
    ui.switchBtn.disabled = true;
    ui.switchBtn.textContent = "切换中...";
    try {
      const cachedUsers = Array.isArray(window.__authUsersCache) ? window.__authUsersCache : [];
      const target = cachedUsers.find((x) => String(x?.uid || "") === uid) || null;
      const token = String(target?.token || "").trim();
      if (!token) throw new Error("目标账户缺少 token");
      setAuthToken(token);

      const res = await apiFetch("/auth/select-user", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uid }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
      authState = {
        logged_in: Boolean(data?.logged_in),
        user: data?.user || null,
      };
      updateAuthUI();
      await loadProfile();
      await loadUsersAndSelection();
      if (ui.modalOverlay) ui.modalOverlay.classList.remove("open");
      setAuthMessage("登录成功");
    } catch (e) {
      console.error("switch user failed:", e);
      setAuthMessage(`登录失败：${String(e?.message || e)}`);
      setAuthToken("");
    } finally {
      ui.switchBtn.disabled = false;
      ui.switchBtn.textContent = oldText;
    }
  }

  function openModal() {
    document.getElementById("modalOverlay").classList.add("open");
  }

  function closeModal() {
    if (!authState.logged_in) return;
    document.getElementById("modalOverlay").classList.remove("open");
  }

  function closeModalOnBackdrop(e) {
    if (e.target === document.getElementById("modalOverlay")) closeModal();
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });
  ui.chatBtn?.addEventListener("click", (e) => {
    if (!authState.logged_in) {
      e.preventDefault();
      setAuthMessage("请先选择账户登录");
      openModal();
      return;
    }
    e.preventDefault();
    smoothNavigate("/app");
  });
  ui.adminBtn?.addEventListener("click", (e) => {
    e.preventDefault();
    if (!authState.logged_in) {
      setAuthMessage("请先选择账户登录");
      openModal();
      return;
    }
    if (!isAdminUser(authState.user)) {
      setAuthMessage("当前账户没有管理员权限");
      return;
    }
    smoothNavigate("/user-admin");
  });
  ui.logsBtn?.addEventListener("click", (e) => {
    e.preventDefault();
    if (!authState.logged_in) {
      setAuthMessage("请先选择账户登录");
      openModal();
      return;
    }
    smoothNavigate("/logs");
  });

  ui.switchBtn?.addEventListener("click", switchSelectedUser);
  syncVersionBadge();
  loadAuthStatus();
  loadUsersAndSelection();
</script>
</body>
</html>
