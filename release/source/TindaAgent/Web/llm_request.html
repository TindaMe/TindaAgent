<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TindaAgent · LLM 请求体</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("tinda_theme");
        if (t !== "dark" && t !== "light") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      } catch (e) { document.documentElement.dataset.theme = "light"; }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff5f9;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-2: rgba(254, 240, 245, 0.78);
      --border: rgba(252, 213, 229, 0.92);
      --text: #3d1f2f;
      --text-dim: #9b5f78;
      --accent: #ff6eb4;
      --accent-deep: #c2185b;
      --shadow: 0 18px 44px rgba(255, 110, 180, 0.12);
    }
    [data-theme="dark"] {
      --bg: radial-gradient(circle at 15% 8%, rgba(255, 105, 168, 0.11), transparent 32%),
            radial-gradient(circle at 84% 10%, rgba(151, 117, 255, 0.085), transparent 34%),
            linear-gradient(180deg, #120d13 0%, #0b090d 100%);
      --surface: rgba(29, 21, 29, 0.82);
      --surface-2: rgba(40, 29, 39, 0.72);
      --border: rgba(255, 194, 219, 0.13);
      --text: #f7edf3;
      --text-dim: #c8aebb;
      --accent: #ff78b7;
      --accent-deep: #ff9ac8;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Nunito', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      animation: pageIn 0.42s cubic-bezier(0.18, 0.92, 0.18, 1) both;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(10px) scale(0.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; }
    .brand-dot {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(255, 110, 180, 0.14);
    }
    .actions { display: flex; align-items: center; gap: 10px; }
    .btn {
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      padding: 0 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(255, 110, 180, 0.45); }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 24px auto 40px;
      display: grid;
      gap: 16px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title { font-size: 16px; font-weight: 900; }
    .muted { color: var(--text-dim); font-size: 12px; font-weight: 700; }
    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      padding: 16px 18px;
    }
    .stat {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface-2);
      padding: 12px;
    }
    .stat-label { color: var(--text-dim); font-size: 11px; font-weight: 800; }
    .stat-value {
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      word-break: break-all;
    }
    pre {
      margin: 0;
      padding: 18px;
      max-height: calc(100vh - 260px);
      overflow: auto;
      font-family: 'JetBrains Mono', "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      line-height: 1.65;
      color: var(--text);
      background: rgba(255, 255, 255, 0.28);
      white-space: pre-wrap;
      word-break: break-word;
    }
    [data-theme="dark"] pre { background: rgba(10, 7, 12, 0.42); }
    .empty {
      padding: 28px 18px;
      color: var(--text-dim);
      font-weight: 700;
      text-align: center;
    }
    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      header { padding: 12px 14px; }
      main { width: min(100vw - 20px, 1180px); }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span class="brand-dot"></span><span>LLM 请求体</span></div>
    <div class="actions">
      <button class="btn" id="refreshBtn" type="button">刷新</button>
      <button class="btn" id="copyBtn" type="button">复制 JSON</button>
      <a class="btn" href="/app">返回聊天</a>
    </div>
  </header>
  <main>
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">最近一次真实 SDK 请求</div>
          <div class="muted" id="logPath">等待加载...</div>
        </div>
        <div class="muted" id="loadState">未加载</div>
      </div>
      <div class="stats" id="stats"></div>
    </section>
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">Payload JSON</div>
        <div class="muted">包含实际写入 LLM 请求的 messages/tools/extra_body</div>
      </div>
      <pre id="payloadView">正在加载...</pre>
    </section>
  </main>
  <script>
    const AUTH_TOKEN_KEY = "ta_auth_token";
    let latestPayloadText = "";

    function getAuthToken() {
      const current = String(sessionStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
      if (current) return current;
      const legacy = String(localStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
      if (legacy) {
        sessionStorage.setItem(AUTH_TOKEN_KEY, legacy);
        localStorage.removeItem(AUTH_TOKEN_KEY);
      }
      return legacy;
    }

    async function apiFetch(url, options = {}) {
      const headers = { ...(options.headers || {}) };
      const token = getAuthToken();
      if (token) headers["X-User-Token"] = token;
      return fetch(url, { ...options, headers });
    }

    function setStats(summary) {
      const rows = [
        ["模型", summary.model || "-"],
        ["来源", summary.source || "-"],
        ["流式", summary.stream ? "true" : "false"],
        ["消息数", summary.message_count ?? 0],
        ["工具数", summary.tool_count ?? 0],
        ["Payload 字符", summary.payload_chars ?? 0],
        ["内容字符", summary.content_chars ?? 0],
        ["估算 token", summary.estimated_tokens ?? 0],
        ["温度", summary.temperature ?? "-"],
        ["工具策略", summary.tool_choice ?? "-"],
        ["时间", summary.ts || "-"],
      ];
      document.getElementById("stats").innerHTML = rows.map(([label, value]) => (
        `<div class="stat"><div class="stat-label">${escapeHtml(label)}</div><div class="stat-value">${escapeHtml(String(value))}</div></div>`
      )).join("");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[ch]));
    }

    async function loadLatest() {
      const state = document.getElementById("loadState");
      const view = document.getElementById("payloadView");
      const logPath = document.getElementById("logPath");
      state.textContent = "加载中...";
      try {
        const res = await apiFetch("/llm-request/latest");
        const data = await res.json();
        if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
        logPath.textContent = data.log_file || "";
        if (!data.exists) {
          latestPayloadText = "";
          setStats({});
          view.textContent = "暂无请求体。发送一次消息后再刷新。";
          state.textContent = "暂无数据";
          return;
        }
        setStats(data.summary || {});
        latestPayloadText = JSON.stringify(data.payload || {}, null, 2);
        view.textContent = latestPayloadText;
        state.textContent = "已加载";
      } catch (e) {
        latestPayloadText = "";
        view.textContent = `加载失败：${String(e?.message || e)}`;
        state.textContent = "失败";
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadLatest);
    document.getElementById("copyBtn").addEventListener("click", async () => {
      if (!latestPayloadText) return;
      try {
        await navigator.clipboard.writeText(latestPayloadText);
        document.getElementById("loadState").textContent = "已复制";
      } catch {
        document.getElementById("loadState").textContent = "复制失败";
      }
    });
    loadLatest();
  </script>
  <script src="/theme_toggle.js"></script>
</body>
</html>
