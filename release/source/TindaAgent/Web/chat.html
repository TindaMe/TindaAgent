<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TindaAgent</title>
  <script>
    /* FOUC 预防 — 必须在 CSS 解析前同步设置 data-theme */
    (function () {
      try {
        var t = localStorage.getItem("tinda_theme");
        if (t !== "dark" && t !== "light") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      } catch (e) { document.documentElement.dataset.theme = "light"; }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff5f9;
      --bg-2: #ffffff;
      --surface: #ffffff;
      --surface-2: #fef0f5;
      --border: #fcd5e5;
      --border-strong: #f9a8c9;
      --text: #3d1f2f;
      --text-dim: #9b5f78;
      --text-faint: #d4a0b5;
      --accent: #ff6eb4;
      --accent-2: #ff9fd3;
      --accent-deep: #c2185b;
      --lavender: #b39ddb;
      --lavender-2: #d1c4e9;
      --gradient: #ff6eb4;
      --gradient-lavender: #c084fc;
      --radius: 20px;
      --ios-glass: rgba(255, 238, 246, 0.74);
      --ios-glass-strong: rgba(255, 245, 250, 0.82);
      --ios-border: rgba(255, 255, 255, 0.82);
      --ios-shadow: 0 18px 44px rgba(120, 55, 82, 0.11), 0 2px 8px rgba(120, 55, 82, 0.05);
      --ios-pressed: inset 7px 7px 16px rgba(182, 104, 136, 0.12), inset -7px -7px 16px rgba(255, 255, 255, 0.82);
      --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.18, 0.92, 0.24, 1);
      --ease-glide: cubic-bezier(0.2, 0.86, 0.24, 1);
      --ease-out-terminal: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── 深色模式：对齐 HOME 的深夜樱粉玻璃 ── */
    [data-theme="dark"] {
      --bg: linear-gradient(148deg, rgba(113, 133, 226, 0.055) 0%, transparent 24%),
            linear-gradient(328deg, rgba(255, 111, 172, 0.040) 0%, transparent 25%),
            linear-gradient(180deg, #100b10 0%, #09070b 100%);
      --bg-2: rgba(18, 14, 20, 0.86);
      --surface: rgba(24, 18, 24, 0.82);
      --surface-2: rgba(32, 24, 32, 0.82);
      --border: rgba(255, 176, 211, 0.12);
      --border-strong: rgba(255, 137, 190, 0.23);
      --text: #f3e8ee;
      --text-dim: #c4a9b8;
      --text-faint: #8a7481;
      --accent: #f87eba;
      --accent-2: #ffadc9;
      --accent-deep: #ff95c8;
      --lavender: #9fa7ff;
      --lavender-2: #c6bbff;
      --gradient: #d85c95;
      --gradient-lavender: #8e93df;
      --ios-glass: rgba(18, 14, 20, 0.76);
      --ios-glass-strong: rgba(25, 19, 27, 0.84);
      --ios-border: rgba(255, 176, 211, 0.12);
      --ios-shadow: 0 24px 58px rgba(0, 0, 0, 0.38), -10px -12px 28px rgba(119, 141, 229, 0.020), 12px 15px 32px rgba(255, 106, 165, 0.018);
      --ios-pressed: inset 7px 7px 16px rgba(0, 0, 0, 0.34), inset -5px -6px 14px rgba(118, 139, 226, 0.018);
    }

    /* 深色模式硬编码颜色覆盖 — chrome / 状态栏 / 输入区 */
    [data-theme="dark"] body { color-scheme: dark; }
    [data-theme="dark"] .top-bar,
    [data-theme="dark"] header {
      background: rgba(18, 14, 20, 0.76);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22), inset 0 -1px 0 rgba(255, 120, 183, 0.014);
      backdrop-filter: blur(24px) saturate(1.12);
      -webkit-backdrop-filter: blur(24px) saturate(1.12);
    }
    [data-theme="dark"] .composer,
    [data-theme="dark"] .input-row,
    [data-theme="dark"] .input-box {
      background: var(--ios-glass);
      border: 1px solid var(--ios-border);
      box-shadow:
        var(--ios-shadow),
        inset 1px 1px 0 rgba(130, 153, 238, 0.030),
        inset -1px -1px 0 rgba(255, 120, 183, 0.014);
    }
    [data-theme="dark"] .input-dock {
      background:
        linear-gradient(180deg, rgba(9, 7, 11, 0) 0%, rgba(10, 8, 12, 0.52) 38%, rgba(9, 7, 11, 0.72) 100%);
    }
    [data-theme="dark"] #input {
      color: var(--text);
      caret-color: var(--accent);
    }
    [data-theme="dark"] .hint .hint-inner,
    [data-theme="dark"] .time-panel,
    [data-theme="dark"] .file-bar,
    [data-theme="dark"] .file-list-panel {
      background: rgba(24, 18, 24, 0.62);
      border-color: var(--border);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.26), inset 0 1px 0 rgba(168, 189, 255, 0.022);
    }
    [data-theme="dark"] .time-btn,
    [data-theme="dark"] .file-btn,
    [data-theme="dark"] .deep-btn,
    [data-theme="dark"] .time-custom input {
      background: var(--ios-glass-strong);
      border-color: var(--border);
      color: var(--text-dim);
    }
    [data-theme="dark"] .file-bar .file-clear {
      color: var(--text-faint);
    }
    [data-theme="dark"] .time-btn.on,
    [data-theme="dark"] .time-btn:hover,
    [data-theme="dark"] .deep-btn.on,
    [data-theme="dark"] .deep-btn:hover,
    [data-theme="dark"] .file-btn:hover {
      background: rgba(216, 92, 149, 0.12);
      border-color: var(--border-strong);
      color: var(--accent-2);
    }
    [data-theme="dark"] .chat-loading {
      background: #0d0a13;
      color: rgba(198, 180, 199, 0.72);
    }
    [data-theme="dark"] .send-btn { color: #f8edf3; }
    [data-theme="dark"] .quick-btn,
    [data-theme="dark"] .btn-chat {
      background: var(--surface-2);
      color: var(--text);
      border-color: var(--border);
    }

    /* status dot — 用 class 切换 light/dark 颜色 */
    .status-dot.status-online  { background: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18); }
    .status-dot.status-offline { background: #ef4444; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18); }
    [data-theme="dark"] .status-dot.status-online  { background: #34d399; box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.25); }
    [data-theme="dark"] .status-dot.status-offline { background: #f87171; box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.25); }

    /* 深色模式硬编码颜色覆盖 — 气泡 / 工具标记 / 弹出层 */
    [data-theme="dark"] .msg.bot .avatar {
      background: #d85c95;
      color: #eee8f1;
      box-shadow: 0 5px 18px rgba(0, 0, 0, 0.24), inset 0 1px 0 rgba(255, 181, 211, 0.065);
    }
    [data-theme="dark"] .msg.user .avatar {
      background: rgba(25, 19, 27, 0.78);
      border-color: rgba(255, 176, 211, 0.12);
      color: #d8c0cc;
    }
    [data-theme="dark"] .msg.user .bubble {
      background: #d85c95;
      border: 1px solid rgba(255, 176, 211, 0.18);
      color: #f8eef4;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24), 8px 10px 24px rgba(109, 32, 67, 0.10), inset 0 1px 0 rgba(255, 181, 211, 0.060);
    }
    [data-theme="dark"] .msg.bot .bubble {
      background: linear-gradient(145deg, rgba(126, 148, 237, 0.030) 0%, rgba(25, 19, 27, 0.78) 38%, rgba(255, 111, 172, 0.014) 100%);
      border: 1px solid rgba(255, 176, 211, 0.11);
      color: var(--text);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24), inset 1px 1px 0 rgba(130, 153, 238, 0.024), inset -1px -1px 0 rgba(255, 120, 183, 0.010);
      backdrop-filter: blur(18px) saturate(1.08);
      -webkit-backdrop-filter: blur(18px) saturate(1.08);
    }
    [data-theme="dark"] .msg.user .bubble.file-chip {
      background: rgba(25, 19, 27, 0.78);
      color: #d8c0cc;
      border-color: rgba(255, 176, 211, 0.13);
      box-shadow: none;
    }
    [data-theme="dark"] .msg.bot .bubble.cmd {
      background: rgba(142, 147, 223, 0.13);
      border-color: rgba(159, 167, 255, 0.22);
      color: #c6bbff;
    }
    [data-theme="dark"] .tool-marker { background: var(--surface-2); border-color: var(--border); }
    [data-theme="dark"] .pending-confirm-overlay { background: rgba(5, 4, 7, 0.72); }
    [data-theme="dark"] .pending-confirm-modal {
      background: var(--surface);
      border: 1px solid var(--border-strong);
    }
    [data-theme="dark"] .msg.bot .bubble.md li::marker {
      color: rgba(168, 160, 214, 0.82);
    }
    [data-theme="dark"] .msg.bot .bubble.md strong {
      color: #eee4ec;
    }
    [data-theme="dark"] .msg.bot .bubble.md code {
      background: rgba(255, 120, 183, 0.10);
      color: #ffc4dc;
    }
    [data-theme="dark"] .msg.bot .bubble.md pre {
      background: rgba(9, 7, 10, 0.72);
      color: #eee4ea;
      border: 1px solid var(--border);
    }
    [data-theme="dark"] .msg.bot .bubble.md blockquote {
      background: rgba(255, 120, 183, 0.075);
      border-left-color: rgba(255, 173, 207, 0.28);
      color: #c8aebb;
      font-size: 13px;
    }
    [data-theme="dark"] .msg.bot .bubble.md a {
      color: #ffadc9;
      border-bottom-color: rgba(255, 173, 207, 0.42);
    }
    [data-theme="dark"] .msg.bot .bubble.md a[href^="toolskip:"] {
      background: rgba(216, 92, 149, 0.16);
      border-color: rgba(255, 137, 190, 0.24);
      color: #ffadc9;
      box-shadow: inset 0 1px 0 rgba(255, 196, 220, 0.08);
    }
    [data-theme="dark"] .msg.bot .bubble.md a[href^="toolskip:"]:hover {
      background: rgba(216, 92, 149, 0.24);
      border-color: rgba(255, 137, 190, 0.34);
    }
    [data-theme="dark"] .msg.bot .bubble.md th {
      background: rgba(39, 31, 49, 0.72);
      color: #ded2df;
    }
    [data-theme="dark"] .sys-notice {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: fit-content;
      max-width: min(78%, 560px);
      padding: 3px 11px;
      font-size: 10.5px;
      line-height: 1.35;
      color: #c4a9b8;
      background: rgba(25, 19, 27, 0.66);
      border: 1px solid rgba(255, 176, 211, 0.12);
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
      backdrop-filter: blur(14px) saturate(1.05);
      -webkit-backdrop-filter: blur(14px) saturate(1.05);
    }
    [data-theme="dark"] .sys-notice::before {
      content: none;
      color: #ffadc9;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      opacity: 0.72;
    }
    [data-theme="dark"] .history-load-more {
      background: rgba(25, 19, 27, 0.58);
      border-color: rgba(255, 176, 211, 0.13);
      color: #c4a9b8;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16);
    }
    [data-theme="dark"] .history-load-more:hover {
      background: rgba(47, 35, 48, 0.72);
      color: #ffadc9;
    }

    /* 深色模式硬编码颜色覆盖 — 终端 */
    [data-theme="dark"] .term-block {
      background: linear-gradient(180deg, rgba(12, 10, 17, 0.96) 0%, rgba(22, 17, 29, 0.94) 100%);
      border: 1px solid var(--border);
    }
    [data-theme="dark"] .term-body  { color: #eee4ea; }
    [data-theme="dark"] .term-title { color: #dfacc2; }
    [data-theme="dark"] .term-cmd       { color: #ffd38a; }
    [data-theme="dark"] .term-out       { color: #eee4ea; }
    [data-theme="dark"] .term-out.err   { color: #ff8d8d; }
    [data-theme="dark"] .term-out.info  { color: #9ed8ff; }
    [data-theme="dark"] .term-out.dim   { color: #8b7f91; }
    [data-theme="dark"] .term-clear-btn { color: var(--accent); }
    [data-theme="dark"] .account-item .dot.on { background: #34d399; }
    [data-theme="dark"] .status-pill,
    [data-theme="dark"] .model-panel {
      background: rgba(25, 19, 27, 0.78);
      border-color: rgba(255, 176, 211, 0.12);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.20), inset 0 1px 0 rgba(130, 153, 238, 0.022);
    }
    [data-theme="dark"] .version-badge,
    [data-theme="dark"] .icon-btn {
      background: transparent;
      border-color: rgba(255, 176, 211, 0.12);
      color: #d8c0cc;
      box-shadow: none;
    }
    [data-theme="dark"] .brand-logo,
    [data-theme="dark"] #sendBtn,
    [data-theme="dark"] .record-item-btn,
    [data-theme="dark"] .config-dialog .btn.save,
    [data-theme="dark"] .pending-confirm-actions .allow {
      background: #d85c95;
      color: #f8eef4;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24), 8px 10px 22px rgba(109, 32, 67, 0.12), inset 0 1px 0 rgba(255, 181, 211, 0.065);
    }
    [data-theme="dark"] .brand-name,
    [data-theme="dark"] .empty-state h2 {
      background: linear-gradient(135deg, #ff8fc4 0%, #a99aff 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }
    [data-theme="dark"] .header-decos .dot {
      background: rgba(255, 173, 201, 0.46);
      box-shadow: 0 0 0 3px rgba(255, 111, 172, 0.045);
    }
    [data-theme="dark"] .version-badge:hover,
    [data-theme="dark"] .icon-btn:hover,
    [data-theme="dark"] .model-item:hover,
    [data-theme="dark"] .time-item:hover {
      background: rgba(40, 29, 39, 0.82);
      border-color: rgba(255, 173, 207, 0.24);
      color: #ff8fc4;
    }
    [data-theme="dark"] .model-btn.on,
    [data-theme="dark"] .model-item.active,
    [data-theme="dark"] .time-btn.on,
    [data-theme="dark"] .deep-btn.on,
    [data-theme="dark"] .file-btn.has-file,
    [data-theme="dark"] .account-item.active {
      background: rgba(216, 92, 149, 0.18);
      border-color: rgba(255, 137, 190, 0.24);
      color: #ffadc9;
    }
    [data-theme="dark"] #messages-wrap::-webkit-scrollbar-thumb,
    [data-theme="dark"] .term-body::-webkit-scrollbar-thumb,
    [data-theme="dark"] .term-exec-output::-webkit-scrollbar-thumb {
      background: rgba(199, 184, 215, 0.20);
    }
    [data-theme="dark"] #messages-wrap::-webkit-scrollbar-thumb:hover,
    [data-theme="dark"] .term-body::-webkit-scrollbar-thumb:hover {
      background: rgba(213, 138, 171, 0.28);
    }
    [data-theme="dark"] .softGlow {
      box-shadow: none;
    }
    [data-theme="dark"] .typing span:nth-child(1) { background: #b98ca0; }
    [data-theme="dark"] .typing span:nth-child(2) { background: #8e93df; }
    [data-theme="dark"] .typing span:nth-child(3) { background: #ffadc9; }
    [data-theme="dark"] .empty-state .logo-big {
      background: #d85c95;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.26);
    }
    [data-theme="dark"] .suggest button:hover {
      background: rgba(48, 39, 60, 0.80);
      border-color: rgba(199, 184, 215, 0.16);
      color: #ded2df;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.20);
    }
    [data-theme="dark"] .input-box:focus-within,
    [data-theme="dark"] .records-search input:focus,
    [data-theme="dark"] .config-dialog input:focus {
      border-color: rgba(255, 137, 190, 0.24);
      box-shadow:
        0 0 0 4px rgba(255, 120, 183, 0.080),
        var(--ios-shadow),
        inset 1px 1px 0 rgba(130, 153, 238, 0.036),
        inset -1px -1px 0 rgba(255, 120, 183, 0.020);
    }
    [data-theme="dark"] #sendBtn {
      background:
        linear-gradient(145deg, rgba(255, 173, 201, 0.20), rgba(216, 92, 149, 0.34)),
        rgba(33, 24, 35, 0.70);
      border: 1px solid rgba(255, 137, 190, 0.24);
      color: #ffe7f0;
      box-shadow:
        0 12px 26px rgba(0, 0, 0, 0.24),
        inset 1px 1px 0 rgba(255, 196, 220, 0.12),
        inset -1px -1px 0 rgba(255, 120, 183, 0.040);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
    }
    [data-theme="dark"] #sendBtn:hover:not(:disabled),
    [data-theme="dark"] .file-btn:hover,
    [data-theme="dark"] .deep-btn:hover,
    [data-theme="dark"] .time-btn:hover {
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.26),
        inset 1px 1px 0 rgba(255, 196, 220, 0.14),
        inset -1px -1px 0 rgba(255, 120, 183, 0.045);
    }
    [data-theme="dark"] .hint kbd {
      background: rgba(39, 31, 49, 0.72);
      border-color: rgba(199, 184, 215, 0.12);
      color: #d7c9dc;
    }
    [data-theme="dark"] .tinda-toast {
      background: rgba(25, 19, 27, 0.92);
      color: #ded2df;
      border: 1px solid rgba(255, 176, 211, 0.12);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
    }
    [data-theme="dark"] .tinda-toast.warn { background: rgba(82, 58, 34, 0.92); color: #e8c994; }
    [data-theme="dark"] .tinda-toast.err  { background: rgba(72, 36, 45, 0.92); color: #e8b0b5; }
    [data-theme="dark"] .resizer:hover,
    [data-theme="dark"] .resizer.dragging {
      background: rgba(168, 160, 214, 0.060);
    }
    [data-theme="dark"] .resizer:hover::after,
    [data-theme="dark"] .resizer.dragging::after {
      background: #8f87bd;
      box-shadow: 0 0 10px rgba(168, 160, 214, 0.20);
    }
    [data-theme="dark"] .term-panel {
      background: linear-gradient(180deg, rgba(18, 14, 20, 0.96), rgba(9, 7, 10, 0.98));
      border-left-color: rgba(255, 176, 211, 0.12);
      box-shadow: -16px 0 34px rgba(0, 0, 0, 0.22);
    }
    [data-theme="dark"] .term-panel.open {
      box-shadow: -16px 0 34px rgba(0, 0, 0, 0.30), -1px 0 0 rgba(199, 184, 215, 0.08);
    }
    [data-theme="dark"] .term-head {
      background: linear-gradient(90deg, rgba(40, 29, 39, 0.74), rgba(24, 18, 24, 0.52));
      border-bottom-color: rgba(255, 176, 211, 0.12);
    }
    [data-theme="dark"] .term-title { color: #d7c9dc; }
    [data-theme="dark"] .term-clear-btn {
      background: rgba(28, 22, 36, 0.72);
      border-color: rgba(199, 184, 215, 0.14);
      color: #c2b4c5;
      box-shadow: none;
    }
    [data-theme="dark"] .term-clear-btn:hover {
      background: rgba(48, 39, 60, 0.76);
      border-color: rgba(213, 138, 171, 0.20);
    }
    [data-theme="dark"] .term-body {
      background: linear-gradient(180deg, rgba(20, 16, 27, 0.96), rgba(13, 10, 18, 0.98));
      color: #ddd4de;
    }
    [data-theme="dark"] .term-line,
    [data-theme="dark"] .term-line.term-call-group {
      background: rgba(24, 18, 24, 0.66);
      border-color: rgba(255, 176, 211, 0.10);
      box-shadow: none;
    }
    [data-theme="dark"] .term-prompt {
      color: rgba(213, 138, 171, 0.54);
    }
    [data-theme="dark"] .term-exec-bubble {
      background: linear-gradient(180deg, rgba(25, 19, 27, 0.84), rgba(14, 10, 16, 0.82));
      border-color: rgba(255, 176, 211, 0.12);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
    }
    [data-theme="dark"] .term-exec-head {
      background: rgba(48, 39, 60, 0.42);
      border-bottom-color: rgba(199, 184, 215, 0.10);
    }
    [data-theme="dark"] .term-exec-title { color: #d7c9dc; }
    [data-theme="dark"] .term-exec-cmd {
      color: #d2b6bf;
      border-bottom-color: rgba(199, 184, 215, 0.08);
    }
    [data-theme="dark"] .term-exec-output { color: #d8d0da; }
    [data-theme="dark"] .term-exec-foot {
      border-top-color: rgba(199, 184, 215, 0.08);
      color: #85788d;
    }
    [data-theme="dark"] .term-exec-status.ok { background: rgba(52, 211, 153, 0.14); color: #9fe3c1; }
    [data-theme="dark"] .term-exec-status.err { background: rgba(248, 113, 113, 0.13); color: #e8a4a7; }
    [data-theme="dark"] .account-card,
    [data-theme="dark"] .config-dialog,
    [data-theme="dark"] .pending-confirm-dialog,
    [data-theme="dark"] .records-panel {
      background: rgba(18, 14, 20, 0.93);
      border-color: rgba(255, 176, 211, 0.12);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.26);
    }
    [data-theme="dark"] .record-item.active {
      background: rgba(157, 85, 120, 0.13);
      border-color: rgba(213, 138, 171, 0.22);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.20);
    }
    [data-theme="dark"] .record-item:hover,
    [data-theme="dark"] .account-item:hover {
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.20);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes headerLeftEnter {
      0% { opacity: 0; translate: -34px 0; scale: 0.97; }
      68% { opacity: 1; translate: 1px 0; scale: 1.002; }
      100% { opacity: 1; translate: 0 0; scale: 1; }
    }
    @keyframes brandPartEnter {
      0% { opacity: 0; translate: -16px 0; scale: 0.96; }
      70% { opacity: 1; translate: 0.75px 0; scale: 1.004; }
      100% { opacity: 1; translate: 0 0; scale: 1; }
    }
    @keyframes headerRightEnter {
      0% { opacity: 0; translate: 40px 0; scale: 0.97; }
      68% { opacity: 1; translate: -1px 0; scale: 1.002; }
      100% { opacity: 1; translate: 0 0; scale: 1; }
    }
    @keyframes quickButtonEnter {
      0% { opacity: 0; translate: 24px 0; scale: 0.94; }
      72% { opacity: 1; translate: -0.75px 0; scale: 1.008; }
      100% { opacity: 1; translate: 0 0; scale: 1; }
    }
    @keyframes statusPillDropExpand {
      0% {
        opacity: 0;
        transform: translateY(-24px) scaleX(0.42) scaleY(0.88);
      }
      56% {
        opacity: 1;
        transform: translateY(2px) scaleX(0.82) scaleY(1.03);
      }
      82% {
        opacity: 1;
        transform: translateY(-0.6px) scaleX(1.01) scaleY(0.995);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scaleX(1) scaleY(1);
      }
    }
    @keyframes statusTextCenterReveal {
      0% {
        opacity: 0;
        clip-path: inset(0 50% 0 50%);
      }
      100% {
        opacity: 1;
        clip-path: inset(0 0 0 0);
      }
    }
    @keyframes statusDotBallDrop {
      0% { opacity: 0; transform: translateY(-11px) scale(0.78); }
      62% { opacity: 1; transform: translateY(1.5px) scale(1.06); }
      84% { opacity: 1; transform: translateY(-0.5px) scale(0.985); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes inputBoxRise {
      0% {
        opacity: 0;
        translate: 0 46px;
        scale: 0.96;
      }
      58% {
        opacity: 1;
        translate: 0 -1.5px;
        scale: 1.004;
      }
      78% {
        opacity: 1;
        translate: 0 0.45px;
        scale: 0.999;
      }
      100% {
        opacity: 1;
        translate: 0 0;
        scale: 1;
      }
    }
    @keyframes headerLeftLeave {
      0% { opacity: 1; translate: 0 0; scale: 1; }
      100% { opacity: 0; translate: -28px 0; scale: 0.97; }
    }
    @keyframes headerRightLeave {
      0% { opacity: 1; translate: 0 0; scale: 1; }
      100% { opacity: 0; translate: 34px 0; scale: 0.97; }
    }
    @keyframes quickButtonLeave {
      0% { opacity: 1; translate: 0 0; scale: 1; }
      100% { opacity: 0; translate: 22px 0; scale: 0.94; }
    }
    @keyframes statusPillLeave {
      0% { opacity: 1; transform: translateY(0) scaleX(1) scaleY(1); }
      100% { opacity: 0; transform: translateY(-18px) scaleX(0.52) scaleY(0.86); }
    }
    @keyframes statusTextHideCenter {
      0% { opacity: 1; clip-path: inset(0 0 0 0); }
      100% { opacity: 0; clip-path: inset(0 50% 0 50%); }
    }
    @keyframes inputBoxLeave {
      0% { opacity: 1; translate: 0 0; scale: 1; }
      100% { opacity: 0; translate: 0 42px; scale: 0.96; }
    }
    @keyframes messagesLeave {
      0% { opacity: 1; translate: 0 0; }
      100% { opacity: 0; translate: 0 12px; }
    }

    body {
      display: flex;
      flex-direction: column;
      position: relative;
      animation: pageIn 0.42s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    body.chat-booting {
      animation: none !important;
      pointer-events: none;
    }
    body.chat-booting *,
    body.chat-booting *::before,
    body.chat-booting *::after {
      animation-play-state: paused !important;
      transition: none !important;
    }
    body.chat-booting > :not(.chat-loading) {
      opacity: 0 !important;
    }
    .chat-loading {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      background: #fff0f6;
      color: rgba(190, 92, 130, 0.72);
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      opacity: 0;
      pointer-events: none;
    }
    body.chat-booting .chat-loading {
      transition: opacity 0.5s ease !important;
    }
    body.chat-loading-visible .chat-loading {
      opacity: 1;
    }
    body.chat-loading-leaving .chat-loading {
      opacity: 0;
    }
    body.chat-leaving {
      pointer-events: none;
    }
    body.chat-leaving .brand {
      animation: headerLeftLeave 0.42s var(--ease-out-terminal) both;
    }
    body.chat-leaving .brand > * {
      animation: headerLeftLeave 0.34s var(--ease-out-terminal) both;
      animation-delay: calc(var(--brand-enter-index, 0) * 0.025s);
    }
    body.chat-leaving .header-right {
      animation: headerRightLeave 0.42s var(--ease-out-terminal) both;
    }
    body.chat-leaving #quickBtns > *,
    body.chat-leaving .header-right > .icon-btn,
    body.chat-leaving .header-right > .btn-sep {
      animation: quickButtonLeave 0.32s var(--ease-out-terminal) both;
      animation-delay: calc(var(--quick-enter-index, 0) * 0.018s);
    }
    body.chat-leaving .status-pill {
      animation: statusPillLeave 0.46s var(--ease-out-terminal) 0.04s both;
    }
    body.chat-leaving .status-text {
      animation: statusTextHideCenter 0.28s var(--ease-out-terminal) both;
    }
    body.chat-leaving .input-box {
      animation: inputBoxLeave 0.46s var(--ease-out-terminal) 0.06s both;
    }
    body.chat-leaving .hint {
      animation: inputBoxLeave 0.4s var(--ease-out-terminal) both;
    }
    body.chat-leaving #messages {
      animation: messagesLeave 0.34s var(--ease-out-terminal) both;
    }
    body.chat-leaving .term-panel {
      opacity: 0 !important;
      transform: translateX(34px) scaleX(0.96);
    }
    body.chat-leaving .resizer {
      opacity: 0;
    }

    /* ── 浮动装饰 ── */
    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      user-select: none;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    .deco svg {
      display: block;
      width: 1em;
      height: 1em;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)    rotate(0deg);  opacity: 0.18; }
      50%  { opacity: 0.38; }
      100% { transform: translateY(-45px) rotate(18deg); opacity: 0.18; }
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 10px 20px;
      gap: 12px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1.5px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15.5px;
      justify-self: start;
      min-width: 0;
      transform-origin: left center;
      animation: headerLeftEnter 0.58s var(--ease-spring) 0.12s both;
      will-change: opacity, translate, scale;
    }
    .brand > * {
      opacity: 0;
      animation: brandPartEnter 0.42s var(--ease-glide) both;
      animation-delay: calc(0.22s + var(--brand-enter-index, 0) * 0.055s);
    }
    .brand-logo { --brand-enter-index: 0; }
    .brand-name { --brand-enter-index: 1; }
    .version-badge { --brand-enter-index: 2; }
    .account-btn { --brand-enter-index: 3; }

    .header-center {
      justify-self: center;
      min-width: 0;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      background: var(--surface);
      border: 1.5px solid var(--border);
      padding: 4px 12px 4px 10px;
      border-radius: 999px;
      box-shadow: 0 2px 10px rgba(255,110,180,0.08);
      white-space: nowrap;
      overflow: hidden;
      transform-origin: center top;
      animation: statusPillDropExpand 0.78s var(--ease-glide) 0.22s both;
      will-change: transform, opacity;
    }
    .status-sep {
      opacity: 0.45;
      font-weight: 600;
      margin: 0 2px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
      animation: statusPulse 2.1s ease-in-out infinite;
    }
    .status-pill .status-dot {
      animation:
        statusDotBallDrop 0.48s var(--ease-glide) 0.44s both,
        statusPulse 2.1s ease-in-out 1.02s infinite;
    }
    .status-text {
      display: inline-block;
      opacity: 0;
      clip-path: inset(0 50% 0 50%);
      animation: statusTextCenterReveal 0.46s var(--ease-out-terminal) 0.62s both;
    }
    @keyframes statusPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
      50%      { transform: scale(0.88); box-shadow: 0 0 0 6px rgba(34,197,94,0.05); }
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--gradient);
      display: grid;
      place-items: center;
      padding: 0;
      line-height: 1;
      box-shadow: 0 4px 16px rgba(255,110,180,0.38);
      animation:
        brandPartEnter 0.42s var(--ease-glide) 0.22s both,
        wiggle 3.5s ease-in-out 0.72s infinite;
      flex-shrink: 0;
    }
    .brand-logo svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: block;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg); }
    }

    .brand-name {
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version-badge {
      min-width: 54px;
      height: 34px;
      font-size: 10.5px;
      color: var(--text-dim);
      background: transparent;
      padding: 0 10px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      word-break: normal;
      line-break: auto;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .version-btn {
      cursor: pointer;
      font-family: inherit;
      line-height: 1;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  background 0.22s ease,
                  border-color 0.22s ease,
                  color 0.22s ease;
    }
    .version-btn:hover {
      background: var(--surface-2);
      border-color: var(--accent-2);
      color: var(--accent-deep);
      transform: scale(1.05);
    }
    .version-btn:active {
      transform: scale(0.96);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
      transform-origin: right center;
      animation: headerRightEnter 0.58s var(--ease-spring) 0.16s both;
      will-change: opacity, translate, scale;
    }
    #quickBtns {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #quickBtns > *,
    .header-right > .icon-btn,
    .header-right > .btn-sep {
      opacity: 0;
      animation: quickButtonEnter 0.44s var(--ease-glide) both;
      animation-delay: calc(0.34s + var(--quick-enter-index, 0) * 0.045s);
    }
    #quickSep { --quick-enter-index: 2; }
    #settingsNavBtn { --quick-enter-index: 1; }
    #homeNavBtn { --quick-enter-index: 0; }
    .account-btn {
      color: var(--text-dim);
    }
    .account-btn:hover {
      color: var(--accent-deep);
    }
    .account-btn:active {
      transform: scale(0.94);
    }
    [data-theme="dark"] .account-btn {
      color: #d8c0cc;
    }
    [data-theme="dark"] .account-btn:hover {
      color: #ffadc9;
    }

    .header-decos {
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 0.5;
      user-select: none;
    }
    .header-decos .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(255,110,180,0.12);
    }

    .icon-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      padding: 0;
      line-height: 1;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  background 0.22s ease,
                  border-color 0.22s ease,
                  color 0.22s ease;
      font-size: 15px;
      text-decoration: none;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
    }
    .icon-btn .icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      display: block;
    }
    .icon-btn .icon-fill {
      fill: currentColor;
      stroke: none;
    }
    .icon-btn:hover {
      background: var(--surface-2);
      border-color: var(--accent-2);
      color: var(--accent-deep);
      transform: scale(1.1);
    }

    /* 统一悬浮提示 */
    .icon-btn[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      top: calc(100% + 9px);
      transform: translateX(-50%) translateY(-3px);
      white-space: nowrap;
      background: rgba(61,31,47,0.94);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      padding: 6px 9px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      box-shadow: 0 6px 16px rgba(0,0,0,0.14);
      transition: opacity 0.16s ease, transform 0.16s ease;
    }
    .icon-btn[data-tip]::before {
      content: "";
      position: absolute;
      left: 50%;
      top: calc(100% + 3px);
      transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-bottom: 6px solid rgba(61,31,47,0.94);
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: opacity 0.16s ease;
    }
    .icon-btn[data-tip]:hover::after,
    .icon-btn[data-tip]:hover::before {
      opacity: 1;
    }
    .icon-btn[data-tip]:hover::after {
      transform: translateX(-50%) translateY(0);
    }

    /* 流式按钮：仅改颜色状态，形状同 icon-btn */
    .stream-btn {
      font-size: 15px;
    }
    .stream-btn.on {
      background: rgba(255, 110, 180, 0.10);
      border-color: var(--accent-2);
      color: var(--accent-deep);
    }
    .stream-btn.on:hover {
      background: var(--surface-2);
      opacity: 1;
      transform: scale(1.1);
    }

    .term-toggle.on {
      background: rgba(255, 110, 180, 0.10);
      border-color: var(--accent-2);
      color: var(--accent-deep);
    }
    .term-toggle.on:hover {
      background: var(--surface-2);
      opacity: 1;
      transform: scale(1.1);
    }

    .model-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .model-btn.on {
      background: rgba(255, 110, 180, 0.10);
      border-color: var(--accent-2);
      color: var(--accent-deep);
    }
	    .model-panel {
	      position: absolute;
	      right: 0;
	      top: calc(100% + 10px);
      min-width: 232px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
	      box-shadow: 0 10px 30px rgba(61, 31, 47, 0.14);
	      padding: 10px;
	      z-index: 35;
	      opacity: 0;
	      transform: translateY(-8px) scale(0.96);
	      transform-origin: top right;
	      pointer-events: none;
	      transition: opacity 0.24s var(--ease-out-terminal), transform 0.3s var(--ease-out-terminal);
	    }
	    .model-panel.open {
	      opacity: 1;
	      transform: translateY(0) scale(1);
	      pointer-events: auto;
	    }
	    .model-panel.closing {
	      opacity: 0;
	      transform: translateY(-8px) scale(0.96);
	      pointer-events: none;
	    }
    .model-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--text-dim);
      cursor: pointer;
	      transition: background 0.16s ease, color 0.16s ease, transform 0.16s ease;
	    }
	    .model-item:hover {
	      background: var(--surface-2);
	      color: var(--accent-deep);
	      transform: translateX(3px);
	    }
    .model-item.active {
      background: rgba(255, 110, 180, 0.08);
      color: var(--accent-deep);
      font-weight: 700;
    }

    /* 按钮分组分隔线 */
    .btn-sep {
      width: 1px; height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── Messages ── */
    #messages-wrap {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: scroll;
      overflow-x: hidden;
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    #messages-wrap::-webkit-scrollbar { width: 6px; }
    #messages-wrap::-webkit-scrollbar-track { background: transparent; }
    #messages-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    #messages-wrap::-webkit-scrollbar-thumb:hover { background: var(--accent-2); }

    #messages {
      max-width: 780px;
      margin: 0 auto;
      padding: 28px 20px var(--composer-bottom-space, 176px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg.same-as-prev { margin-top: -6px; }

	    .msg {
	      display: flex;
	      gap: 10px;
	      align-items: flex-start;
	      opacity: 0;
	      transform: translate3d(-22px, 14px, 0) scale(0.96);
	      animation: messageInBot 0.48s var(--ease-spring) forwards;
	      will-change: transform, opacity;
	    }
	    @keyframes popIn {
	      to { opacity: 1; transform: translateY(0) scale(1); }
	    }
	    @keyframes fadeScaleIn {
	      from { opacity: 0; transform: translateY(14px) scale(0.95); filter: blur(4px); }
	      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
	    }
	    @keyframes messageInBot {
	      0% { opacity: 0; transform: translate3d(-24px, 16px, 0) scale(0.95); filter: blur(5px); }
	      62% { opacity: 1; transform: translate3d(3px, -1px, 0) scale(1.01); filter: blur(0); }
	      100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); filter: blur(0); }
	    }
	    @keyframes messageInUser {
	      0% { opacity: 0; transform: translate3d(24px, 16px, 0) scale(0.95); filter: blur(5px); }
	      62% { opacity: 1; transform: translate3d(-3px, -1px, 0) scale(1.01); filter: blur(0); }
	      100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); filter: blur(0); }
	    }
	    @keyframes softGlow {
	      0% { box-shadow: 0 0 0 rgba(255,110,180,0); }
	      45% { box-shadow: 0 10px 34px rgba(255,110,180,0.18); }
	      100% { box-shadow: inherit; }
	    }

	    .msg.user {
	      flex-direction: row-reverse;
	      transform: translate3d(22px, 14px, 0) scale(0.96);
	      animation-name: messageInUser;
	    }
	    .msg.history-msg,
	    .msg.user.history-msg {
	      opacity: 1;
	      transform: none;
	      animation: none;
	      filter: none;
	      will-change: auto;
	    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
      cursor: default;
      color: #fff;
    }
    .avatar svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .avatar:hover { transform: scale(1.18) rotate(-8deg); }

    .msg.bot .avatar {
      background: var(--gradient);
      box-shadow: 0 3px 12px rgba(255,110,180,0.32);
    }

    .msg.user .avatar {
      background: #f4edf7;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
    }

    .msg.same-as-prev .avatar { visibility: hidden; }

    .bubble {
      max-width: calc(100% - 54px);
      padding: 10px 16px;
      border-radius: 22px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.72;
    }

    /* iMessage-style pointed corner（头像在顶部，尖角对齐到顶部） */
    .msg.bot:not(.same-as-prev) .bubble  { border-top-left-radius: 5px; }
    .msg.user:not(.same-as-prev) .bubble { border-top-right-radius: 5px; }

    .msg.bot .bubble {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
    }

	    .msg.user .bubble {

	      color: #fff;
	      border: none;
	      box-shadow: 0 4px 18px rgba(255,110,180,0.26);
	    }
	    .msg:not(.same-as-prev) .bubble {

	    }
	    .msg.history-msg .bubble {
	      animation: none;
	    }

    .msg.user .bubble.file-chip {
      background: var(--surface);
      color: var(--accent-deep);
      border: 1.5px solid var(--accent-2);
      box-shadow: none;
      padding: 6px 13px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 16px;
    }
    .msg.user .bubble.file-chip svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      display: block;
    }
    /* file chip consecutive: no pointy corner */
    .msg.user.same-as-prev .bubble.file-chip { border-top-right-radius: 16px; }

    .msg.bot .bubble.cmd {
      background: rgba(167,139,250,0.1);
      border-color: rgba(167,139,250,0.32);
      font-family: "JetBrains Mono","Fira Code","SF Mono",Consolas,monospace;
      font-size: 13px;
      color: #7c3aed;
    }

    /* Markdown */
    .msg.bot .bubble.md :where(p,ul,ol,pre,blockquote) { margin: 0.45em 0; }
    .msg.bot .bubble.md :where(h1,h2,h3,h4,h5,h6) { margin: 0.7em 0 0.3em; font-weight: 700; }
    .msg.bot .bubble.md h1 { font-size: 1.15em; }
    .msg.bot .bubble.md h2 { font-size: 1.08em; }
    .msg.bot .bubble.md h3,.msg.bot .bubble.md h4 { font-size: 1em; }
    .msg.bot .bubble.md :first-child { margin-top: 0; }
    .msg.bot .bubble.md :last-child  { margin-bottom: 0; }
    .msg.bot .bubble.md ul,.msg.bot .bubble.md ol { padding-left: 1.3em; }
    .msg.bot .bubble.md li { margin: 0.15em 0; }
    .msg.bot .bubble.md li::marker { color: var(--accent); }
    .msg.bot .bubble.md strong { color: var(--accent-deep); font-weight: 700; }
    .msg.bot .bubble.md pre {
      overflow-x: auto;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      background: var(--surface-2);
      margin: 0.6em 0;
    }
    .msg.bot .bubble.md code {
      font-family: "JetBrains Mono","Fira Code","SF Mono",Consolas,monospace;
      font-size: 12.5px;
      background: rgba(255,110,180,0.1);
      color: var(--accent-deep);
      border-radius: 7px;
      padding: 1px 5px;
    }
    .msg.bot .bubble.md pre code { background: transparent; color: var(--text); padding: 0; white-space: pre; }
    .msg.bot .bubble.md blockquote {
      border-left: 3px solid var(--accent-2);
      padding-left: 10px;
      color: var(--text-dim);
      margin-left: 0;
      background: rgba(255,110,180,0.05);
      border-radius: 0 10px 10px 0;
    }
    .msg.bot .bubble.md hr {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 0.8em 0;
    }
    .msg.bot .bubble.md .md-table-wrap {
      margin: 0.6em 0;
      overflow-x: auto;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
    }
    .msg.bot .bubble.md table {
      border-collapse: collapse;
      min-width: 100%;
      font-size: 13px;
      line-height: 1.55;
    }
    .msg.bot .bubble.md th,
    .msg.bot .bubble.md td {
      padding: 7px 10px;

      border-bottom: 1px solid var(--border);
      vertical-align: top;
      white-space: normal;
      word-break: break-word;

    .msg.bot .bubble.md th {

    .msg.bot .bubble.md tr:last-child td { border-bottom: none; }
    .msg.bot .bubble.md th:last-child,

    .msg.bot .bubble.md a { color: var(--accent); text-decoration: none; border-bottom: 1.5px dotted var(--accent-2); }
    .msg.bot .bubble.md a:hover { border-bottom-style: solid; }

  /**
   * 全局唯一的上下文 token 阈值入口。
   * 优先级：localStorage 全局设置 > sessionStorage 会话缓存 > 默认 16k。
   * 只有用户主动在设置页或配置弹窗保存才会改写前两级。
   */
  function getContextTokenLimit() {
    try {
      var s = JSON.parse(localStorage.getItem("tinda_settings") || "{}");
      if (isValidContextTokenLimit(s.token_limit)) return Math.floor(Number(s.token_limit));
    } catch (_) {}
    var ss = sessionStorage.getItem("tinda_max_context_tokens");
    if (ss) { var v = parseInt(ss, 10); if (isValidContextTokenLimit(v)) return v; }
    return CONTEXT_TOKEN_DEFAULT;
  }

  function isValidContextTokenLimit(value) {
    const n = Number(value);
    return Number.isFinite(n) && n >= CONTEXT_TOKEN_MIN && n <= CONTEXT_TOKEN_MAX;
  }

  function parseContextTokenLimitInput(value) {
    const parsed = parseInt(String(value || ""), 10);
    if (isValidContextTokenLimit(parsed)) return Math.floor(parsed);
    return 0;
  }

  async function syncContextTokenLimitForSession(sessionId = getSessionId()) {
    const sid = String(sessionId || "").trim();
    const limit = Number(getContextTokenLimit());
    if (!sid || isDraftSessionId(sid) || !isValidContextTokenLimit(limit)) return 0;
    try {
      const res = await apiFetch(`/sessions/${encodeURIComponent(sid)}/config`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ max_context_tokens: Math.floor(limit) }),
      });
      const data = await res.json();
      if (res.ok && data?.ok !== false) {
        statusContextTokenLimit = Math.floor(limit);
        return Math.floor(limit);
      }
    } catch (_) {}
    return 0;
  }

  function getAuthToken() {
    const current = String(sessionStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
    if (current) return current;
    const legacy = String(localStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
    if (legacy) {
      sessionStorage.setItem(AUTH_TOKEN_KEY, legacy);
      localStorage.removeItem(AUTH_TOKEN_KEY);
    }
    return legacy;
  }

  function setAuthToken(token) {
    const t = String(token || "").trim();
    if (!t) {
      localStorage.removeItem(AUTH_TOKEN_KEY);
      sessionStorage.removeItem(AUTH_TOKEN_KEY);
      return;
    }
    localStorage.removeItem(AUTH_TOKEN_KEY);
    sessionStorage.setItem(AUTH_TOKEN_KEY, t);
  }

  function authHeaders(extra) {
    const headers = Object.assign({}, extra || {});
    const token = getAuthToken();
    if (token) headers["X-User-Token"] = token;
    return headers;
  }

  async function apiFetch(url, options = {}) {
    const opts = Object.assign({}, options);
    opts.headers = authHeaders(opts.headers || {});
    return fetch(url, opts);
  }

  function getSessionStorageKey() {
    const uid = String(userMeta?.uid || "").trim();
    return uid && uid !== "N/A" ? `${SESSION_KEY}:${uid}` : SESSION_KEY;
  }

  function getStoredSessionId() {
    return String(localStorage.getItem(getSessionStorageKey()) || "").trim();
  }

  function setStoredSessionId(sessionId) {
    const sid = String(sessionId || "").trim();
    if (!sid) return;
    localStorage.setItem(getSessionStorageKey(), sid);
    localStorage.setItem(SESSION_KEY, sid);
  }

  function clearStoredSessionId() {
    localStorage.removeItem(getSessionStorageKey());
    localStorage.removeItem(SESSION_KEY);
  }

  let initialChatRenderReleasing = false;
  function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, Math.max(0, Number(ms) || 0)));
  }
  function startInitialChatLoading() {
    if (!document.body.classList.contains("chat-booting")) return;
    requestAnimationFrame(() => {
      document.body.classList.add("chat-loading-visible");
    });
  }
  async function releaseInitialChatRender() {
    if (!document.body.classList.contains("chat-booting")) return;
    if (initialChatRenderReleasing) return;

    const elapsed = performance.now() - chatBootStartedAt;
    await sleep(CHAT_BOOT_MIN_MS - elapsed);
    document.body.classList.remove("chat-loading-visible");
    document.body.classList.add("chat-loading-leaving");
    await sleep(CHAT_LOADING_FADE_MS);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.body.classList.remove("chat-booting", "chat-loading-leaving");
        document.body.classList.add("chat-ready");
      });
    });
  }

  function startChatSessionLoading() {
    document.body.classList.remove("chat-ready", "chat-loading-leaving");
    document.body.classList.add("chat-booting");
    requestAnimationFrame(() => {
      document.body.classList.add("chat-loading-visible");
    });
  }

  async function releaseChatSessionLoading(startedAt = performance.now()) {
    if (!document.body.classList.contains("chat-booting")) return;
    const elapsed = performance.now() - startedAt;
    await sleep(CHAT_SESSION_LOADING_MIN_MS - elapsed);
    document.body.classList.remove("chat-loading-visible");
    document.body.classList.add("chat-loading-leaving");
    await sleep(CHAT_LOADING_FADE_MS);
    await new Promise((resolve) => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.body.classList.remove("chat-booting", "chat-loading-leaving");
          document.body.classList.add("chat-ready");
          resolve();
        });
      });

  function showToast(text, variant = "info") {
    if (!toastEl) return;
    toastEl.textContent = text;
    toastEl.classList.remove("warn", "err");
    if (variant === "warn" || variant === "err") toastEl.classList.add(variant);
    // 重新触发动画
    toastEl.classList.remove("show");
    void toastEl.offsetWidth;
    toastEl.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toastEl.classList.remove("show");
      toastTimer = 0;
    }, 2400);
  }

  function waitForTransition(node, { property = "transform", timeout = 360 } = {}) {
    return new Promise((resolve) => {
      if (!node) {
        resolve();
        return;
      }
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        node.removeEventListener("transitionend", onEnd);
        clearTimeout(timer);
        resolve();
      };
      const onEnd = (event) => {
        if (event.target !== node) return;
        if (property && event.propertyName !== property) return;
        finish();
      };
      const timer = setTimeout(finish, timeout);
      node.addEventListener("transitionend", onEnd);
    });
  }

  function openAnimatedPanel(node, closingKey, visibleClass = "show") {
    if (!node) return;
    if (closingKey && Object.prototype.hasOwnProperty.call(panelClosing, closingKey)) {
      panelClosing[closingKey] = false;
    }
    node.classList.remove("closing");
    node.classList.add(visibleClass);
    node.setAttribute("aria-hidden", "false");
  }

  async function closeAnimatedPanel(node, closingKey, visibleClass = "show", { timeout = 420 } = {}) {
    if (!node) return;
    if (!node.classList.contains(visibleClass) && !node.classList.contains("closing")) return;
    if (closingKey && panelClosing[closingKey]) return;
    if (closingKey && Object.prototype.hasOwnProperty.call(panelClosing, closingKey)) {
      panelClosing[closingKey] = true;
    }
    node.classList.add("closing");
    node.classList.remove(visibleClass);
    node.setAttribute("aria-hidden", "true");
    await waitForTransition(node, { property: "opacity", timeout });
    node.classList.remove("closing");
    if (closingKey && Object.prototype.hasOwnProperty.call(panelClosing, closingKey)) {
      panelClosing[closingKey] = false;
    }
  }

  function normalizeStatusCount(value) {
    const n = Number(value);
    if (!Number.isFinite(n) || n < 0) return 0;
    return Math.floor(n);
  }

  function renderHeaderStatus() {
    const onlineText = gatewayOnline ? "在线" : "离线";
    const sessionText = String(activeSessionTitle || "新会话").trim() || "新会话";
    const usageNow = normalizeStatusCount(statusContextUsageLength);
    const limit = normalizeStatusCount(statusContextTokenLimit) || getContextTokenLimit();
    const previous = normalizeStatusCount(statusContextPreviousUsageLength);
    const usageText = previous > usageNow ? `${previous}→${usageNow}/${limit}` : `${usageNow}/${limit}`;
    if (statusTextEl) {
      statusTextEl.innerHTML = `${escapeHtml(onlineText)} <span class="status-sep">·</span> ${escapeHtml(sessionText)} <span class="status-sep">·</span> ${escapeHtml(usageText)}`;

      // 用 class 切换以支持深色模式覆盖

      statusDotEl.classList.toggle("status-offline", !gatewayOnline);

      statusDotEl.style.boxShadow = "";

  async function refreshContextUsageLength(sessionId = getSessionId()) {
    const sid = String(sessionId || "").trim();
    if (!sid || isDraftSessionId(sid)) {
      statusContextUsageLength = 0;
      statusContextPreviousUsageLength = 0;
      renderHeaderStatus();

    try {
      const res = await apiFetch(`/sessions/${encodeURIComponent(sid)}/context-usage`, { method: "GET" });
      if (!res.ok) throw new Error(`http ${res.status}`);
      const data = await res.json();

      if (nextTitle && nextTitle !== activeSessionTitle) {
        activeSessionTitle = nextTitle;
      }
      statusContextUsageLength = normalizeStatusCount(data?.usage_length);
      const serverLimit = normalizeStatusCount(data?.max_context_tokens);
      if (serverLimit >= 100) statusContextTokenLimit = serverLimit;
      renderHeaderStatus();
      setGatewayOnlineState(true);

  function normalizePendingConfirmItem(raw) {
    if (!raw || typeof raw !== "object") return null;
    const kind = String(raw.kind || "").trim().toLowerCase() === "question" ? "question" : "terminal";
    const cmd = String(raw.cmd || "").trim();
    const question = String(raw.question || "").trim();
    if (kind === "question" && !question) return null;
    if (kind !== "question" && !cmd) return null;
    const callId = String(raw.call_id || raw.confirm_id || "").trim();
    const confirmId = String(raw.confirm_id || callId || "").trim() || ("tcf_" + Date.now().toString(36));
    return {
      flow: String(raw.flow || "").trim(),
      kind,
      confirm_id: confirmId,
      call_id: callId || confirmId,
      cmd,
      question,
      options: Array.isArray(raw.options) ? raw.options.map((x) => String(x || "").trim()).filter(Boolean).slice(0, 8) : [],
      none_of_them_value: String(raw.none_of_them_value || "__none_of_them__"),
      none_of_them_label: String(raw.none_of_them_label || "以上都不是，我自己补充"),
      allow_custom_answer: raw.allow_custom_answer !== false,
      placeholder: String(raw.placeholder || "补充你的答案或限制条件..."),

  function setPendingConfirmFromList(items) {
    const list = Array.isArray(items) ? items : [];
    const visibleList = list.filter((item) => String(item?.flow || "") !== "deep_alignment");
    const first = visibleList.length > 0 ? normalizePendingConfirmItem(visibleList[0]) : null;
    pendingConfirmCurrent = first;

  function clearPendingConfirm() {

    void hidePendingConfirmOverlay();

    setTerminalConfirmLock(false, 0);

  function showPendingConfirmOverlay() {

  async function hidePendingConfirmOverlay() {

  function setPendingConfirmButtonsDisabled(disabled) {
    const locked = !!disabled;
    if (pendingConfirmAllowBtnEl) pendingConfirmAllowBtnEl.disabled = locked;
    if (pendingConfirmDenyBtnEl) pendingConfirmDenyBtnEl.disabled = locked;

  function renderPendingConfirmOverlay() {
    if (!pendingConfirmOverlayEl || !pendingConfirmMetaEl || !pendingConfirmCmdEl) return;
    const dialog = pendingConfirmOverlayEl.querySelector(".pending-confirm-dialog");
    if (!pendingConfirmCurrent) {
      dialog?.classList.remove("question-mode");
      pendingConfirmMetaEl.textContent = "等待确认";
      pendingConfirmCmdEl.textContent = "";
      if (pendingQuestionOptionsEl) pendingQuestionOptionsEl.innerHTML = "";
      if (pendingQuestionAnswerEl) pendingQuestionAnswerEl.value = "";
      void hidePendingConfirmOverlay();
      setPendingConfirmButtonsDisabled(false);
      return;
    }
    const isQuestion = pendingConfirmCurrent.kind === "question";
    dialog?.classList.toggle("question-mode", isQuestion);
    pendingConfirmMetaEl.textContent = isQuestion ? "需要你补充条件" : "待确认";
    pendingConfirmCmdEl.textContent = isQuestion ? String(pendingConfirmCurrent.question || "") : String(pendingConfirmCurrent.cmd || "");
    if (pendingQuestionOptionsEl) {
      pendingQuestionOptionsEl.innerHTML = "";
      if (isQuestion) {
        (pendingConfirmCurrent.options || []).forEach((option) => {
          const isNoneOption = option === pendingConfirmCurrent.none_of_them_value;
          const label = isNoneOption ? pendingConfirmCurrent.none_of_them_label : option;
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "pending-question-option";
          btn.textContent = label;
          if (pendingConfirmCurrent.selected_choice === option) btn.classList.add("selected");
          btn.addEventListener("click", () => {
            pendingConfirmCurrent.selected_choice = option;
            if (pendingQuestionAnswerEl && !pendingQuestionAnswerEl.value.trim() && !isNoneOption) {
              pendingQuestionAnswerEl.value = option;
            }
            if (pendingQuestionAnswerEl && isNoneOption) pendingQuestionAnswerEl.focus();
            renderPendingConfirmOverlay();
          });
          pendingQuestionOptionsEl.appendChild(btn);

    if (pendingQuestionAnswerEl) {
      pendingQuestionAnswerEl.placeholder = String(pendingConfirmCurrent.placeholder || "补充你的答案或限制条件...");
      pendingQuestionAnswerEl.style.display = isQuestion && pendingConfirmCurrent.allow_custom_answer ? "" : "none";
    }
    if (pendingConfirmAllowBtnEl) pendingConfirmAllowBtnEl.textContent = isQuestion ? "提交回答" : "允许执行";
    if (pendingConfirmDenyBtnEl) pendingConfirmDenyBtnEl.textContent = isQuestion ? "取消" : "拒绝";
    showPendingConfirmOverlay();
    setPendingConfirmButtonsDisabled(pendingConfirmSubmitting);

  async function syncPendingConfirmationsFromServer(sessionId = getSessionId(), { silent = true } = {}) {
    const sid = String(sessionId || getSessionId()).trim();
    if (!sid) {
      clearPendingConfirm();
      return [];
    }
    try {
      const params = new URLSearchParams({ session_id: sid });
      const res = await apiFetch(`/terminal/pending?${params.toString()}`, { method: "GET" });
      const data = await res.json();
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `http ${res.status}`));
      const pending = Array.isArray(data?.pending) ? data.pending : [];
      setPendingConfirmFromList(pending);
      return pending;
    } catch (e) {
      if (!silent) {
        showToast(`同步确认状态失败：${String(e?.message || e)}`, "err");
      }
      return [];
    }
  }

  async function submitPendingConfirmation(approval) {
    if (pendingConfirmSubmitting) return;
    const currentEl = pendingConfirmCurrent;
    if (!currentEl) return;
    const sid = String(getSessionId() || "").trim();
    if (!sid) return;

    pendingConfirmSubmitting = true;
    setPendingConfirmButtonsDisabled(true);
    void hidePendingConfirmOverlay();
    pendingConfirmCurrent = null;

    try {
      const isQuestion = currentEl.kind === "question";
      const selectedChoice = String(currentEl.selected_choice || "").trim();
      const isNoneChoice = selectedChoice && selectedChoice === String(currentEl.none_of_them_value || "__none_of_them__");
      const answerText = isQuestion ? String(pendingQuestionAnswerEl?.value || selectedChoice || "").trim() : "";
      if (isQuestion && approval && !answerText && !selectedChoice) {
        pendingConfirmSubmitting = false;
        pendingConfirmCurrent = currentEl;
        renderPendingConfirmOverlay();
        showToast("请先选择或补充回答", "warn");
        return;
      }
      if (isQuestion && approval && isNoneChoice && !String(pendingQuestionAnswerEl?.value || "").trim()) {
        pendingConfirmSubmitting = false;
        pendingConfirmCurrent = currentEl;
        renderPendingConfirmOverlay();
        pendingQuestionAnswerEl?.focus();
        showToast("选择“以上都不是”后请补充你的答案", "warn");
        return;
      }
      const res = await apiFetch("/terminal/confirm", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sid,
          approval: !!approval,
          kind: currentEl.kind || "terminal",
          call_id: currentEl.call_id || "",
          cmd: currentEl.cmd || "",
          choice: isNoneChoice ? "" : selectedChoice,
          answer: answerText,
        }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) {
        throw new Error(String(data?.error || `http ${res.status}`));
      }
      if (data?.flow === "deep_alignment") {
        const confirmPending = Array.isArray(data?.pending) ? data.pending : [];
        if (data?.active && String(data?.alignment_text || "").trim()) {
          removeDeepCard(deepActiveCard);
          deepPendingPayload = normalizeDeepPayload({
            sid,
            message: String(data.original_message || deepPendingPayload?.message || ""),
            file_names: Array.isArray(data.file_names) ? data.file_names : [],
            file_contents: Array.isArray(data.file_contents) ? data.file_contents : [],
            alignment_text: String(data.alignment_text || ""),
            rounds: Array.isArray(data.rounds) ? data.rounds : [],
            active_index: Number(data.active_index || 0),
            can_back: !!data.can_back,
            pending_deep_ask: data.pending_deep_ask || null,
            force_latest: true,
          });
          renderDeepAlignmentCard(deepPendingPayload);
        } else if (data?.state === "cancelled") {
          deepPendingPayload = null;
          removeDeepCard(deepActiveCard);
        }
        setPendingConfirmFromList(confirmPending);
        showToast(data?.state === "cancelled" ? "已取消 Deep 对齐" : "已提交回答");
        return;
      }
      const replyText = sanitizeAssistantDisplayText(String(data?.reply || ""));
      const confirmPending = Array.isArray(data?.pending) ? data.pending : null;
      const toolSteps = Math.max(0, Number(data?.tool_steps || 0));
      const marker = buildToolTraceMarkerMarkdown(data?.tool_trace);
      const compressionText = absorbContextCompressionPayload(data.context_compression);
      let finalReply = marker
        ? (replyText ? `${replyText}\n\n${marker}` : marker)
        : replyText;
      if (compressionText) {
        finalReply = String(finalReply || "").trim()
          ? `${finalReply}\n\n${compressionText}`
          : compressionText;
      }
      if (finalReply.trim()) {
        upsertAssistantTurnBubble(finalReply, { turnId: data?.turn_id, append: true });
      }
      if (Array.isArray(data?.tool_trace) && data.tool_trace.length > 0) {
        renderToolTraceToTerminal(data.tool_trace, { sessionId: sid, persist: false });
      }
      if (confirmPending) {
        setPendingConfirmFromList(confirmPending);
      } else {
        await syncPendingConfirmationsFromServer(sid, { silent: true });
      }
      showToast(currentEl.kind === "question" ? "已提交回答" : (approval ? "已允许执行" : "已拒绝执行"));
    } catch (e) {
      showToast(`操作失败：${String(e?.message || e)}`, "err");
      await syncPendingConfirmationsFromServer(sid, { silent: false });
    } finally {
      pendingConfirmSubmitting = false;
      renderPendingConfirmOverlay();
      syncTerminalConfirmLockFromDom();
    }
  }

  function syncTerminalConfirmLockFromDom() {
    const pending = pendingConfirmCurrent ? 1 : 0;
    setTerminalConfirmLock(pending > 0, pending);
    return pending;

  function pendingConfirmLockMessage() {
    const kind = String(pendingConfirmCurrent?.kind || "").trim().toLowerCase();
    if (kind === "question") return "存在待回答问题，请先在弹窗中提交回答或取消。";
    return "存在待确认终端命令，请先在弹窗中允许/拒绝。";

  function reportErrorToTerminal(message, { source = "", sessionId = getSessionId(), persist = false } = {}) {
    const text = String(message ?? "").trim() || "未知错误";
    const prefix = source ? `[error/${source}]` : "[error]";
    showTerm();
    addTermLine("out", `${prefix} ${text}`, "err", { sessionId, persist });
