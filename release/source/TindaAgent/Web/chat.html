  function stringifyValue(v) {
    if (v === null || v === undefined) return "";
    if (typeof v === "string") return v;
    if (typeof v === "number" || typeof v === "boolean") return String(v);
    try { return JSON.stringify(v, null, 2); } catch { return String(v); }
  }

  function renderToolTraceToTerminal(trace, { sessionId = getSessionId(), persist = false } = {}) {
    if (!Array.isArray(trace) || trace.length === 0) return false;
    showTerm();
    trace.forEach((step) => {
      const name = step?.agent_tool || "unknown_tool";
      const args = step?.arguments || {};
      addTermLine("cmd", `[tool] ${name} ${stringifyValue(args)}`, "", { sessionId, persist });

      const result = step?.result;
      if (result && typeof result === "object") {
        const inner = result.result;
        if (inner && typeof inner === "object" && inner.pending_confirmation === true) {
          const cmd = String(inner.cmd || "").trim();
          const callId = String(inner.call_id || result.call_id || step?.call_id || step?.tool_call_id || "").trim();
          if (cmd) {
            syncPendingConfirmationsFromServer(getSessionId(), { silent: true });
            addTermLine("out", `[warn] 需要确认: ${cmd.slice(0, 80)}`, "info", { sessionId, persist });
          }
        } else if (result.pending_confirmation === true) {
          const cmd = String(result.cmd || "").trim();
          const callId = String(result.call_id || step?.call_id || step?.tool_call_id || "").trim();
          if (cmd) {
            syncPendingConfirmationsFromServer(getSessionId(), { silent: true });
            addTermLine("out", `[warn] 需要确认: ${cmd.slice(0, 80)}`, "info", { sessionId, persist });
          }
        } else if (result.ok === false) {
          if (result.error_code === "permission_denied" && result.expose_to_user === false) {
            addTermLine("out", `[error] ${result.user_message || "该工具当前不可用，请尝试其它方式。"}`, "err", { sessionId, persist });
          } else {
            addTermLine("out", `[error] ${result.error || "工具执行失败"}`, "err", { sessionId, persist });
          }
        } else {
          if (result.tool_name) addTermLine("out", `tool: ${result.tool_name}`, "info", { sessionId, persist });
          if (result.stdout) {
            String(result.stdout).split("\n").forEach((line) => addTermLine("out", line, "", { sessionId, persist }));
          }
          if (result.result !== undefined) {
            const rendered = stringifyValue(result.result);
            if (rendered) rendered.split("\n").forEach((line) => addTermLine("out", line, "", { sessionId, persist }));
          }
          if (result.tools && typeof result.tools === "object") {
            addTermLine("out", "可用工具列表：", "info", { sessionId, persist });
            Object.entries(result.tools).forEach(([k, v]) => addTermLine("out", `- ${k}: ${v}`, "", { sessionId, persist }));
          }
        }
      } else {
        const raw = stringifyValue(step?.raw_result);
        if (raw) raw.split("\n").forEach((line) => addTermLine("out", line, "", { sessionId, persist }));
      }
      addTermSep({ sessionId, persist });
    });
    showToast("已同步工具调用到终端");
    return true;
  }

  // --- Resize drag ---
  resizerEl.addEventListener("mousedown", (e) => {
    if (!termOpen) return;
    isResizing   = true;
    resizeStartX = e.clientX;
    resizeStartW = termPanelEl.offsetWidth;
    document.body.style.cursor     = "col-resize";
    document.body.style.userSelect = "none";
    resizerEl.classList.add("dragging");
    e.preventDefault();
  });

  document.addEventListener("mousemove", (e) => {
    if (!isResizing || !termOpen) return;
    const dx   = resizeStartX - e.clientX;
    const newW = Math.min(Math.max(resizeStartW + dx, 180), window.innerWidth * 0.65);
    termWidth = newW;
    termPanelEl.style.transition = "none";
    termPanelEl.style.width      = newW + "px";
    scheduleRecalcPinnedSpacerHeight();
  });

  document.addEventListener("mouseup", () => {
    if (!isResizing) return;
    isResizing = false;
    document.body.style.cursor     = "";
    document.body.style.userSelect = "";
    resizerEl.classList.remove("dragging");
    termPanelEl.style.transition = "";
    localStorage.setItem(TERM_WIDTH_KEY, String(Math.round(termWidth)));
    scheduleRecalcPinnedSpacerHeight();
  });

  // --- Session handling ---
  function genSessionId() {
    return "s_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 10);
  }
  function getSessionId() {
    let sid = localStorage.getItem(SESSION_KEY);
    if (!sid) { sid = genSessionId(); localStorage.setItem(SESSION_KEY, sid); }
    return sid;
  }
  function rotateSessionId() {
    const sid = genSessionId();
    localStorage.setItem(SESSION_KEY, sid);
    return sid;
  }

  async function ensureActiveSession() {
    let sid = String(localStorage.getItem(SESSION_KEY) || "").trim();
    if (sid) {
      try {
        const res = await apiFetch("/sessions?limit=500&offset=0");
        if (res.ok) {
          const data = await res.json();
          const list = Array.isArray(data?.sessions) ? data.sessions : [];
          const found = list.find((x) => String(x?.id || "") === sid);
          if (!found) {
            localStorage.removeItem(SESSION_KEY);
            sid = "";
          }
        }
      } catch {
        // 网络不通时保留本地 ID，不做清除
      }
    }
    if (!sid) {
      try {
        const currentInStore = String(localStorage.getItem(SESSION_KEY) || "").trim();
        const res = await apiFetch("/sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title: "新对话",
            current_session_id: currentInStore || undefined,
            reuse_if_current_empty: true,
          }),
        });
        const data = await res.json();
        sid = String(data?.session?.id || "").trim();
      } catch {
        sid = "";
      }
      if (!sid) sid = genSessionId();
      localStorage.setItem(SESSION_KEY, sid);
    }
    return sid;
  }

  function setActiveSession(sessionId, { title = "新对话", silent = false } = {}) {
    const sid = String(sessionId || "").trim();
    if (!sid) return;
    localStorage.setItem(SESSION_KEY, sid);
    activeSessionTitle = String(title || "新对话");
    renderHeaderStatus();
    refreshContextUsageLength(sid).catch(() => {});
    if (!silent) showToast(`已切换会话：${activeSessionTitle}`);
    toolLastSeq = 0;
    processedTerminalSeq.clear();
    clearPendingConfirm();
  }

  async function createSessionAndSwitch(title = "新对话", { silent = false } = {}) {
    const res = await apiFetch("/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title }),
    });
    const data = await res.json();
    if (!res.ok || !data?.session?.id) {
      throw new Error(String(data?.error || `http ${res.status}`));
    }
    setActiveSession(data.session.id, { title: data.session.title || title, silent });
    return data.session;
  }

  function normalizeEntryForPersist(raw) {
    if (!raw || typeof raw !== "object") return null;
    const role = String(raw.role || "").trim();
    if (role !== "user" && role !== "assistant") return null;

    const entryType = String(raw.entry_type || "chat").trim() || "chat";
    const allowedTypes = ["chat", "notice", "tool_marker", "terminal", "attachment", "terminal_confirm", "terminal_exec"];
    const safeType = allowedTypes.includes(entryType) ? entryType : "chat";

    const terminalKindRaw = String(raw.terminal_kind || "").trim();
    const safeTerminalKind =
      safeType === "terminal" && ["cmd", "out", "sep"].includes(terminalKindRaw)
        ? terminalKindRaw
        : "";
    const terminalClassRaw = String(raw.terminal_class ?? raw.class ?? "").trim();
    const safeTerminalClass = safeType === "terminal" ? normalizeTerminalClass(terminalClassRaw) : "";

    const content = String(raw.content ?? "");
    if (!content.trim()) return null;
    return {
      role,
      entry_type: safeType,
      terminal_kind: safeTerminalKind,
      terminal_class: safeTerminalClass,
      content,
      ts: String(raw.ts || toIsoWithOffset(new Date())),
    };
  }

  function enqueueSessionEntries(entries, { sessionId = getSessionId() } = {}) {
    const sid = String(sessionId || getSessionId()).trim();
    if (!sid || !Array.isArray(entries) || entries.length === 0) return;
    const payloadEntries = entries
      .map(normalizeEntryForPersist)
      .filter((x) => !!x);
    if (payloadEntries.length === 0) return;

    sessionPersistQueue = sessionPersistQueue
      .then(async () => {
        try {
          await apiFetch("/session/events", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_id: sid,
              entries: payloadEntries,
            }),
          });
        } catch (e) {
          reportErrorToTerminal(`会话事件写入失败：${String(e?.message || e)}`, {
            source: "session_events",
            sessionId: sid,
            persist: false,
          });
        }
      })
      .catch(() => {
        // keep queue alive after an upstream failure
      });
  }

  function normalizeModelChoice(raw) {
    const key = String(raw || "").trim().toLowerCase();
    return MODEL_ALIAS_MAP[key] || "";
  }

  function getModelLabel(modelId) {
    const id = normalizeModelChoice(modelId) || String(modelId || "").trim();
    const item = modelChoices.find((x) => String(x?.id || "") === id);
    return item?.label || id || "unknown";
  }

  function setModelSwitchBtnUI() {
    const mb = document.getElementById("modelSwitchBtn");
    if (!mb) return;
    const label = getModelLabel(currentModel);
    mb.classList.toggle("on", !!currentModel);
    mb.title = `当前模型：${label}`;
    mb.setAttribute("data-tip", `当前模型：${label}`);
  }

  function renderModelPanel() {
    if (!modelPanelEl) return;
    const rows = modelChoices.length > 0 ? modelChoices : MODEL_CHOICES_FALLBACK;
    const html = rows.map((item) => {
      const modelId = String(item?.id || "");
      const label = String(item?.label || modelId);
      const active = normalizeModelChoice(currentModel) === normalizeModelChoice(modelId);
      return `<button type="button" class="model-item${active ? " active" : ""}" data-model="${escapeHtml(modelId)}">${escapeHtml(label)}</button>`;
    }).join("");
    modelPanelEl.innerHTML = html || `<div class="records-empty">无可用模型</div>`;
    modelPanelEl.querySelectorAll(".model-item").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const modelId = btn.getAttribute("data-model") || "";
        if (!modelId) return;
        await switchModel(modelId);
      });
    });
  }

  function closeModelPanel() {
    modelPanelEl?.classList.remove("open");
  }

  function toggleModelPanel() {
    if (!modelPanelEl) return;
    const willOpen = !modelPanelEl.classList.contains("open");
    closeTimePanel();
    if (willOpen) {
      renderModelPanel();
      modelPanelEl.classList.add("open");
    } else {
      modelPanelEl.classList.remove("open");
    }
  }

  async function loadModelInfo() {
    try {
      const res = await apiFetch("/model");
      if (!res.ok) throw new Error(`http ${res.status}`);
      const data = await res.json();
      currentModel = normalizeModelChoice(data?.current_model) || currentModel;
      if (Array.isArray(data?.available_models) && data.available_models.length > 0) {
        modelChoices = data.available_models
          .map((x) => ({
            id: normalizeModelChoice(x?.id) || normalizeModelChoice(x?.label) || String(x?.id || x?.label || "").trim(),
            label: String(x?.label || x?.id || "").trim(),
          }))
          .filter((x) => x.id && x.label);
      }
    } catch (e) {
      reportErrorToTerminal(`读取模型信息失败：${String(e?.message || e)}`, { source: "model_info" });
    }
    if (!currentModel) currentModel = "deepseek-v4-flash";
    if (!Array.isArray(modelChoices) || modelChoices.length === 0) {
      modelChoices = MODEL_CHOICES_FALLBACK.slice();
    }
    setModelSwitchBtnUI();
    renderModelPanel();
  }

  async function switchModel(modelId) {
    const target = normalizeModelChoice(modelId);
    if (!target) return;
    if (normalizeModelChoice(currentModel) === target) {
      closeModelPanel();
      return;
    }
    try {
      const res = await apiFetch("/model", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: target }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) {
        throw new Error(String(data?.error || `http ${res.status}`));
      }
      currentModel = normalizeModelChoice(data?.current_model) || target;
      if (Array.isArray(data?.available_models) && data.available_models.length > 0) {
        modelChoices = data.available_models
          .map((x) => ({
            id: normalizeModelChoice(x?.id) || normalizeModelChoice(x?.label) || String(x?.id || x?.label || "").trim(),
            label: String(x?.label || x?.id || "").trim(),
          }))
          .filter((x) => x.id && x.label);
      }
      setModelSwitchBtnUI();
      renderModelPanel();
      closeModelPanel();
      showToast(`模型已切换：${getModelLabel(currentModel)}`);
    } catch (e) {
      reportErrorToTerminal(`模型切换失败：${String(e?.message || e)}`, { source: "model_switch" });
      showToast(`模型切换失败：${String(e?.message || e)}`, "err");
    }
  }

  function formatRecordTime(value) {
    const text = String(value || "").trim();
    if (!text) return "N/A";
    const dt = new Date(text);
    if (Number.isNaN(dt.getTime())) return text;
    return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")} ${String(dt.getHours()).padStart(2, "0")}:${String(dt.getMinutes()).padStart(2, "0")}`;
  }

  function renderRecordsList(rows) {
    if (!recordsListEl) return;
    if (!Array.isArray(rows) || rows.length === 0) {
      recordsListEl.innerHTML = `<div class="records-empty">暂无聊天记录</div>`;
      return;
    }
    recordsListEl.innerHTML = "";
    rows.forEach((item) => {
      const recordId = String(item?.id || item?.session_id || "");
      const messageCount = Number(item?.message_count || 0);
      const node = document.createElement("div");
      node.className = "record-item";
      if (recordId === getSessionId()) node.classList.add("active");
      node.innerHTML = `
        <div class="record-item-title">${escapeHtml(String(item?.title || "新对话"))}</div>
        <div class="record-item-meta">
          session: ${escapeHtml(String(item?.id || item?.session_id || "N/A"))}<br/>
          updated: ${escapeHtml(formatRecordTime(item?.updated_at))}<br/>
          messages: ${messageCount}
        </div>
      `;
      const btn = document.createElement("button");
      btn.className = "record-item-btn";
      btn.type = "button";
      btn.textContent = "切换";
      btn.addEventListener("click", async () => {
        setActiveSession(recordId, { title: String(item?.title || "新对话") });
        await loadCurrentSessionRecord();
        closeRecordsPanel();
      });
      node.appendChild(btn);
      recordsListEl.appendChild(node);
    });
  }

  async function createSessionFromPanel() {
    if (creatingSessionFromPanel) return;
    creatingSessionFromPanel = true;
    const createBtn = recordsPanelEl?.querySelector(".records-actions button");
    if (createBtn) createBtn.disabled = true;
    try {
      const currentId = String(getSessionId() || "").trim();
      const res = await apiFetch("/sessions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: "新对话",
          current_session_id: currentId,
          reuse_if_current_empty: true,
        }),
      });
      const data = await res.json();
      if (!res.ok || !data?.session?.id) {
        throw new Error(String(data?.error || `http ${res.status}`));
      }
      const row = data.session;
      if (data?.reused) {
        addSystemNotice("当前已是空会话", { pinTop: true, sessionId: currentId || row.id, persist: false });
        await refreshRecords();
        return;
      }
      setActiveSession(row.id, { title: row.title || "新对话", silent: true });
      showEmptyState();
      clearTerm();
      clearPendingConfirm();
      await refreshRecords();
      addSystemNotice("已新建会话", { pinTop: true, sessionId: row.id, persist: false });
      startToolPolling(row.id);
    } catch (e) {
      reportErrorToTerminal(`创建会话失败：${String(e?.message || e)}`, { source: "session_create" });
      addSystemNotice(`创建会话失败：${String(e?.message || e)}`);
    } finally {
      creatingSessionFromPanel = false;
      if (createBtn) createBtn.disabled = false;
    }
  }

  async function deleteCurrentSessionFromPanel() {
    const sid = String(getSessionId() || "").trim();
    if (!sid) return;
    try {
      const res = await apiFetch(`/sessions/${encodeURIComponent(sid)}`, { method: "DELETE" });
      let data = {};
      const bodyText = await res.text();
      if (bodyText) {
        try {
          data = JSON.parse(bodyText);
        } catch {
          data = { ok: false, error: `HTTP ${res.status} ${bodyText.slice(0, 120)}` };
        }
      }
      if (!res.ok || data?.ok === false) {
        throw new Error(String(data?.error || `http ${res.status}`));
      }
      await refreshRecords();
      const next = Array.isArray(sessionsCache) && sessionsCache.length > 0 ? sessionsCache[0] : null;
      if (next && String(next?.id || "").trim()) {
        const nextId = String(next.id || "").trim();
        setActiveSession(nextId, { title: String(next?.title || "新对话"), silent: true });
        showEmptyState();
        clearTerm();
        await loadCurrentSessionRecord();
        startToolPolling(nextId);
        addSystemNotice("当前会话已删除，已切换到其他会话", { pinTop: true, sessionId: nextId, persist: false });
      } else {
        localStorage.removeItem(SESSION_KEY);
        activeSessionTitle = "无会话";
        statusContextUsageLength = 0;
        renderHeaderStatus();
        toolLastSeq = 0;
        processedTerminalSeq.clear();
        stopToolPolling();
        showEmptyState();
        clearTerm();
        clearPendingConfirm();
        addSystemNotice("当前会话已删除", { pinTop: true, sessionId: sid, persist: false });
      }
    } catch (e) {
      reportErrorToTerminal(`删除会话失败：${String(e?.message || e)}`, { source: "session_delete" });
      addSystemNotice(`删除会话失败：${String(e?.message || e)}`);
    }
  }

  async function deleteAllSessionsFromPanel() {
    if (!confirm("确定要删除全部会话吗？此操作不可撤销。")) return;

    try {
      const res = await apiFetch("/sessions", { method: "DELETE" });
      let data = {};
      const bodyText = await res.text();
      if (bodyText) {
        try {
          data = JSON.parse(bodyText);
        } catch {
          data = { ok: false, error: `HTTP ${res.status} ${bodyText.slice(0, 120)}` };
        }
      }
      if (!res.ok || data?.ok === false) {
        throw new Error(String(data?.error || `http ${res.status}`));
      }
      const count = Number(data?.deleted || 0);
      localStorage.removeItem(SESSION_KEY);
      activeSessionTitle = "无会话";
      statusContextUsageLength = 0;
      renderHeaderStatus();
      toolLastSeq = 0;
      processedTerminalSeq.clear();
      stopToolPolling();
      showEmptyState();
      clearTerm();
      clearPendingConfirm();
      await refreshRecords();
      addSystemNotice(`已删除 ${count} 个会话`, { pinTop: true, persist: false });
    } catch (e) {
      reportErrorToTerminal(`删除全部会话失败：${String(e?.message || e)}`, { source: "session_delete_all" });
      addSystemNotice(`删除全部会话失败：${String(e?.message || e)}`);
    }
  }

  async function refreshRecords() {
    if (!recordsListEl) return;
    const keyword = String(recordsSearchInputEl?.value || "").trim();
    recordsListEl.innerHTML = `<div class="records-empty">加载中...</div>`;
    try {
      const params = new URLSearchParams({
        limit: String(RECORDS_PAGE_LIMIT),
        offset: "0",
      });
      const res = await apiFetch(`/sessions?${params.toString()}`);
      if (!res.ok) throw new Error(`http ${res.status}`);
      const data = await res.json();
      let rows = Array.isArray(data.sessions) ? data.sessions : [];
      if (keyword) {
        const kw = keyword.toLowerCase();
        rows = rows.filter((x) => String(x?.id || "").toLowerCase().includes(kw) || String(x?.title || "").toLowerCase().includes(kw));
      }
      sessionsCache = rows;
      renderRecordsList(rows);
    } catch (e) {
      reportErrorToTerminal(`读取记录失败：${String(e?.message || e)}`, { source: "records" });
      recordsListEl.innerHTML = `<div class="records-empty">读取记录失败</div>`;
    }
  }

    recordsPanelOpen = true;
    recordsMaskEl?.classList.add("show");
    recordsPanelEl?.classList.add("show");
    if (recordsPanelEl) recordsPanelEl.setAttribute("aria-hidden", "false");

  function resetTerminalForReplay() {
    termRequestGroup = null;
    termBodyEl.innerHTML = "";
    termInitialized = false;
    initTermContent();
    termInitialized = true;
  }

  function renderImportedTerminalEntry(entry) {
    const kind = String(entry?.terminal_kind || "").trim();
    const content = String(entry?.content || "");
    if (kind === "cmd") {
      addTermLine("cmd", content, "", { persist: false });
      return true;
    }
    if (kind === "sep") {
      addTermSep({ persist: false });
      return true;
    }
    addTermLine("out", content, inferTerminalClass(content, String(entry?.terminal_class ?? entry?.class ?? "")), { persist: false });
    return true;
  }

  function renderImportedNotice(content) {
    const text = String(content || "").trim();
    if (!text) return false;
    clearEmptyState();
    const pill = document.createElement("div");
    pill.className = "sys-notice";
    pill.textContent = text;
    const spacer = messagesEl.querySelector(".sys-pin-spacer");
    if (spacer) {
      messagesEl.insertBefore(pill, spacer);
    } else {
      messagesEl.appendChild(pill);
    }
    return true;
  }

  function renderImportedEntries(entries) {
    resetStageActive = false;
    clearPinnedSpacer();
    messagesEl.innerHTML = "";
    resetAssistantTurnBubbleMap();
    resetTerminalForReplay();
    setTerminalConfirmLock(false, 0);
    if (!Array.isArray(entries) || entries.length === 0) {
      showEmptyState();
      syncTerminalConfirmLockFromDom();
      return;
    }
    let hasChatBubble = false;
    let hasTerminal = false;

    const parseLegacyContextEntry = (text) => {
      const raw = String(text || "").trim();
      if (!raw) return null;

      const termMatch = /^\[终端\/(cmd|out|sep)\]\s*([\s\S]*)$/u.exec(raw);
      if (termMatch) {
        const kind = termMatch[1];
        const payload = String(termMatch[2] || "");
        if (kind === "cmd") {
          return { kind: "terminal", terminal_kind: "cmd", content: payload };
        }
        if (kind === "sep") {
          return { kind: "terminal", terminal_kind: "sep", content: payload || "─".repeat(36) };
        }
        return { kind: "terminal", terminal_kind: "out", content: payload };
      }

      const noticeMatch = /^\[系统提示\]\s*([\s\S]*)$/u.exec(raw);
      if (noticeMatch) {
        return { kind: "notice", content: String(noticeMatch[1] || "").trim() };
      }

      const toolMatch = /^\[工具调用\]\s*([\s\S]*)$/u.exec(raw);
      if (toolMatch) {
        return { kind: "tool_marker", content: String(toolMatch[1] || "").trim() || "> >_<\n> --调用工具中--" };
      }

      return null;
    };

    entries.forEach((entry) => {
      const role = String(entry?.role || "").trim();
      const entryType = String(entry?.entry_type || "chat").trim() || "chat";
      const content = String(entry?.content || "");
      const turnId = normalizeTurnId(entry?.turn_id || "");
      if (!content.trim()) return;

      if (entryType === "terminal") {
        hasTerminal = renderImportedTerminalEntry(entry) || hasTerminal;
        return;
      }

      if (entryType === "notice") {
        hasChatBubble = renderImportedNotice(content) || hasChatBubble;
        return;
      }

      if (entryType === "tool_marker") {
        clearEmptyState();
        const bubble = upsertAssistantTurnBubble(content, { turnId, append: true, isCommand: true });
        hasChatBubble = Boolean(bubble) || hasChatBubble;
        return;
      }

      if (entryType === "terminal_exec") {
        hasTerminal = renderTermExecInTerminal(entry) || hasTerminal;
        return;
      }

      if (entryType === "terminal_confirm") {
        let parsed = {};
        try { parsed = JSON.parse(String(entry?.content || "{}")); } catch { parsed = {}; }
        const cmd = String(parsed?.cmd || "").trim();
        const status = String(parsed?.status || "pending").toLowerCase();
        if (cmd && status === "pending") {
          syncPendingConfirmationsFromServer(getSessionId(), { silent: true });
        }
        return;
      }

      if (entryType === "attachment") {
        clearEmptyState();
        addFileChipBubble(content);
        hasChatBubble = true;
        return;
      }

      if (role === "user") {
        clearEmptyState();
        const displayContent = stripFilePrefix(content);
        if (displayContent) {
          addBubble(displayContent, "user");
          hasChatBubble = true;
        }
        return;
      }
      if (role === "assistant") {
        if (entryType === "chat_continuation") {
          clearEmptyState();
          const bubble = upsertAssistantTurnBubble(content, { turnId, append: true });
          hasChatBubble = Boolean(bubble) || hasChatBubble;
        } else {
          if (entryType === "chat") {
            const legacy = parseLegacyContextEntry(content);
            if (legacy) {
              if (legacy.kind === "terminal") {
                hasTerminal = renderImportedTerminalEntry(legacy) || hasTerminal;
                return;
              }
              if (legacy.kind === "notice") {
                hasChatBubble = renderImportedNotice(legacy.content) || hasChatBubble;
                return;
              }
              if (legacy.kind === "tool_marker") {
                clearEmptyState();
                const bubble = upsertAssistantTurnBubble(legacy.content, { turnId, append: true, isCommand: true });
                hasChatBubble = Boolean(bubble) || hasChatBubble;
                return;
              }
            }
          }
          clearEmptyState();
          const bubble = upsertAssistantTurnBubble(content, { turnId, append: false });
          hasChatBubble = Boolean(bubble) || hasChatBubble;
        }
      }
    });
    if (!hasChatBubble) showEmptyState();
    if (hasTerminal) showTerm();
    syncTerminalConfirmLockFromDom();
    scrollToBottom();
  }

  async function importRecord(recordId) {
    if (!recordId) return;
    try {
      const res = await apiFetch("/records/import", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: getSessionId(),
          record_id: recordId,
        }),
      });
      const data = await res.json();
      if (!res.ok || data.ok === false) {
        throw new Error(data?.error || `http ${res.status}`);
      }
      renderImportedEntries(Array.isArray(data.entries) ? data.entries : []);
      addSystemNotice(`已切换记录：${recordId}`);
      closeRecordsPanel();
    } catch (e) {
      reportErrorToTerminal(`导入记录失败：${String(e?.message || e)}`, { source: "record_import" });
      addSystemNotice(`导入失败：${String(e?.message || e)}`);
    }
  }

  async function loadCurrentSessionRecord() {
    try {
      const sid = await ensureActiveSession();
      const res = await apiFetch(`/sessions/${encodeURIComponent(sid)}/messages`);
      if (!res.ok) return;
      const data = await res.json();
      const entries = Array.isArray(data.entries) ? data.entries : [];
      renderImportedEntries(entries);
      await syncPendingConfirmationsFromServer(sid, { silent: true });
      await refreshContextUsageLength(sid);
    } catch (e) {
      reportErrorToTerminal(`读取当前会话记录失败：${String(e?.message || e)}`, { source: "session_record" });
    }
  }

  // --- UI helpers ---
  function scrollToBottom() {
    messagesWrap.scrollTop = getMaxUsefulScroll();
  }

  function getMaxUsefulScroll() {
    const naturalMax = Math.max(0, messagesWrap.scrollHeight - messagesWrap.clientHeight);
    if (!resetStageActive) return naturalMax;

    const resetPill = messagesEl.querySelector(".sys-notice.pinned");
    if (!resetPill) return naturalMax;

    // 扣掉 spacer 占的额外空间：naturalMax 里包含了 spacer 和 #messages 的 padding-bottom，
    // padding-bottom 是输入框留白，要保留；spacer 是人为撑高的，不能让用户滚进去。
    const spacer = messagesEl.querySelector(".sys-pin-spacer");
    const spacerHeight = spacer ? spacer.offsetHeight : 0;
    const pillTop = Math.max(resetPill.offsetTop - 6, 0);
    const contentMax = Math.max(0, naturalMax - spacerHeight);
    return Math.max(pillTop, contentMax);
  }

  function clampMessagesScrollWithinBounds() {
    const maxUseful = getMaxUsefulScroll();
    if (messagesWrap.scrollTop < 0) {
      messagesWrap.scrollTop = 0;
      return;
    }
    if (messagesWrap.scrollTop > maxUseful) {
      messagesWrap.scrollTop = maxUseful;
    }
  }

  function scheduleRecalcPinnedSpacerHeight() {
    if (spacerRecalcRaf) return;
    spacerRecalcRaf = requestAnimationFrame(() => {
      spacerRecalcRaf = 0;
      recalcPinnedSpacerHeight();
    });
  }

  function recalcPinnedSpacerHeight() {
    if (!resetStageActive) return;
    const spacer = messagesEl.querySelector(".sys-pin-spacer");
    if (!spacer) return;
    const viewportHeight = messagesWrap.clientHeight;
    const nextHeight = Math.max(viewportHeight - 80, 120);
    spacer.style.height = `${nextHeight}px`;
  }

  function clearPinnedSpacer() {
    messagesEl.querySelectorAll(".sys-pin-spacer").forEach((n) => n.remove());
  }

  function addBubble(text, role, { isCommand = false, turnId = "" } = {}) {
    const row = document.createElement("div");
    row.className = "msg " + role;

    const spacer = messagesEl.querySelector(".sys-pin-spacer");
    const prev = spacer ? spacer.previousElementSibling : messagesEl.lastElementChild;
    if (prev && prev.classList.contains("msg") && prev.classList.contains(role)) {
      row.classList.add("same-as-prev");
    }

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.innerHTML = role === "bot"
      ? `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.8v4.2M12 17v4.2M2.8 12h4.2M17 12h4.2M5.3 5.3l3 3M15.7 15.7l3 3M18.7 5.3l-3 3M8.3 15.7l-3 3"></path></svg>`
      : `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="8" r="3.2"></circle></svg>`;

    const bubble = document.createElement("div");
    bubble.className = "bubble" + (isCommand ? " cmd" : "");
    if (role === "bot") {
      bubble.classList.add("md");
      bubble.dataset.rawMd = String(text ?? "");
      bubble.innerHTML = renderMarkdown(text);
      const tid = normalizeTurnId(turnId);
      if (tid) {
        bubble.dataset.turnId = tid;
        rememberAssistantTurnBubble(tid, bubble);
      }
    } else {
      bubble.textContent = text;
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    if (spacer) {
      messagesEl.insertBefore(row, spacer);
    } else {
      messagesEl.appendChild(row);
    }
    scrollToBottom();
    return { row, bubble };

    const spacer = messagesEl.querySelector(".sys-pin-spacer");

      row.classList.add("same-as-prev");

    bubble.className = "bubble file-chip";
    bubble.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg><span>${escapeHtml(shortName)}</span>`;

  function getDisplayFileName(fullName) {
    const name = String(fullName || "").trim();
    const lastSlash = Math.max(name.lastIndexOf("/"), name.lastIndexOf("\\"));
    return lastSlash >= 0 ? name.slice(lastSlash + 1) : name;
  }

  function stripFilePrefix(raw) {
    const text = String(raw ?? "");
    const m = text.match(/^\[文件: [^\n]+\]\n```[^\n]*\n[\s\S]*?\n```\n?/);
    if (m) return text.slice(m[0].length).trim();
    return text;
  }

  function sanitizeAssistantDisplayText(raw) {
    const text = String(raw ?? "");
    if (!text) return "";
    const cleaned = text
      .replace(/^\s*\[系统摘要\]\s*/gmu, "")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
    return cleaned;
  }

  function normalizeTurnId(raw) {
    const text = String(raw ?? "").trim();
    if (!text) return "";
    return text.replace(/[^A-Za-z0-9._:-]+/g, "_").slice(0, 80);
  }

  function resetAssistantTurnBubbleMap() {
    assistantTurnBubbleById.clear();
  }

  function resolveAssistantTurnBubble(turnId) {
    const tid = normalizeTurnId(turnId);
    if (!tid) return null;
    const bubble = assistantTurnBubbleById.get(tid);
    if (!bubble || !bubble.isConnected) {
      assistantTurnBubbleById.delete(tid);
      return null;
    }
    return bubble;
  }

  function rememberAssistantTurnBubble(turnId, bubbleEl) {
    const tid = normalizeTurnId(turnId);
    if (!tid || !bubbleEl) return;
    assistantTurnBubbleById.set(tid, bubbleEl);
  }

  function upsertAssistantTurnBubble(rawText, { turnId = "", append = false, isCommand = false } = {}) {
    const text = sanitizeAssistantDisplayText(rawText);
    if (!text) return null;
    const tid = normalizeTurnId(turnId);
    const existing = resolveAssistantTurnBubble(tid);
    if (existing) {
      if (append) {
        const prev = String(existing.dataset.rawMd ?? "");
        const next = prev ? `${prev}\n\n${text}` : text;
        existing.dataset.rawMd = next;
        existing.innerHTML = renderMarkdown(next);
      } else {
        existing.dataset.rawMd = text;
        existing.innerHTML = renderMarkdown(text);
      }
      scrollToBottom();
      return { row: existing.closest(".msg"), bubble: existing };
    }
    return addBubble(text, "bot", { isCommand, turnId: tid });
  }

  function createMsgRow(role, contentEl) {
    const row = document.createElement("div");
    row.className = "msg " + role;
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.innerHTML = role === "bot"
      ? `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.8v4.2M12 17v4.2M2.8 12h4.2M17 12h4.2M5.3 5.3l3 3M15.7 15.7l3 3M18.7 5.3l-3 3M8.3 15.7l-3 3"></path></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="8" r="3.2"></circle></svg>`;
    row.appendChild(avatar);
    if (contentEl instanceof Node) row.appendChild(contentEl);
    return row;
  }

    const rc = data.returncode !== null && data.returncode !== undefined ? String(data.returncode) : "-";
    const ok = data.status === "ok";

    const bubble = document.createElement("div");
    bubble.className = "term-exec-bubble";

    const head = document.createElement("div");
    head.className = "term-exec-head";
    head.innerHTML = `<span class="term-exec-dots"><span class="term-exec-dot"></span><span class="term-exec-dot"></span><span class="term-exec-dot"></span></span>
      <span class="term-exec-title">终端执行</span>
      <span class="term-exec-status ${ok ? "ok" : "err"}">${ok ? "完成" : "失败"}</span>`;
    bubble.appendChild(head);

    if (cmd) {
      const cmdEl = document.createElement("div");
      cmdEl.className = "term-exec-cmd";
      cmdEl.textContent = `tinda@agent ~ % ${cmd}`;
      bubble.appendChild(cmdEl);

  function renderTermConfirmEntry(entry) {
    const content = entry.content || "{}";
    let data;
    try { data = JSON.parse(content); } catch { data = {}; }
    const cmd = data.cmd || "";
    const rawStatus = String(data.status || "pending").toLowerCase();
    const status = rawStatus === "allow"
      ? "allowed"
      : rawStatus === "deny"
        ? "denied"
        : (["pending", "allowed", "denied"].includes(rawStatus) ? rawStatus : "pending");

    const wrapper = document.createElement("div");
    wrapper.className = "term-confirm" + (status !== "pending" ? " collapsed" : "");
    wrapper.dataset.confirmId = entry.id || "";
    wrapper.dataset.status = status;
    wrapper.dataset.turnId = normalizeTurnId(entry?.turn_id || "");

    const head = document.createElement("div");
    head.className = "term-confirm-head";
    const dotClass = status === "allowed" ? "allowed" : status === "denied" ? "denied" : "pending";
    head.innerHTML = `<span class="dot ${dotClass}"></span><span>终端命令${status === "pending" ? "请求确认" : status === "allowed" ? "已允许" : "已拒绝"}</span>`;
    wrapper.appendChild(head);

    const body = document.createElement("div");
    body.className = "term-confirm-body";
    body.innerHTML = `<div class="term-confirm-cmd">${escapeHtml(cmd)}</div>`;

    if (status === "pending") {
      const actions = document.createElement("div");
      actions.className = "term-confirm-actions";
      const allowBtn = document.createElement("button");
      allowBtn.className = "term-confirm-btn allow"; allowBtn.textContent = "允许执行";
      allowBtn.onclick = () => confirmTerminalAction(entry.id, "allow", wrapper, cmd);
      const denyBtn = document.createElement("button");
      denyBtn.className = "term-confirm-btn deny"; denyBtn.textContent = "拒绝";
      denyBtn.onclick = () => confirmTerminalAction(entry.id, "deny", wrapper, cmd);
      actions.appendChild(allowBtn); actions.appendChild(denyBtn);
      body.appendChild(actions);
    } else {
      const result = document.createElement("div");
      result.className = "term-confirm-result " + status;
      result.innerHTML = status === "allowed" ? "已允许执行"
        : "已拒绝执行" + `<span class="toggle-expand" onclick="this.closest('.term-confirm').classList.toggle('collapsed')">展开</span>`;
      body.appendChild(result);
    }
    wrapper.appendChild(body);
    return wrapper;
  }

  function renderTermExecInTerminal(entry, { persist = false, sessionId = getSessionId(), noScroll = false } = {}) {
    if (!entry || typeof entry !== "object") return false;
    showTerm();
    const execEl = renderTermExecBubble(entry);
    appendTerminalWidget(execEl, { noScroll });
    if (persist) enqueueSessionEntries([entry], { sessionId });
    return true;
  }

  function renderTermConfirmInTerminal(entry, { persist = false, sessionId = getSessionId(), noScroll = false } = {}) {
    if (!entry || typeof entry !== "object") return false;
    showTerm();
    const confirmEl = renderTermConfirmEntry(entry);
    const confirmId = String(entry.id || "").trim();
    if (confirmId) {
      const existing = Array.from(termBodyEl.querySelectorAll(".term-confirm"))
        .find((node) => String(node?.dataset?.confirmId || "").trim() === confirmId);
      if (existing && existing.parentElement) {
        existing.parentElement.replaceChild(confirmEl, existing);
        if (!noScroll) termBodyEl.scrollTop = termBodyEl.scrollHeight;
        syncTerminalConfirmLockFromDom();
        return true;
      }
    }
    appendTerminalWidget(confirmEl, { noScroll });
    if (persist) enqueueSessionEntries([entry], { sessionId });
    syncTerminalConfirmLockFromDom();
    return true;
  }

  async function confirmTerminalAction(confirmId, action, wrapperEl, cmd) {
    const callId = String(confirmId || "").trim();
    const cmdText = String(cmd || "").trim();
    if (callId || cmdText) {
      syncPendingConfirmationsFromServer(getSessionId(), { silent: true });
    }
    if (wrapperEl) {
      wrapperEl.classList.add("collapsed");
      wrapperEl.dataset.status = action === "allow" ? "allowed" : "denied";
    }
    await submitPendingConfirmation(action === "allow");
  }

  function appendMarkdownToBotBubble(bubbleEl, extraText) {
    if (!bubbleEl) return false;
    const prev = String(bubbleEl.dataset.rawMd ?? "");
    const next = `${prev}${String(extraText ?? "")}`;
    bubbleEl.dataset.rawMd = next;
    bubbleEl.innerHTML = renderMarkdown(next);
    return true;
  }

  function escapeHtml(text) {
    return text
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll("\"", "&quot;")
      .replaceAll("'", "&#39;");
  }

  function safeHref(rawUrl) {
    const url = rawUrl.trim();
    if (/^(https?:\/\/|mailto:)/i.test(url)) return url;
    return "#";
  }

  function renderInlineMarkdown(line) {
    const codeSpans = [];
    let s = line.replace(/`([^`]+)`/g, (_, code) => {
      const token = `@@INLINE_CODE_${codeSpans.length}@@`;
      codeSpans.push(`<code>${escapeHtml(code)}</code>`);
      return token;
    });

    s = escapeHtml(s);
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
      const href = safeHref(url);
      return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    });
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
    s = s.replace(/~~([^~]+)~~/g, "<del>$1</del>");

    codeSpans.forEach((html, i) => {
      s = s.replaceAll(`@@INLINE_CODE_${i}@@`, html);
    });
    return s;
  }

  function parseTableCells(line) {
    let s = String(line ?? "").trim();
    if (s.startsWith("|")) s = s.slice(1);
    if (s.endsWith("|")) s = s.slice(0, -1);
    const token = "@@ESCAPED_PIPE@@";
    s = s.replace(/\\\|/g, token);
    return s.split("|").map((cell) => cell.replaceAll(token, "|").trim());
  }

  function isTableSeparatorLine(line) {
    const s = String(line ?? "").trim();
    if (!s || !s.includes("|")) return false;
    const cells = parseTableCells(s);
    if (!cells.length) return false;
    // 兼容常见 markdown 变体：允许 :--: / --: / :--
    // （标准多为 3 个以上横杠，但不少模型会产出 2 个横杠）
    return cells.every((cell) => /^:?-{2,}:?$/.test(cell));
  }

  function parseTableAlign(cell) {
    const s = String(cell ?? "").trim();
    if (s.startsWith(":") && s.endsWith(":")) return "center";
    if (s.endsWith(":")) return "right";
    return "left";
  }

  function renderMarkdown(text) {
    const source = (text ?? "").replace(/\r\n/g, "\n");
    const codeBlocks = [];

    let body = source.replace(/```([a-zA-Z0-9_-]+)?\n([\s\S]*?)```/g, (_, lang, code) => {
      const langClass = lang ? ` class="language-${escapeHtml(lang)}"` : "";
      const token = `@@CODE_BLOCK_${codeBlocks.length}@@`;
      const html = `<pre><code${langClass}>${escapeHtml(code)}</code></pre>`;
      codeBlocks.push(html);
      return token;
    });

    const lines = body.split("\n");
    const parts = [];
    let inList = false;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trimEnd();
      const trim = line.trim();

      if (!trim) {
        if (inList) { parts.push("</ul>"); inList = false; }
        continue;
      }

      const nextTrim = i + 1 < lines.length ? lines[i + 1].trim() : "";
      if (trim.includes("|") && nextTrim && isTableSeparatorLine(nextTrim)) {
        if (inList) { parts.push("</ul>"); inList = false; }

        const headers = parseTableCells(trim);
        const alignDefs = parseTableCells(nextTrim);
        const aligns = headers.map((_, idx) => parseTableAlign(alignDefs[idx] || ""));
        const rows = [];

        i += 2;
        for (; i < lines.length; i++) {
          const rowTrim = lines[i].trim();
          if (!rowTrim) {
            i -= 1;
            break;
          }
          if (!rowTrim.includes("|") || /^@@CODE_BLOCK_\d+@@$/.test(rowTrim)) {
            i -= 1;
            break;
          }
          rows.push(parseTableCells(rowTrim));
        }

        const thHtml = headers.map((h, idx) => `<th style="text-align:${aligns[idx]}">${renderInlineMarkdown(h)}</th>`).join("");
        const trHtml = rows.map((cols) => {
          const tds = headers.map((_, idx) => {
            const cellText = cols[idx] ?? "";
            return `<td style="text-align:${aligns[idx]}">${renderInlineMarkdown(cellText)}</td>`;
          }).join("");
          return `<tr>${tds}</tr>`;
        }).join("");
        const tbody = trHtml ? `<tbody>${trHtml}</tbody>` : "";
        parts.push(`<div class="md-table-wrap"><table><thead><tr>${thHtml}</tr></thead>${tbody}</table></div>`);
        continue;
      }

      if (/^(-{3,}|\*{3,}|_{3,})$/.test(trim)) {
        if (inList) { parts.push("</ul>"); inList = false; }
        parts.push("<hr/>");
        continue;
      }

      const listMatch = /^[-*+]\s+(.+)$/.exec(trim);
      if (listMatch) {
        if (!inList) { parts.push("<ul>"); inList = true; }
        parts.push(`<li>${renderInlineMarkdown(listMatch[1])}</li>`);
        continue;
      }

      if (inList) { parts.push("</ul>"); inList = false; }

      const headingMatch = /^(#{1,6})\s+(.+)$/.exec(trim);
      if (headingMatch) {
        const level = headingMatch[1].length;
        parts.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
        continue;
      }

      if (trim.startsWith(">")) {
        if (inList) { parts.push("</ul>"); inList = false; }
        const quoteLines = [];
        for (; i < lines.length; i++) {
          const qTrim = lines[i].trim();
          if (!qTrim.startsWith(">")) {
            i -= 1;
            break;
          }
          const m = /^>\s?(.*)$/.exec(qTrim);
          quoteLines.push(m ? m[1] : "");
        }
        const quoteHtml = quoteLines
          .map((line) => (line ? renderInlineMarkdown(line) : "<br/>"))
          .join("<br/>");
        parts.push(`<blockquote>${quoteHtml}</blockquote>`);
        continue;
      }

      if (/^@@CODE_BLOCK_\d+@@$/.test(trim)) { parts.push(trim); continue; }

      parts.push(`<p>${renderInlineMarkdown(trim)}</p>`);
    }

    if (inList) parts.push("</ul>");

    let html = parts.join("");
    codeBlocks.forEach((block, i) => { html = html.replaceAll(`@@CODE_BLOCK_${i}@@`, block); });
    return html || "<p></p>";
  }

  function addTyping() {
    const row = document.createElement("div");
    row.className = "msg bot";
    row.innerHTML = `
      <div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.8v4.2M12 17v4.2M2.8 12h4.2M17 12h4.2M5.3 5.3l3 3M15.7 15.7l3 3M18.7 5.3l-3 3M8.3 15.7l-3 3"></path></svg></div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    const spacer = messagesEl.querySelector(".sys-pin-spacer");
    if (spacer) {
      messagesEl.insertBefore(row, spacer);
    } else {
      messagesEl.appendChild(row);
    }
    scrollToBottom();
    return row;
  }

  function setStreamToggleUI() {
    const sb = document.getElementById("streamToggleBtn");
    if (!sb) return;
    const iconOn = sb.querySelector(".stream-on");
    const iconOff = sb.querySelector(".stream-off");
    if (iconOn && iconOff) {
      iconOn.style.display = streamEnabled ? "" : "none";
      iconOff.style.display = streamEnabled ? "none" : "";
    }
    sb.classList.toggle("on", streamEnabled);
    const tip = "切换流式输出";
    sb.title = tip;
    sb.setAttribute("data-tip", tip);
  }

  function toggleStream() {
    streamEnabled = !streamEnabled;

  function addSystemNotice(text, { pinTop = false, persist = true, sessionId = getSessionId() } = {}) {
    const pill = document.createElement("div");
    pill.className = "sys-notice";
    pill.textContent = text;
    if (!pinTop) {
      const spacer = messagesEl.querySelector(".sys-pin-spacer");
      if (spacer) {
        messagesEl.insertBefore(pill, spacer);
      } else {
        messagesEl.appendChild(pill);
      }
    } else {
      messagesEl.appendChild(pill);
    }

    if (pinTop) {
      resetStageActive = true;
      // 清掉旧的 pinned 标记，只留最新的重置 pill
      messagesEl.querySelectorAll(".sys-notice.pinned").forEach((n) => {
        if (n !== pill) n.classList.remove("pinned");
      });
      pill.classList.add("pinned");
      // 重建 spacer：在 pill 之后追加一个大占位，撑高 scrollHeight 才能把 pill 滚到顶
      clearPinnedSpacer();
      const spacer = document.createElement("div");
      spacer.className = "sys-pin-spacer";
      spacer.setAttribute("aria-hidden", "true");
      messagesEl.appendChild(spacer);
      recalcPinnedSpacerHeight();

      requestAnimationFrame(() => {
        messagesWrap.scrollTo({
          top: Math.max(pill.offsetTop - 6, 0),
          behavior: "smooth",
        });
      });
    } else if (resetStageActive) {
      // 重置阶段：保持重置 pill 在顶，新 pill 自然显示在其下方
      const resetPill = messagesEl.querySelector(".sys-notice.pinned");
      if (resetPill) {
        requestAnimationFrame(() => {
          messagesWrap.scrollTo({
            top: Math.max(resetPill.offsetTop - 6, 0),
            behavior: "smooth",
          });
        });
      } else {
        scrollToBottom();
      }
    } else {
      scrollToBottom();
    }
    if (persist) {
      enqueueSessionEntries(
        [
          {
            role: "assistant",
            entry_type: "notice",
            content: String(text ?? ""),
            ts: toIsoWithOffset(new Date()),
          },
        ],
        { sessionId },
      );
    }
    return pill;
  }

  async function showVersionTip() {
    clearEmptyState();
    const localDisplay = getVersionBadgeText();
    const localNorm = normalizeVersionTag(localDisplay);
    const signText = appVersionSignatureId ? `，签名${appVersionSignatureId}` : "";
    const verifyText = appVersionSignatureId ? (appVersionVerified ? "，签名已验证" : "，签名未验证") : "";
    addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，正在检查最新版本...`, { persist: false });

    let latestVersion = "";
    let remoteError = "";
    try {
      const res = await apiFetch("/system/versions", { method: "GET" });
      const data = res.ok ? await res.json() : {};
      if (!res.ok) {
        remoteError = String(data?.error || `HTTP ${res.status}`);
      } else {
        const latestVerified = String(data?.latest_verified?.version || "").trim();
        const remoteRows = Array.isArray(data?.remote_versions) ? data.remote_versions : [];
        const firstRemote = String(remoteRows[0]?.version || "").trim();
        latestVersion = latestVerified || firstRemote;
        if (!latestVersion && data?.remote_ok === false) {
          remoteError = String(data?.error || "远端版本不可用");
        }
      }
    } catch (e) {
      remoteError = String(e?.message || e);
    }

    if (remoteError) {
      addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，最新版本检查失败：${remoteError}`);
      return;
    }

    const latestNorm = normalizeVersionTag(latestVersion);
    if (!latestNorm) {
      addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，暂未获取到远端版本。`);
      return;
    }

    const cmp = compareVersionTag(localNorm, latestNorm);
    const latestText = `v${latestNorm}`;
    if (cmp >= 0) {
      addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，已是最新（远端最新 ${latestText}）。`);
    } else {
      addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，发现新版本 ${latestText}。`);
    }
  }

  function formatReadableDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    const hh = String(date.getHours()).padStart(2, "0");
    const mm = String(date.getMinutes()).padStart(2, "0");
    const ss = String(date.getSeconds()).padStart(2, "0");
    return `${y}年${m}月${d}日 ${hh}:${mm}:${ss}`;
  }

  function toIsoWithOffset(date) {
    const pad2 = (n) => String(n).padStart(2, "0");
    const y = date.getFullYear();
    const m = pad2(date.getMonth() + 1);
    const d = pad2(date.getDate());
    const hh = pad2(date.getHours());
    const mm = pad2(date.getMinutes());
    const ss = pad2(date.getSeconds());
    const offsetMin = -date.getTimezoneOffset();
    const sign = offsetMin >= 0 ? "+" : "-";
    const absMin = Math.abs(offsetMin);
    const offH = pad2(Math.floor(absMin / 60));
    const offM = pad2(absMin % 60);
    return `${y}-${m}-${d}T${hh}:${mm}:${ss}${sign}${offH}:${offM}`;
  }

  function parseDateTimeLocal(value) {
    const s = String(value || "").trim();
    if (!s) return null;
    const normalized = s.length === 16 ? `${s}:00` : s;
    const dt = new Date(normalized);
    if (Number.isNaN(dt.getTime())) return null;
    return dt;
  }

  function collectTimeMeta() {
    if (timeMode === "none") {
      return { time_iso: "N/A", time_text: "N/A" };
    }

    if (timeMode === "custom") {
      const dt = parseDateTimeLocal(customTimeValue);
      if (!dt) return { time_iso: "N/A", time_text: "N/A" };
      return {
        time_iso: toIsoWithOffset(dt),
        time_text: formatReadableDate(dt),
      };
    }

    const now = new Date();
    return {
      time_iso: toIsoWithOffset(now),
      time_text: formatReadableDate(now),
    };
  }

    const timeMeta = collectTimeMeta();

      div.innerHTML = `<span class="dot ${active ? "on" : "off"}"></span><span>${name} (${uid})</span>`;
      div.addEventListener("click", () => switchToAccount(uid));
      accountListEl.appendChild(div);
    });
  }

  async function switchToAccount(uid) {
    if (!uid || uid === String(userMeta.uid || "")) { hideAccountPopup(); return; }
    const users = Array.isArray(window.__headerUsersCache) ? window.__headerUsersCache : [];
    const target = users.find(x => String(x?.uid || "") === uid);
    if (!target) return;
    const token = String(target?.token || "").trim();
    if (!token) { showToast("目标账户缺少 token", "error"); return; }
    setAuthToken(token);
    try {
      const res = await apiFetch("/user/switch", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({uid}) });
      const data = await res.json();
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
      applyUserMeta(data);
      addSystemNotice(`已切换账户：${userMeta.name} (${userMeta.uid})`, {persist:false});
      showToast("账户已切换");
      hideAccountPopup();
      await loadAccountList();
      renderQuickButtons();
      if (!adminLinkBtnEl || adminLinkBtnEl.style.display === "none") { if (location.pathname === "/user-admin") location.href = "/"; }
    } catch(e) {
      setAuthToken("");
      showToast(`切换失败：${String(e?.message||e)}`, "error");
    }
  }

  function hideAccountPopup() { if (accountPopupEl) accountPopupEl.classList.remove("show"); }


  async function pollToolEventsOnce(sessionId) {
    const sid = String(sessionId || getSessionId()).trim();
    if (!sid) return;
    if (toolPollInFlight) return;
    toolPollInFlight = true;
    try {
      const params = new URLSearchParams({ after_seq: String(toolLastSeq), limit: "200" });
      const res = await apiFetch(`/sessions/${encodeURIComponent(sid)}/tool-events?${params.toString()}`);
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      const data = await res.json();
      const events = Array.isArray(data.events) ? data.events : [];
      if (typeof data.next_seq === "number") toolLastSeq = data.next_seq;
      // 拉取恢复后清空错误抖动计数
      toolEventsFetchErrorStreak = 0;
      toolEventsLastErrorAt = 0;
      if (!events.length) return;
      showTerm();
      const frag = document.createDocumentFragment();
      let activeGroup = null;
      events.forEach((ev) => {
        const seq = Number(ev?.seq || 0);
        if (seq > 0) {
          if (processedTerminalSeq.has(seq)) return;
          processedTerminalSeq.add(seq);
        }
        if (ev?.type !== "terminal") return;
        const kind = String(ev?.kind || "out");
        const text = String(ev?.text || "");
        if (kind === "cmd") {
          activeGroup = document.createElement("div");
          activeGroup.className = "term-line term-call-group";
          activeGroup.dataset.termKind = "call-group";
          const row = document.createElement("div");
          row.className = "term-call-row cmd";
          row.innerHTML = `<span class="term-prompt">tinda@agent ~ % </span><span class="term-cmd">${escapeHtml(text)}</span>`;
          activeGroup.appendChild(row);
          frag.appendChild(activeGroup);
        } else if (kind === "sep") {
          if (activeGroup) {
            const row = document.createElement("div");
            row.className = "term-call-row sep";
            row.textContent = "─".repeat(36);
            activeGroup.appendChild(row);
            activeGroup = null;
          } else {
            const row = document.createElement("div");
            row.className = "term-line term-sep";
            row.dataset.termKind = "sep";
            row.textContent = "─".repeat(36);
            frag.appendChild(row);
          }
        } else {
          if (activeGroup) {
            const row = document.createElement("div");
            row.className = "term-call-row out";
            const span = document.createElement("span");
            const cls = inferTerminalClass(text, String(ev?.class || ""));
            span.className = "term-out" + (cls ? " " + cls : "");
            span.textContent = text;
            row.appendChild(span);
            activeGroup.appendChild(row);
          } else {
            let group = frag.lastElementChild;
            if (
              !group
              || !group.classList
              || !group.classList.contains("term-line")
              || String(group.dataset?.termKind || "") !== "out-group"
            ) {
              group = document.createElement("div");
              group.className = "term-line term-out-group";
              group.dataset.termKind = "out-group";
              frag.appendChild(group);
            }
            const outRow = document.createElement("div");
            outRow.className = "term-out-row";
            const span = document.createElement("span");
            const cls = inferTerminalClass(text, String(ev?.class || ""));
            span.className = "term-out" + (cls ? " " + cls : "");
            span.textContent = text;
            outRow.appendChild(span);
            group.appendChild(outRow);
          }
        }
      });
      termBodyEl.appendChild(frag);
      trimTerminalLines();
      termBodyEl.scrollTop = termBodyEl.scrollHeight;
    } catch (e) {
      // 网络抖动/切页瞬断时不每秒刷红错误；仅在持续失败时节流提示
      toolEventsFetchErrorStreak += 1;
      const now = Date.now();
      const message = String(e?.message || e);
      const isTransient = /Failed to fetch|NetworkError|Load failed|AbortError/i.test(message);
      const isFirstPersistentTransient = isTransient && toolEventsFetchErrorStreak === 3;
      const reachedInterval = toolEventsLastErrorAt === 0 || now - toolEventsLastErrorAt >= TOOL_EVENTS_ERROR_REPORT_INTERVAL_MS;
      const shouldReport =
        !isTransient
        || isFirstPersistentTransient
        || reachedInterval;
      if (shouldReport) {
        toolEventsLastErrorAt = now;
        reportErrorToTerminal(`工具事件读取失败：${message}`, { source: "tool_events", sessionId: sid, persist: false });
      }
      if (isTransient && toolEventsFetchErrorStreak >= TOOL_EVENTS_ERROR_AUTO_PAUSE_STREAK && !toolPollPausedByError) {
        toolPollPausedByError = true;
        stopToolPolling();
        reportErrorToTerminal("工具事件通道连续失败，已自动暂停轮询。发送新消息后会自动恢复。", {
          source: "tool_events",
          sessionId: sid,
          persist: false,
        });
        showToast("工具事件通道已自动暂停（连续失败）", "warn");
      }
    } finally {
      toolPollInFlight = false;
    }
  }

  function stopToolPolling() {
    if (toolPollTimer) {
      clearInterval(toolPollTimer);
      toolPollTimer = 0;
    }
    flushTermPersistBuffer();
    toolPollInFlight = false;
    toolEventsFetchErrorStreak = 0;
    toolEventsLastErrorAt = 0;
  }

  function startToolPolling(sessionId) {
    stopToolPolling();
    toolPollPausedByError = false;
    const sid = String(sessionId || getSessionId()).trim();
    if (!sid) return;
    pollToolEventsOnce(sid);
    toolPollTimer = setInterval(() => {
      pollToolEventsOnce(sid);
    }, 1400);
  }

  // --- Actions ---
  async function sendMessage() {
    if (syncTerminalConfirmLockFromDom() > 0) {
      showToast("存在待确认终端命令，请先在弹窗中允许/拒绝。", "warn");
      inputEl?.focus();
      return;
    }
    const text = inputEl.value.trim();
    const hasFile = importedFile !== null;
    if (!text && !hasFile) return;
    let fullMessage = text;
    const fileBackup = hasFile ? { name: importedFile.name, content: importedFile.content } : null;
    if (hasFile) {
      const ext = getFileExtension(importedFile.name);
      fullMessage = `[文件: ${importedFile.name}]\n\`\`\`${ext}\n${importedFile.content}\n\`\`\`\n` + (text || "");
    }
    const sid = await ensureActiveSession();

    await ensureUserMetaLoaded();

    clearEmptyState();
    inputEl.value = "";
    autoResize();
    setMessageSendInFlight(true);

    if (hasFile && fileBackup) {
      addFileChipBubble(fileBackup.name);
      enqueueSessionEntries([{
        role: "user",
        entry_type: "attachment",
        content: fileBackup.name,
      }], { sessionId: sid });
      removeFile();
    }
    if (text) {
      addBubble(text, "user");
    }
    const echo = isEchoCmd(text);
    if (echo) { showTerm(); }
    // 所有输入统一走 SSE：命令与普通对话共享同一工具事件工作环。
    const useStream = true;
    const renderDelta = streamEnabled;
    const typingRow = useStream ? (renderDelta ? null : addTyping()) : addTyping();
    const metaPayload = buildRequestMeta();
    let streamBot = null;
    const clearTypingPlaceholder = () => {
      if (typingRow && typingRow.isConnected) typingRow.remove();
    };
    const clearDraftBotBubble = () => {
      if (streamBot?.row && streamBot.row.isConnected) streamBot.row.remove();
      streamBot = null;
    };

    try {
      if (useStream) {
        if (renderDelta) {
          streamBot = addBubble("", "bot");
          streamBot.bubble.classList.add("md");
        }
        const params = new URLSearchParams({
          message: fullMessage,
          session_id: sid,
        });
        Object.entries(metaPayload).forEach(([k, v]) => params.set(k, String(v)));
        const url = `/chat/stream?${params.toString()}`;
        const res = await apiFetch(url, {
          method: "GET",
          headers: { "Accept": "text/event-stream" },
        });
        if (!res.ok || !res.body) throw new Error(`stream http ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        let streamText = "";
        let donePayload = null;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf("\n\n")) >= 0) {
            const rawEvent = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            if (!rawEvent.trim()) continue;

            let eventName = "message";
            let dataText = "";
            rawEvent.split("\n").forEach((line) => {
              if (line.startsWith("event:")) eventName = line.slice(6).trim();
              if (line.startsWith("data:")) dataText += line.slice(5).trim();
            });

            let payload = {};
            if (dataText) {
              try { payload = JSON.parse(dataText); } catch { payload = {}; }
            }

            if (eventName === "delta") {
              streamText += String(payload.content || "");
              if (renderDelta && streamBot) {
                streamBot.bubble.dataset.rawMd = streamText;
                streamBot.bubble.innerHTML = renderMarkdown(streamText);
                scrollToBottom();
              }
            } else if (eventName === "reset") {
              const marker = `\n\n> >_<\n> --调用工具中--\n`;
              streamText += marker;
              if (renderDelta && streamBot) {
                streamBot.bubble.dataset.rawMd = streamText;
                streamBot.bubble.innerHTML = renderMarkdown(streamText);
                scrollToBottom();
              }
            } else if (eventName === "tool_step") {
              const trace = Array.isArray(payload?.trace) ? payload.trace : [];
              if (trace.length > 0) {
                renderToolTraceToTerminal(trace, { sessionId: sid, persist: false });
              }
            } else if (eventName === "done") {
              donePayload = payload;
            } else if (eventName === "error") {
              const pendingCount = Math.max(0, Number(payload?.pending_confirm_count || 0));
              if (pendingCount > 0) {
                setTerminalConfirmLock(true, pendingCount);
                await syncPendingConfirmationsFromServer(sid, { silent: true });
              }
              throw new Error(payload.message || "stream failed");
            }
          }
        }

        if (donePayload) {
          const doneTurnId = normalizeTurnId(donePayload?.turn_id || "");
          // 以服务端最终回复为准，避免中途 delta 文本（含误注入工具明细）残留给用户
          if (typeof donePayload.reply === "string") {
            const doneReply = sanitizeAssistantDisplayText(String(donePayload.reply || ""));
            // 保留流式阶段注入的 >_< 标记，不覆盖
            if (doneReply && !streamText.includes(doneReply)) {
              streamText = streamText ? streamText + "\n\n" + doneReply : doneReply;
            } else if (!streamText) {
              streamText = doneReply;
            }
            if (renderDelta && streamBot) {
              streamBot.bubble.dataset.rawMd = streamText;
              streamBot.bubble.innerHTML = renderMarkdown(streamText);
              if (doneTurnId) {
                streamBot.bubble.dataset.turnId = doneTurnId;
                rememberAssistantTurnBubble(doneTurnId, streamBot.bubble);
              }
            }
          } else if (!streamText && donePayload.reply) {
            streamText = sanitizeAssistantDisplayText(String(donePayload.reply));
            if (renderDelta && streamBot) {
              streamBot.bubble.dataset.rawMd = streamText;
              streamBot.bubble.innerHTML = renderMarkdown(streamText);
              if (doneTurnId) {
                streamBot.bubble.dataset.turnId = doneTurnId;
                rememberAssistantTurnBubble(doneTurnId, streamBot.bubble);
              }
            }
          }
          clearTypingPlaceholder();
          if (!renderDelta) {
            const fallbackText = streamText || String(donePayload.reply || "（无回复）");
            upsertAssistantTurnBubble(fallbackText || "（无回复）", { turnId: doneTurnId });
          }
          if (donePayload.tool_async) {
            startToolPolling(sid);
          } else if (!renderDelta) {
            const traced = renderToolTraceToTerminal(donePayload.tool_trace, { sessionId: sid, persist: false });
            if ((donePayload.tool_steps || 0) > 0 && !traced) {
              showToast("本轮工具调用没有终端输出", "warn");
            }
          }
          const donePendingCount = Math.max(0, Number(donePayload?.pending_confirm_count || 0));
          if (donePendingCount > 0 || donePayload?.pending_confirmation === true) {
            await syncPendingConfirmationsFromServer(sid, { silent: true });
          } else {
            clearPendingConfirm();
          }
        } else if (typingRow) {
          clearTypingPlaceholder();
          if (!renderDelta) {
            upsertAssistantTurnBubble(streamText || "（无回复）", { turnId: doneTurnId });
          }
        }
        return;
      }

      const res = await apiFetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: fullMessage,
          session_id: sid,
          ...metaPayload,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        const pendingCount = Math.max(0, Number(data?.pending_confirm_count || 0));
        if (pendingCount > 0) {
          setTerminalConfirmLock(true, pendingCount);
          await syncPendingConfirmationsFromServer(sid, { silent: true });
        }
        throw new Error(String(data?.detail || data?.error || `http ${res.status}`));
      }
      clearTypingPlaceholder();
      if (data?.tool_async) {
        const replyText = String(data.reply || "> >_<\n> --调用工具中--");
        upsertAssistantTurnBubble(replyText || "（无回复）", { turnId: data?.turn_id, isCommand: true });
        if (data?.tool_job?.job_id) startToolPolling(sid);
      } else if (echo) {
        const reply = data.reply ?? "";
        reply.split("\n").forEach(line => addTermLine("out", line, "", { sessionId: sid }));
        if (Array.isArray(data.tool_trace) && data.tool_trace.length > 0) {
          addTermSep({ sessionId: sid });
          addTermLine("out", "(已跳过重复工具轨迹渲染)", "dim", { sessionId: sid });
        }
        showToast("已输出至终端");
      } else {
        upsertAssistantTurnBubble(String(data.reply ?? "（无回复）"), { turnId: data?.turn_id, isCommand: text.startsWith("/") });
        // 工具轨迹由后端同轮次写入会话，前端这里仅做实时展示（不落盘），避免刷新后位置漂移。
        const traced = renderToolTraceToTerminal(data.tool_trace, { sessionId: sid, persist: false });
        if (data.tool_steps > 0 && !traced) {
          showToast("本轮工具调用没有终端输出", "warn");
        }
      }
      const responsePendingCount = Math.max(0, Number(data?.pending_confirm_count || 0));
      if (responsePendingCount > 0 || data?.pending_confirmation === true) {
        await syncPendingConfirmationsFromServer(sid, { silent: true });
      } else {
        clearPendingConfirm();
      }
    } catch (e) {
      const errText = String(e?.message || e || "");
      clearTypingPlaceholder();
      clearDraftBotBubble();
      if (errText.includes("待确认终端命令")) {
        showToast(errText, "warn");
        await syncPendingConfirmationsFromServer(sid, { silent: true });
      } else {
        reportErrorToTerminal(`请求失败：${errText}`, { source: "chat", sessionId: sid });
        if (!echo) addBubble("请求失败，请确认服务已启动。", "bot");
      }
    } finally {
      setMessageSendInFlight(false);
      refreshContextUsageLength(sid).catch(() => {});
      inputEl.focus();
      removeFile();
    }
  }

  async function resetChat() {
    const sid = String(getSessionId() || "").trim();
    if (!sid) return;
    try {
      const res = await apiFetch("/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },

      });

      closeRecordsPanel();

      addSystemNotice("上下文已清理，当前会话已开始新上下文", { pinTop: true, sessionId: sid });
      await refreshRecords();
      startToolPolling(sid);
    } catch (e) {
      reportErrorToTerminal(`上下文清理失败：${String(e?.message || e)}`, { source: "reset" });
      clearEmptyState();
      addSystemNotice("清理失败，请检查服务是否运行");
    }
  }

      closeTimePanel();
      closeModelPanel();

  window.addEventListener("resize", scheduleRecalcPinnedSpacerHeight);
  termPanelEl.addEventListener("transitionend", (e) => {
    if (e.propertyName === "width") scheduleRecalcPinnedSpacerHeight();
  });

  // 桌面滚轮：到顶/到底后硬边界停止，不再回弹
  messagesWrap.addEventListener("wheel", (e) => {
    const deltaY = e.deltaY;
    if (!deltaY) return;
    const currentTop = messagesWrap.scrollTop;
    const maxUseful = getMaxUsefulScroll();

    if (deltaY > 0 && currentTop >= maxUseful - 0.5) {
      e.preventDefault();
      messagesWrap.scrollTop = maxUseful;
      return;
    }
    if (deltaY < 0 && currentTop <= 0.5) {
      e.preventDefault();
      messagesWrap.scrollTop = 0;
      return;
    }
  }, { passive: false });

  // 触摸/拖拽滚动兜底：强制夹紧到有效范围
  messagesWrap.addEventListener("scroll", () => {
    clampMessagesScrollWithinBounds();
  }, { passive: true });

  // --- Init ---
  if (!getAuthToken()) {
    location.href = "/";
  }
  renderHeaderStatus();
  startGatewayHeartbeat();
  const savedWidth = Number(localStorage.getItem(TERM_WIDTH_KEY));
  if (Number.isFinite(savedWidth) && savedWidth >= 180) {
    termWidth = Math.min(savedWidth, Math.max(180, Math.floor(window.innerWidth * 0.65)));
  }
  const savedTimeMode = localStorage.getItem(TIME_MODE_KEY);
  if (savedTimeMode) timeMode = savedTimeMode;
  const savedCustomTime = localStorage.getItem(TIME_CUSTOM_KEY);
  if (savedCustomTime) customTimeValue = savedCustomTime;
  setTimeMode(timeMode, { silent: true });
  loadModelInfo();
  syncAppVersion();
  streamEnabled = localStorage.getItem(STREAM_ENABLED_KEY) === "1";
  setStreamToggleUI();
  // 读取设置页配置
  try {
    const s = JSON.parse(localStorage.getItem("tinda_settings") || "{}");
    if (s.termOpen === true) openTerm();
    if (typeof s.tokenLimit === "number" && s.tokenLimit >= 100) {
      const sid = getSessionId();
      if (sid) {
        apiFetch(`/sessions/${encodeURIComponent(sid)}/config`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ max_context_tokens: s.tokenLimit }),
        }).catch(() => {});
      }
    }
  } catch {}
  showEmptyState();
  (async () => {
    try {
      const authRes = await apiFetch("/auth/status");
      const authData = authRes.ok ? await authRes.json() : {};
      if (!authRes.ok || !authData?.logged_in) {
        location.href = "/";
        return;
      }
    } catch {
      location.href = "/";
      return;
    }
    await ensureUserMetaLoaded();
    await loadAccountList();
    renderQuickButtons();
    const sid = await ensureActiveSession();
    const sessionsRes = await apiFetch(`/sessions?limit=${RECORDS_PAGE_LIMIT}&offset=0`);
    if (sessionsRes.ok) {
      const payload = await sessionsRes.json();
      const first = Array.isArray(payload.sessions) ? payload.sessions.find((x) => String(x?.id || "") === sid) : null;
      if (first) setActiveSession(sid, { title: String(first.title || "新对话"), silent: true });
    }
    await loadCurrentSessionRecord();
    startToolPolling(sid);
  })();
  closeTerm();
  refreshComposerDisabledState();
  inputEl.focus();
</script>
</body>
</html>
