<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TindaAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff5f9;
      --bg-2: #ffffff;
      --surface: #ffffff;
      --surface-2: #fef0f5;
      --border: #fcd5e5;
      --border-strong: #f9a8c9;
      --text: #3d1f2f;
      --text-dim: #9b5f78;
      --text-faint: #d4a0b5;
      --accent: #ff6eb4;
      --accent-2: #ff9fd3;
      --accent-deep: #c2185b;
      --lavender: #b39ddb;
      --lavender-2: #d1c4e9;
      --gradient: #ff6eb4;
      --gradient-lavender: #c084fc;
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    body {
      display: flex;
      flex-direction: column;
      position: relative;
      animation: pageIn 0.42s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* ── 浮动装饰 ── */
    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      user-select: none;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    .deco svg {
      display: block;
      width: 1em;
      height: 1em;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)    rotate(0deg);  opacity: 0.18; }
      50%  { opacity: 0.38; }
      100% { transform: translateY(-45px) rotate(18deg); opacity: 0.18; }
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 10px 20px;
      gap: 12px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1.5px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15.5px;
      justify-self: start;
      min-width: 0;
    }

    .header-center {
      justify-self: center;
      min-width: 0;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      background: var(--surface);
      border: 1.5px solid var(--border);
      padding: 4px 12px 4px 10px;
      border-radius: 999px;
      box-shadow: 0 2px 10px rgba(255,110,180,0.08);
      white-space: nowrap;
    }
    .status-sep {
      opacity: 0.45;
      font-weight: 600;
      margin: 0 2px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
      animation: statusPulse 2.1s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
      50%      { transform: scale(0.88); box-shadow: 0 0 0 6px rgba(34,197,94,0.05); }
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(255,110,180,0.38);
      animation: wiggle 3.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    .brand-logo svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg); }
    }

    .brand-name {
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version-badge {
      font-size: 10.5px;
      color: var(--text-faint);
      background: var(--surface-2);
      padding: 2px 9px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      word-break: normal;
      line-break: auto;
      flex-shrink: 0;
    }

    .version-btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      line-height: inherit;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }
    .version-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(255,110,180,0.18);
    }
    .version-btn:active {
      transform: translateY(0);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
    }
    #quickBtns {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .account-btn {
      width: 30px;
      height: 30px;
    }

    .header-decos {
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 0.5;
      user-select: none;
    }
    .header-decos .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(255,110,180,0.12);
    }

    .icon-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
      font-size: 15px;
      text-decoration: none;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
    }
    .icon-btn .icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    .icon-btn .icon-fill {
      fill: currentColor;
      stroke: none;
    }
    .icon-btn:hover {
      background: var(--surface-2);
      border-color: var(--accent-2);
      transform: scale(1.1);
    }

    /* 统一悬浮提示 */
    .icon-btn[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      top: calc(100% + 9px);
      transform: translateX(-50%) translateY(-3px);
      white-space: nowrap;
      background: rgba(61,31,47,0.94);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      padding: 6px 9px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      box-shadow: 0 6px 16px rgba(0,0,0,0.14);
      transition: opacity 0.16s ease, transform 0.16s ease;
    }
    .icon-btn[data-tip]::before {
      content: "";
      position: absolute;
      left: 50%;
      top: calc(100% + 3px);
      transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-bottom: 6px solid rgba(61,31,47,0.94);
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: opacity 0.16s ease;
    }
    .icon-btn[data-tip]:hover::after,
    .icon-btn[data-tip]:hover::before {
      opacity: 1;
    }
    .icon-btn[data-tip]:hover::after {
      transform: translateX(-50%) translateY(0);
    }

    /* 流式按钮：仅改颜色状态，形状同 icon-btn */
    .stream-btn {
      font-size: 15px;
    }
    .stream-btn.on {
      background: var(--gradient);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 12px rgba(255,110,180,0.32);
    }
    .stream-btn.on:hover {
      background: var(--gradient);
      opacity: 0.88;
      transform: scale(1.1);
    }

    .term-toggle.on {
      background: var(--gradient);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 12px rgba(255,110,180,0.32);
    }
    .term-toggle.on:hover {
      background: var(--gradient);
      opacity: 0.88;
      transform: scale(1.1);
    }

    .model-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .model-btn.on {
      background: rgba(255, 110, 180, 0.10);
      border-color: var(--accent-2);
      color: var(--accent-deep);
    }
    .model-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      min-width: 232px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(61, 31, 47, 0.14);
      padding: 10px;
      z-index: 35;
      display: none;
    }
    .model-panel.open { display: block; }
    .model-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.16s ease, color 0.16s ease;
    }
    .model-item:hover {
      background: var(--surface-2);
      color: var(--accent-deep);
    }
    .model-item.active {
      background: rgba(255, 110, 180, 0.08);
      color: var(--accent-deep);
      font-weight: 700;
    }

    /* 按钮分组分隔线 */
    .btn-sep {
      width: 1px; height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── Messages ── */
    #messages-wrap {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: scroll;
      overflow-x: hidden;
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    #messages-wrap::-webkit-scrollbar { width: 6px; }
    #messages-wrap::-webkit-scrollbar-track { background: transparent; }
    #messages-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    #messages-wrap::-webkit-scrollbar-thumb:hover { background: var(--accent-2); }

    #messages {
      max-width: 780px;
      margin: 0 auto;
      padding: 28px 20px 144px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg.same-as-prev { margin-top: -6px; }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(10px) scale(0.97);
      animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes popIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
      cursor: default;
      color: #fff;
    }
    .avatar svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .avatar:hover { transform: scale(1.18) rotate(-8deg); }

    .msg.bot .avatar {
      background: var(--gradient);
      box-shadow: 0 3px 12px rgba(255,110,180,0.32);
    }

    .msg.user .avatar {
      background: #f4edf7;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
    }

    .msg.same-as-prev .avatar { visibility: hidden; }

    .bubble {
      max-width: calc(100% - 54px);
      padding: 10px 16px;
      border-radius: 22px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.72;
    }

    /* iMessage-style pointed corner（头像在顶部，尖角对齐到顶部） */
    .msg.bot:not(.same-as-prev) .bubble  { border-top-left-radius: 5px; }
    .msg.user:not(.same-as-prev) .bubble { border-top-right-radius: 5px; }

    .msg.bot .bubble {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--gradient);
      color: #fff;
      border: none;
      box-shadow: 0 4px 18px rgba(255,110,180,0.26);
    }

    .msg.user .bubble.file-chip {
      background: var(--surface);
      color: var(--accent-deep);
      border: 1.5px solid var(--accent-2);
      box-shadow: none;
      padding: 6px 13px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 16px;
    }
    .msg.user .bubble.file-chip svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    /* file chip consecutive: no pointy corner */
    .msg.user.same-as-prev .bubble.file-chip { border-top-right-radius: 16px; }

    .msg.bot .bubble.cmd {
      background: rgba(167,139,250,0.1);
      border-color: rgba(167,139,250,0.32);
      font-family: "JetBrains Mono","Fira Code","SF Mono",Consolas,monospace;
      font-size: 13px;
      color: #7c3aed;
    }

    /* Markdown */
    .msg.bot .bubble.md :where(p,ul,ol,pre,blockquote) { margin: 0.45em 0; }
    .msg.bot .bubble.md :where(h1,h2,h3,h4,h5,h6) { margin: 0.7em 0 0.3em; font-weight: 700; }
    .msg.bot .bubble.md h1 { font-size: 1.15em; }
    .msg.bot .bubble.md h2 { font-size: 1.08em; }
    .msg.bot .bubble.md h3,.msg.bot .bubble.md h4 { font-size: 1em; }
    .msg.bot .bubble.md :first-child { margin-top: 0; }
    .msg.bot .bubble.md :last-child  { margin-bottom: 0; }
    .msg.bot .bubble.md ul,.msg.bot .bubble.md ol { padding-left: 1.3em; }
    .msg.bot .bubble.md li { margin: 0.15em 0; }
    .msg.bot .bubble.md li::marker { color: var(--accent); }
    .msg.bot .bubble.md strong { color: var(--accent-deep); font-weight: 700; }
    .msg.bot .bubble.md pre {
      overflow-x: auto;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      background: var(--surface-2);
      margin: 0.6em 0;
    }
    .msg.bot .bubble.md code {
      font-family: "JetBrains Mono","Fira Code","SF Mono",Consolas,monospace;
      font-size: 12.5px;
      background: rgba(255,110,180,0.1);
      color: var(--accent-deep);
      border-radius: 7px;
      padding: 1px 5px;
    }
    .msg.bot .bubble.md pre code { background: transparent; color: var(--text); padding: 0; white-space: pre; }
    .msg.bot .bubble.md blockquote {
      border-left: 3px solid var(--accent-2);
      padding-left: 10px;
      color: var(--text-dim);
      margin-left: 0;
      background: rgba(255,110,180,0.05);
      border-radius: 0 10px 10px 0;
    }
    .msg.bot .bubble.md hr {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 0.8em 0;
    }
    .msg.bot .bubble.md .md-table-wrap {
      margin: 0.6em 0;
      overflow-x: auto;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
    }
    .msg.bot .bubble.md table {
      border-collapse: collapse;
      min-width: 100%;
      font-size: 13px;
      line-height: 1.55;
    }
    .msg.bot .bubble.md th,
    .msg.bot .bubble.md td {
      padding: 7px 10px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      white-space: normal;
      word-break: break-word;
    }
    .msg.bot .bubble.md th {
      background: var(--surface-2);
      color: var(--accent-deep);
      font-weight: 700;
      text-align: left;
    }
    .msg.bot .bubble.md tr:last-child td { border-bottom: none; }
    .msg.bot .bubble.md th:last-child,
    .msg.bot .bubble.md td:last-child { border-right: none; }
    .msg.bot .bubble.md a { color: var(--accent); text-decoration: none; border-bottom: 1.5px dotted var(--accent-2); }
    .msg.bot .bubble.md a:hover { border-bottom-style: solid; }

    /* System pill */
    .sys-notice {
      align-self: center;
      font-size: 11px;
      color: var(--text-faint);
      background: var(--surface);
      border: 1.5px dashed var(--border);
      padding: 4px 14px;
      border-radius: 999px;
      opacity: 0;
      animation: popIn 0.3s ease forwards;
    }
    .sys-pin-spacer {
      width: 100%;
      flex-shrink: 0;
      pointer-events: none;
    }

    /* Toast（工具调用类轻量通知） */
    .tinda-toast {
      position: fixed;
      left: 50%;
      bottom: 118px;
      transform: translateX(-50%) translateY(14px);
      z-index: 1000;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: rgba(61,31,47,0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(61,31,47,0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .tinda-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .tinda-toast.warn { background: rgba(180,83,9,0.94); }
    .tinda-toast.err  { background: rgba(185,28,28,0.94); }

    /* Typing dots */
    .typing { display: inline-flex; gap: 5px; padding: 3px 2px; align-items: center; }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: dotBounce 1.3s infinite ease-in-out;
    }
    .typing span:nth-child(1) { background: #ff6eb4; }
    .typing span:nth-child(2) { background: #a78bfa; animation-delay: 0.18s; }
    .typing span:nth-child(3) { background: #ff9fd3; animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%,80%,100% { transform: scale(0.55); opacity: 0.5; }
      40%          { transform: scale(1.25); opacity: 1; }
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding-top: 12vh;
      text-align: center;
    }

    .empty-state .logo-big {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(255,110,180,0.3);
      animation: floatLogo 3.2s ease-in-out infinite;
    }
    .empty-state .logo-big svg {
      width: 44px;
      height: 44px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes floatLogo {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-12px) rotate(3deg); }
    }

    .empty-state h2 {
      font-size: 24px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sparkle-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      opacity: 0.55;
      user-select: none;
    }
    .sparkle-row svg {
      width: 13px;
      height: 13px;
      stroke: var(--text-dim);
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-faint);
      max-width: 340px;
      font-weight: 500;
    }

    .suggest {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }

    .suggest button {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      padding: 7px 16px;
      border-radius: 999px;
      font-size: 12.5px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .suggest button:hover {
      background: rgba(255,110,180,0.08);
      color: var(--accent-deep);
      border-color: var(--accent-2);
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 7px 20px rgba(255,110,180,0.18);
    }

    /* ── Input dock ── */
    .input-dock {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 5;
      padding: 14px 20px 22px;
      background: rgba(255,245,249,0.95);
      pointer-events: none;
    }

    .input-box {
      max-width: 780px;
      margin: 0 auto;
      pointer-events: auto;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 5px 5px 5px 20px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 20px rgba(255,110,180,0.09);
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255,110,180,0.12), 0 3px 20px rgba(255,110,180,0.12);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      min-height: 28px;
      /* max 5 行 ≈ 5 × 14px × 1.6 + padding 18 ≈ 130 */
      max-height: 130px;
      padding: 9px 0;
      overflow-y: auto;
    }
    #input::placeholder { color: var(--text-faint); font-weight: 500; }
    #input::-webkit-scrollbar { width: 4px; }
    #input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #sendBtn {
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.2s ease,
                  opacity 0.2s ease;
      flex-shrink: 0;
      align-self: flex-end;
      box-shadow: 0 2px 10px rgba(255,110,180,0.28);
    }
    #sendBtn .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .time-btn .icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    #sendBtn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 4px 16px rgba(255,110,180,0.42);
    }
    #sendBtn:active:not(:disabled) { transform: scale(0.94); }
    #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    .time-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .time-btn {
      background: var(--surface-2);
      color: var(--text-dim);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      min-width: 40px;
      height: 40px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 10px rgba(255, 110, 180, 0.12);
    }
    .time-btn:hover {
      border-color: var(--accent-2);
      color: var(--accent-deep);
      transform: translateY(-1px);
    }
    .time-btn.on {
      background: rgba(255, 110, 180, 0.10);
      border-color: var(--accent-2);
      color: var(--accent-deep);
    }
    .time-panel {
      position: absolute;
      right: 0;
      bottom: calc(100% + 10px);
      min-width: 250px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(61, 31, 47, 0.14);
      padding: 10px;
      z-index: 22;
      display: none;
    }
    .time-panel.open { display: block; }
    .time-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.16s ease, color 0.16s ease;
    }
    .time-item:hover {
      background: var(--surface-2);
      color: var(--accent-deep);
    }
    .time-item.active {
      background: rgba(255, 110, 180, 0.08);
      color: var(--accent-deep);
      font-weight: 700;
    }
    .time-custom {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
      display: none;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .time-custom.open { display: flex; }
    .time-custom input {
      flex: 1;
      min-width: 140px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 12px;
      color: var(--text);
      background: var(--bg-2);
      font-family: inherit;
      outline: none;
    }
    .time-custom input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 110, 180, 0.12);
    }
    .time-custom button {
      border: none;
      border-radius: 10px;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--gradient);
    }

    .file-bar {
      max-width: 780px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-deep);
      pointer-events: auto;
      box-shadow: 0 2px 8px rgba(255,110,180,0.08);
    }
    .file-bar .file-icon {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .file-bar .file-icon svg {
      width: 15px; height: 15px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .file-bar .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-bar .file-remove {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .file-bar .file-remove:hover { color: var(--fail); }

    .file-btn {
      background: var(--surface-2);
      color: var(--text-dim);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      min-width: 40px;
      height: 40px;
      padding: 0;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: 0 2px 10px rgba(255, 110, 180, 0.12);
    }
    .file-btn:hover {
      border-color: var(--accent-2);
      color: var(--accent-deep);
      transform: translateY(-1px);
    }
    .file-btn.has-file {
      background: rgba(255,110,180,0.10);
      border-color: var(--accent-2);
      color: var(--accent-deep);
    }
    .file-btn .icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .hint {
      max-width: 780px;
      margin: 10px auto 0;
      text-align: center;
      font-size: 11.5px;
      color: var(--text-dim);
      font-weight: 600;
    }
    .hint .hint-inner {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 1px 4px rgba(61,31,47,0.04);
    }
    .hint kbd {
      display: inline-block;
      padding: 1px 5px;
      margin: 0 1px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-bottom-width: 1.5px;
      border-radius: 4px;
      font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
      font-size: 10.5px;
      color: var(--accent-deep);
      font-weight: 700;
    }

    /* ── Layout ── */
    .content-wrap {
      flex: 1; display: flex; overflow: hidden; position: relative;
    }
    .chat-col {
      flex: 1; min-width: 280px; display: flex;
      flex-direction: column; position: relative; overflow: hidden;
    }

    /* ── Resizer (可拖拽分隔条) ── */
    .resizer {
      width: 0; flex-shrink: 0; position: relative;
      cursor: col-resize; z-index: 5;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.2s;
    }
    .resizer.visible { width: 8px; }
    .resizer:hover,
    .resizer.dragging { background: rgba(255,110,180,0.08); }

    .resizer::after {
      content: "";
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 3px; height: 32px;
      background: var(--border); border-radius: 99px;
      opacity: 0;
      transition: background 0.2s, height 0.2s, opacity 0.3s, box-shadow 0.2s;
    }
    .resizer.visible::after { opacity: 1; }
    .resizer:hover::after,
    .resizer.dragging::after {
      background: var(--accent); height: 44px;
      box-shadow: 0 0 10px rgba(255,110,180,0.45);
    }

    /* ── Terminal panel (默认隐藏) ── */
    .term-panel {
      width: 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      opacity: 0;
      will-change: width, opacity;
      border-left: 1.5px solid rgba(251, 113, 133, 0.35);
      background: linear-gradient(180deg, #fff7fb 0%, #ffeef6 100%);
      box-shadow: -14px 0 30px rgba(251, 113, 133, 0.12);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.4s ease;
    }
    .term-panel.open {
      box-shadow: -14px 0 30px rgba(251, 113, 133, 0.16), -1px 0 0 rgba(251, 113, 133, 0.25);
    }

    .term-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(251, 113, 133, 0.22);
      background: linear-gradient(90deg, rgba(255, 110, 180, 0.12), rgba(192, 132, 252, 0.10));
    }
    .term-dots {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .term-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(61, 31, 47, 0.15);
    }
    .term-dot:nth-child(1) { background: #fb7185; }
    .term-dot:nth-child(2) { background: #f59e0b; }
    .term-dot:nth-child(3) { background: #34d399; }
    .term-title {
      flex: 1;
      text-align: center;
      font-size: 12.5px;
      font-weight: 700;
      color: #9d174d;
      letter-spacing: 0.2px;
    }
    .term-clear-btn {
      margin-left: auto;
      border: 1px solid rgba(251, 113, 133, 0.45);
      background: #fff;
      color: #be185d;
      border-radius: 999px;
      padding: 4px 11px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow: 0 2px 8px rgba(251, 113, 133, 0.12);
      flex-shrink: 0;
    }
    .term-clear-btn:hover {
      border-color: #ff6eb4;
      background: #fff7fb;
      transform: translateY(-1px);
    }
    .term-clear-btn:active { transform: translateY(0); }

    .term-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 14px;
      font-family: "JetBrains Mono","Fira Code","SF Mono","Cascadia Code",Consolas,monospace;
      font-size: 12.5px;
      line-height: 1.65;
      font-weight: 500;
      color: #334155;
      font-variant-ligatures: contextual;
      background:
        radial-gradient(circle at 88% -12%, rgba(255, 110, 180, 0.14) 0%, rgba(255, 110, 180, 0) 55%),
        radial-gradient(circle at -12% 0%, rgba(192, 132, 252, 0.16) 0%, rgba(192, 132, 252, 0) 58%),
        #fff9fc;
    }
    .term-body::-webkit-scrollbar { width: 6px; }
    .term-body::-webkit-scrollbar-track { background: transparent; }
    .term-body::-webkit-scrollbar-thumb {
      background: rgba(251, 113, 133, 0.38);
      border-radius: 999px;
    }
    .term-body::-webkit-scrollbar-thumb:hover { background: rgba(251, 113, 133, 0.56); }

    .term-line {
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 1em;
      margin: 4px 0;
      padding: 6px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(251, 113, 133, 0.14);
      box-shadow: 0 1px 3px rgba(251, 113, 133, 0.06);

    .term-line.term-out-group {

    .term-line.term-call-group {

      letter-spacing: 0.5px;

    .term-prompt {

    .term-cmd { color: #7c2d12; font-weight: 600; }
    .term-out { color: #166534; }
    .term-out.err { color: #dc2626; font-weight: 600; }

    .term-sep {

    .records-mask {

    .records-list {

    .record-item {
      background: var(--surface);

    .account-item {

    }
    .config-dialog input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(255,110,180,0.12);
    }
    .config-dialog .btn-row {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .config-dialog .btn {
      height: 32px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      padding: 0 14px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .config-dialog .btn:hover { border-color: var(--accent-2); color: var(--accent-deep); }
    .config-dialog .btn.save {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .config-dialog .btn.save:hover { color: #fff; opacity: 0.88; }

    .pending-confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 380;
      background: rgba(14, 18, 26, 0.56);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .pending-confirm-overlay.show { display: flex; }
    .pending-confirm-dialog {
      width: min(680px, 96vw);
      border-radius: 16px;
      border: 1.5px solid rgba(245, 158, 11, 0.42);
      background: linear-gradient(180deg, #fffdf6 0%, #fff7e5 100%);
      box-shadow: 0 20px 56px rgba(14, 18, 26, 0.25);
      padding: 16px;
      color: #78350f;
    }
    .pending-confirm-title {
      font-size: 15px;
      font-weight: 800;
      margin: 0 0 6px;
    }
    .pending-confirm-meta {
      font-size: 12px;
      color: #92400e;
      margin-bottom: 10px;
    }
    .pending-confirm-cmd {
      background: #141824;
      border-radius: 10px;
      color: #e2e8f0;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 12px;
      line-height: 1.55;
      padding: 10px 12px;
      min-height: 52px;
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    .pending-confirm-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .pending-confirm-actions button {
      border: 1.5px solid transparent;
      border-radius: 999px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .pending-confirm-actions .allow {
      background: #16a34a;
      color: #fff;
      border-color: #15803d;
    }
    .pending-confirm-actions .allow:hover:not(:disabled) { filter: brightness(0.94); }
    .pending-confirm-actions .deny {
      background: #fff;
      color: #dc2626;
      border-color: #fca5a5;
    }
    .pending-confirm-actions .deny:hover:not(:disabled) { background: #fef2f2; }
    .pending-confirm-actions button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .term-confirm {
      background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%);
      border: 1.5px solid rgba(245,158,11,0.4);
      border-radius: 16px;
      padding: 12px 14px;
      margin: 6px 0;
      box-shadow: 0 2px 12px rgba(245,158,11,0.10);
    }
    .term-confirm.collapsed .term-confirm-body { display: none; }
    .term-confirm-head {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; color: #92400e;
    }
    .term-confirm-head .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .term-confirm-head .dot.pending { background: #f59e0b; }
    .term-confirm-head .dot.allowed { background: #22c55e; }
    .term-confirm-head .dot.denied { background: #ef4444; }
    .term-confirm-body { margin-top: 8px; }
    .term-confirm-cmd {
      background: #1e1b2e; color: #e2e8f0;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px; padding: 8px 10px; border-radius: 8px;
      white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto;
    }
    .term-confirm-actions {
      display: flex; gap: 8px; margin-top: 8px;
    }
    .term-confirm-btn {
      padding: 5px 14px; border-radius: 999px;
      font-size: 12px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: 1.5px solid transparent;
      transition: all 0.15s;
    }
    .term-confirm-btn.allow {
      background: #22c55e; color: #fff; border-color: #16a34a;
    }
    .term-confirm-btn.allow:hover { filter: brightness(0.92); }
    .term-confirm-btn.deny {
      background: #fff; color: #dc2626; border-color: #fca5a5;
    }
    .term-confirm-btn.deny:hover { background: #fef2f2; }
    .term-confirm-result {
      font-size: 12px; font-weight: 600; margin-top: 6px;
    }
    .term-confirm-result.allowed { color: #166534; }
    .term-confirm-result.denied { color: #dc2626; }
    .term-confirm-result .toggle-expand {
      font-size: 11px; color: var(--text-dim); cursor: pointer;
      margin-left: 6px; text-decoration: underline;
    }

    .term-exec-bubble {
      background: linear-gradient(180deg, #fff7fb 0%, #ffeef6 100%);
      border: 1.5px solid rgba(251,113,133,0.35);
      border-radius: 16px;
      margin: 4px 0;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(251,113,133,0.10);
    }
    .term-exec-head {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      background: linear-gradient(90deg, rgba(255,110,180,0.08), rgba(192,132,252,0.06));
      border-bottom: 1px solid rgba(251,113,133,0.14);
    }
    .term-exec-dots { display: flex; gap: 5px; flex-shrink: 0; }
    .term-exec-dot { width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 1px 3px rgba(61,31,47,0.12); }
    .term-exec-dot:nth-child(1) { background: #fb7185; }
    .term-exec-dot:nth-child(2) { background: #f59e0b; }
    .term-exec-dot:nth-child(3) { background: #34d399; }
    .term-exec-title { font-size: 11px; font-weight: 700; color: #9d174d; letter-spacing: 0.2px; flex: 1; }
    .term-exec-status { font-size: 10px; font-weight: 700; padding: 1px 8px; border-radius: 999px; flex-shrink: 0; }
    .term-exec-status.ok { background: #dcfce7; color: #166534; }
    .term-exec-status.err { background: #fef2f2; color: #dc2626; }
    .term-exec-cmd {
      padding: 6px 10px;
      font-family: "JetBrains Mono", monospace; font-size: 12px;
      color: #db2777; font-weight: 600;
      border-bottom: 1px solid rgba(251,113,133,0.10);
    }
    .term-exec-output {
      padding: 6px 10px;
      font-family: "JetBrains Mono","Fira Code",monospace;
      font-size: 12px; line-height: 1.55; color: #334155;
      white-space: pre-wrap; word-break: break-word;
      max-height: 300px; overflow-y: auto;
    }
    .term-exec-output::-webkit-scrollbar { width: 4px; }
    .term-exec-output::-webkit-scrollbar-thumb { background: rgba(251,113,133,0.3); border-radius: 99px; }
    .term-exec-foot {
      padding: 4px 10px; font-size: 10px; font-weight: 600; color: var(--text-dim);
      border-top: 1px solid rgba(251,113,133,0.10);
      display: flex; gap: 10px;
    }
  </style>
</head>

<header>

      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="8" r="3.2"></circle></svg>

</header>

<div id="accountPopup" class="account-popup" onclick="if(event.target===this)hideAccountPopup()">
  <div class="account-card">
    <h3>切换账户</h3>
    <div id="accountList" class="account-list"></div>
  </div>
</div>

<div id="configOverlay" class="config-overlay" onclick="if(event.target===this)hideConfigDialog()">
  <div class="config-dialog">
    <h3>上下文配置</h3>
    <p class="sub">设置触发自动压缩的 token 阈值（当前会话）</p>
    <label for="configTokenInput">最大上下文字 token（100 ~ 10M）</label>
    <input type="number" id="configTokenInput" min="100" max="10000000" step="100" value="16000" placeholder="16000">
    <div class="btn-row">
      <button class="btn" onclick="hideConfigDialog()">取消</button>
      <button class="btn save" onclick="saveConfig()">保存</button>
    </div>
  </div>
</div>

<div id="pendingConfirmOverlay" class="pending-confirm-overlay">
  <div class="pending-confirm-dialog" role="dialog" aria-modal="true" aria-label="终端命令确认">
    <h3 class="pending-confirm-title">终端命令请求确认</h3>
    <div id="pendingConfirmMeta" class="pending-confirm-meta">等待确认</div>
    <div id="pendingConfirmCmd" class="pending-confirm-cmd"></div>
    <div class="pending-confirm-actions">
      <button id="pendingConfirmDenyBtn" class="deny" type="button">拒绝</button>
      <button id="pendingConfirmAllowBtn" class="allow" type="button">允许执行</button>
    </div>
  </div>
</div>

<div class="content-wrap">
  <div class="chat-col">
    <div id="messages-wrap">
      <div id="messages"></div>
    </div>
    <div class="input-dock">
      <div class="file-bar" id="fileBar" style="display:none;">
        <span class="file-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
        </span>
        <span class="file-name" id="fileName"></span>
        <button class="file-remove" onclick="removeFile()" title="移除文件">×</button>
      </div>
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="跟 Tinda 说说话吧 ..."></textarea>
        <div class="time-wrap">
          <button id="timeModeBtn" class="time-btn on" type="button" title="时间注入模式" aria-label="时间注入模式">
            <svg class="icon icon-clock" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="8"></circle>
              <path d="M12 8v5l3 2"></path>
            </svg>
            <svg class="icon icon-calendar" viewBox="0 0 24 24" aria-hidden="true" style="display:none;">
              <rect x="4" y="5" width="16" height="15" rx="2"></rect>
              <path d="M8 3v4M16 3v4M4 10h16"></path>
            </svg>
            <svg class="icon icon-stop" viewBox="0 0 24 24" aria-hidden="true" style="display:none;">
              <rect x="7" y="7" width="10" height="10" rx="1.5"></rect>
            </svg>
          </button>
          <div id="timeModePanel" class="time-panel">

            <button type="button" class="time-item" data-mode="custom">自定义时间</button>
            <div id="timeCustomBox" class="time-custom">
              <input id="timeCustomInput" type="datetime-local" />
              <button id="timeCustomApplyBtn" type="button">确认</button>

          </div>
        </div>
        <button id="fileBtn" class="file-btn" type="button" title="导入文件" aria-label="导入文件" onclick="pickFile()">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">

            <polyline points="9 14 12 11 15 14"></polyline>

        <span class="term-dot"></span>
        <span class="term-dot"></span>

      <span class="term-title">Tinda Terminal</span>
      <button class="term-clear-btn" onclick="clearTerm()">清空</button>
    </div>
    <div class="term-body" id="termBody"></div>

</div>

<script>
  const messagesEl   = document.getElementById("messages");

  const quickSepEl = document.getElementById("quickSep");
  const accountBtnEl = document.getElementById("accountBtn");
  const accountPopupEl = document.getElementById("accountPopup");
  const accountListEl = document.getElementById("accountList");
  const recordsMaskEl = document.getElementById("recordsMask");
  const recordsPanelEl = document.getElementById("recordsPanel");
  const recordsListEl = document.getElementById("recordsList");
  const recordsSearchInputEl = document.getElementById("recordsSearchInput");
  const pendingConfirmOverlayEl = document.getElementById("pendingConfirmOverlay");
  const pendingConfirmMetaEl = document.getElementById("pendingConfirmMeta");
  const pendingConfirmCmdEl = document.getElementById("pendingConfirmCmd");
  const pendingConfirmAllowBtnEl = document.getElementById("pendingConfirmAllowBtn");
  const pendingConfirmDenyBtnEl = document.getElementById("pendingConfirmDenyBtn");
  const toastEl = document.getElementById("tindaToast");
  const statusPillEl = document.getElementById("statusPill");
  const statusDotEl = statusPillEl ? statusPillEl.querySelector(".status-dot") : null;
  const statusTextEl = statusPillEl ? statusPillEl.querySelector(".status-text") : null;
  const timeModeBtnEl = document.getElementById("timeModeBtn");
  const timeModePanelEl = document.getElementById("timeModePanel");
  const timeCustomBoxEl = document.getElementById("timeCustomBox");
  const timeCustomInputEl = document.getElementById("timeCustomInput");
  const timeCustomApplyBtnEl = document.getElementById("timeCustomApplyBtn");
  const fileBtnEl = document.getElementById("fileBtn");
  const fileBarEl = document.getElementById("fileBar");
  const fileNameEl = document.getElementById("fileName");
  const fileInputEl = document.getElementById("fileInput");
  let importedFile = null;
  const SESSION_KEY = "tinda_active_session_id";
  const TERM_WIDTH_KEY = "tinda_term_width";
  const STREAM_ENABLED_KEY = "tinda_stream_enabled";
  const TIME_MODE_KEY = "tinda_time_mode";
  const TIME_CUSTOM_KEY = "tinda_time_custom";
  const RECORDS_PAGE_LIMIT = 200;
  const MODEL_CHOICES_FALLBACK = [
    { id: "deepseek-chat", label: "deepseek-chat" },
    { id: "deepseek-v4-pro", label: "deepseek-pro" },
    { id: "deepseek-reasoner", label: "deepseek-reasoner" },
    { id: "deepseek-v4-flash", label: "deepseek-v4-flash" },
  ];
  const MODEL_ALIAS_MAP = {
    "deepseek-chat": "deepseek-chat",
    "chat": "deepseek-chat",
    "deepseek-v4-pro": "deepseek-v4-pro",
    "deepseek-pro": "deepseek-v4-pro",
    "pro": "deepseek-v4-pro",
    "deepseek-reasoner": "deepseek-reasoner",
    "reasoner": "deepseek-reasoner",
    "deepseek-v4-flash": "deepseek-v4-flash",
    "v4-flash": "deepseek-v4-flash",
    "flash": "deepseek-v4-flash",
  };
  const USER_ADMIN_PERM = 511;
  const AUTH_TOKEN_KEY = "ta_auth_token";
  const VERSION_FALLBACK = "v1.7.14";

  function getAuthToken() {
    return String(localStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
  }

  function setAuthToken(token) {
    const t = String(token || "").trim();

  async function syncPendingConfirmationsFromServer(sessionId = getSessionId(), { silent = true } = {}) {
    const sid = String(sessionId || getSessionId()).trim();
    if (!sid) {
      clearPendingConfirm();
      return [];
    }
    try {
      const params = new URLSearchParams({ session_id: sid });
      const res = await apiFetch(`/terminal/pending?${params.toString()}`, { method: "GET" });
      const data = await res.json();
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `http ${res.status}`));
      const pending = Array.isArray(data?.pending) ? data.pending : [];
      setPendingConfirmFromList(pending);
      return pending;
    } catch (e) {
      if (!silent) {
        showToast(`同步确认状态失败：${String(e?.message || e)}`, "err");
      }
      return [];
    }
  }

  async function submitPendingConfirmation(approval) {
    if (pendingConfirmSubmitting) return;
    const currentEl = pendingConfirmCurrent;
    if (!currentEl) return;
    const sid = String(getSessionId() || "").trim();
    if (!sid) return;

    pendingConfirmSubmitting = true;
    setPendingConfirmButtonsDisabled(true);
    hidePendingConfirmOverlay();
    pendingConfirmCurrent = null;

    try {
      const res = await apiFetch("/terminal/confirm", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sid,
          approval: !!approval,
          call_id: currentEl.call_id || "",
          cmd: currentEl.cmd || "",
        }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) {
        throw new Error(String(data?.error || `http ${res.status}`));
      }
      const replyText = sanitizeAssistantDisplayText(String(data?.reply || ""));
      if (replyText) {
        upsertAssistantTurnBubble(replyText, { turnId: data?.turn_id, append: true });
      }
      if (Array.isArray(data?.tool_trace) && data.tool_trace.length > 0) {
        renderToolTraceToTerminal(data.tool_trace, { sessionId: sid, persist: false });
      }
      const pending = Array.isArray(data?.pending) ? data.pending : null;
      if (pending) {
        setPendingConfirmFromList(pending);
      } else {
        await syncPendingConfirmationsFromServer(sid, { silent: true });
      }
      showToast(approval ? "已允许执行" : "已拒绝执行");
    } catch (e) {
      showToast(`操作失败：${String(e?.message || e)}`, "err");
      await syncPendingConfirmationsFromServer(sid, { silent: false });
    } finally {
      pendingConfirmSubmitting = false;
      renderPendingConfirmOverlay();
      syncTerminalConfirmLockFromDom();
    }
  }

  function syncTerminalConfirmLockFromDom() {

      .filter((node) => String(node?.dataset?.status || "").trim() === "pending")

  function reportErrorToTerminal(message, { source = "", sessionId = getSessionId(), persist = true } = {}) {

  function normalizeTerminalClass(raw) {
    const v = String(raw || "").trim().toLowerCase();
    return ["err", "info", "dim"].includes(v) ? v : "";
  }

  function inferTerminalClass(text, rawClass = "") {
    const normalized = normalizeTerminalClass(rawClass);
    if (normalized) return normalized;
    const line = String(text || "").trim();
    if (!line) return "";
    if (/^\[error(?:\/[^\]]+)?\]/i.test(line)) return "err";
    if (/(请求失败|执行失败|命令解析失败|未知命令|权限不足|exception|traceback|permission denied)/i.test(line)) {
      return "err";
    }
    if (/^(tool:\s*|可用工具)/i.test(line)) return "info";
    if (/^\(已跳过重复工具轨迹渲染\)/.test(line)) return "dim";
    return "";
  }

  function getVersionBadgeText() {
    return String(appVersionDisplay || VERSION_FALLBACK).trim() || VERSION_FALLBACK;

  function normalizeVersionTag(v) {
    const raw = String(v || "").trim();
    if (!raw) return "";
    return raw.replace(/^v/i, "");
  }

  function compareVersionTag(a, b) {
    const sa = normalizeVersionTag(a);
    const sb = normalizeVersionTag(b);
    if (!sa && !sb) return 0;
    if (!sa) return -1;
    if (!sb) return 1;
    const pa = sa.split(/[.+-]/);
    const pb = sb.split(/[.+-]/);
    const len = Math.max(pa.length, pb.length);
    for (let i = 0; i < len; i++) {
      const xa = String(pa[i] ?? "0");
      const xb = String(pb[i] ?? "0");
      const na = /^\d+$/.test(xa);
      const nb = /^\d+$/.test(xb);
      if (na && nb) {
        const ia = Number(xa);
        const ib = Number(xb);
        if (ia > ib) return 1;
        if (ia < ib) return -1;
        continue;
      }
      const cmp = xa.localeCompare(xb);
      if (cmp !== 0) return cmp > 0 ? 1 : -1;
    }
    return 0;
  }

  function trimTerminalLines() {
    const children = termBodyEl?.children;
    if (!children) return;
    const overflow = children.length - TERM_MAX_LINES;
    if (overflow <= 0) return;
    for (let i = 0; i < overflow; i++) {
      if (!termBodyEl.firstElementChild) break;
      termBodyEl.removeChild(termBodyEl.firstElementChild);
    }
  }

  function enqueueTermPersist(entry, sessionId) {
    if (!entry) return;
    termPersistBuffer.push({ entry, sessionId: String(sessionId || getSessionId()).trim() });
    if (termPersistBuffer.length >= TERM_FLUSH_BATCH) {
      flushTermPersistBuffer();
      return;
    }
    if (termPersistTimer) return;
    termPersistTimer = setTimeout(() => {
      termPersistTimer = 0;
      flushTermPersistBuffer();
    }, 160);
  }

  function flushTermPersistBuffer() {
    if (termPersistTimer) {
      clearTimeout(termPersistTimer);
      termPersistTimer = 0;
    }
    if (!Array.isArray(termPersistBuffer) || termPersistBuffer.length === 0) return;
    const batch = termPersistBuffer.splice(0, termPersistBuffer.length);
    const groups = new Map();
    batch.forEach((item) => {
      const sid = String(item?.sessionId || getSessionId()).trim();
      if (!sid || !item?.entry) return;
      if (!groups.has(sid)) groups.set(sid, []);
      groups.get(sid).push(item.entry);
    });
    groups.forEach((entries, sid) => {
      enqueueSessionEntries(entries, { sessionId: sid });
    });
  }

  function createTermRequestGroup() {
    const group = document.createElement("div");
    group.className = "term-line term-call-group";

    trimTerminalLines();
    termRequestGroup = group;
    return group;

  function ensureTermRequestGroup() {
    if (termRequestGroup && termRequestGroup.isConnected) return termRequestGroup;
    return createTermRequestGroup();

  // --- Terminal ---
  function addTermLine(type, text, cls = "", { persist = true, sessionId = getSessionId(), noScroll = false } = {}) {
    let line = null;
    let appendedNewLine = false;
    if (type === "cmd") {
      termRequestGroup = null;
      const group = ensureTermRequestGroup();
      const row = document.createElement("div");
      row.className = "term-call-row cmd";
      row.innerHTML = `<span class="term-prompt">tinda@agent ~ % </span><span class="term-cmd">${escapeHtml(text)}</span>`;
      group.appendChild(row);
    } else {
      const normalizedCls = inferTerminalClass(text, cls);
      if (termRequestGroup && termRequestGroup.isConnected) {
        line = termRequestGroup;
      } else {
        const last = termBodyEl.lastElementChild;
        if (
          last
          && last.classList
          && last.classList.contains("term-line")
          && String(last.dataset?.termKind || "") === "out-group"
        ) {
          line = last;
        } else {
          line = document.createElement("div");
          line.className = "term-line term-out-group";
          line.dataset.termKind = "out-group";
          termBodyEl.appendChild(line);
          appendedNewLine = true;
        }
      }
      const row = document.createElement("div");
      row.className = termRequestGroup && termRequestGroup.isConnected ? "term-call-row out" : "term-out-row";
      const span = document.createElement("span");
      span.className = "term-out" + (normalizedCls ? " " + normalizedCls : "");
      span.textContent = text;
      row.appendChild(span);
      line.appendChild(row);
    }
    if (appendedNewLine) trimTerminalLines();
    if (!noScroll) termBodyEl.scrollTop = termBodyEl.scrollHeight;
    if (persist) {
      enqueueTermPersist(
        {
          role: "assistant",
          entry_type: "terminal",
          terminal_kind: type === "cmd" ? "cmd" : "out",
          terminal_class: type === "cmd" ? "" : inferTerminalClass(text, cls),
          content: String(text ?? ""),
          ts: toIsoWithOffset(new Date()),
        },
        sessionId,
      );
    }
  }

  function addTermSep({ persist = true, sessionId = getSessionId(), noScroll = false } = {}) {
    const lineText = "─".repeat(36);
    if (termRequestGroup && termRequestGroup.isConnected) {
      const row = document.createElement("div");
      row.className = "term-call-row sep";
      row.textContent = lineText;
      termRequestGroup.appendChild(row);
      termRequestGroup = null;
    } else {
      const el = document.createElement("div");
      el.className = "term-line term-sep";
      el.dataset.termKind = "sep";
      el.textContent = lineText;
      termBodyEl.appendChild(el);
      trimTerminalLines();

      enqueueTermPersist(
        {
          role: "assistant",
          entry_type: "terminal",
          terminal_kind: "sep",

          ts: toIsoWithOffset(new Date()),

    document.body.style.animation  = "none";

    document.body.style.transform  = "translateY(-8px) scale(0.99)";

  function isEchoCmd(text) {
    const parts = text.trim().split(/\s+/);
    return parts[0] === "/tool" && parts[1] === "echo";
