  function normalizeTerminalClass(raw) {
    const v = String(raw || "").trim().toLowerCase();
    return ["err", "info", "dim"].includes(v) ? v : "";
  }

  function inferTerminalClass(text, rawClass = "") {
    const normalized = normalizeTerminalClass(rawClass);
    if (normalized) return normalized;
    const line = String(text || "").trim();
    if (!line) return "";
    if (/^\[error(?:\/[^\]]+)?\]/i.test(line)) return "err";
    if (/(请求失败|执行失败|命令解析失败|未知命令|权限不足|exception|traceback|permission denied)/i.test(line)) {
      return "err";
    }
    if (/^(tool:\s*|可用工具)/i.test(line)) return "info";
    if (/^\(已跳过重复工具轨迹渲染\)/.test(line)) return "dim";
    return "";
  }

  function getVersionBadgeText() {
    return String(appVersionDisplay || VERSION_FALLBACK).trim() || VERSION_FALLBACK;
  }

  function normalizeVersionTag(v) {
    const raw = String(v || "").trim();
    if (!raw) return "";
    return raw.replace(/^v/i, "");
  }

  function compareVersionTag(a, b) {
    const sa = normalizeVersionTag(a);
    const sb = normalizeVersionTag(b);
    if (!sa && !sb) return 0;
    if (!sa) return -1;
    if (!sb) return 1;
    const pa = sa.split(/[.+-]/);
    const pb = sb.split(/[.+-]/);
    const len = Math.max(pa.length, pb.length);
    for (let i = 0; i < len; i++) {
      const xa = String(pa[i] ?? "0");
      const xb = String(pb[i] ?? "0");
      const na = /^\d+$/.test(xa);
      const nb = /^\d+$/.test(xb);
      if (na && nb) {
        const ia = Number(xa);
        const ib = Number(xb);
        if (ia > ib) return 1;
        if (ia < ib) return -1;
        continue;
      }
      const cmp = xa.localeCompare(xb);
      if (cmp !== 0) return cmp > 0 ? 1 : -1;
    }
    return 0;
  }

  async function syncAppVersion() {
    try {
      const res = await fetch("/system/version", { method: "GET" });
      const data = res.ok ? await res.json() : {};
      const display = String(data?.display || "").trim();
      if (display) appVersionDisplay = display;
      appVersionSignatureId = String(data?.signature_id || "").trim();
      appVersionVerified = Boolean(data?.verified);
    } catch {}
    const badgeEl = document.getElementById("versionBadgeBtn");
    if (badgeEl) badgeEl.textContent = getVersionBadgeText();
  }

  function trimTerminalLines() {
    const children = termBodyEl?.children;
    if (!children) return;
    const overflow = children.length - TERM_MAX_LINES;
    if (overflow <= 0) return;
    for (let i = 0; i < overflow; i++) {
      if (!termBodyEl.firstElementChild) break;
      termBodyEl.removeChild(termBodyEl.firstElementChild);
    }
  }

  function enqueueTermPersist(entry, sessionId) {
    if (!entry) return;
    termPersistBuffer.push({ entry, sessionId: String(sessionId || getSessionId()).trim() });
    if (termPersistBuffer.length >= TERM_FLUSH_BATCH) {
      flushTermPersistBuffer();
      return;
    }
    if (termPersistTimer) return;
    termPersistTimer = setTimeout(() => {
      termPersistTimer = 0;
      flushTermPersistBuffer();
    }, 160);
  }

  function flushTermPersistBuffer() {
    if (termPersistTimer) {
      clearTimeout(termPersistTimer);
      termPersistTimer = 0;
    }
    if (!Array.isArray(termPersistBuffer) || termPersistBuffer.length === 0) return;
    const batch = termPersistBuffer.splice(0, termPersistBuffer.length);
    const groups = new Map();
    batch.forEach((item) => {
      const sid = String(item?.sessionId || getSessionId()).trim();
      if (!sid || !item?.entry) return;
      if (!groups.has(sid)) groups.set(sid, []);
      groups.get(sid).push(item.entry);
    });
    groups.forEach((entries, sid) => {
      enqueueSessionEntries(entries, { sessionId: sid });
    });
  }

  function createTermRequestGroup() {
    const group = document.createElement("div");
    group.className = "term-line term-call-group";
    group.dataset.termKind = "call-group";
    termBodyEl.appendChild(group);
    trimTerminalLines();
    termRequestGroup = group;
    return group;
  }

  function ensureTermRequestGroup() {
    if (termRequestGroup && termRequestGroup.isConnected) return termRequestGroup;
    return createTermRequestGroup();
  }

  // --- Terminal ---
  function addTermLine(type, text, cls = "", { persist = true, sessionId = getSessionId(), noScroll = false } = {}) {
    let line = null;
    let appendedNewLine = false;
    if (type === "cmd") {
      termRequestGroup = null;
      const group = ensureTermRequestGroup();
      const row = document.createElement("div");
      row.className = "term-call-row cmd";
      row.innerHTML = `<span class="term-prompt">tinda@agent ~ % </span><span class="term-cmd">${escapeHtml(text)}</span>`;
      group.appendChild(row);
    } else {
      const normalizedCls = inferTerminalClass(text, cls);
      if (termRequestGroup && termRequestGroup.isConnected) {
        line = termRequestGroup;
      } else {
        const last = termBodyEl.lastElementChild;
        if (
          last
          && last.classList
          && last.classList.contains("term-line")
          && String(last.dataset?.termKind || "") === "out-group"
        ) {
          line = last;
        } else {
          line = document.createElement("div");
          line.className = "term-line term-out-group";
          line.dataset.termKind = "out-group";
          termBodyEl.appendChild(line);
          appendedNewLine = true;
        }
      }
      const row = document.createElement("div");
      row.className = termRequestGroup && termRequestGroup.isConnected ? "term-call-row out" : "term-out-row";
      const span = document.createElement("span");
      span.className = "term-out" + (normalizedCls ? " " + normalizedCls : "");
      span.textContent = text;
      row.appendChild(span);
      line.appendChild(row);
    }
    if (appendedNewLine) trimTerminalLines();
    if (!noScroll) termBodyEl.scrollTop = termBodyEl.scrollHeight;
    if (persist) {
      enqueueTermPersist(
        {
          role: "assistant",
          type: "terminal",
          display_target: "terminal",
          context_policy: "include",
          entry_type: "terminal",
          terminal_kind: type === "cmd" ? "cmd" : "out",
          terminal_class: type === "cmd" ? "" : inferTerminalClass(text, cls),
          content: String(text ?? ""),
          ts: toIsoWithOffset(new Date()),
        },
        sessionId,
      );
    }
  }

  function addTermSep({ persist = true, sessionId = getSessionId(), noScroll = false } = {}) {
    termRequestGroup = null;
    if (!noScroll) termBodyEl.scrollTop = termBodyEl.scrollHeight;
  }

  function appendTerminalWidget(contentEl, { noScroll = false } = {}) {
    if (!(contentEl instanceof Node)) return null;
    termRequestGroup = null;
    const line = document.createElement("div");
    line.className = "term-line term-widget";
    line.dataset.termKind = "widget";
    line.appendChild(contentEl);
    termBodyEl.appendChild(line);
    trimTerminalLines();
    if (!noScroll) termBodyEl.scrollTop = termBodyEl.scrollHeight;
    return line;
  }

  function initTermContent() {
    addTermLine("out", `Tinda Terminal ${getVersionBadgeText()}`, "info", { persist: false });
    addTermLine("out", "使用 /tool echo <文本> 在此输出内容", "dim", { persist: false });
    addTermSep({ persist: false });
  }

  function ensureTermInitialized() {
    if (termInitialized) return;
    initTermContent();
    termInitialized = true;
  }

  function openTerm() {
    ensureTermInitialized();
    termOpen = true;
    const tb = document.getElementById("termToggleBtn");
    if (tb) {
      tb.classList.add("on");
      tb.title = "关闭终端";
      tb.setAttribute("data-tip", "关闭终端");
    }
    // double-RAF：确保浏览器已记录 width:0/opacity:0 的初始帧，再启动过渡
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        termPanelEl.style.transition = "";
        termPanelEl.style.width   = termWidth + "px";
        termPanelEl.style.opacity = "1";
        termPanelEl.classList.add("open");
        resizerEl.classList.add("visible");
        scheduleRecalcPinnedSpacerHeight();
      });
    });
  }

  function closeTerm() {
    termOpen = false;
    termPanelEl.style.transition = "";
    termPanelEl.style.width   = "0px";
    termPanelEl.style.opacity = "0";
    termPanelEl.classList.remove("open");
    resizerEl.classList.remove("visible");
    scheduleRecalcPinnedSpacerHeight();
    const tb = document.getElementById("termToggleBtn");
    if (tb) {
      tb.classList.remove("on");
      tb.title = "打开终端";
      tb.setAttribute("data-tip", "打开终端");
    }
  }

  function smoothNavigate(url) {
    if (!url) return;
    if (navigationPending) return;
    navigationPending = true;
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      if (termOpen) closeTerm();
      location.href = url;
      return;
    }
    if (isResizing) {
      isResizing = false;
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
      resizerEl.classList.remove("dragging");
    }
    closeTimePanel();
    closeModelPanel();
    closeRecordsPanel();
    if (termOpen) {
      termWidth = Math.max(termPanelEl.offsetWidth, 180);
      localStorage.setItem(TERM_WIDTH_KEY, String(Math.round(termWidth)));
      closeTerm();
    }
    document.body.classList.add("chat-leaving");
    setTimeout(() => { location.href = url; }, 520);
  }

  function showTerm() {
    if (termOpen) return;
    openTerm();
  }

  function clearTerm() {
    flushTermPersistBuffer();
    termRequestGroup = null;
    termBodyEl.innerHTML = "";
    termInitialized = false;
    initTermContent();
    termInitialized = true;
  }

  function toggleTerm() {
    if (!termOpen) {
      openTerm();
      return;
    }
    termWidth = Math.max(termPanelEl.offsetWidth, 180);
    localStorage.setItem(TERM_WIDTH_KEY, String(termWidth));
    closeTerm();
  }

  function isEchoCmd(text) {
    const parts = text.trim().split(/\s+/);
    return parts[0] === "/tool" && parts[1] === "echo";
  }

  function stringifyValue(v) {
    if (v === null || v === undefined) return "";
    if (typeof v === "string") return v;
    if (typeof v === "number" || typeof v === "boolean") return String(v);
    try { return JSON.stringify(v, null, 2); } catch { return String(v); }
  }

  function renderToolTraceToTerminal(trace, { sessionId = getSessionId(), persist = false } = {}) {
    if (!Array.isArray(trace) || trace.length === 0) return false;
    const planShown = showPlanPanelsFromTrace(trace);
    const terminalTrace = trace.filter((step) => !isPlanToolTraceStep(step));
    if (terminalTrace.length === 0) return planShown;
    showTerm();
    terminalTrace.forEach((step) => {
      const name = step?.agent_tool || "unknown_tool";
      const args = step?.arguments || {};
      addTermLine("cmd", `[tool] ${name} ${stringifyValue(args)}`, "", { sessionId, persist });

      const result = step?.result;
      if (result && typeof result === "object") {
        const inner = result.result;
        if (inner && typeof inner === "object" && inner.pending_confirmation === true) {
          const cmd = String(inner.cmd || "").trim();
          const callId = String(inner.call_id || result.call_id || step?.call_id || step?.tool_call_id || "").trim();
          if (cmd) {
            syncPendingConfirmationsFromServer(getSessionId(), { silent: true });
            addTermLine("out", `[warn] 需要确认: ${cmd.slice(0, 80)}`, "info", { sessionId, persist });
          }
        } else if (result.pending_confirmation === true) {
          const cmd = String(result.cmd || "").trim();
          const callId = String(result.call_id || step?.call_id || step?.tool_call_id || "").trim();
          if (cmd) {
            syncPendingConfirmationsFromServer(getSessionId(), { silent: true });
            addTermLine("out", `[warn] 需要确认: ${cmd.slice(0, 80)}`, "info", { sessionId, persist });
          }
        } else if (result.ok === false) {
          if (result.error_code === "permission_denied" && result.expose_to_user === false) {
            addTermLine("out", `[error] ${result.user_message || "该工具当前不可用，请尝试其它方式。"}`, "err", { sessionId, persist });
          } else {
            addTermLine("out", `[error] ${result.error || "工具执行失败"}`, "err", { sessionId, persist });
          }
        } else {
          if (result.tool_name) addTermLine("out", `tool: ${result.tool_name}`, "info", { sessionId, persist });
          if (result.stdout) {
            String(result.stdout).split("\n").forEach((line) => addTermLine("out", line, "", { sessionId, persist }));
          }
          if (result.result !== undefined) {
            const rendered = stringifyValue(result.result);
            if (rendered) rendered.split("\n").forEach((line) => addTermLine("out", line, "", { sessionId, persist }));
          }
          if (result.tools && typeof result.tools === "object") {
            addTermLine("out", "可用工具列表：", "info", { sessionId, persist });
            Object.entries(result.tools).forEach(([k, v]) => addTermLine("out", `- ${k}: ${v}`, "", { sessionId, persist }));
          }
        }
      } else {
        const raw = stringifyValue(step?.raw_result);
        if (raw) raw.split("\n").forEach((line) => addTermLine("out", line, "", { sessionId, persist }));
      }
      addTermSep({ sessionId, persist });
    });
    showToast("已同步工具调用到终端");
    return true;
  }

  function buildToolTraceMarkerMarkdown(trace) {
    if (!Array.isArray(trace) || trace.length === 0) return "";
    const renderer = window.ChatBubbleRenderer?.renderToolMarkerMarkdown;
    if (typeof renderer !== "function") return "";
    const blocks = [];
    trace.forEach((step) => {
      if (!step || typeof step !== "object") return;
      const name = String(step.agent_tool || step.name || step.tool_name || "unknown").trim() || "unknown";
      const callId = String(step.call_id || step.id || "").trim();
      const toolCallId = String(step.tool_call_id || step.toolCallId || "").trim();
      const marker = renderer(
        {
          name,
          id: callId,
          call_id: callId,
          tool_call_id: toolCallId,
          arguments: step.arguments && typeof step.arguments === "object" ? step.arguments : {},
          result: step.result && typeof step.result === "object" ? step.result : {},
          status: "done",
        },
        { done: true, tool_call_id: toolCallId, trailingNewline: false },
      );
      if (String(marker || "").trim()) blocks.push(String(marker).trim());
    });
    return blocks.join("\n\n");
  }

  // --- Resize drag ---
  resizerEl.addEventListener("mousedown", (e) => {
    if (!termOpen) return;
    isResizing   = true;
    resizeStartX = e.clientX;
    resizeStartW = termPanelEl.offsetWidth;
    document.body.style.cursor     = "col-resize";
    document.body.style.userSelect = "none";
    resizerEl.classList.add("dragging");
    e.preventDefault();
  });

  document.addEventListener("mousemove", (e) => {
    if (!isResizing || !termOpen) return;
    const dx   = resizeStartX - e.clientX;
    const newW = Math.min(Math.max(resizeStartW + dx, 180), window.innerWidth * 0.65);
    termWidth = newW;
    termPanelEl.style.transition = "none";
    termPanelEl.style.width      = newW + "px";
    scheduleRecalcPinnedSpacerHeight();
  });

  document.addEventListener("mouseup", () => {
    if (!isResizing) return;
    isResizing = false;
    document.body.style.cursor     = "";
    document.body.style.userSelect = "";
    resizerEl.classList.remove("dragging");
    termPanelEl.style.transition = "";
    localStorage.setItem(TERM_WIDTH_KEY, String(Math.round(termWidth)));
    scheduleRecalcPinnedSpacerHeight();
  });

  // --- Session handling ---
  function genSessionId() {
    return "s_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 10);
  }
  function genDraftSessionId() {
    return DRAFT_SESSION_PREFIX + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
  }
  function getSessionId() {
    return getStoredSessionId();
  }
  function rotateSessionId() {
    const sid = genSessionId();
    setStoredSessionId(sid);
    return sid;
  }

  function enterDraftSession({ title = "新会话", clearTerminal = true } = {}) {
    clearActiveSessionState({ title });
    clearChatSessionView({ showEmpty: true, clearTerminal });
    activeSessionTitle = title;
    renderHeaderStatus();
  }

  function createDraftSessionId() {
    const sid = genDraftSessionId();
    setStoredSessionId(sid);
    activeSessionTitle = "新会话";
    statusContextUsageLength = 0;
    statusContextPreviousUsageLength = 0;
    renderHeaderStatus();
    return sid;
  }

  function clearChatSessionView({ showEmpty = true, clearTerminal = true } = {}) {
    stopToolPolling();
    toolLastSeq = 0;
    processedTerminalSeq.clear();
    toolPollPausedByError = false;
    toolPollInFlight = false;
    resetStageActive = false;
    clearPinnedSpacer();
    resetAssistantTurnBubbleMap();
    clearPendingConfirm();
    hydratedSessionEntries = [];
    historyPagingState = { sid: "", oldestSeq: 0, hasMore: false, loading: false };
    if (messagesEl) {
      delete messagesEl.dataset.hydrating;
      messagesEl.innerHTML = "";
    }
    if (clearTerminal) clearTerm();
    if (showEmpty) showEmptyState();
    if (messagesWrap) messagesWrap.scrollTop = 0;
  }

  function clearActiveSessionState({ title = "无会话" } = {}) {
    clearStoredSessionId();
    apiFetch("/web-settings", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ last_session_id: "" }),
    }).catch(() => {});
    activeSessionTitle = title;
    statusContextUsageLength = 0;
    statusContextPreviousUsageLength = 0;
    renderHeaderStatus();
  }

  async function withChatSessionLoading(action, { keepRecordsPanel = false } = {}) {
    const shouldReopenRecords = !!keepRecordsPanel && !!recordsPanelOpen;
    const startedAt = performance.now();
    startChatSessionLoading();
    await sleep(60);
    try {
      if (typeof action === "function") {
        await action();
      }
    } finally {
      await releaseChatSessionLoading(startedAt);
      if (shouldReopenRecords) openRecordsPanel();
    }
  }

  async function ensureActiveSession() {
    let sid = getStoredSessionId();
    if (!sid || isDraftSessionId(sid)) {
      sid = createDraftSessionId();
    }
    return sid;
  }

  async function restoreExistingSessionForBoot() {
    let sid = getStoredSessionId();
    if (isDraftSessionId(sid)) {
      clearStoredSessionId();
      sid = "";
    }

    let restoreEnabled = false;
    let serverLastSid = "";
    try {
      const wr = await apiFetch("/web-settings");
      if (wr.ok) {
        const ws = await wr.json();
        restoreEnabled = !!ws?.restore_last_session;
        serverLastSid = String(ws?.last_session_id || "").trim();
      }
    } catch {}

    const candidate = restoreEnabled && serverLastSid ? serverLastSid : sid;
    if (!candidate) return "";

    try {
      const res = await apiFetch("/sessions?limit=500&offset=0");
      if (!res.ok) return "";
      const data = await res.json();
      const list = Array.isArray(data?.sessions) ? data.sessions : [];
      const found = list.find((x) => String(x?.id || "") === candidate);
      if (!found) {
        if (candidate === sid) clearStoredSessionId();
        return "";
      }
      setActiveSession(candidate, { title: String(found.title || "新对话"), silent: true });
      return candidate;
    } catch {
      return "";
    }
  }

  async function ensureSessionForUserMessage() {
    const existing = String(getStoredSessionId() || "").trim();
    if (existing && !isDraftSessionId(existing)) return existing;

    const sid = genSessionId();
    setActiveSession(sid, { title: "新对话", silent: true, skipContextUsage: true });
    return sid;
  }

  function setActiveSession(sessionId, { title = "新对话", silent = false, skipContextUsage = false } = {}) {
    const sid = String(sessionId || "").trim();
    if (!sid) return;
    setStoredSessionId(sid);
    // Notify server of last session for restore-later feature
    apiFetch("/web-settings", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ last_session_id: sid }),
    }).catch(() => {});
    activeSessionTitle = String(title || "新对话");
    renderHeaderStatus();
    if (!skipContextUsage && !isDraftSessionId(sid)) refreshContextUsageLength(sid).catch(() => {});
    if (!silent) showToast(`已切换会话：${activeSessionTitle}`);
    toolLastSeq = 0;
    processedTerminalSeq.clear();
    clearPendingConfirm();
  }

  async function createSessionAndSwitch(title = "新对话", { silent = false } = {}) {
    const res = await apiFetch("/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title }),
    });
    const data = await res.json();
    if (!res.ok || !data?.session?.id) {
      throw new Error(String(data?.error || `http ${res.status}`));
    }
    setActiveSession(data.session.id, { title: data.session.title || title, silent });
    return data.session;
  }

  function normalizeEntryForPersist(raw) {
    if (!raw || typeof raw !== "object") return null;
    const role = String(raw.role || "").trim();
    if (role !== "user" && role !== "assistant" && role !== "system") return null;
    const content = String(raw.content ?? "");
    if (!content.trim()) return null;
    const entry = { role, content, ts: String(raw.ts || toIsoWithOffset(new Date())) };
    if (raw.type) entry.type = String(raw.type);
    if (raw.display_target) entry.display_target = String(raw.display_target);
    if (raw.context_policy) entry.context_policy = String(raw.context_policy);
    if (raw.entry_type) entry.entry_type = String(raw.entry_type);
    if (raw.terminal_kind) entry.terminal_kind = String(raw.terminal_kind);
    if (raw.terminal_class) entry.terminal_class = String(raw.terminal_class);
    return entry;
  }

  function enqueueSessionEntries(entries, { sessionId = getSessionId() } = {}) {
    const sid = String(sessionId || getSessionId()).trim();
    if (!sid || !Array.isArray(entries) || entries.length === 0) return;
    const payloadEntries = entries
      .map(normalizeEntryForPersist)
      .filter((x) => !!x);
    if (payloadEntries.length === 0) return;

    sessionPersistQueue = sessionPersistQueue
      .then(async () => {
        try {
          await apiFetch("/session/events", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_id: sid,
              entries: payloadEntries,
            }),
          });
        } catch (e) {
          reportErrorToTerminal(`会话事件写入失败：${String(e?.message || e)}`, {
            source: "session_events",
            sessionId: sid,
            persist: false,
          });
        }
      })
      .catch(() => {
        // keep queue alive after an upstream failure
      });
  }

  function normalizeModelChoice(raw) {
    const key = String(raw || "").trim().toLowerCase();
    return MODEL_ALIAS_MAP[key] || String(raw || "").trim();
  }

  function getModelLabel(modelId) {
    const id = normalizeModelChoice(modelId) || String(modelId || "").trim();
    const item = modelChoices.find((x) => String(x?.id || "") === id);
    return item?.label || id || "unknown";
  }

  function setModelSwitchBtnUI() {
    const mb = document.getElementById("modelSwitchBtn");
    if (!mb) return;
    const label = getModelLabel(currentModel);
    mb.classList.toggle("on", !!currentModel);
    mb.title = `当前模型：${label}`;
    mb.setAttribute("data-tip", `当前模型：${label}`);
  }

  function renderModelPanel() {
    if (!modelPanelEl) return;
    const rows = modelChoices.length > 0 ? modelChoices : MODEL_CHOICES_FALLBACK;
    const html = rows.map((item) => {
      const modelId = String(item?.id || "");
      const label = String(item?.label || modelId);
      const active = normalizeModelChoice(currentModel) === normalizeModelChoice(modelId);
      return `<button type="button" class="model-item${active ? " active" : ""}" data-model="${escapeHtml(modelId)}">${escapeHtml(label)}</button>`;
    }).join("");
    modelPanelEl.innerHTML = html || `<div class="records-empty">无可用模型</div>`;
    modelPanelEl.querySelectorAll(".model-item").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const modelId = btn.getAttribute("data-model") || "";
        if (!modelId) return;
        await switchModel(modelId);
      });
    });
  }

  async function closeModelPanel() {
    if (!modelPanelEl) return;
    await closeAnimatedPanel(modelPanelEl, "model", "open", { timeout: 360 });
  }

  function toggleModelPanel() {
    if (!modelPanelEl) return;
    const willOpen = !modelPanelEl.classList.contains("open");
    closeTimePanel();
    if (willOpen) {
      renderModelPanel();
      openAnimatedPanel(modelPanelEl, "model", "open");
    } else {
      closeModelPanel();
    }
  }

  async function loadModelInfo() {
    try {
      const res = await apiFetch("/model");
      if (!res.ok) throw new Error(`http ${res.status}`);
      const data = await res.json();
      currentModel = normalizeModelChoice(data?.current_model) || currentModel;
      if (Array.isArray(data?.available_models) && data.available_models.length > 0) {
        modelChoices = data.available_models
          .map((x) => ({
            id: normalizeModelChoice(x?.id) || normalizeModelChoice(x?.label) || String(x?.id || x?.label || "").trim(),
            label: String(x?.label || x?.id || "").trim(),
          }))
          .filter((x) => x.id && x.label);
      }
    } catch (e) {
      reportErrorToTerminal(`读取模型信息失败：${String(e?.message || e)}`, { source: "model_info" });
    }
    if (!currentModel) currentModel = "deepseek-v4-flash";
    if (!Array.isArray(modelChoices) || modelChoices.length === 0) {
      modelChoices = MODEL_CHOICES_FALLBACK.slice();
    }
    setModelSwitchBtnUI();
    renderModelPanel();
  }

  async function switchModel(modelId) {
    const target = normalizeModelChoice(modelId);
    if (!target) return;
    if (normalizeModelChoice(currentModel) === target) {
      closeModelPanel();
      return;
    }
    try {
      const res = await apiFetch("/model", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: target }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) {
        throw new Error(String(data?.error || `http ${res.status}`));
      }
      currentModel = normalizeModelChoice(data?.current_model) || target;
      if (Array.isArray(data?.available_models) && data.available_models.length > 0) {
        modelChoices = data.available_models
          .map((x) => ({
            id: normalizeModelChoice(x?.id) || normalizeModelChoice(x?.label) || String(x?.id || x?.label || "").trim(),
            label: String(x?.label || x?.id || "").trim(),
          }))
          .filter((x) => x.id && x.label);
      }
      setModelSwitchBtnUI();
      renderModelPanel();
      closeModelPanel();
      showToast(`模型已切换：${getModelLabel(currentModel)}`);
    } catch (e) {
      reportErrorToTerminal(`模型切换失败：${String(e?.message || e)}`, { source: "model_switch" });
      showToast(`模型切换失败：${String(e?.message || e)}`, "err");
    }
  }

  function formatRecordTime(value) {
    const text = String(value || "").trim();
    if (!text) return "N/A";
    const dt = new Date(text);
    if (Number.isNaN(dt.getTime())) return text;
    return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")} ${String(dt.getHours()).padStart(2, "0")}:${String(dt.getMinutes()).padStart(2, "0")}`;
  }

  function renderRecordsList(rows) {
    if (!recordsListEl) return;
    if (!Array.isArray(rows) || rows.length === 0) {
      recordsListEl.innerHTML = `<div class="records-empty">暂无聊天记录</div>`;
      return;
    }
    recordsListEl.innerHTML = "";
    rows.forEach((item) => {
      const recordId = String(item?.id || item?.session_id || "");
      const messageCount = Number(item?.message_count || 0);
      const node = document.createElement("div");
      node.className = "record-item";
      if (recordId === getStoredSessionId()) node.classList.add("active");
      node.innerHTML = `
        <div class="record-item-title">${escapeHtml(String(item?.title || "新对话"))}</div>
        <div class="record-item-meta">
          session: ${escapeHtml(String(item?.id || item?.session_id || "N/A"))}<br/>
          updated: ${escapeHtml(formatRecordTime(item?.updated_at))}<br/>
          messages: ${messageCount}
        </div>
      `;
      const btn = document.createElement("button");
      btn.className = "record-item-btn";
      btn.type = "button";
      btn.textContent = "切换";
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        try {
          await switchSessionFromPanel(recordId, String(item?.title || "新对话"));
        } finally {
          btn.disabled = false;
        }
      });
      node.appendChild(btn);
      recordsListEl.appendChild(node);
    });
  }

  async function switchSessionFromPanel(sessionId, title = "新对话") {
    const sid = String(sessionId || "").trim();
    if (!sid) return;
    try {
      await withChatSessionLoading(async () => {
        setActiveSession(sid, { title, silent: true });
        clearChatSessionView({ showEmpty: false, clearTerminal: true });
        await loadCurrentSessionRecord({ sessionId: sid });
        startToolPolling(sid);
        await refreshRecords();
      }, { keepRecordsPanel: true });
    } catch (e) {
      reportErrorToTerminal(`切换会话失败：${String(e?.message || e)}`, { source: "session_switch", sessionId: sid });
      addSystemNotice(`切换会话失败：${String(e?.message || e)}`, { persist: false });
    }
  }

  async function createSessionFromPanel() {
    if (creatingSessionFromPanel) return;
    creatingSessionFromPanel = true;
    const createBtn = recordsPanelEl?.querySelector(".records-actions button");
    if (createBtn) createBtn.disabled = true;
    try {
      await withChatSessionLoading(async () => {
        createDraftSessionId();
        clearChatSessionView({ showEmpty: true, clearTerminal: true });
        await refreshRecords();

  function appendTerminalEventToFragment(ev, state) {
    if (!ev || typeof ev !== "object") return;
    const kind = String(ev.kind || ev.terminal_kind || "out");
    const text = String(ev.text ?? ev.content ?? "");
    const frag = state?.frag;
    if (!frag) return;
    if (kind === "cmd") {
      const group = document.createElement("div");
      group.className = "term-line term-call-group";
      group.dataset.termKind = "call-group";
      const row = document.createElement("div");
      row.className = "term-call-row cmd";
      row.innerHTML = `<span class="term-prompt">tinda@agent ~ % </span><span class="term-cmd">${escapeHtml(text)}</span>`;
      group.appendChild(row);
      frag.appendChild(group);
      state.activeGroup = group;
    } else if (kind === "sep") {
      state.activeGroup = null;
    } else if (state.activeGroup) {
      const row = document.createElement("div");
      row.className = "term-call-row out";
      const span = document.createElement("span");
      const cls = inferTerminalClass(text, String(ev.class || ev.terminal_class || ""));
      span.className = "term-out" + (cls ? " " + cls : "");
      span.textContent = text;
      row.appendChild(span);
      state.activeGroup.appendChild(row);
    } else {
      let group = frag.lastElementChild;
      if (
        !group
        || !group.classList
        || !group.classList.contains("term-line")
        || String(group.dataset?.termKind || "") !== "out-group"
      ) {
        group = document.createElement("div");
        group.className = "term-line term-out-group";
        group.dataset.termKind = "out-group";
        frag.appendChild(group);
      }
      const outRow = document.createElement("div");
      outRow.className = "term-out-row";
      const span = document.createElement("span");
      const cls = inferTerminalClass(text, String(ev.class || ev.terminal_class || ""));
      span.className = "term-out" + (cls ? " " + cls : "");
      span.textContent = text;
      outRow.appendChild(span);
      group.appendChild(outRow);
    }
  }

  function appendTerminalEvents(events, { replay = false } = {}) {
    if (!Array.isArray(events) || !events.length) return 0;
    const frag = document.createDocumentFragment();
    const state = { frag, activeGroup: null };
    let appended = 0;
    events.forEach((ev) => {
      if (!ev || typeof ev !== "object") return;
      if (String(ev.display_target || "terminal") !== "terminal") return;
      if (String(ev.type || "terminal") !== "terminal") return;
      const seq = replay
        ? (String(ev.source || "") === "tool_runtime" ? Number(ev.source_seq || 0) : 0)
        : Number(ev.seq || ev.source_seq || 0);
      if (seq > 0) {
        if (processedTerminalSeq.has(seq)) return;
        processedTerminalSeq.add(seq);
        if (replay) toolLastSeq = Math.max(toolLastSeq, seq);
      }
      appendTerminalEventToFragment(ev, state);
      appended += 1;
    });
    if (appended > 0) {
      termBodyEl.appendChild(frag);
      trimTerminalLines();
      termBodyEl.scrollTop = termBodyEl.scrollHeight;
    }
    return appended;
  }

  async function fetchSessionMessagesPage(sid, { beforeSeq = 0, limit = CHAT_INITIAL_MESSAGE_LIMIT } = {}) {

    const safeLimit = Math.max(1, Math.min(Number(limit) || CHAT_INITIAL_MESSAGE_LIMIT, 500));
    params.set("limit", String(safeLimit));
    if (beforeSeq > 0) params.set("before_seq", String(beforeSeq));
    const res = await apiFetch(`/sessions/${encodeURIComponent(sid)}/messages?${params.toString()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return {
      entries: Array.isArray(data.entries) ? data.entries : [],
      oldestSeq: Number(data.oldest_seq || 0),
      newestSeq: Number(data.newest_seq || 0),
      hasMore: !!data.has_more,
      total: Number(data.total || 0),
      plan: data && typeof data.plan === "object" ? data.plan : {},
    };
  }

        preserveScroll,
      });
    }
    if (!preserveScroll) {

  async function loadOlderHistoryPage() {
    if (historyPagingState.loading || !historyPagingState.hasMore || !historyPagingState.sid) return;
    const sid = historyPagingState.sid;
    historyPagingState.loading = true;
    renderHistoryLoadMoreControl();
    try {
      const page = await fetchSessionMessagesPage(sid, {
        beforeSeq: historyPagingState.oldestSeq,
        limit: CHAT_HISTORY_PAGE_LIMIT,
      });
      if (sid !== historyPagingState.sid) return;
      const seen = new Set(hydratedSessionEntries.map((entry) => String(entry?.seq || entry?.id || "")));
      const older = page.entries.filter((entry) => !seen.has(String(entry?.seq || entry?.id || "")));
      hydratedSessionEntries = older.concat(hydratedSessionEntries);
      historyPagingState.oldestSeq = page.oldestSeq || historyPagingState.oldestSeq;
      historyPagingState.hasMore = page.hasMore;
      await renderHydratedSessionEntries(hydratedSessionEntries, { preserveScroll: true });
    } catch (e) {
      reportErrorToTerminal(`读取更早消息失败：${String(e?.message || e)}`, { source: "session_record", sessionId: sid });
      showToast("读取更早消息失败", "warn");
    } finally {
      if (sid === historyPagingState.sid) {
        historyPagingState.loading = false;
        renderHistoryLoadMoreControl();
      }
    }
  }

  async function loadCurrentSessionRecord({ sessionId = "" } = {}) {
    try {
      let sid = String(sessionId || "").trim();
      if (!sid || isDraftSessionId(sid)) {
        showEmptyState();
        return false;
      }
      const data = await fetchSessionMessagesPage(sid, { limit: CHAT_INITIAL_MESSAGE_LIMIT });
      const planMeta = data.plan && typeof data.plan === "object" ? data.plan : {};
      planDeletedBySession.set(sid, !!planMeta.deleted);
      hydratedSessionEntries = data.entries;
      historyPagingState = {
        sid,
        oldestSeq: data.oldestSeq,
        hasMore: data.hasMore,
        loading: false,
      };
      await renderHydratedSessionEntries(hydratedSessionEntries);
      resetTerminalForReplay();
      try {
        const terminalEntries = await fetchSessionTerminalEvents(sid);
        appendTerminalEvents(terminalEntries, { replay: true });
      } catch (terminalError) {
        reportErrorToTerminal(`读取终端历史失败：${String(terminalError?.message || terminalError)}`, {
          source: "session_terminal",
          sessionId: sid,
          persist: false,
        });
      }
      await syncPendingConfirmationsFromServer(sid, { silent: true });
      await restoreDeepAlignmentCard(sid);
      await refreshContextUsageLength(sid);
      return true;
    } catch (e) {
      reportErrorToTerminal(`读取当前会话记录失败：${String(e?.message || e)}`, { source: "session_record" });
      if (messagesEl && messagesEl.childElementCount === 0) showEmptyState();
      return false;
    }
  }

  function isHydratingMessages() {

  function getMaxUsefulScroll() {
    const naturalMax = Math.max(0, messagesWrap.scrollHeight - messagesWrap.clientHeight);
    if (!resetStageActive) return naturalMax;

    const resetPill = messagesEl.querySelector(".sys-notice.pinned");
    if (!resetPill) return naturalMax;

    // 扣掉 spacer 占的额外空间：naturalMax 里包含了 spacer 和 #messages 的 padding-bottom，
    // padding-bottom 是输入框留白，要保留；spacer 是人为撑高的，不能让用户滚进去。
    const spacer = messagesEl.querySelector(".sys-pin-spacer");
    const spacerHeight = spacer ? spacer.offsetHeight : 0;
    const pillTop = Math.max(resetPill.offsetTop - 6, 0);
    const contentMax = Math.max(0, naturalMax - spacerHeight);
    return Math.max(pillTop, contentMax);
  }

  function clampMessagesScrollWithinBounds() {
    const maxUseful = getMaxUsefulScroll();
    if (messagesWrap.scrollTop < 0) {
      messagesWrap.scrollTop = 0;

  function absorbContextCompressionPayload(payload) {
    if (!payload || typeof payload !== "object") return "";
    const usageBefore = normalizeStatusCount(payload.usage_before);
    const usageAfter = normalizeStatusCount(payload.usage_after);
    const serverLimit = normalizeStatusCount(payload.max_context_tokens);
    if (serverLimit >= 100) statusContextTokenLimit = serverLimit;
    if (usageBefore > 0) statusContextPreviousUsageLength = usageBefore;
    if (usageAfter >= 0) statusContextUsageLength = usageAfter;
    renderHeaderStatus();
    return String(payload.text || payload.content || payload.summary || "").trim();
  }

  function _streamDisplay(reasoning, content) {
    const r = String(reasoning || "").trim();
    const c = String(content || "").trim();
    if (!r && !c) return "";
    if (r) {
      const rBlock = markdownQuoteBlock(r);
      return c ? c + "\n\n" + rBlock : rBlock;
    }
    return c;
  }

  function markdownQuoteBlock(text) {
    const raw = String(text ?? "").trim();
    if (!raw) return "";
    return raw
      .split(/\r?\n/)
      .map((line) => line ? `> ${line}` : ">")
      .join("\n");
  }

    setStreamToggleUI();
    addSystemNotice(streamEnabled ? "已开启流式输出" : "已关闭流式输出");
  }

  function addSystemNotice(text, { pinTop = false, persist = true, sessionId = getSessionId() } = {}) {
    const pill = document.createElement("div");
    pill.className = "sys-notice";
    pill.textContent = text;
    if (!pinTop) {
      const spacer = messagesEl.querySelector(".sys-pin-spacer");
      if (spacer) {
        messagesEl.insertBefore(pill, spacer);
      } else {
        messagesEl.appendChild(pill);
      }
    } else {
      messagesEl.appendChild(pill);
    }

    if (pinTop) {
      resetStageActive = true;
      // 清掉旧的 pinned 标记，只留最新的重置 pill
      messagesEl.querySelectorAll(".sys-notice.pinned").forEach((n) => {
        if (n !== pill) n.classList.remove("pinned");
      });
      pill.classList.add("pinned");
      // 重建 spacer：在 pill 之后追加一个大占位，撑高 scrollHeight 才能把 pill 滚到顶
      clearPinnedSpacer();
      const spacer = document.createElement("div");
      spacer.className = "sys-pin-spacer";
      spacer.setAttribute("aria-hidden", "true");
      messagesEl.appendChild(spacer);
      recalcPinnedSpacerHeight();

      requestAnimationFrame(() => {
        messagesWrap.scrollTo({
          top: Math.max(pill.offsetTop - 6, 0),
          behavior: "smooth",
        });
      });
    } else if (resetStageActive) {
      // 重置阶段：保持重置 pill 在顶，新 pill 自然显示在其下方
      const resetPill = messagesEl.querySelector(".sys-notice.pinned");
      if (resetPill) {
        requestAnimationFrame(() => {
          messagesWrap.scrollTo({
            top: Math.max(resetPill.offsetTop - 6, 0),
            behavior: "smooth",
          });
        });
      } else {
        scrollToBottom();
      }
    } else {
      scrollToBottom();
    }
    if (persist) {
      enqueueSessionEntries(
        [
          {
            role: "system",
            entry_type: "notice",
            content: String(text ?? ""),
            ts: toIsoWithOffset(new Date()),
          },
        ],
        { sessionId },
      );
    }
    return pill;
  }

  function normalizePlanPayload(raw) {
    const stack = [];
    const seen = new Set();
    if (raw && typeof raw === "object") stack.push(raw);
    let result = null;
    while (stack.length > 0) {
      const source = stack.shift();
      if (!source || typeof source !== "object" || seen.has(source)) continue;
      seen.add(source);
      const looksLikePlan = String(source.kind || "") === "plan"
        || (Array.isArray(source.steps) && (
          Object.prototype.hasOwnProperty.call(source, "goal")
          || Object.prototype.hasOwnProperty.call(source, "status")
          || Object.prototype.hasOwnProperty.call(source, "notes")
        ));
      if (looksLikePlan) {
        result = source;
        break;
      }
      ["data", "tool_marker", "result"].forEach((key) => {
        const next = source[key];
        if (next && typeof next === "object") stack.push(next);
      });
    }
    if (!result || typeof result !== "object") return null;
    const inferPlanStepStatus = (text) => {
      const rawText = String(text ?? "").trim();
      if (!rawText) return "";
      if (/✅|(?:→|—|-)\s*(?:已完成|已实施|完成|done)(?:\s*[（(][^）)]*[）)])?\s*$/i.test(rawText)) return "done";
      if (/(?:^|[→—\-\s])(?:进行中|处理中|in[_ -]?progress)(?:$|[，。,.\s])/i.test(rawText)) return "in_progress";
      if (/⏳|(?:^|[→—\-\s])(?:未实施|搁置|待定|阻塞|blocked)(?:$|[：:，。,.\s])/i.test(rawText)) return "blocked";
      return "";
    };
    const cleanPlanStepText = (text) => {
      let clean = String(text ?? "").trim();
      clean = clean.replace(/^\s*[-*•]\s*/, "");
      clean = clean.replace(/^\s*\d{1,3}[.、)]\s*/, "");
      clean = clean.replace(/[✅⏳🏁]/g, "");
      clean = clean.trim();
      clean = clean.replace(/\s*(?:→|—|-)\s*(?:已完成|已实施|完成|done)(?:\s*[（(][^）)]*[）)])?\s*$/i, "");
      clean = clean.replace(/\s*(?:→|—|-)\s*(?:进行中|处理中|in[_ -]?progress)\s*$/i, "");
      clean = clean.replace(/\s*(?:→|—|-)\s*(?:待定|未实施|搁置|阻塞|blocked)(?:\s*[：:].*)?\s*$/i, "");
      clean = clean.replace(/^(?:未实施|待定|搁置)(?:[（(][^）)]*[）)])?\s*[：:]\s*/, "");
      return clean.replace(/\s{2,}/g, " ").trim();
    };
    const schemaVersion = Number(result.schema_version || result.schemaVersion || 0);
    const allowLegacyTextStatus = !schemaVersion || schemaVersion < 2;
    const stepsRaw = Array.isArray(result.steps) ? result.steps : [];
    const steps = stepsRaw.map((step, idx) => {
      const rawText = typeof step === "object" ? String(step.text || "") : String(step || "");
      let stepStatus = String((step && typeof step === "object" ? step.status : "") || "pending").trim().toLowerCase();
      const inferredStatus = allowLegacyTextStatus ? inferPlanStepStatus(rawText) : "";
      if (allowLegacyTextStatus && (!stepStatus || stepStatus === "pending") && inferredStatus) stepStatus = inferredStatus;
      if (!["pending", "in_progress", "done", "blocked"].includes(stepStatus)) stepStatus = "pending";
      return {
        index: Number((step && typeof step === "object" ? step.index : 0) || idx + 1),
        text: allowLegacyTextStatus ? cleanPlanStepText(rawText) : rawText.replace(/^\s*[-*•]\s*/, "").replace(/^\s*\d{1,3}[.、)]\s*/, "").trim(),
        status: stepStatus,
      };
    }).filter((step) => step.text);
    const status = String(result.status || "planned").trim();
    const completed = result.completed === true || status === "complete";
    const requiresCompletionConfirmation = result.requires_completion_confirmation === true
      || result.requiresCompletionConfirmation === true
      || status === "awaiting_completion_confirmation";
    let completionConfirmationState = String(
      result.completion_confirmation_state
      || result.completionConfirmationState
      || ""
    ).trim().toLowerCase();
    if (!completionConfirmationState) {
      completionConfirmationState = completed
        ? "confirmed"
        : requiresCompletionConfirmation
        ? "pending"
        : "none";
    }
    if (!["none", "pending", "confirmed"].includes(completionConfirmationState)) {
      completionConfirmationState = "none";
    }
    return {
      action: String(result.action || "create").trim().toLowerCase(),
      goal: String(result.goal || "").trim(),
      status,
      schema_version: schemaVersion || 1,
      completed,
      requires_completion_confirmation: requiresCompletionConfirmation,
      completion_confirmation_state: completionConfirmationState,
      notes: String(result.notes || "").trim(),
      completion_note: String(result.completion_note || result.completionNote || "").trim(),
      update_note: String(result.update_note || result.updateNote || "").trim(),
      step_updates: normalizePlanStepUpdates(result.step_updates || result.stepUpdates || [], {
        step_index: result.step_index || result.stepIndex || 0,
        step_text: result.step_text || result.stepText || "",
        step_status: result.step_status || result.stepStatus || "",
        update_note: result.update_note || result.updateNote || "",
      }),
      steps,
    };
  }

  function normalizePlanStepStatus(status) {
    const raw = String(status || "pending").trim().toLowerCase();
    if (raw === "complete" || raw === "completed" || raw === "finished") return "done";
    if (raw === "doing" || raw === "working" || raw === "progress") return "in_progress";
    if (raw === "block") return "blocked";
    return ["pending", "in_progress", "done", "blocked"].includes(raw) ? raw : "pending";
  }

  function normalizePlanStepUpdates(rawUpdates, fallback = {}) {
    const values = Array.isArray(rawUpdates)
      ? rawUpdates
      : rawUpdates && typeof rawUpdates === "object"
      ? [rawUpdates]
      : [];
    const fallbackIndex = Number(fallback.step_index || 0);
    const fallbackText = String(fallback.step_text || "").trim();
    const fallbackStatus = String(fallback.step_status || "").trim();
    if (fallbackIndex > 0 || fallbackText || fallbackStatus) {
      values.push({
        index: fallbackIndex,
        text: fallbackText,
        status: fallbackStatus,
        note: fallback.update_note || "",
      });
    }
    return values.map((item) => {
      if (!item || typeof item !== "object") return null;
      const index = Number(item.index || item.step_index || 0);
      const text = String(item.text || item.step_text || "").trim();
      if (index <= 0 && !text) return null;
      return {
        index,
        text,
        status: normalizePlanStepStatus(item.status || item.step_status),
        note: String(item.note || item.update_note || "").trim(),
      };
    }).filter(Boolean);
  }

  function mergePlanPayload(base, eventPayload) {
    const nextEvent = normalizePlanPayload(eventPayload);
    if (!nextEvent) return base || null;
    if (nextEvent.action === "clear") return nextEvent;
    if (nextEvent.action !== "set_step_status") {
      return nextEvent;
    }
    const current = base ? normalizePlanPayload(base) : null;
    if (!current) return nextEvent;
    const merged = {
      ...current,
      action: "update",
      status: nextEvent.status === "planned" ? current.status : nextEvent.status,
      notes: nextEvent.notes || current.notes,
      completion_note: nextEvent.completion_note || current.completion_note,
      update_note: nextEvent.update_note || current.update_note || "",
      steps: current.steps.map((step) => ({ ...step })),
    };
    nextEvent.step_updates.forEach((update) => {
      let idx = Number(update.index || 0) - 1;
      if (idx < 0 && update.text) {
        const needle = update.text.toLowerCase();
        idx = merged.steps.findIndex((step) => String(step.text || "").toLowerCase().includes(needle));
      }
      if (idx >= 0 && idx < merged.steps.length) {
        merged.steps[idx] = { ...merged.steps[idx], status: update.status };
      }
    });
    return merged;
  }

  function planStateView(payload) {
    const state = String(payload?.completion_confirmation_state || "").trim().toLowerCase();
    if (state === "confirmed" || payload?.completed) {
      return { text: "已确认完成", cls: "confirmed complete" };
    }
    if (state === "pending" || payload?.requires_completion_confirmation) {
      return { text: "待用户确认完成", cls: "pending confirm" };
    }
    const status = String(payload?.status || "planned").trim();
    if (status === "revised") return { text: "已修订", cls: "" };
    if (status === "blocked") return { text: "已阻塞", cls: "blocked" };
    if (status === "complete") return { text: "已确认完成", cls: "confirmed complete" };
    return { text: "计划中", cls: "" };
  }

  function planStepStatusText(status) {
    const normalized = String(status || "pending").trim().toLowerCase();
    if (normalized === "done") return "完成";
    if (normalized === "in_progress") return "进行中";
    if (normalized === "blocked") return "阻塞";
    return "待办";
  }

  function renderPlanFloat(plan) {
    if (!planFloatEl || !planFloatBodyEl || !planFloatSubtitleEl) return;
    const currentPayload = planFloatEl?._planPayload || null;
    const incomingPayload = normalizePlanPayload(plan);
    const payload = incomingPayload?.action === "set_step_status"
      ? mergePlanPayload(currentPayload, incomingPayload)
      : incomingPayload;
    if (!payload) return;
    if (payload.action === "clear") {
      planFloatEl._planPayload = null;
      clearPlanFloatContent();
      hidePlanFloat();
      return;
    }
    planFloatEl._planPayload = payload;
    const stateView = planStateView(payload);
    planFloatSubtitleEl.textContent = payload.goal ? `${stateView.text} · ${payload.goal}` : `${stateView.text} · ${payload.steps.length || 0} 个步骤`;
    const stateHtml = `<div class="plan-state ${escapeHtml(stateView.cls)}">${escapeHtml(stateView.text)}</div>`;
    const goalHtml = payload.goal
      ? `<p class="plan-goal">${escapeHtml(payload.goal)}</p>`
      : `<p class="plan-goal">LLM 已记录一份执行计划。</p>`;
    const stepsHtml = payload.steps.length
      ? `<ol class="plan-steps">${payload.steps.map((step, idx) => `
          <li class="plan-step plan-step-${escapeHtml(step.status || "pending")}">
            <span class="plan-step-index">${escapeHtml(String(step.index || idx + 1))}</span>
            <span class="plan-step-text">${escapeHtml(step.text)}</span>
            <span class="plan-step-status">${escapeHtml(planStepStatusText(step.status))}</span>
          </li>`).join("")}</ol>`
      : "";
    const notesHtml = payload.notes ? `<div class="plan-notes">${renderMarkdown(payload.notes)}</div>` : "";
    const completionHtml = payload.completion_note
      ? `<div class="plan-completion-note">${escapeHtml(payload.completion_note)}</div>`
      : "";
    planFloatBodyEl.innerHTML = stateHtml + goalHtml + stepsHtml + notesHtml + completionHtml;
    showPlanFloat();
  }

  function clearPlanFloatContent() {
    if (planFloatBodyEl) planFloatBodyEl.innerHTML = "";
    if (planFloatSubtitleEl) planFloatSubtitleEl.textContent = "等待 LLM 制定计划";
    if (planFloatEl) {
      planFloatEl.classList.remove("collapsed");
      planFloatEl._planPayload = null;
    }
    if (planFloatCollapseBtnEl) {
      planFloatCollapseBtnEl.textContent = "－";
      planFloatCollapseBtnEl.setAttribute("aria-label", "折叠计划面板");
    }
  }

  function showPlanFloat() {
    if (!planFloatEl) return;
    planFloatEl.style.display = "flex";
    requestAnimationFrame(() => planFloatEl.classList.add("show"));
  }

  function hidePlanFloat() {
    if (!planFloatEl) return;
    planFloatEl.classList.remove("show");
    window.setTimeout(() => {
      if (!planFloatEl.classList.contains("show")) planFloatEl.style.display = "none";
    }, 280);
  }

  async function deleteCurrentPlan() {
    const sid = String(getSessionId() || "").trim();
    if (!sid || isDraftSessionId(sid)) {
      clearPlanFloatContent();
      hidePlanFloat();
      return;
    }
    if (planDeleteInFlight) return;
    planDeleteInFlight = true;
    planDeletedBySession.set(sid, true);
    clearPlanFloatContent();
    hidePlanFloat();
    try {
      const res = await apiFetch(`/sessions/${encodeURIComponent(sid)}/plan`, { method: "DELETE" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
    } catch (e) {
      showToast(`删除计划失败：${String(e?.message || e)}`, "warn");
    } finally {
      planDeleteInFlight = false;
    }
  }

  function togglePlanFloatCollapsed() {
    if (!planFloatEl || !planFloatCollapseBtnEl) return;
    const collapsed = !planFloatEl.classList.contains("collapsed");
    planFloatEl.classList.toggle("collapsed", collapsed);
    planFloatCollapseBtnEl.textContent = collapsed ? "+" : "－";
    planFloatCollapseBtnEl.setAttribute("aria-label", collapsed ? "展开计划面板" : "折叠计划面板");
  }

  function clampPlanFloat(left, top) {
    const rect = planFloatEl?.getBoundingClientRect?.();
    const width = rect?.width || 420;
    const height = rect?.height || 220;
    const maxLeft = Math.max(8, window.innerWidth - width - 8);
    const maxTop = Math.max(8, window.innerHeight - Math.min(height, window.innerHeight - 16) - 8);
    return {
      left: Math.max(8, Math.min(Number(left) || 8, maxLeft)),
      top: Math.max(8, Math.min(Number(top) || 8, maxTop)),
    };
  }

  function startPlanFloatDrag(e) {
    if (!planFloatEl || e.target?.closest?.(".plan-float-actions")) return;
    planFloatDragging = true;
    const rect = planFloatEl.getBoundingClientRect();
    planFloatDragStartX = e.clientX;
    planFloatDragStartY = e.clientY;
    planFloatStartLeft = rect.left;
    planFloatStartTop = rect.top;
    planFloatEl.classList.add("dragging");
    planFloatEl.style.left = `${rect.left}px`;
    planFloatEl.style.top = `${rect.top}px`;
    planFloatEl.style.right = "auto";
    e.preventDefault();
  }

  function movePlanFloatDrag(e) {
    if (!planFloatDragging || !planFloatEl) return;
    const pos = clampPlanFloat(
      planFloatStartLeft + e.clientX - planFloatDragStartX,
      planFloatStartTop + e.clientY - planFloatDragStartY,
    );
    planFloatEl.style.left = `${pos.left}px`;
    planFloatEl.style.top = `${pos.top}px`;
  }

  function stopPlanFloatDrag() {
    if (!planFloatDragging) return;
    planFloatDragging = false;
    planFloatEl?.classList.remove("dragging");
  }

  function showPlanPanelFromToolResult(step) {
    const name = String(step?.agent_tool || step?.name || step?.tool_name || "").trim();
    if (name !== "plan") return false;
    const payload = normalizePlanPayload(step?.result || step);
    if (!payload) return false;
    const sid = String(getSessionId() || "").trim();
    if (payload.action === "clear") {
      if (sid) planDeletedBySession.set(sid, true);
      clearPlanFloatContent();
      hidePlanFloat();
      return true;
    }
    if (sid) planDeletedBySession.set(sid, false);
    renderPlanFloat(payload);
    return true;
  }

  function showPlanPanelsFromTrace(trace) {
    if (!Array.isArray(trace)) return false;
    let shown = false;
    trace.forEach((step) => {
      if (showPlanPanelFromToolResult(step)) shown = true;
    });
    return shown;
  }

  function showLatestPlanFromSessionEntries(entries) {
    if (!Array.isArray(entries)) return false;
    let latest = null;
    entries.forEach((entry) => {
      const content = entry?.content;
      if (!Array.isArray(content)) return;
      content.forEach((step) => {
        if (!step || String(step.kind || "") !== "tool_marker") return;
        const marker = step.data && typeof step.data === "object" ? step.data : {};
        const name = String(marker.name || marker.tool_name || marker.agent_tool || "").trim();
        if (name !== "plan") return;
        const payload = normalizePlanPayload(marker);
        if (payload) latest = mergePlanPayload(latest, payload);
      });
    });
    if (!latest) return false;
    renderPlanFloat(latest);
    return true;
  }

  function isPlanToolTraceStep(step) {
    return String(step?.agent_tool || step?.name || step?.tool_name || "").trim() === "plan";
  }

  function buildDeepAlignmentContext(payload) {
    return String(payload?.alignment_text || "").trim();
  }

  function getDeepDisplayIndex(payload) {
    const rounds = Array.isArray(payload?.rounds) ? payload.rounds : [];
    const fallback = Math.max(0, Math.min(rounds.length - 1, Number(payload?.active_index ?? (rounds.length - 1)) || 0));
    const raw = Number(payload?.display_index ?? fallback);
    if (!rounds.length) return 0;
    return Math.max(0, Math.min(rounds.length - 1, Number.isFinite(raw) ? raw : fallback));
  }

  function normalizeDeepPayload(payload) {
    const next = payload && typeof payload === "object" ? payload : {};
    const rounds = Array.isArray(next.rounds) ? next.rounds : [];
    const latestIndex = Math.max(0, rounds.length - 1);
    const activeIndex = Math.max(0, Math.min(latestIndex, Number(next.active_index ?? latestIndex) || 0));
    next.active_index = activeIndex;
    if (next.display_index === undefined || next.force_latest === true) {
      next.display_index = activeIndex;
    }
    return next;
  }

  function getDeepPendingAsk(payload) {
    const ask = payload?.pending_deep_ask;
    return ask && typeof ask === "object" ? ask : null;
  }

  function getDeepDisplayText(payload) {
    const rounds = Array.isArray(payload?.rounds) ? payload.rounds : [];
    const idx = getDeepDisplayIndex(payload);
    const row = rounds[idx] || {};
    return String(row.alignment_text || payload?.alignment_text || "正在整理理解...");
  }

  function updateDeepCardView(wrapper) {
    if (!wrapper?.card || !wrapper.payload) return;
    const payload = wrapper.payload;
    const rounds = Array.isArray(payload.rounds) ? payload.rounds : [];
    const idx = getDeepDisplayIndex(payload);
    const body = wrapper.card.querySelector(".deep-align-body");
    if (body) body.innerHTML = renderMarkdown(getDeepDisplayText(payload));
    const countEl = wrapper.card.querySelector("[data-deep-page-count]");
    if (countEl) countEl.textContent = rounds.length > 0 ? `${idx + 1}/${rounds.length}` : "0/0";
    const prevBtn = wrapper.card.querySelector('[data-action="prev-round"]');
    const nextBtn = wrapper.card.querySelector('[data-action="next-round"]');
    if (prevBtn) prevBtn.disabled = idx <= 0;
    if (nextBtn) nextBtn.disabled = !rounds.length || idx >= rounds.length - 1;
    wrapper.card.classList.toggle("collapsed", !!payload.collapsed);
    wrapper.card.classList.toggle("readonly", !!payload.readonly);
    const actions = wrapper.card.querySelector(".deep-align-actions");
    const ask = getDeepPendingAsk(payload);
    if (actions) actions.hidden = !!payload.collapsed || !!payload.readonly || !!ask;
    const askPanel = wrapper.card.querySelector(".deep-ask-panel");
    if (askPanel) {
      renderDeepAskPanel(wrapper, askPanel, ask);
    }
    wrapper.card.classList.toggle("asking", !!ask);
  }

  function collapseDeepCard(card) {
    if (!card?.payload || !card.card) return;
    card.payload.collapsed = true;
    card.payload.readonly = true;
    card.card.classList.remove("busy", "revising");
    updateDeepCardView(card);
  }

  function toggleDeepRecord(card) {
    if (!card?.payload?.readonly) return;
    card.payload.collapsed = !card.payload.collapsed;
    updateDeepCardView(card);
  }

  function switchDeepRound(card, delta) {
    if (!card?.payload) return;
    const rounds = Array.isArray(card.payload.rounds) ? card.payload.rounds : [];
    if (!rounds.length) return;
    const next = Math.max(0, Math.min(rounds.length - 1, getDeepDisplayIndex(card.payload) + Number(delta || 0)));
    card.payload.display_index = next;
    card.payload.collapsed = false;
    updateDeepCardView(card);
    scrollToBottom();
  }

  function renderDeepAskPanel(wrapper, panel, ask) {
    if (!panel) return;
    if (!ask) {
      panel.innerHTML = "";
      return;
    }
    const options = Array.isArray(ask.options) ? ask.options : [];
    const selected = String(ask.selected_choice || "");
    const noneValue = String(ask.none_of_them_value || "__none_of_them__");
    const allowCustom = ask.allow_custom_answer !== false;
    const optionsHtml = options.map((option) => {
      const value = String(option || "");
      const label = value === noneValue ? String(ask.none_of_them_label || "以上都不是，我自己补充") : value;
      const cls = value === selected ? "deep-ask-option selected" : "deep-ask-option";
      return `<button type="button" class="${cls}" data-deep-ask-choice="${escapeHtml(value)}">${escapeHtml(label)}</button>`;
    }).join("");
    panel.innerHTML = `
      <p class="deep-ask-question">${escapeHtml(String(ask.question || "需要你补充一个条件"))}</p>
      <div class="deep-ask-options">${optionsHtml}</div>
      ${allowCustom ? `<textarea class="deep-ask-input" rows="3" placeholder="${escapeHtml(String(ask.placeholder || "补充你的答案或限制条件..."))}">${escapeHtml(String(ask.answer_text || ""))}</textarea>` : ""}
      <div class="deep-ask-actions">
        <button type="button" data-action="cancel-deep-ask">取消</button>
        <button type="button" class="deep-ask-submit" data-action="submit-deep-ask">提交回答</button>
      </div>`;
    panel.querySelectorAll("[data-deep-ask-choice]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const choice = String(btn.getAttribute("data-deep-ask-choice") || "");
        ask.selected_choice = choice;
        const isNone = choice === noneValue;
        const input = panel.querySelector(".deep-ask-input");
        if (input && !input.value.trim() && !isNone) input.value = choice;
        if (input && isNone) input.focus();
        renderDeepAskPanel(wrapper, panel, ask);
      });
    });
    panel.querySelector(".deep-ask-input")?.addEventListener("input", (e) => {
      ask.answer_text = String(e.target?.value || "");
    });
    panel.querySelector('[data-action="submit-deep-ask"]')?.addEventListener("click", () => submitDeepAskAnswer(wrapper));
    panel.querySelector('[data-action="cancel-deep-ask"]')?.addEventListener("click", () => cancelDeepAskAnswer(wrapper));
  }

  async function sendDeepAskDecision(wrapper, approval) {
    const ask = getDeepPendingAsk(wrapper?.payload);
    if (!ask) return;
    const sid = String(wrapper?.payload?.sid || getSessionId() || "").trim();
    if (!sid) return;
    const selectedChoice = String(ask.selected_choice || "").trim();
    const noneValue = String(ask.none_of_them_value || "__none_of_them__");
    const isNoneChoice = selectedChoice && selectedChoice === noneValue;
    const answerText = String(ask.answer_text || "").trim() || (isNoneChoice ? "" : selectedChoice);
    if (approval && !answerText && !selectedChoice) {
      showToast("请先选择或补充回答", "warn");
      return;
    }
    if (approval && isNoneChoice && !String(ask.answer_text || "").trim()) {
      showToast("选择“以上都不是”后请补充你的答案", "warn");
      wrapper.card?.querySelector(".deep-ask-input")?.focus();
      return;
    }
    setDeepCardBusy(wrapper, true);
    try {
      const res = await apiFetch("/terminal/confirm", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sid,
          approval: !!approval,
          kind: "question",
          call_id: ask.call_id || ask.confirm_id || "",
          choice: isNoneChoice ? "" : selectedChoice,
          answer: answerText,
        }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `http ${res.status}`));
      const confirmPending = Array.isArray(data?.pending) ? data.pending : [];
      if (data?.active && String(data?.alignment_text || "").trim()) {
        removeDeepCard(deepActiveCard);
        deepPendingPayload = normalizeDeepPayload({
          sid,
          message: String(data.original_message || wrapper.payload?.message || ""),
          file_names: Array.isArray(data.file_names) ? data.file_names : [],
          file_contents: Array.isArray(data.file_contents) ? data.file_contents : [],
          alignment_text: String(data.alignment_text || ""),
          rounds: Array.isArray(data.rounds) ? data.rounds : [],
          active_index: Number(data.active_index ?? 0),
          can_back: !!data.can_back,
          force_latest: true,
        });
        renderDeepAlignmentCard(deepPendingPayload);
      } else if (data?.state === "cancelled") {
        deepPendingPayload = null;
        removeDeepCard(deepActiveCard);
      }
      setPendingConfirmFromList(confirmPending);
      showToast(data?.state === "cancelled" ? "已取消 Deep 对齐" : "已提交回答");
    } catch (e) {
      showToast(`Deep 回答提交失败：${String(e?.message || e)}`, "warn");
      setDeepCardBusy(wrapper, false);
    }
  }

  function submitDeepAskAnswer(wrapper) {
    return sendDeepAskDecision(wrapper, true);
  }

  function cancelDeepAskAnswer(wrapper) {
    return sendDeepAskDecision(wrapper, false);

  async function submitDeepRevision(card) {
    if (!card?.payload) return;
    const textarea = card.card?.querySelector(".deep-align-revision textarea");
    const revision = String(textarea?.value || "").trim();
    if (!revision) {
      showToast("请先输入需要修正的理解点", "warn");
      textarea?.focus();
      return;
    }
    setDeepCardBusy(card, true);
    try {
      const sid = String(card.payload.sid || getSessionId() || "").trim();
      const res = await apiFetch(`/sessions/${encodeURIComponent(sid)}/deep/revise`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ revision }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `http ${res.status}`));
      removeDeepCard(card);
      renderDeepAlignmentCard(normalizeDeepPayload({
        ...card.payload,
        alignment_text: String(data.alignment_text || ""),
        rounds: Array.isArray(data.rounds) ? data.rounds : [],
        active_index: Number(data.active_index || 0),
        can_back: !!data.can_back,
        pending_deep_ask: data.pending_deep_ask || null,
        force_latest: true,

  async function startDeepAlignment(payload) {
    deepAlignmentBusy = true;
    setMessageSendInFlight(true);
    removeDeepCard(deepActiveCard);
    const deepLoadingBubble = renderDeepLoadingBubble("正在理解您的问题...");
    try {
      const res = await apiFetch(`/sessions/${encodeURIComponent(payload.sid)}/deep/align`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: payload.sid,
          message: payload.message,
          file_names: payload.file_names || [],
          file_contents: payload.file_contents || [],
        }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `http ${res.status}`));
      const pendingCount = Math.max(0, Number(data?.pending_confirm_count || 0));
      if (pendingCount > 0 || data?.pending_confirmation === true) {
        deepPendingPayload = normalizeDeepPayload({
          ...payload,
          alignment_text: "",
          rounds: Array.isArray(data.rounds) ? data.rounds : [],
          active_index: Number(data.active_index || 0),
          can_back: !!data.can_back,
          pending_deep_ask: data.pending_deep_ask || (Array.isArray(data.pending) ? data.pending.find((x) => String(x?.flow || "") === "deep_alignment") : null),
          force_latest: true,
        });
        removeDeepCard(deepActiveCard);
        mountDeepAlignmentCard(deepPendingPayload, deepLoadingBubble);
        setPendingConfirmFromList(Array.isArray(data.pending) ? data.pending : []);
        return;
      }
      deepPendingPayload = normalizeDeepPayload({
        ...payload,
        alignment_text: String(data.alignment_text || ""),
        rounds: Array.isArray(data.rounds) ? data.rounds : [],
        active_index: Number(data.active_index || 0),
        can_back: !!data.can_back,
        pending_deep_ask: data.pending_deep_ask || null,
        force_latest: true,
      });
      mountDeepAlignmentCard(deepPendingPayload, deepLoadingBubble);
    } catch (e) {
      reportErrorToTerminal(`Deep 对齐失败：${String(e?.message || e)}`, { source: "deep_alignment", sessionId: payload.sid });
      if (deepLoadingBubble?.bubble?.isConnected) {
        window.ChatBubbleRenderer?.updateBubbleMarkdown?.(deepLoadingBubble.bubble, "Deep 对齐失败，请检查模型服务或关闭 Deep 后重试。");
      } else {
        addBubble("Deep 对齐失败，请检查模型服务或关闭 Deep 后重试。", "bot");
      }
      if (payload.createdForThisMessage && String(getStoredSessionId() || "") === payload.sid) {
        clearActiveSessionState({ title: "新会话" });
      }
    } finally {
      deepAlignmentBusy = false;
      setMessageSendInFlight(false);
      inputEl.focus();
      removeFile();
    }
  }

  async function showVersionTip() {
    clearEmptyState();
    const localDisplay = getVersionBadgeText();
    const localNorm = normalizeVersionTag(localDisplay);
    const signText = appVersionSignatureId ? `，签名${appVersionSignatureId}` : "";
    const verifyText = appVersionSignatureId ? (appVersionVerified ? "，签名已验证" : "，签名未验证") : "";
    addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，正在检查最新版本...`);

    let latestVersion = "";
    let remoteError = "";
    try {
      const res = await apiFetch("/system/versions", { method: "GET" });
      const data = res.ok ? await res.json() : {};
      if (!res.ok) {
        remoteError = String(data?.error || `HTTP ${res.status}`);
      } else {
        const latestVerified = String(data?.latest_verified?.version || "").trim();
        const remoteRows = Array.isArray(data?.remote_versions) ? data.remote_versions : [];
        const firstRemote = String(remoteRows[0]?.version || "").trim();
        latestVersion = latestVerified || firstRemote;
        if (!latestVersion && data?.remote_ok === false) {
          remoteError = String(data?.error || "远端版本不可用");
        }
      }
    } catch (e) {
      remoteError = String(e?.message || e);
    }

    if (remoteError) {
      addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，最新版本检查失败：${remoteError}`);
      return;
    }

    const latestNorm = normalizeVersionTag(latestVersion);
    if (!latestNorm) {
      addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，暂未获取到远端版本。`);
      return;
    }

    const cmp = compareVersionTag(localNorm, latestNorm);
    const latestText = `v${latestNorm}`;
    if (cmp >= 0) {
      addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，已是最新（远端最新 ${latestText}）。`);
    } else {
      addSystemNotice(`当前版本${localDisplay}${signText}${verifyText}，发现新版本 ${latestText}。前往 <a href="/home" target="_blank">版本管理</a> 安装。`);
    }
  }

      fileBarWrapEl.classList.remove("file-list-closing");
      return;
    }
    if (fileListClosing) return;

    if (!fileBarWrapEl) return;
    if (fileBarClosing) return;
    fileBarClosing = true;
    await closeFileList();
    fileBarWrapEl.classList.add("closing");
    await waitForTransition(fileBarWrapEl, { property: "opacity", timeout: 360 });

  function refreshFileList() {
    const n = importedFiles.length;
    fileNameEl.textContent = n + " 个文件";
    if (n === 0) {
      removeFile();
      return;
    }
    var html = "";
    importedFiles.forEach(function(f, i) {
      var shortName = getDisplayFileName(f.name);
      html += '<div class="file-list-item">' +
        '<span class="file-list-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg></span>' +

        '<button class="file-list-delete" onclick="event.stopPropagation();removeOneFile(' + i + ')">删除</button>' +
        '</div>';
    });
    fileListPanelEl.innerHTML = html;
    fileListPanelEl.style.maxHeight = FILE_LIST_MAX_HEIGHT + "px";
    fileListPanelEl.style.display = "flex";
    var actualH = fileListPanelEl.scrollHeight;
    var cappedH = Math.min(actualH, FILE_LIST_MAX_HEIGHT);
    fileListPanelEl.style.maxHeight = cappedH + "px";
    if (actualH <= FILE_LIST_MAX_HEIGHT) {
      fileListPanelEl.style.overflowY = "hidden";
    } else {
      fileListPanelEl.style.overflowY = "auto";
    }
    fileListPanelEl.style.display = "";
    renderComposerSelections();
    requestAnimationFrame(updateComposerBottomSpace);
  }

  function handleFileSelect(e) {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    const validFiles = files.filter(function(f) {
      if (!isTextFile(f.name)) { showToast("不支持的文件类型: " + f.name, "warn"); return false; }
      return true;
    });
    if (validFiles.length === 0) { fileInputEl.value = ""; return; }
    var loaded = 0;
    validFiles.forEach(function(file) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        importedFiles.push({ name: file.name, content: ev.target.result });
        loaded++;
        if (loaded === validFiles.length) {
          openFileBar();
          refreshFileList();
        }
      };
      reader.onerror = function() { showToast("读取失败: " + file.name, "error"); };
      reader.readAsText(file);
    });
  }

  function sanitizeMetaText(v) {

  function formatReadableDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    const hh = String(date.getHours()).padStart(2, "0");
    const mm = String(date.getMinutes()).padStart(2, "0");
    const ss = String(date.getSeconds()).padStart(2, "0");
    return `${y}年${m}月${d}日 ${hh}:${mm}:${ss}`;
  }

  function toIsoWithOffset(date) {
    const pad2 = (n) => String(n).padStart(2, "0");
    const y = date.getFullYear();
    const m = pad2(date.getMonth() + 1);
    const d = pad2(date.getDate());
    const hh = pad2(date.getHours());
    const mm = pad2(date.getMinutes());
    const ss = pad2(date.getSeconds());
    const offsetMin = -date.getTimezoneOffset();
    const sign = offsetMin >= 0 ? "+" : "-";
    const absMin = Math.abs(offsetMin);
    const offH = pad2(Math.floor(absMin / 60));
    const offM = pad2(absMin % 60);
    return `${y}-${m}-${d}T${hh}:${mm}:${ss}${sign}${offH}:${offM}`;
  }

  function parseDateTimeLocal(value) {
    const s = String(value || "").trim();
    if (!s) return null;
    const normalized = s.length === 16 ? `${s}:00` : s;
    const dt = new Date(normalized);
    if (Number.isNaN(dt.getTime())) return null;
    return dt;
  }

  function collectTimeMeta() {
    if (timeMode === "none") {
      return { time_iso: "N/A", time_text: "N/A" };
    }

    if (timeMode === "custom") {
      const dt = parseDateTimeLocal(customTimeValue);
      if (!dt) return { time_iso: "N/A", time_text: "N/A" };
      return {
        time_iso: toIsoWithOffset(dt),
        time_text: formatReadableDate(dt),
      };
    }

    const now = new Date();
    return {
      time_iso: toIsoWithOffset(now),
      time_text: formatReadableDate(now),
    };
  }

  function buildRequestMeta() {
    const timeMeta = collectTimeMeta();
    return {
      meta_user_name: sanitizeMetaText(userMeta.name),
      meta_user_id: sanitizeMetaText(userMeta.uid),

  function renderAccountList(users, currentUid) {
    if (!accountListEl) return;
    accountListEl.innerHTML = "";
    if (!Array.isArray(users) || users.length === 0) {
      accountListEl.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:8px;">无可用账户</div>';
      return;
    }
    users.forEach(u => {
      const uid = String(u?.uid || "");
      const name = String(u?.name || "-");
      const active = uid === String(currentUid || "");
      const div = document.createElement("div");
      div.className = "account-item" + (active ? " active" : "");
      div.innerHTML = `<span class="dot ${active ? "on" : "off"}"></span><span>${name} (${uid})</span>`;
      div.addEventListener("click", () => switchToAccount(uid));
      accountListEl.appendChild(div);
    });
  }

  async function switchToAccount(uid) {
    if (!uid || uid === String(userMeta.uid || "")) { hideAccountPopup(); return; }
    try {
      stopToolPolling();
      clearPendingConfirm();
      const res = await fetch("/auth/local-login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({uid}),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) throw new Error(String(data?.error || `HTTP ${res.status}`));
      const token = String(data?.token || "").trim();
      if (!token) throw new Error("本机登录未返回 token");
      setAuthToken(token);
      applyUserMeta(data?.user || {});
      const sid = await restoreExistingSessionForBoot();
      if (sid) {
        await loadCurrentSessionRecord({ sessionId: sid });
        startToolPolling(sid);
      } else {
        enterDraftSession({ title: "新会话", clearTerminal: true });
      }
      showToast("账户已切换");
      hideAccountPopup();
      await loadAccountList();
      renderQuickButtons();
      if (!adminLinkBtnEl || adminLinkBtnEl.style.display === "none") { if (location.pathname === "/user-admin") location.href = "/"; }
    } catch(e) {
      showToast(`切换失败：${String(e?.message||e)}`, "error");
    }
  }
