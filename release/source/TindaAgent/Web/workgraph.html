<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WORKGRAPH · TindaAgent</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09070d;
      --surface: #120b1c;
      --surface-2: #1b1128;
      --surface-3: #2d1b40;
      --border: #49345f;
      --border-strong: #715591;
      --text: #f8f2ff;
      --text-dim: #bcaad0;
      --purple: #715591;
      --purple-soft: #c9a7ff;
      --neon-purple: #8b5cf6;
      --neon-purple-hot: #e879f9;
      --edge: #6e6fa1;
      --edge-hot: #bff07a;
      --blue: #6e6fa1;
      --green: #61b856;
      --orange: #ed9827;
      --red: #ff3b5f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 16% 8%, rgba(97, 184, 86, 0.035), transparent 28%),
                  radial-gradient(circle at 82% 12%, rgba(113, 85, 145, 0.24), transparent 34%),
                  linear-gradient(180deg, #09070d 0%, #120d1a 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }
    body {
      display: grid;
      grid-template-rows: 56px 1fr 148px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid rgba(113, 85, 145, 0.34);
      background: rgba(10, 6, 15, 0.94);
      backdrop-filter: blur(18px);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.14em;
    }
    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      border: 1px solid rgba(97, 184, 86, 0.42);
      background: linear-gradient(135deg, rgba(113, 85, 145, 0.68), rgba(97, 184, 86, 0.18));
      display: grid;
      place-items: center;
      box-shadow: 0 0 18px rgba(97, 184, 86, 0.16), 0 0 30px rgba(113, 85, 145, 0.22);
    }
    .brand-mark svg,
    .btn svg,
    .tab svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn {
      min-height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 11px;
      background: rgba(27, 15, 42, 0.88);
      color: var(--text-dim);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.16s ease, background 0.16s ease, color 0.16s ease, transform 0.16s ease;
    }
    .btn:hover {
      border-color: rgba(201, 167, 255, 0.46);
      background: rgba(42, 24, 62, 0.94);
      color: var(--text);
      transform: translateY(-1px);
    }
    .btn.primary {
      border-color: rgba(97, 184, 86, 0.54);
      background: rgba(97, 184, 86, 0.12);
      color: #eaffd8;
    }
    main {
      min-height: 0;
      display: grid;
      grid-template-columns: 264px 1fr;
    }
    aside {
      min-width: 0;
      border-right: 1px solid rgba(113, 85, 145, 0.34);
      background: rgba(12, 7, 18, 0.88);
      padding: 12px;
      overflow: auto;
    }
    .section-title {
      margin: 8px 0 9px;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .workflow-card,
    .metric,
    .detail-panel {
      border: 1px solid rgba(113, 85, 145, 0.32);
      border-radius: 8px;
      background: rgba(27, 15, 42, 0.80);
    }
    .workflow-card {
      padding: 10px;
      margin-bottom: 8px;
    }
    .workflow-card.active {
      border-color: rgba(201, 167, 255, 0.56);
      box-shadow: inset 3px 0 0 rgba(237, 152, 39, 0.78), 0 0 24px rgba(113, 85, 145, 0.16);
    }
    .workflow-name {
      font-size: 13px;
      font-weight: 900;
      color: var(--text);
    }
    .workflow-meta {
      margin-top: 5px;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 11px;
      color: var(--text-dim);
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .metric {
      padding: 9px;
    }
    .metric span {
      display: block;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 900;
    }
    .metric strong {
      display: block;
      margin-top: 5px;
      font-size: 18px;
      line-height: 1;
      color: #bff07a;
    }
    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 48px 1fr;
    }
    .tabs {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(113, 85, 145, 0.34);
      background: rgba(13, 8, 20, 0.82);
    }
    .tab-group,
    .status-legend {
      display: inline-flex;
      align-items: center;
      min-width: 0;
    }
    .tab-group {
      gap: 8px;
    }
    .tab {
      height: 30px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 10px;
      background: transparent;
      color: var(--text-dim);
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }
    .tab.active {
      border-color: rgba(97, 184, 86, 0.38);
      background: rgba(97, 184, 86, 0.10);
      color: #eaffd8;
    }
    .status-legend {
      gap: 10px;
      overflow: hidden;
      justify-content: flex-end;
      flex-wrap: wrap;
      row-gap: 4px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: 0.08em;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(201, 167, 255, 0.42);
      box-shadow: 0 0 12px currentColor;
    }
    .legend-item[data-status="active"] .legend-dot { background: var(--green); color: var(--green); }
    .legend-item[data-status="done"] .legend-dot { background: var(--green); color: var(--green); }
    .legend-item[data-status="blocked"] .legend-dot { background: var(--orange); color: var(--orange); }
    .legend-item[data-status="failed"] .legend-dot { background: var(--red); color: var(--red); }
    .legend-item[data-status="audit"] .legend-dot { background: var(--orange); color: var(--orange); }
    .canvas {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background-color: #120e19;
      background-image:
        linear-gradient(rgba(97, 184, 86, 0.020) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 167, 255, 0.058) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .graph-layer {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 18px 20px;
      scrollbar-color: rgba(113, 85, 145, 0.72) rgba(27, 15, 42, 0.88);
    }
    .scene {
      position: relative;
      min-width: 100%;
      min-height: 100%;
      transform-origin: 0 0;
    }
    .edge-layer,
    .lane-layer,
    .node-layer {
      position: absolute;
      inset: 0;
    }
    .edge-layer {
      overflow: visible;
      pointer-events: none;
      z-index: 2;
    }
    .lane-layer {
      z-index: 1;
      pointer-events: none;
    }
    .node-layer {
      z-index: 3;
    }
    .wg-lane {
      position: absolute;
      left: 0;
      border-top: 1px solid rgba(113, 85, 145, 0.22);
      border-bottom: 1px solid rgba(97, 184, 86, 0.04);
      background: linear-gradient(90deg, rgba(113, 85, 145, 0.10), rgba(42, 24, 62, 0.24) 46%, transparent);
      transition: opacity 0.15s ease, filter 0.15s ease;
    }
    .wg-lane-label {
      position: absolute;
      left: 12px;
      top: 9px;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }
    .wg-level {
      position: absolute;
      left: 0;
      border-top: 1px solid rgba(113, 85, 145, 0.24);
      background: rgba(31, 20, 45, 0.38);
      transition: opacity 0.15s ease, filter 0.15s ease;
    }
    .wg-level-label {
      position: absolute;
      left: 12px;
      top: 8px;
      color: rgba(154, 164, 179, 0.80);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: 0.12em;
    }
    .wg-axis {
      position: absolute;
      height: 1px;
      background: rgba(116, 112, 128, 0.42);
      box-shadow: none;
      pointer-events: none;
      transition: opacity 0.15s ease, filter 0.15s ease;
    }
    .wg-axis-label {
      position: absolute;
      left: 0;
      top: -23px;
      color: rgba(201, 167, 255, 0.74);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: 0.12em;
    }
    .wg-node {
      position: absolute;
      width: var(--node-w);
      height: var(--node-h);
      border: 1px solid rgba(113, 85, 145, 0.58);
      border-radius: 9px;
      background: rgba(35, 20, 51, 0.96);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 5px;
      padding: 10px 11px;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.20), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease, filter 0.15s ease, background 0.15s ease;
    }
    .wg-node:focus {
      outline: none;
    }
    .wg-node.selected {
      transform: translateY(-2px);
      border-color: rgba(191, 240, 122, 0.88);
      background: rgba(50, 30, 70, 0.99);
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.32), 0 0 0 1px rgba(97, 184, 86, 0.24), 0 0 22px rgba(97, 184, 86, 0.12);
    }
    .wg-node.related {
      border-color: rgba(201, 167, 255, 0.50);
      background: rgba(43, 25, 60, 0.97);
    }
    .wg-node.dimmed {
      opacity: 0.36;
      filter: grayscale(0.82);
    }
    .wg-node.hover-dimmed {
      opacity: 0.30;
      filter: grayscale(0.72) brightness(0.72);
    }
    .wg-node.hover-related {
      border-color: rgba(201, 167, 255, 0.42);
      background: rgba(43, 25, 60, 0.97);
    }
    .wg-node.event {
      border-radius: 8px;
    }
    .wg-node.lane-event {
      border-radius: 8px;
      justify-content: flex-start;
    }
    .wg-node.milestone {
      border-radius: 999px;
    }
    .wg-node.actor {
      align-items: center;
      text-align: center;
    }
    .wg-node.actor .node-top {
      justify-content: center;
    }
    .wg-node.actor .node-sub {
      text-align: center;
      -webkit-line-clamp: 1;
    }
    .node-top {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }
    .node-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12.5px;
      font-weight: 950;
      letter-spacing: 0.02em;
    }
    .node-status {
      flex: 0 0 auto;
      border-radius: 999px;
      width: 11px;
      height: 11px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(188, 170, 208, 0.30);
      color: rgba(188, 170, 208, 0.64);
      font-size: 0;
      line-height: 0;
      overflow: hidden;
      box-shadow: 0 0 10px currentColor;
    }
    .node-sub {
      width: 100%;
      min-width: 0;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      white-space: normal;
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.32;
    }
    .wg-node.status-active .node-status,
    .wg-node.status-done .node-status {
      background: var(--green);
      color: var(--green);
    }
    .wg-node.status-blocked .node-status,
    .wg-node.status-audit .node-status {
      background: var(--orange);
      color: var(--orange);
    }
    .wg-node.status-failed .node-status {
      background: var(--red);
      color: var(--red);
    }
    .wg-node.status-idle .node-status,
    .wg-node.status-pending .node-status {
      background: rgba(188, 170, 208, 0.32);
      color: rgba(188, 170, 208, 0.38);
    }
    .wg-node:hover,
    .wg-node:focus-visible {
      z-index: 5;
      transform: translateY(-3px);
      border-color: rgba(191, 240, 122, 0.90);
      background: rgba(48, 29, 68, 0.99);
      box-shadow:
        0 24px 58px rgba(0, 0, 0, 0.36),
        0 0 0 1px rgba(191, 240, 122, 0.22),
        0 0 26px rgba(97, 184, 86, 0.24),
        0 0 46px rgba(113, 85, 145, 0.28);
    }
    body.has-selection .wg-node.dimmed:hover,
    body.has-selection .wg-node.dimmed:focus-visible {
      opacity: 0.66;
      filter: grayscale(0.35);
    }
    .wg-node.hover-dimmed:hover,
    .wg-node.hover-dimmed:focus-visible {
      opacity: 0.72;
      filter: grayscale(0.28) brightness(0.90);
    }
    .wg-edge {
      fill: none;
      stroke: rgba(110, 111, 161, 0.56);
      stroke-width: 1.55;
      filter: drop-shadow(0 0 7px rgba(97, 184, 86, 0.22));
      opacity: 0.86;
      transition: opacity 0.15s ease, stroke 0.15s ease, stroke-width 0.15s ease, filter 0.15s ease;
    }
    .wg-edge.arrow,
    .wg-edge.hierarchy { marker-end: url(#arrow-gray); }
    .wg-edge.dashed { stroke-dasharray: 6 5; }
    .wg-edge.handoff { stroke: rgba(97, 184, 86, 0.46); marker-end: url(#arrow-blue); }
    .wg-edge.block { stroke: rgba(237, 152, 39, 0.62); stroke-dasharray: 5 4; marker-end: url(#arrow-orange); }
    .wg-edge.failure { stroke: rgba(255, 59, 95, 0.66); stroke-dasharray: 8 3; marker-end: url(#arrow-red); }
    .wg-edge.audit { stroke: rgba(237, 152, 39, 0.54); stroke-dasharray: 2 4; marker-end: url(#arrow-orange); }
    .wg-edge.active {
      stroke: rgba(213, 220, 232, 0.76);
      stroke-width: 2.05;
      opacity: 1;
    }
    body.has-hover-preview .wg-lane,
    body.has-hover-preview .wg-level,
    body.has-hover-preview .wg-axis {
      opacity: 0.38;
      filter: grayscale(0.55) brightness(0.72);
    }
    body.has-hover-preview .wg-edge:not(.active) {
      opacity: 0.14;
      filter: grayscale(0.65) brightness(0.68);
    }
    .wg-edge.selected-edge {
      stroke: rgba(191, 240, 122, 0.86);
      stroke-width: 2.25;
      filter: drop-shadow(0 0 7px rgba(97, 184, 86, 0.22));
      marker-end: url(#arrow-gray-hot);
      opacity: 1;
    }
    body.has-selection .wg-edge:not(.selected-edge) {
      opacity: 0.12;
    }
    body[data-view="lane"] .wg-edge {
      opacity: 0.50;
      stroke: rgba(139, 149, 165, 0.48);
      stroke-width: 1.45;
      filter: none;
      marker-end: url(#arrow-gray);
    }
    body[data-view="lane"] .wg-edge.active,
    body[data-view="lane"] .wg-edge.selected-edge {
      opacity: 1;
      stroke: rgba(191, 240, 122, 0.84);
      stroke-width: 2.15;
      filter: none;
    }
    body[data-view="lane"] .wg-edge.handoff,
    body[data-view="lane"] .wg-edge.audit {
      stroke-dasharray: 3 6;
    }
    .node-panel {
      position: absolute;
      z-index: 20;
      width: 604px;
      height: 344px;
      border: 1px solid rgba(201, 167, 255, 0.78);
      border-radius: 8px;
      background: rgba(18, 11, 28, 0.985);
      color: var(--text);
      box-shadow: 0 26px 68px rgba(0, 0, 0, 0.48), 0 0 0 1px rgba(97, 184, 86, 0.10);
      overflow: hidden;
    }
    .node-panel.settings-mode {
      width: 704px;
      height: 444px;
    }
    .node-panel-head {
      height: 38px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 10px;
      border-bottom: 1px solid rgba(113, 85, 145, 0.42);
      background: rgba(35, 20, 51, 0.98);
      font-size: 12px;
      font-weight: 950;
    }
    .node-panel-head .spacer {
      flex: 1;
    }
    .node-panel-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .node-panel-kicker {
      flex: 0 0 auto;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .node-panel-status {
      flex: 0 0 auto;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(188, 170, 208, 0.34);
      color: rgba(188, 170, 208, 0.44);
      box-shadow: 0 0 10px currentColor;
    }
    .node-panel-status.status-active,
    .node-panel-status.status-done {
      background: var(--green);
      color: var(--green);
    }
    .node-panel-status.status-blocked,
    .node-panel-status.status-audit {
      background: var(--orange);
      color: var(--orange);
    }
    .node-panel-status.status-failed {
      background: var(--red);
      color: var(--red);
    }
    .node-panel-btn {
      width: 25px;
      height: 25px;
      border: 1px solid rgba(113, 85, 145, 0.55);
      border-radius: 6px;
      display: grid;
      place-items: center;
      color: #cbb8df;
      background: rgba(13, 8, 20, 0.72);
      cursor: pointer;
    }
    .node-panel-btn:hover,
    .node-panel-btn.active {
      border-color: rgba(97, 184, 86, 0.66);
      color: #eaffd8;
      background: rgba(97, 184, 86, 0.14);
      box-shadow: 0 0 16px rgba(97, 184, 86, 0.20);
    }
    .node-panel-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .node-log-body {
      height: calc(100% - 38px);
      display: grid;
      grid-template-columns: 238px 1fr;
      min-height: 0;
    }
    .node-log-list {
      border-right: 1px solid rgba(113, 85, 145, 0.38);
      background: rgba(13, 8, 20, 0.76);
      overflow: hidden;
    }
    .node-log-columns,
    .node-log-row {
      display: grid;
      grid-template-columns: 50px 65px 66px 1fr;
      align-items: start;
      gap: 6px;
    }
    .node-log-columns {
      padding: 8px 9px 6px;
      border-bottom: 1px solid rgba(113, 85, 145, 0.22);
      color: #9f89b9;
      font-size: 9px;
      font-weight: 950;
      letter-spacing: 0.04em;
    }
    .node-log-row {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(113, 85, 145, 0.22);
      padding: 8px 9px;
      background: transparent;
      color: #bcaad0;
      font: inherit;
      font-size: 10px;
      line-height: 1.22;
      text-align: left;
      cursor: pointer;
    }
    .node-log-row strong {
      grid-column: 1 / -1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 11px;
    }
    .node-log-row:hover,
    .node-log-row.active {
      background: rgba(97, 184, 86, 0.10);
      box-shadow: inset 3px 0 0 rgba(97, 184, 86, 0.70);
    }
    .node-log-row.warn {
      box-shadow: inset 3px 0 0 rgba(237, 152, 39, 0.70);
    }
    .node-log-detail {
      min-width: 0;
      padding: 11px 12px;
      overflow: hidden;
    }
    .node-log-kv {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 5px 10px;
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.44;
    }
    .node-log-kv b {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .node-log-output {
      height: 158px;
      margin-top: 12px;
      border: 1px solid rgba(113, 85, 145, 0.38);
      border-radius: 6px;
      background: rgba(5, 4, 8, 0.62);
      padding: 9px;
      overflow: auto;
      color: #d8cff5;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 10.5px;
      line-height: 1.46;
      white-space: pre-wrap;
    }
    .node-settings-body {
      height: calc(100% - 38px);
      display: grid;
      grid-template-columns: 154px 1fr;

  <script>
    const AUTH_TOKEN_KEY = "ta_auth_token";
    const graphLayer = document.getElementById("graphLayer");
    const sceneEl = document.getElementById("scene");
    const laneLayer = document.getElementById("laneLayer");
    const edgeLayer = document.getElementById("edgeLayer");
    const nodeLayer = document.getElementById("nodeLayer");
    const selectedPanel = document.getElementById("selectedPanel");
    const rawPanel = document.getElementById("rawPanel");
    const detailsSummary = document.getElementById("detailsSummary");
    const detailsToggle = document.getElementById("detailsToggle");
    let activeView = "actor";
    let activeSelection = "";
    let currentScene = null;
    let nodePanelMode = "log";
    let activeLogIndex = 0;
    let resizeTimer = 0;
    let detailsCollapsed = false;
    let detailsTouched = false;

    const workflow = {
      workflow_id: "wf_workgraph_sample",
      name: "WorkGraph rendering prototype",
      status: "active",
      actors: [
        { id: "client", name: "Client Input", type: "user", role: "source", status: "done" },
        { id: "router", name: "Workflow Router", type: "system", role: "route", parent_id: "client", status: "done" },
        { id: "planner", name: "Planner Agent", type: "agent", role: "plan", parent_id: "router", status: "done" },
        { id: "executor", name: "Executor Agent", type: "agent", role: "execute", parent_id: "planner", status: "active" },
        { id: "tool", name: "Tool Runtime", type: "tool", role: "tool", parent_id: "executor", status: "blocked" },
        { id: "audit", name: "Audit Agent", type: "agent", role: "audit", parent_id: "planner", status: "audit" },
        { id: "guard", name: "Retry Guard", type: "system", role: "recovery", parent_id: "tool", status: "failed" },
        { id: "delivery", name: "Delivery Channel", type: "external", role: "handoff", parent_id: "audit", status: "idle" }
      ],
      events: [
        { id: "e_001", actor_id: "client", type: "start", time: "2026-05-30T22:00:00+08:00", summary: "用户提出工作流渲染需求", status: "done", payload: { input: "render workflow graphs" } },
        { id: "e_002", actor_id: "router", type: "plan", time: "2026-05-30T22:01:20+08:00", parent_id: "e_001", summary: "选择 WorkGraph 三视图协议", status: "done", payload: { views: ["actor", "event", "lane"] } },
        { id: "e_003", actor_id: "planner", type: "assign", time: "2026-05-30T22:02:10+08:00", parent_id: "e_002", summary: "生成 RenderScene 元素规范", status: "done", payload: { nodes: true, edges: true, lanes: true } },
        { id: "e_004", actor_id: "executor", type: "execute", time: "2026-05-30T22:03:15+08:00", parent_id: "e_003", summary: "绘制 Actor Map 与事件节点", status: "active", payload: { renderer: "svg+html" } },
        { id: "e_005", actor_id: "tool", type: "issue", time: "2026-05-30T22:04:00+08:00", parent_id: "e_004", summary: "等待真实事件源接入", status: "blocked", payload: { missing: "workflow database API" } },
        { id: "e_006", actor_id: "guard", type: "recover", time: "2026-05-30T22:04:35+08:00", parent_id: "e_005", summary: "自动恢复路径未命中", status: "failed", payload: { retry: 1, reason: "no persisted event source" } },
        { id: "e_007", actor_id: "audit", type: "audit", time: "2026-05-30T22:05:30+08:00", parent_id: "e_004", summary: "检查状态色和三视图一致性", status: "audit", payload: { status_palette: "purple/red/orange/green" } },
        { id: "e_008", actor_id: "delivery", type: "done", time: "2026-05-30T22:06:20+08:00", parent_id: "e_007", summary: "原型待验收", status: "pending", payload: { next: "connect persisted events" } }
      ],
      links: [
        { from: "e_001", to: "e_002", type: "causal" },
        { from: "e_002", to: "e_003", type: "causal" },
        { from: "e_003", to: "e_004", type: "handoff" },
        { from: "e_004", to: "e_005", type: "block" },
        { from: "e_005", to: "e_006", type: "failure" },
        { from: "e_004", to: "e_007", type: "audit" },
        { from: "e_007", to: "e_008", type: "handoff" }
      ]
    };

    const statusRank = { active: 1, blocked: 2, failed: 3, audit: 4, done: 5, pending: 6, idle: 7 };
    const statusLegend = [
      ["active", "running"],
      ["done", "done"],
      ["blocked", "blocked"],
      ["failed", "failed"],
      ["audit", "audit"]
    ];

    function byTime(a, b) {
      const time = String(a.time || "").localeCompare(String(b.time || ""));
      return time || String(a.id || "").localeCompare(String(b.id || ""));
    }

    function edgeKind(type) {
      if (type === "handoff") return "handoff";
      if (type === "block") return "block";
      if (type === "failure") return "failure";
      if (type === "audit") return "audit";
      if (type === "report") return "dashed";
      return "arrow";
    }

    function graphViewportWidth() {
      return Math.max(760, (graphLayer?.clientWidth || 1180) - 40);
    }

    function fittedSpacing(count, nodeWidth, start, end, min, max) {
      if (count <= 1) return max;
      const available = graphViewportWidth() - start - end - nodeWidth;
      return Math.max(min, Math.min(max, Math.floor(available / (count - 1))));
    }

    function actorOrderByFirstEvent(data) {
      const seen = new Set();
      const ids = [];
      [...data.events].sort(byTime).forEach((event) => {
        if (event.actor_id && !seen.has(event.actor_id)) {
          seen.add(event.actor_id);
          ids.push(event.actor_id);
        }
      });
      data.actors.forEach((actor) => {
        if (!seen.has(actor.id)) ids.push(actor.id);
      });
      const actorMap = new Map(data.actors.map((actor) => [actor.id, actor]));
      return ids.map((id) => actorMap.get(id)).filter(Boolean);
    }

    function layoutActorMap(data) {
      const children = new Map();
      data.actors.forEach((actor) => {
        const parent = actor.parent_id || "__root";
        if (!children.has(parent)) children.set(parent, []);
        children.get(parent).push(actor);
      });
      for (const list of children.values()) {
        list.sort((a, b) => (statusRank[a.status] || 99) - (statusRank[b.status] || 99) || a.name.localeCompare(b.name));
      }
      const nodes = [];
      const edges = [];
      const roots = children.get("__root") || [];
      const levels = [];
      const actorDepth = new Map();
      const queue = roots.map((actor) => ({ actor, depth: 0 }));
      while (queue.length) {
        const { actor, depth } = queue.shift();
        actorDepth.set(actor.id, depth);
        if (!levels[depth]) levels[depth] = [];
        levels[depth].push(actor);
        (children.get(actor.id) || []).forEach((child) => queue.push({ actor: child, depth: depth + 1 }));
      }
      const nodeW = 214;
      const nodeH = 74;
      const levelGap = 118;
      const top = 52;
      const viewport = graphViewportWidth();
      levels.forEach((actors, depth) => {
        const gap = Math.max(34, Math.min(94, Math.floor((viewport - actors.length * nodeW - 80) / Math.max(1, actors.length + 1))));
        const rowWidth = actors.length * nodeW + Math.max(0, actors.length - 1) * gap;
        const startX = Math.max(44, Math.floor((viewport - rowWidth) / 2));
        actors.forEach((actor, index) => {
          nodes.push({
            id: `actor:${actor.id}`,
            kind: "actor",
            x: startX + index * (nodeW + gap),
            y: top + depth * levelGap,
            w: nodeW,
            h: nodeH,
            label: actor.name,
            sublabel: `${actor.type} / ${actor.role || "unit"}`,
            status: actor.status || "idle",
            source_id: actor.id,
            source: actor
          });
        });
      });
      data.actors.forEach((actor) => {
        const kids = children.get(actor.id) || [];
        kids.forEach((child) => edges.push({
          id: `edge:${actor.id}:${child.id}`,
          from: `actor:${actor.id}`,
          to: `actor:${child.id}`,
          kind: "hierarchy",
          layout: "hierarchy",
          source: { type: "structure", from: actor.id, to: child.id }
        }));
      });
      const maxDepth = Math.max(0, ...Array.from(actorDepth.values()));
      const width = Math.max(viewport, ...nodes.map((node) => node.x + node.w + 64));
      const lanes = Array.from({ length: maxDepth + 1 }, (_, depth) => ({
        id: `level:${depth}`,
        kind: "level",
        label: `LEVEL ${depth + 1}`,
        x: 0,
        y: top - 24 + depth * levelGap,
        w: width,
        h: levelGap - 10
      }));
      return { width, height: Math.max(560, top + (maxDepth + 1) * levelGap + 40), nodes, edges, lanes };
    }

    function layoutEventTimeline(data) {
      const events = [...data.events].sort(byTime);
      const start = 38;
      const nodeW = 196;
      const nodeH = 76;
      const spacing = fittedSpacing(events.length, nodeW, start, 38, 166, 212);
      const nodes = events.map((event, index) => ({
        id: `event:${event.id}`,
        kind: "event",
        x: start + index * spacing,
        y: 112 + (index % 2) * 112,
        w: nodeW,
        h: nodeH,
        label: event.id,
        sublabel: `${event.type} · ${event.summary}`,
        status: event.status || "pending",
        source_id: event.id,
        source: event
      }));
      const nodeIds = new Set(nodes.map((node) => node.id));
      const parentEdges = events
        .filter((event) => event.parent_id && nodeIds.has(`event:${event.parent_id}`))
        .map((event) => ({ id: `parent:${event.parent_id}:${event.id}`, from: `event:${event.parent_id}`, to: `event:${event.id}`, kind: "arrow", source: { type: "parent", from: event.parent_id, to: event.id } }));
      const linkEdges = data.links.map((link, index) => ({ id: `link:${index}:${link.from}:${link.to}`, from: `event:${link.from}`, to: `event:${link.to}`, kind: edgeKind(link.type), source: link }));
      const width = Math.max(graphViewportWidth(), start + Math.max(0, events.length - 1) * spacing + nodeW + 38);
      return {
        width,
        height: 420,
        nodes,
        edges: [...parentEdges, ...linkEdges],
        lanes: [{ id: "axis:time", kind: "axis", label: "TIME ORDER", x: 22, y: 205, w: width - 44, h: 1 }]
      };
    }

    function layoutLaneTimeline(data) {
      const actors = actorOrderByFirstEvent(data);
      const actorIndex = new Map(actors.map((actor, index) => [actor.id, index]));
      const events = [...data.events].sort(byTime);
      const nodeW = 210;
      const nodeH = 72;
      const laneH = 82;
      const laneTop = 26;
      const start = 218;
      const spacing = fittedSpacing(events.length, nodeW, start, 42, 154, 194);
      const width = Math.max(graphViewportWidth(), start + Math.max(0, events.length - 1) * spacing + nodeW + 42);
      const lanes = actors.map((actor, index) => ({ id: `lane:${actor.id}`, actor_id: actor.id, label: actor.name, x: 0, y: laneTop + index * laneH, w: width, h: laneH - 8, source: actor }));
      const nodes = events.map((event, index) => {
        const laneIndex = actorIndex.get(event.actor_id) ?? 0;
        return {
          id: `event:${event.id}`,
          kind: "lane-event",
          x: start + index * spacing,
          y: laneTop + 7 + laneIndex * laneH,
          w: nodeW,
          h: nodeH,
          label: event.id,
          sublabel: `${event.type} · ${event.summary}`,
          status: event.status || "pending",
          source_id: event.id,
          source: event
        };
      });
      const edges = data.links.map((link, index) => ({ id: `lane-link:${index}:${link.from}:${link.to}`, from: `event:${link.from}`, to: `event:${link.to}`, kind: edgeKind(link.type), layout: "lane", source: link }));
      return { width, height: Math.max(620, 58 + actors.length * laneH), nodes, edges, lanes };
    }

    function sceneForView(view) {
      if (view === "event") return layoutEventTimeline(workflow);
      if (view === "lane") return layoutLaneTimeline(workflow);
      return layoutActorMap(workflow);
    }

    function centerOf(node, side) {
      if (side === "left") return { x: node.x, y: node.y + node.h / 2 };
      if (side === "right") return { x: node.x + node.w, y: node.y + node.h / 2 };
      if (side === "top") return { x: node.x + node.w / 2, y: node.y };
      return { x: node.x + node.w / 2, y: node.y + node.h };
    }

    function edgePath(edge, nodeMap) {
      const from = nodeMap.get(edge.from);
      const to = nodeMap.get(edge.to);
      if (!from || !to) return "";
      if (edge.layout === "hierarchy") {
        const a = centerOf(from, "bottom");
        const b = centerOf(to, "top");
        const midY = a.y + (b.y - a.y) * 0.5;
        return `M ${a.x} ${a.y} L ${a.x} ${midY} L ${b.x} ${midY} L ${b.x} ${b.y}`;
      }
      if (edge.layout === "lane") {
        const fromRight = centerOf(from, "right");
        const toLeft = centerOf(to, "left");
        const a = toLeft.x > fromRight.x + 24 ? fromRight : { x: from.x + from.w / 2, y: from.y + from.h / 2 };
        const b = toLeft.x > fromRight.x + 24 ? toLeft : { x: to.x + to.w / 2, y: to.y + to.h / 2 };
        const midX = a.x + (b.x - a.x) * 0.5;
        if (Math.abs(a.y - b.y) < 4) return `M ${a.x} ${a.y} L ${b.x} ${b.y}`;
        return `M ${a.x} ${a.y} L ${midX} ${a.y} L ${midX} ${b.y} L ${b.x} ${b.y}`;
      }
      const horizontal = Math.abs((to.x || 0) - (from.x || 0)) >= Math.abs((to.y || 0) - (from.y || 0));
      const a = centerOf(from, horizontal ? "right" : "bottom");
      const b = centerOf(to, horizontal ? "left" : "top");
      if (edge.kind === "solid") return `M ${a.x} ${a.y} L ${b.x} ${b.y}`;
      const c1x = horizontal ? a.x + Math.max(50, (b.x - a.x) * 0.46) : a.x;
      const c1y = horizontal ? a.y : a.y + Math.max(42, (b.y - a.y) * 0.44);
      const c2x = horizontal ? b.x - Math.max(50, (b.x - a.x) * 0.46) : b.x;
      const c2y = horizontal ? b.y : b.y - Math.max(42, (b.y - a.y) * 0.44);
      return `M ${a.x} ${a.y} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${b.x} ${b.y}`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[ch]));
    }

    function removeNodePanel() {
      sceneEl.querySelector(".node-panel")?.remove();
    }

    function formatLogTime(value) {
      const match = String(value || "").match(/T(\d{2}:\d{2}:\d{2})/);
      return match ? match[1] : "--:--:--";
    }

    function toolNameForEvent(event) {
      const byType = {
        start: "user",
        plan: "planner",
        assign: "codex-cli",
        execute: "terminal",
        issue: "status",
        recover: "retry",
        audit: "audit",
        done: "handoff"
      };
      return byType[event?.type] || event?.type || "event";
    }

    function nodeLogsFor(node) {
      if (!node) return [];
      let events = [];
      if (node.kind === "actor") {
        events = workflow.events.filter((event) => event.actor_id === node.source_id);
      } else if (node.kind === "event" || node.kind === "lane-event") {
        const eventId = node.source_id;
        const selected = workflow.events.find((event) => event.id === eventId);
        events = workflow.events.filter((event) => event.id === eventId || event.parent_id === eventId || event.id === selected?.parent_id);
      }
      if (!events.length && node.source) {
        events = [{ ...node.source, id: node.source_id, summary: node.label, type: node.kind, payload: node.source }];
      }
      return events.sort(byTime).map((event, index) => ({
        time: formatLogTime(event.time),
        id: event.id || `log_${String(index + 1).padStart(4, "0")}`,
        tool: toolNameForEvent(event),
        content: event.summary || event.type || node.label,
        status: event.status || node.status || "pending",
        source: event
      }));
    }

    function renderLogRows(logs) {
      return logs.map((log, index) => `
        <button class="node-log-row ${index === activeLogIndex ? "active" : ""} ${log.status === "blocked" || log.status === "audit" ? "warn" : ""}" type="button" data-log-index="${index}">
          <span>${escapeHtml(log.time)}</span>
          <span>${escapeHtml(log.id)}</span>
          <span>${escapeHtml(log.tool)}</span>
          <span>${escapeHtml(log.status)}</span>
          <strong>${escapeHtml(log.content)}</strong>
        </button>
      `).join("");
    }

    function renderLogDetail(node, log) {
      const payload = log?.source?.payload ?? log?.source ?? node?.source ?? {};
      return `
        <div class="node-log-kv">
          <span>tool</span><b>${escapeHtml(log?.tool || "event")}</b>
          <span>cwd</span><b>./TindaAgent</b>
          <span>status</span><b>${escapeHtml(log?.status || node?.status || "pending")}</b>
          <span>scope</span><b>${escapeHtml(node ? `${node.label} · current node` : "current node")}</b>
        </div>
        <pre class="node-log-output">${escapeHtml(JSON.stringify(payload, null, 2))}</pre>
      `;
    }

    function renderNodeSettings(node) {
      return `
        <div class="node-settings-body">
          <div class="node-settings-nav" aria-label="Node settings sections">
            <button class="node-settings-tab active" type="button">运行 <span>01</span></button>
            <button class="node-settings-tab" type="button">日志 <span>02</span></button>
            <button class="node-settings-tab" type="button">工具权限 <span>03</span></button>
            <button class="node-settings-tab" type="button">环境变量 <span>04</span></button>
            <button class="node-settings-tab" type="button">告警 <span>05</span></button>
          </div>
          <div class="node-settings-content">
            <div class="node-settings-grid">
              <section class="node-setting-slot" data-setting-slot="enabled">
                <div class="node-setting-label">节点启用</div>
                <div class="node-setting-value">${escapeHtml(node.label)} · ${escapeHtml(node.status || "pending")}</div>
                <div class="node-setting-note">预留开关位。后续可替换为真实节点启停控件。</div>
              </section>
              <section class="node-setting-slot" data-setting-slot="runtime">
                <div class="node-setting-label">运行身份</div>
                <div class="node-setting-value">${escapeHtml(node.kind)} / ${escapeHtml(node.source_id)}</div>
                <div class="node-setting-note">预留 actor、event、tool runtime 的身份配置。</div>
              </section>
              <section class="node-setting-slot" data-setting-slot="timeout">
                <div class="node-setting-label">执行超时</div>
                <div class="node-setting-value">reserved</div>
                <div class="node-setting-note">预留 timeout、retry、blocked 阈值。</div>
              </section>
              <section class="node-setting-slot" data-setting-slot="log-scope">
                <div class="node-setting-label">日志范围</div>
                <div class="node-setting-value">current node</div>
                <div class="node-setting-note">预留当前节点、直接依赖、完整路径等日志范围。</div>
              </section>
              <section class="node-setting-slot wide" data-setting-slot="tool-permissions">
                <div class="node-setting-label">工具权限</div>
                <div class="node-setting-value">reserved slot</div>
                <div class="node-setting-note">这里保留给你后续设计工具白名单、审批策略和危险操作控制。</div>
              </section>
              <section class="node-setting-slot" data-setting-slot="environment">
                <div class="node-setting-label">环境</div>
                <div class="node-setting-value">cwd: ./TindaAgent</div>
                <div class="node-setting-note">预留相对路径、env、上下文输入等配置。</div>
              </section>
              <section class="node-setting-slot" data-setting-slot="status-light">
                <div class="node-setting-label">状态灯阈值</div>
                <div class="node-setting-value">reserved</div>
                <div class="node-setting-note">预留红橙绿状态灯判定规则。</div>
              </section>
            </div>
            <div class="node-setting-actions">
              <button class="node-setting-action" type="button" data-panel-action="reset">Reset</button>
              <button class="node-setting-action" type="button" data-panel-action="logs">Back to logs</button>
              <button class="node-setting-action primary" type="button" data-panel-action="apply">Apply to node</button>
            </div>
          </div>
        </div>
      `;
    }

    function nodePanelPosition(node, width, height, scene) {
      const centerX = node.x + node.w / 2;
      const centerY = node.y + node.h / 2;
      const maxLeft = Math.max(18, scene.width - width - 18);
      const maxTop = Math.max(18, scene.height - height - 18);
      return {
        left: Math.max(18, Math.min(centerX - width / 2, maxLeft)),
        top: Math.max(18, Math.min(centerY - height / 2, maxTop))
      };
    }

    function renderNodePanel(node, scene, mode = nodePanelMode) {
      if (!node || !scene) return;
      removeNodePanel();
      nodePanelMode = mode === "settings" ? "settings" : "log";
      const logs = nodeLogsFor(node);
      if (activeLogIndex >= logs.length) activeLogIndex = 0;
      const selectedLog = logs[activeLogIndex] || logs[0];
      const width = nodePanelMode === "settings" ? 704 : 604;
      const height = nodePanelMode === "settings" ? 444 : 344;
      const position = nodePanelPosition(node, width, height, scene);
      const panel = document.createElement("section");
      panel.className = `node-panel ${nodePanelMode === "settings" ? "settings-mode" : ""}`;
      panel.style.left = `${position.left}px`;
      panel.style.top = `${position.top}px`;
      panel.innerHTML = `
        <div class="node-panel-head">
          <span class="node-panel-status status-${escapeHtml(node.status || "pending")}"></span>
          <span class="node-panel-title">${escapeHtml(node.label)}</span>
          <span class="node-panel-kicker">${nodePanelMode === "settings" ? "node settings" : `${logs.length} logs`}</span>
          <span class="spacer"></span>
          <button class="node-panel-btn ${nodePanelMode === "settings" ? "active" : ""}" type="button" data-panel-action="settings" title="Node settings" aria-label="Node settings">
            <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2 2 0 1 1-2.82 2.82l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21a2 2 0 1 1-4 0v-.06A1.8 1.8 0 0 0 8.76 19.3a1.8 1.8 0 0 0-1.98.36l-.04.04a2 2 0 1 1-2.82-2.82l.04-.04a1.8 1.8 0 0 0 .36-1.98 1.8 1.8 0 0 0-1.66-1.1H2.6a2 2 0 1 1 0-4h.06A1.8 1.8 0 0 0 4.3 8.76a1.8 1.8 0 0 0-.36-1.98l-.04-.04A2 2 0 1 1 6.72 3.9l.04.04a1.8 1.8 0 0 0 1.98.36h.02A1.8 1.8 0 0 0 9.86 2.6V2.5a2 2 0 1 1 4 0v.1a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.04-.04A2 2 0 1 1 19.8 6.7l-.04.04a1.8 1.8 0 0 0-.36 1.98v.02a1.8 1.8 0 0 0 1.66 1.1h.1a2 2 0 1 1 0 4h-.1a1.8 1.8 0 0 0-1.66 1.1Z"></path></svg>
          </button>
          <button class="node-panel-btn" type="button" data-panel-action="close" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"></path></svg>
          </button>
        </div>
        ${nodePanelMode === "settings" ? renderNodeSettings(node) : `
          <div class="node-log-body">
            <div class="node-log-list">
              <div class="node-log-columns"><span>时间</span><span>日志ID</span><span>工具</span><span>状态</span></div>
              ${renderLogRows(logs)}
            </div>
            <div class="node-log-detail">${renderLogDetail(node, selectedLog)}</div>
          </div>
        `}
      `;
      panel.addEventListener("click", (event) => event.stopPropagation());
      panel.querySelectorAll("[data-log-index]").forEach((row) => {
        row.addEventListener("click", () => {
          activeLogIndex = Number(row.dataset.logIndex || 0);
          renderNodePanel(node, scene, "log");
        });
      });
      panel.querySelectorAll("[data-panel-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.dataset.panelAction;
          if (action === "close") clearSelection();
          if (action === "settings") renderNodePanel(node, scene, nodePanelMode === "settings" ? "log" : "settings");
          if (action === "logs") renderNodePanel(node, scene, "log");
        });
      });
      sceneEl.appendChild(panel);
    }

    function renderScene(scene) {
      currentScene = scene;
      sceneEl.style.width = `${scene.width}px`;
      sceneEl.style.height = `${scene.height}px`;
      laneLayer.style.width = `${scene.width}px`;
      laneLayer.style.height = `${scene.height}px`;
      nodeLayer.style.width = `${scene.width}px`;
      nodeLayer.style.height = `${scene.height}px`;
      edgeLayer.setAttribute("width", String(scene.width));
      edgeLayer.setAttribute("height", String(scene.height));
      edgeLayer.setAttribute("viewBox", `0 0 ${scene.width} ${scene.height}`);
      const nodeMap = new Map(scene.nodes.map((node) => [node.id, node]));
      laneLayer.innerHTML = scene.lanes.map((lane) => {
        if (lane.kind === "axis") {
          return `
            <div class="wg-axis" style="left:${lane.x || 0}px;top:${lane.y}px;width:${lane.w || scene.width}px">
              <span class="wg-axis-label">${escapeHtml(lane.label)}</span>
            </div>
          `;
        }
        if (lane.kind === "level") {
          return `
            <div class="wg-level" style="left:${lane.x || 0}px;top:${lane.y}px;width:${lane.w || scene.width}px;height:${lane.h}px">
              <span class="wg-level-label">${escapeHtml(lane.label)}</span>
            </div>
          `;
        }
        return `
          <div class="wg-lane" style="left:${lane.x || 0}px;top:${lane.y}px;width:${lane.w || scene.width}px;height:${lane.h}px">
            <span class="wg-lane-label">${escapeHtml(lane.label)}</span>
          </div>
        `;
      }).join("");
      edgeLayer.innerHTML = `
        <defs>
          <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8d7d9e"></path></marker>
          <marker id="arrow-gray-hot" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d9ff8a"></path></marker>
          <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"></path></marker>
          <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7cff3a"></path></marker>
          <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9f1c"></path></marker>
          <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3b5f"></path></marker>
        </defs>
        ${scene.edges.map((edge) => {
          const path = edgePath(edge, nodeMap);
          if (!path) return "";
          return `<path class="wg-edge ${edge.kind || "arrow"}" data-edge-id="${escapeHtml(edge.id)}" data-from="${escapeHtml(edge.from)}" data-to="${escapeHtml(edge.to)}" d="${path}"></path>`;
        }).join("")}
      `;
      nodeLayer.innerHTML = scene.nodes.map((node) => {
        const status = node.status || "pending";
        return `
        <button class="wg-node ${escapeHtml(node.kind)} status-${escapeHtml(status)}" data-node-id="${escapeHtml(node.id)}" aria-label="${escapeHtml(`${node.label}, status ${status}`)}" style="left:${node.x}px;top:${node.y}px;--node-w:${node.w}px;--node-h:${node.h}px">
          <span class="node-top">
            <span class="node-label">${escapeHtml(node.label)}</span>
            <span class="node-status" title="${escapeHtml(status)}" aria-hidden="true"></span>
          </span>
          <span class="node-sub">${escapeHtml(node.sublabel || node.source_id)}</span>
        </button>
      `;
      }).join("");
      nodeLayer.querySelectorAll(".wg-node").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          selectNode(button.dataset.nodeId || "", scene);
        });
        button.addEventListener("mouseenter", () => highlightRelated(button.dataset.nodeId || "", true));
        button.addEventListener("mouseleave", () => highlightRelated(button.dataset.nodeId || "", false));
      });
      if (activeSelection && scene.nodes.some((node) => node.id === activeSelection)) {
        applySelection(activeSelection, scene);
      } else {
        clearSelection();
      }
    }

    function highlightRelated(nodeId, active) {
      if (activeSelection) return;
      document.body.classList.toggle("has-hover-preview", Boolean(active));
      const relatedIds = active ? relatedNodeIds(nodeId) : new Set();
      nodeLayer.querySelectorAll(".wg-node").forEach((node) => {
        const id = node.dataset.nodeId || "";
        node.classList.toggle("hover-related", Boolean(active && relatedIds.has(id) && id !== nodeId));
        node.classList.toggle("hover-dimmed", Boolean(active && !relatedIds.has(id)));
      });
      edgeLayer.querySelectorAll(".wg-edge").forEach((edge) => {
        const related = edge.dataset.from === nodeId || edge.dataset.to === nodeId;
        edge.classList.toggle("active", Boolean(active && related));
      });
    }

    function relatedNodeIds(nodeId) {
      const ids = new Set([nodeId]);
      edgeLayer.querySelectorAll(".wg-edge").forEach((edge) => {
        if (edge.dataset.from === nodeId && edge.dataset.to) ids.add(edge.dataset.to);
        if (edge.dataset.to === nodeId && edge.dataset.from) ids.add(edge.dataset.from);
      });
      return ids;
    }

    function clearSelection() {
      activeSelection = "";
      nodePanelMode = "log";
      activeLogIndex = 0;
      removeNodePanel();
      document.body.classList.remove("has-selection", "has-hover-preview");
      nodeLayer.querySelectorAll(".wg-node").forEach((node) => {
        node.classList.remove("selected", "related", "dimmed", "hover-related", "hover-dimmed");
      });
      edgeLayer.querySelectorAll(".wg-edge").forEach((edge) => {
        edge.classList.remove("active", "selected-edge");
      });
      selectedPanel.textContent = "null";
      rawPanel.textContent = JSON.stringify(workflow, null, 2);
      detailsSummary.textContent = "SELECTED · null";
    }

    function applySelection(nodeId, scene) {
      activeSelection = nodeId;
      document.body.classList.remove("has-hover-preview");
      document.body.classList.add("has-selection");
      const relatedIds = relatedNodeIds(nodeId);
      nodeLayer.querySelectorAll(".wg-node").forEach((node) => {
        const id = node.dataset.nodeId || "";
        const selected = id === nodeId;
        const related = !selected && relatedIds.has(id);
        node.classList.remove("hover-related", "hover-dimmed");
        node.classList.toggle("selected", selected);
        node.classList.toggle("related", related);
        node.classList.toggle("dimmed", !selected && !related);
      });
      edgeLayer.querySelectorAll(".wg-edge").forEach((edge) => {
        const related = edge.dataset.from === nodeId || edge.dataset.to === nodeId;
        edge.classList.remove("active");
        edge.classList.toggle("selected-edge", related);
      });
      const node = scene.nodes.find((item) => item.id === nodeId);
      selectedPanel.textContent = JSON.stringify(node ? { id: node.id, kind: node.kind, source_id: node.source_id, status: node.status } : null, null, 2);
      rawPanel.textContent = JSON.stringify(node?.source || workflow, null, 2);
      detailsSummary.textContent = node ? `SELECTED · ${node.source_id} · ${node.status}` : "SELECTED · null";
      if (node) renderNodePanel(node, scene, nodePanelMode);
    }

    function selectNode(nodeId, scene) {
      if (activeSelection === nodeId) {
        clearSelection();
        return;
      }
      nodePanelMode = "log";
      activeLogIndex = 0;
      applySelection(nodeId, scene);
    }

    function setDetailsCollapsed(next) {
      detailsCollapsed = Boolean(next);
      document.body.classList.toggle("details-collapsed", detailsCollapsed);
      detailsToggle.textContent = detailsCollapsed ? "EXPAND" : "COLLAPSE";
    }

    function renderLegend() {
      const counts = new Map();
      [...workflow.actors, ...workflow.events].forEach((item) => {
        const status = String(item.status || "pending");
        counts.set(status, (counts.get(status) || 0) + 1);
      });
      document.getElementById("statusLegend").innerHTML = statusLegend.map(([status, label]) => `
        <span class="legend-item" data-status="${escapeHtml(status)}">
          <span class="legend-dot"></span>
          ${escapeHtml(label)} ${counts.get(status) || 0}
        </span>
      `).join("");
    }

    function render(view = activeView) {
      activeView = view;
      document.body.dataset.view = view;
      const scene = sceneForView(view);
      document.getElementById("workflowName").textContent = workflow.name;
      document.getElementById("workflowMeta").textContent = `status=${workflow.status} · events=${workflow.events.length}`;
      document.getElementById("actorCount").textContent = String(workflow.actors.length);
      document.getElementById("eventCount").textContent = String(workflow.events.length);
      document.getElementById("linkCount").textContent = String(workflow.links.length);
      document.getElementById("laneCount").textContent = String(view === "lane" ? workflow.actors.length : 0);
      activeSelection = "";
      if (!detailsTouched) setDetailsCollapsed(view === "lane");
      renderLegend();
      renderScene(scene);
    }

    function getAuthToken() {
      const current = String(sessionStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
      if (current) return current;
      const legacy = String(localStorage.getItem(AUTH_TOKEN_KEY) || "").trim();
      if (legacy) {
        sessionStorage.setItem(AUTH_TOKEN_KEY, legacy);
        localStorage.removeItem(AUTH_TOKEN_KEY);
      }
      return legacy;
    }
    async function ensureAuth() {
      const token = getAuthToken();
      if (!token) {
        location.href = "/";
        return;
      }
      const res = await fetch("/auth/status", { headers: { "X-User-Token": token } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data?.logged_in) location.href = "/";
    }
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((node) => node.classList.remove("active"));
        tab.classList.add("active");
        render(tab.dataset.view || "actor");
      });
    });
    document.getElementById("refreshBtn")?.addEventListener("click", () => {
      render(activeView);
    });
    graphLayer.addEventListener("click", (event) => {
      if (event.target instanceof Element && event.target.closest(".wg-node")) return;
      clearSelection();
    });
    detailsToggle.addEventListener("click", () => {
      detailsTouched = true;
      setDetailsCollapsed(!detailsCollapsed);
    });
    window.addEventListener("resize", () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(() => render(activeView), 120);
    });
    render("actor");
    ensureAuth();
  </script>
</body>
</html>
