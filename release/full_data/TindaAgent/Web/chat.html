<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TindaAgent ✿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff5f9;
      --bg-2: #ffffff;
      --surface: #ffffff;
      --surface-2: #fef0f5;
      --border: #fcd5e5;
      --border-strong: #f9a8c9;
      --text: #3d1f2f;
      --text-dim: #9b5f78;
      --text-faint: #d4a0b5;
      --accent: #ff6eb4;
      --accent-2: #ff9fd3;
      --accent-deep: #c2185b;
      --lavender: #b39ddb;
      --lavender-2: #d1c4e9;
      --gradient: linear-gradient(135deg, #ff6eb4 0%, #ff9fd3 70%, #ffb3c6 100%);
      --gradient-lavender: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    body {
      display: flex;
      flex-direction: column;
      position: relative;
      animation: pageIn 0.42s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* ── 背景柔光 ── */
    body::before {
      content: "";
      position: fixed;
      top: -15%;
      right: -10%;
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(255,110,180,0.13) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: "";
      position: fixed;
      bottom: -20%;
      left: -10%;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(167,139,250,0.11) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── 浮动装饰 ── */
    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      user-select: none;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)    rotate(0deg);  opacity: 0.18; }
      50%  { opacity: 0.38; }
      100% { transform: translateY(-45px) rotate(18deg); opacity: 0.18; }
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 10px 20px;
      gap: 12px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1.5px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15.5px;
      justify-self: start;
      min-width: 0;
    }

    .header-center {
      justify-self: center;
      min-width: 0;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      background: var(--surface);
      border: 1.5px solid var(--border);
      padding: 4px 12px 4px 10px;
      border-radius: 999px;
      box-shadow: 0 2px 10px rgba(255,110,180,0.08);
      white-space: nowrap;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
      animation: statusPulse 2.1s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
      50%      { transform: scale(0.88); box-shadow: 0 0 0 6px rgba(34,197,94,0.05); }
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 16px rgba(255,110,180,0.38);
      animation: wiggle 3.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg); }
    }

    .brand-name {
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version-badge {
      font-size: 10.5px;
      color: var(--text-faint);
      background: var(--surface-2);
      padding: 2px 9px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      font-weight: 700;
    }

    .version-btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      line-height: inherit;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }
    .version-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(255,110,180,0.18);
    }
    .version-btn:active {
      transform: translateY(0);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
    }

    .header-decos {
      font-size: 13px;
      letter-spacing: 5px;
      opacity: 0.5;
      user-select: none;
    }

    .icon-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
      font-size: 15px;
      text-decoration: none;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
    }
    .icon-btn:hover {
      background: var(--surface-2);
      border-color: var(--accent-2);
      transform: scale(1.1);
    }

    /* 统一悬浮提示 */
    .icon-btn[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      top: calc(100% + 9px);
      transform: translateX(-50%) translateY(-3px);
      white-space: nowrap;
      background: rgba(61,31,47,0.94);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      padding: 6px 9px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      box-shadow: 0 6px 16px rgba(0,0,0,0.14);
      transition: opacity 0.16s ease, transform 0.16s ease;
    }
    .icon-btn[data-tip]::before {
      content: "";
      position: absolute;
      left: 50%;
      top: calc(100% + 3px);
      transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-bottom: 6px solid rgba(61,31,47,0.94);
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: opacity 0.16s ease;
    }
    .icon-btn[data-tip]:hover::after,
    .icon-btn[data-tip]:hover::before {
      opacity: 1;
    }
    .icon-btn[data-tip]:hover::after {
      transform: translateX(-50%) translateY(0);
    }

    /* 流式按钮：仅改颜色状态，形状同 icon-btn */
    .stream-btn {
      font-size: 16px;
      font-weight: 700;
    }
    .stream-btn.on {
      background: var(--gradient);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 12px rgba(255,110,180,0.32);
    }
    .stream-btn.on:hover {
      background: var(--gradient);
      opacity: 0.88;
      transform: scale(1.1);
    }

    .term-toggle.on {
      background: var(--gradient);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 12px rgba(255,110,180,0.32);
    }
    .term-toggle.on:hover {
      background: var(--gradient);
      opacity: 0.88;
      transform: scale(1.1);
    }

    .model-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .model-btn.on {
      background: linear-gradient(135deg, rgba(255, 110, 180, 0.14) 0%, rgba(167, 139, 250, 0.14) 100%);
      border-color: var(--accent-2);
      color: var(--accent-deep);
    }
    .model-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      min-width: 232px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(61, 31, 47, 0.14);
      padding: 10px;
      z-index: 35;
      display: none;
    }
    .model-panel.open { display: block; }
    .model-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.16s ease, color 0.16s ease;
    }
    .model-item:hover {
      background: var(--surface-2);
      color: var(--accent-deep);
    }
    .model-item.active {
      background: linear-gradient(135deg, rgba(255, 110, 180, 0.12) 0%, rgba(167, 139, 250, 0.12) 100%);
      color: var(--accent-deep);
      font-weight: 700;
    }

    /* 按钮分组分隔线 */
    .btn-sep {
      width: 1px; height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── Messages ── */
    #messages-wrap {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: scroll;
      overflow-x: hidden;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    #messages-wrap::-webkit-scrollbar { width: 6px; }
    #messages-wrap::-webkit-scrollbar-track { background: transparent; }
    #messages-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    #messages-wrap::-webkit-scrollbar-thumb:hover { background: var(--accent-2); }

    #messages {
      max-width: 780px;
      margin: 0 auto;
      padding: 28px 20px 144px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg.same-as-prev { margin-top: -6px; }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(10px) scale(0.97);
      animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes popIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
      cursor: default;
    }
    .avatar:hover { transform: scale(1.18) rotate(-8deg); }

    .msg.bot .avatar {
      background: var(--gradient);
      box-shadow: 0 3px 12px rgba(255,110,180,0.32);
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, #e9e3ff 0%, #ffdaec 100%);
      border: 1.5px solid var(--border);
      font-size: 16px;
    }

    .msg.same-as-prev .avatar { visibility: hidden; }

    .bubble {
      max-width: calc(100% - 54px);
      padding: 10px 16px;
      border-radius: 22px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.72;
    }

    /* iMessage-style pointed corner（头像在顶部，尖角对齐到顶部） */
    .msg.bot:not(.same-as-prev) .bubble  { border-top-left-radius: 5px; }
    .msg.user:not(.same-as-prev) .bubble { border-top-right-radius: 5px; }

    .msg.bot .bubble {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--gradient);
      color: #fff;
      border: none;
      box-shadow: 0 4px 18px rgba(255,110,180,0.26);
    }

    .msg.bot .bubble.cmd {
      background: rgba(167,139,250,0.1);
      border-color: rgba(167,139,250,0.32);
      font-family: "JetBrains Mono","Fira Code","SF Mono",Consolas,monospace;
      font-size: 13px;
      color: #7c3aed;
    }

    /* Markdown */
    .msg.bot .bubble.md :where(p,ul,ol,pre,blockquote) { margin: 0.45em 0; }
    .msg.bot .bubble.md :where(h1,h2,h3,h4,h5,h6) { margin: 0.7em 0 0.3em; font-weight: 700; }
    .msg.bot .bubble.md h1 { font-size: 1.15em; }
    .msg.bot .bubble.md h2 { font-size: 1.08em; }
    .msg.bot .bubble.md h3,.msg.bot .bubble.md h4 { font-size: 1em; }
    .msg.bot .bubble.md :first-child { margin-top: 0; }
    .msg.bot .bubble.md :last-child  { margin-bottom: 0; }
    .msg.bot .bubble.md ul,.msg.bot .bubble.md ol { padding-left: 1.3em; }
    .msg.bot .bubble.md li { margin: 0.15em 0; }
    .msg.bot .bubble.md li::marker { color: var(--accent); }
    .msg.bot .bubble.md strong { color: var(--accent-deep); font-weight: 700; }
    .msg.bot .bubble.md pre {
      overflow-x: auto;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      background: var(--surface-2);
      margin: 0.6em 0;
    }
    .msg.bot .bubble.md code {
      font-family: "JetBrains Mono","Fira Code","SF Mono",Consolas,monospace;
      font-size: 12.5px;
      background: rgba(255,110,180,0.1);
      color: var(--accent-deep);
      border-radius: 7px;
      padding: 1px 5px;
    }
    .msg.bot .bubble.md pre code { background: transparent; color: var(--text); padding: 0; white-space: pre; }
    .msg.bot .bubble.md blockquote {
      border-left: 3px solid var(--accent-2);
      padding-left: 10px;
      color: var(--text-dim);
      margin-left: 0;
      background: rgba(255,110,180,0.05);
      border-radius: 0 10px 10px 0;
    }
    .msg.bot .bubble.md hr {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 0.8em 0;
    }
    .msg.bot .bubble.md .md-table-wrap {
      margin: 0.6em 0;
      overflow-x: auto;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
    }
    .msg.bot .bubble.md table {
      border-collapse: collapse;
      min-width: 100%;
      font-size: 13px;
      line-height: 1.55;
    }
    .msg.bot .bubble.md th,
    .msg.bot .bubble.md td {
      padding: 7px 10px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      white-space: normal;
      word-break: break-word;
    }
    .msg.bot .bubble.md th {
      background: var(--surface-2);
      color: var(--accent-deep);
      font-weight: 700;
      text-align: left;
    }
    .msg.bot .bubble.md tr:last-child td { border-bottom: none; }
    .msg.bot .bubble.md th:last-child,
    .msg.bot .bubble.md td:last-child { border-right: none; }
    .msg.bot .bubble.md a { color: var(--accent); text-decoration: none; border-bottom: 1.5px dotted var(--accent-2); }
    .msg.bot .bubble.md a:hover { border-bottom-style: solid; }

    /* System pill */
    .sys-notice {
      align-self: center;
      font-size: 11px;
      color: var(--text-faint);
      background: var(--surface);
      border: 1.5px dashed var(--border);
      padding: 4px 14px;
      border-radius: 999px;
      opacity: 0;
      animation: popIn 0.3s ease forwards;
    }
    .sys-pin-spacer {
      width: 100%;
      flex-shrink: 0;
      pointer-events: none;
    }

    /* Toast（工具调用类轻量通知） */
    .tinda-toast {
      position: fixed;
      left: 50%;
      bottom: 118px;
      transform: translateX(-50%) translateY(14px);
      z-index: 1000;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: rgba(61,31,47,0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(61,31,47,0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .tinda-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .tinda-toast.warn { background: rgba(180,83,9,0.94); }
    .tinda-toast.err  { background: rgba(185,28,28,0.94); }

    /* 橡皮回弹 */
    @keyframes rubberBottom {
      0%   { transform: translateY(0); }
      38%  { transform: translateY(-42px); }
      100% { transform: translateY(0); }
    }
    @keyframes rubberTop {
      0%   { transform: translateY(0); }
      38%  { transform: translateY(42px); }
      100% { transform: translateY(0); }
    }
    #messages.rubber-bottom { animation: rubberBottom 0.46s cubic-bezier(0.22, 0.8, 0.28, 1); }
    #messages.rubber-top    { animation: rubberTop    0.46s cubic-bezier(0.22, 0.8, 0.28, 1); }

    /* Typing dots */
    .typing { display: inline-flex; gap: 5px; padding: 3px 2px; align-items: center; }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: dotBounce 1.3s infinite ease-in-out;
    }
    .typing span:nth-child(1) { background: #ff6eb4; }
    .typing span:nth-child(2) { background: #a78bfa; animation-delay: 0.18s; }
    .typing span:nth-child(3) { background: #ff9fd3; animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%,80%,100% { transform: scale(0.55); opacity: 0.5; }
      40%          { transform: scale(1.25); opacity: 1; }
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding-top: 12vh;
      text-align: center;
    }

    .empty-state .logo-big {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      box-shadow: 0 12px 40px rgba(255,110,180,0.3);
      animation: floatLogo 3.2s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-12px) rotate(3deg); }
    }

    .empty-state h2 {
      font-size: 24px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sparkle-row {
      font-size: 18px;
      letter-spacing: 8px;
      opacity: 0.55;
      user-select: none;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-faint);
      max-width: 340px;
      font-weight: 500;
    }

    .suggest {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }

    .suggest button {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      padding: 7px 16px;
      border-radius: 999px;
      font-size: 12.5px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .suggest button:hover {
      background: linear-gradient(135deg,rgba(255,110,180,0.1) 0%,rgba(167,139,250,0.1) 100%);
      color: var(--accent-deep);
      border-color: var(--accent-2);
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 7px 20px rgba(255,110,180,0.18);
    }

    /* ── Input dock ── */
    .input-dock {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 5;
      padding: 14px 20px 22px;
      background: linear-gradient(to bottom, rgba(255,245,249,0) 0%, rgba(255,245,249,0.9) 28%, var(--bg) 100%);
      pointer-events: none;
    }

    .input-box {
      max-width: 780px;
      margin: 0 auto;
      pointer-events: auto;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 5px 5px 5px 20px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 20px rgba(255,110,180,0.09);
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255,110,180,0.12), 0 3px 20px rgba(255,110,180,0.12);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      min-height: 28px;
      /* max 5 行 ≈ 5 × 14px × 1.6 + padding 18 ≈ 130 */
      max-height: 130px;
      padding: 9px 0;
      overflow-y: auto;
    }
    #input::placeholder { color: var(--text-faint); font-weight: 500; }
    #input::-webkit-scrollbar { width: 4px; }
    #input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #sendBtn {
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.2s ease,
                  opacity 0.2s ease;
      flex-shrink: 0;
      align-self: flex-end;
      font-size: 18px;
      box-shadow: 0 2px 10px rgba(255,110,180,0.28);
    }
    #sendBtn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 4px 16px rgba(255,110,180,0.42);
    }
    #sendBtn:active:not(:disabled) { transform: scale(0.94); }
    #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    .time-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .time-btn {
      background: var(--surface-2);
      color: var(--text-dim);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      min-width: 40px;
      height: 40px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 10px rgba(255, 110, 180, 0.12);
    }
    .time-btn:hover {
      border-color: var(--accent-2);
      color: var(--accent-deep);
      transform: translateY(-1px);
    }
    .time-btn.on {
      background: linear-gradient(135deg, rgba(255, 110, 180, 0.14) 0%, rgba(167, 139, 250, 0.14) 100%);
      border-color: var(--accent-2);
      color: var(--accent-deep);
    }
    .time-panel {
      position: absolute;
      right: 0;
      bottom: calc(100% + 10px);
      min-width: 250px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(61, 31, 47, 0.14);
      padding: 10px;
      z-index: 22;
      display: none;
    }
    .time-panel.open { display: block; }
    .time-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.16s ease, color 0.16s ease;
    }
    .time-item:hover {
      background: var(--surface-2);
      color: var(--accent-deep);
    }
    .time-item.active {
      background: linear-gradient(135deg, rgba(255, 110, 180, 0.12) 0%, rgba(167, 139, 250, 0.12) 100%);
      color: var(--accent-deep);
      font-weight: 700;
    }
    .time-custom {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
      display: none;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .time-custom.open { display: flex; }
    .time-custom input {
      flex: 1;
      min-width: 140px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 12px;
      color: var(--text);
      background: var(--bg-2);
      font-family: inherit;
      outline: none;
    }
    .time-custom input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 110, 180, 0.12);
    }
    .time-custom button {
      border: none;
      border-radius: 10px;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--gradient);
    }

    .hint {
      max-width: 780px;
      margin: 10px auto 0;
      text-align: center;
      font-size: 11.5px;
      color: var(--text-dim);
      font-weight: 600;
    }
    .hint .hint-inner {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 1px 4px rgba(61,31,47,0.04);
    }
    .hint kbd {
      display: inline-block;
      padding: 1px 5px;
      margin: 0 1px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-bottom-width: 1.5px;
      border-radius: 4px;
      font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
      font-size: 10.5px;
      color: var(--accent-deep);
      font-weight: 700;
    }

    /* ── Layout ── */
    .content-wrap {
      flex: 1; display: flex; overflow: hidden; position: relative;
    }
    .chat-col {
      flex: 1; min-width: 280px; display: flex;
      flex-direction: column; position: relative; overflow: hidden;
    }

    /* ── Resizer (可拖拽分隔条) ── */
    .resizer {
      width: 0; flex-shrink: 0; position: relative;
      cursor: col-resize; z-index: 5;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.2s;
    }
    .resizer.visible { width: 8px; }
    .resizer:hover,
    .resizer.dragging { background: rgba(255,110,180,0.08); }

    .resizer::after {
      content: "";
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 3px; height: 32px;
      background: var(--border); border-radius: 99px;
      opacity: 0;
      transition: background 0.2s, height 0.2s, opacity 0.3s, box-shadow 0.2s;
    }
    .resizer.visible::after { opacity: 1; }
    .resizer:hover::after,
    .resizer.dragging::after {
      background: var(--accent); height: 44px;
      box-shadow: 0 0 10px rgba(255,110,180,0.45);
    }

    /* ── Terminal panel (默认隐藏) ── */
    .term-panel {
      width: 0; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: #0d0810; overflow: hidden; min-width: 0;
      opacity: 0;
      will-change: width, opacity;
      box-shadow: none;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.38s ease 0.1s,
                  box-shadow 0.5s ease;
    }
    .term-panel.open {
      box-shadow: -3px 0 20px rgba(0,0,0,0.22), -1px 0 0 var(--border);
    }

    /* 可爱的终端标题栏 */
    .term-head {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 13px;
      background: var(--gradient); flex-shrink: 0;
    }
    .term-dots { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
    .term-dot {
      width: 11px; height: 11px; border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    .term-dot:nth-child(1) { background: #ff5f57; }
    .term-dot:nth-child(2) { background: #ffbd2e; }
    .term-dot:nth-child(3) { background: #28c940; }
    .term-title {
      flex: 1; text-align: center;
      font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,0.92); letter-spacing: 0.3px;
    }
    .term-clear-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.55);
      color: #fff;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 11.5px;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      flex-shrink: 0;
    }
    .term-clear-btn:hover {
      background: rgba(255,255,255,0.32);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    }
    .term-clear-btn:active { transform: translateY(0); }

    /* 真实终端内部 */
    .term-body {
      flex: 1; overflow-y: auto;
      padding: 12px 14px 16px;
      font-family: "JetBrains Mono","Fira Code","SF Mono","Cascadia Code",Consolas,monospace;
      font-size: 12.5px; line-height: 1.7;
      font-weight: 500;
      background: #0d0810; color: #d8d8d8;
      font-variant-ligatures: contextual;
    }
    .term-body::-webkit-scrollbar { width: 5px; }
    .term-body::-webkit-scrollbar-track { background: #1a0d18; }
    .term-body::-webkit-scrollbar-thumb { background: #3d1f2f; border-radius: 3px; }
    .term-body::-webkit-scrollbar-thumb:hover { background: #5a2d40; }

    .term-line { white-space: pre-wrap; word-break: break-all; min-height: 1em; }
    .term-prompt { color: #ff6eb4; user-select: none; }
    .term-cmd    { color: #e2e8f0; }
    .term-out    { color: #a3e635; }
    .term-out.err  { color: #f87171; }
    .term-out.info { color: #60a5fa; font-style: italic; }
    .term-out.dim  { color: #4b3a45; }
    .term-sep      { color: #2a1520; user-select: none; }

    .records-mask {
      position: fixed;
      inset: 0;
      background: rgba(26, 12, 22, 0.28);
      z-index: 26;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .records-mask.show {
      opacity: 1;
      pointer-events: auto;
    }
    .records-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: min(420px, 92vw);
      z-index: 27;
      background: var(--bg-2);
      border-left: 1.5px solid var(--border);
      box-shadow: -16px 0 36px rgba(61, 31, 47, 0.16);
      transform: translateX(105%);
      transition: transform 0.24s ease;
      display: flex;
      flex-direction: column;
    }
    .records-panel.show { transform: translateX(0); }
    .records-head {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .records-head h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .records-actions {
      display: flex;
      gap: 6px;
    }
    .records-actions button {
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      border-radius: 8px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }
    .records-actions button:hover {
      border-color: var(--accent-2);
      color: var(--accent-deep);
      background: var(--surface-2);
    }
    .records-search {
      padding: 10px 14px;
      border-bottom: 1px dashed var(--border);
    }
    .records-search input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      outline: none;
    }
    .records-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 110, 180, 0.11);
    }
    .records-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 16px;
    }
    .record-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 11px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .record-item-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      word-break: break-all;
    }
    .record-item-meta {
      font-size: 11px;
      color: var(--text-faint);
      line-height: 1.45;
    }
    .record-item-btn {
      align-self: flex-start;
      border: none;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: var(--gradient);
      cursor: pointer;
      font-family: inherit;
    }
    .record-item-btn:hover { opacity: 0.9; }
    .records-empty {
      color: var(--text-faint);
      font-size: 12px;
      text-align: center;
      padding: 28px 10px;
    }

    @media (max-width: 640px) {
      #messages { padding: 16px 12px 126px; }
      .input-dock { padding: 10px 12px 18px; }
      .brand { font-size: 14px; }
      .empty-state { padding-top: 8vh; }
      .header-decos { display: none; }
      .btn-sep { display: none; }
      header { grid-template-columns: 1fr auto; }
      .header-center { display: none; }
      .tinda-toast { bottom: 100px; }
    }
  </style>
</head>
<body>

<!-- 浮动装饰 -->
<span class="deco" style="top:7%;left:4%;font-size:20px;animation-duration:4.4s;">🌸</span>
<span class="deco" style="top:18%;right:5%;font-size:13px;animation-duration:5.6s;animation-delay:-1.2s;">⭐</span>
<span class="deco" style="top:52%;left:2.5%;font-size:14px;animation-duration:4.9s;animation-delay:-2.1s;">💕</span>
<span class="deco" style="top:72%;right:5%;font-size:17px;animation-duration:6.1s;animation-delay:-0.6s;">🌟</span>
<span class="deco" style="top:38%;right:3%;font-size:11px;animation-duration:5.2s;animation-delay:-1.7s;">✿</span>
<span class="deco" style="top:85%;left:7%;font-size:12px;animation-duration:5.8s;animation-delay:-3s;">🎀</span>

<header>
  <div class="brand">
    <div class="brand-logo">🌸</div>
    <span class="brand-name">TindaAgent</span>
    <button class="version-badge version-btn" onclick="showVersionTip()" title="版本信息">v0.1.5</button>
  </div>
  <div class="header-center">
    <span id="statusPill" class="status-pill">
      <span class="status-dot"></span>
      <span class="status-text">AI Agent · 在线</span>
    </span>
  </div>
  <div class="header-right">
    <div class="model-wrap">
      <button id="modelSwitchBtn" class="icon-btn model-btn" type="button" title="切换模型" data-tip="切换模型">🧠</button>
      <div id="modelPanel" class="model-panel"></div>
    </div>
    <button id="streamToggleBtn" class="icon-btn stream-btn" onclick="toggleStream()" title="流式输出" data-tip="切换流式输出">💬</button>
    <div class="btn-sep"></div>
    <button id="termToggleBtn" class="icon-btn term-toggle" onclick="toggleTerm()" title="打开终端" data-tip="打开终端">💻</button>
    <button id="recordsToggleBtn" class="icon-btn" onclick="toggleRecordsPanel()" title="聊天记录" data-tip="聊天记录">📚</button>
    <a class="icon-btn" href="/" title="返回主页" data-tip="返回主页" onclick="event.preventDefault(); smoothNavigate('/');">🏠</a>
    <button class="icon-btn" onclick="resetChat()" title="清空上下文" data-tip="清空当前会话上下文">🔄</button>
  </div>
</header>

<div class="content-wrap">
  <div class="chat-col">
    <div id="messages-wrap">
      <div id="messages"></div>
    </div>
    <div class="input-dock">
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="跟 Tinda 说说话吧 ✿ ..."></textarea>
        <div class="time-wrap">
          <button id="timeModeBtn" class="time-btn on" type="button" title="时间注入模式">🕒</button>
          <div id="timeModePanel" class="time-panel">
            <button type="button" class="time-item active" data-mode="now">发送当前时间</button>
            <button type="button" class="time-item" data-mode="none">不发送时间</button>
            <button type="button" class="time-item" data-mode="custom">自定义时间</button>
            <div id="timeCustomBox" class="time-custom">
              <input id="timeCustomInput" type="datetime-local" />
              <button id="timeCustomApplyBtn" type="button">确认</button>
            </div>
          </div>
        </div>
        <button id="sendBtn" onclick="sendMessage()" title="发送">🌸</button>
      </div>
      <div class="hint"><span class="hint-inner"><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行 · 输入 <kbd>/help</kbd> 查看指令 ✿</span></div>
    </div>
  </div>

  <!-- 可拖拽分隔条 -->
  <div class="resizer" id="resizer"></div>

  <!-- 轻量通知 toast -->
  <div id="tindaToast" class="tinda-toast" role="status" aria-live="polite"></div>

  <!-- 终端面板 -->
  <div class="term-panel" id="termPanel">
    <div class="term-head">
      <div class="term-dots">
        <span class="term-dot"></span>
        <span class="term-dot"></span>
        <span class="term-dot"></span>
      </div>
      <span class="term-title">💻 Tinda Terminal</span>
      <button class="term-clear-btn" onclick="clearTerm()">清空</button>
    </div>
    <div class="term-body" id="termBody"></div>
  </div>
</div>

<div id="recordsMask" class="records-mask" onclick="closeRecordsPanel()"></div>
<aside id="recordsPanel" class="records-panel" aria-hidden="true">
  <div class="records-head">
    <h3>聊天记录</h3>
    <div class="records-actions">
      <button type="button" onclick="refreshRecords()">刷新</button>
      <button type="button" onclick="closeRecordsPanel()">关闭</button>
    </div>
  </div>
  <div class="records-search">
    <input id="recordsSearchInput" placeholder="按 session_id 或 record_id 搜索..." />
  </div>
  <div id="recordsList" class="records-list"></div>
</aside>

<script>
  const messagesEl   = document.getElementById("messages");
  const messagesWrap = document.getElementById("messages-wrap");
  const inputEl      = document.getElementById("input");
  const sendBtn      = document.getElementById("sendBtn");
  const termBodyEl = document.getElementById("termBody");
  const termPanelEl = document.getElementById("termPanel");
  const resizerEl   = document.getElementById("resizer");
  const modelSwitchBtnEl = document.getElementById("modelSwitchBtn");
  const modelPanelEl = document.getElementById("modelPanel");
  const streamToggleBtnEl = document.getElementById("streamToggleBtn");
  const termToggleBtnEl = document.getElementById("termToggleBtn");
  const recordsToggleBtnEl = document.getElementById("recordsToggleBtn");
  const recordsMaskEl = document.getElementById("recordsMask");
  const recordsPanelEl = document.getElementById("recordsPanel");
  const recordsListEl = document.getElementById("recordsList");
  const recordsSearchInputEl = document.getElementById("recordsSearchInput");
  const toastEl = document.getElementById("tindaToast");
  const timeModeBtnEl = document.getElementById("timeModeBtn");
  const timeModePanelEl = document.getElementById("timeModePanel");
  const timeCustomBoxEl = document.getElementById("timeCustomBox");
  const timeCustomInputEl = document.getElementById("timeCustomInput");
  const timeCustomApplyBtnEl = document.getElementById("timeCustomApplyBtn");
  const SESSION_KEY = "tinda_session_id";
  const TERM_WIDTH_KEY = "tinda_term_width";
  const STREAM_ENABLED_KEY = "tinda_stream_enabled";
  const TIME_MODE_KEY = "tinda_time_mode";
  const TIME_CUSTOM_KEY = "tinda_time_custom";
  const RECORDS_PAGE_LIMIT = 100;
  const MODEL_CHOICES_FALLBACK = [
    { id: "deepseek-chat", label: "deepseek-chat" },
    { id: "deepseek-v4-pro", label: "deepseek-pro" },
    { id: "deepseek-reasoner", label: "deepseek-reasoner" },
    { id: "deepseek-v4-flash", label: "deepseek-v4-flash" },
  ];
  const MODEL_ALIAS_MAP = {
    "deepseek-chat": "deepseek-chat",
    "chat": "deepseek-chat",
    "deepseek-v4-pro": "deepseek-v4-pro",
    "deepseek-pro": "deepseek-v4-pro",
    "pro": "deepseek-v4-pro",
    "deepseek-reasoner": "deepseek-reasoner",
    "reasoner": "deepseek-reasoner",
    "deepseek-v4-flash": "deepseek-v4-flash",
    "v4-flash": "deepseek-v4-flash",
    "flash": "deepseek-v4-flash",
  };

  let termInitialized = false;
  let termOpen = false;
  let termWidth   = 320;
  let isResizing  = false, resizeStartX = 0, resizeStartW = 0;
  let streamEnabled = false;
  let resetStageActive = false;
  let spacerRecalcRaf = 0;
  let recordsPanelOpen = false;
  let userMeta = {
    name: "N/A",
    uid: "N/A",
    perm: "N/A",
  };
  let timeMode = "now";
  let customTimeValue = "";
  let modelChoices = MODEL_CHOICES_FALLBACK.slice();
  let currentModel = "deepseek-v4-pro";
  let sessionPersistQueue = Promise.resolve();

  // --- Toast ---
  let toastTimer = 0;
  function showToast(text, variant = "info") {
    if (!toastEl) return;
    toastEl.textContent = text;
    toastEl.classList.remove("warn", "err");
    if (variant === "warn" || variant === "err") toastEl.classList.add(variant);
    // 重新触发动画
    toastEl.classList.remove("show");
    void toastEl.offsetWidth;
    toastEl.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toastEl.classList.remove("show");
      toastTimer = 0;
    }, 2400);
  }

  function reportErrorToTerminal(message, { source = "", sessionId = getSessionId(), persist = true } = {}) {
    const text = String(message ?? "").trim() || "未知错误";
    const prefix = source ? `[error/${source}]` : "[error]";
    showTerm();
    addTermLine("out", `${prefix} ${text}`, "err", { sessionId, persist });
  }

  // --- Terminal ---
  function addTermLine(type, text, cls = "", { persist = true, sessionId = getSessionId() } = {}) {
    const line = document.createElement("div");
    line.className = "term-line";
    if (type === "cmd") {
      line.innerHTML = `<span class="term-prompt">tinda@agent ~ % </span><span class="term-cmd">${escapeHtml(text)}</span>`;
    } else {
      const span = document.createElement("span");
      span.className = "term-out" + (cls ? " " + cls : "");
      span.textContent = text;
      line.appendChild(span);
    }
    termBodyEl.appendChild(line);
    termBodyEl.scrollTop = termBodyEl.scrollHeight;
    if (persist) {
      enqueueSessionEntries(
        [
          {
            role: "assistant",
            entry_type: "terminal",
            terminal_kind: type === "cmd" ? "cmd" : "out",
            content: String(text ?? ""),
            ts: toIsoWithOffset(new Date()),
          },
        ],
        { sessionId },
      );
    }
  }

  function addTermSep({ persist = true, sessionId = getSessionId() } = {}) {
    const lineText = "─".repeat(36);
    const el = document.createElement("div");
    el.className = "term-line term-sep";
    el.textContent = lineText;
    termBodyEl.appendChild(el);
    if (persist) {
      enqueueSessionEntries(
        [
          {
            role: "assistant",
            entry_type: "terminal",
            terminal_kind: "sep",
            content: lineText,
            ts: toIsoWithOffset(new Date()),
          },
        ],
        { sessionId },
      );
    }
  }

  function initTermContent() {
    addTermLine("out", "Tinda Terminal v0.1.5  ✿", "info", { persist: false });
    addTermLine("out", "使用 /tool echo <文本> 在此输出内容", "dim", { persist: false });
    addTermSep({ persist: false });
  }

  function ensureTermInitialized() {
    if (termInitialized) return;
    initTermContent();
    termInitialized = true;
  }

  function openTerm() {
    ensureTermInitialized();
    termOpen = true;
    if (termToggleBtnEl) {
      termToggleBtnEl.classList.add("on");
      termToggleBtnEl.title = "关闭终端";
      termToggleBtnEl.setAttribute("data-tip", "关闭终端");
    }
    // double-RAF：确保浏览器已记录 width:0/opacity:0 的初始帧，再启动过渡
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        termPanelEl.style.transition = "";
        termPanelEl.style.width   = termWidth + "px";
        termPanelEl.style.opacity = "1";
        termPanelEl.classList.add("open");
        resizerEl.classList.add("visible");
        scheduleRecalcPinnedSpacerHeight();
      });
    });
  }

  function closeTerm() {
    termOpen = false;
    termPanelEl.style.transition = "";
    termPanelEl.style.width   = "0px";
    termPanelEl.style.opacity = "0";
    termPanelEl.classList.remove("open");
    resizerEl.classList.remove("visible");
    scheduleRecalcPinnedSpacerHeight();
    if (termToggleBtnEl) {
      termToggleBtnEl.classList.remove("on");
      termToggleBtnEl.title = "打开终端";
      termToggleBtnEl.setAttribute("data-tip", "打开终端");
    }
  }

  function smoothNavigate(url) {
    document.body.style.animation  = "none";
    document.body.style.transition = "opacity 0.22s ease, transform 0.22s ease";
    document.body.style.opacity    = "0";
    document.body.style.transform  = "translateY(-8px) scale(0.99)";
    setTimeout(() => { location.href = url; }, 240);
  }

  function showTerm() {
    if (termOpen) return;
    openTerm();
  }

  function clearTerm() {
    termBodyEl.innerHTML = "";
    termInitialized = false;
    initTermContent();
    termInitialized = true;
  }

  function toggleTerm() {
    if (!termOpen) {
      openTerm();
      return;
    }
    termWidth = Math.max(termPanelEl.offsetWidth, 180);
    localStorage.setItem(TERM_WIDTH_KEY, String(termWidth));
    closeTerm();
  }

  function isEchoCmd(text) {
    const parts = text.trim().split(/\s+/);
    return parts[0] === "/tool" && parts[1] === "echo";
  }

  function stringifyValue(v) {
    if (v === null || v === undefined) return "";
    if (typeof v === "string") return v;
    if (typeof v === "number" || typeof v === "boolean") return String(v);
    try { return JSON.stringify(v, null, 2); } catch { return String(v); }
  }

  function renderToolTraceToTerminal(trace, { sessionId = getSessionId() } = {}) {
    if (!Array.isArray(trace) || trace.length === 0) return false;
    showTerm();
    trace.forEach((step) => {
      const name = step?.agent_tool || "unknown_tool";
      const args = step?.arguments || {};
      addTermLine("cmd", `[tool] ${name} ${stringifyValue(args)}`, "", { sessionId });

      const result = step?.result;
      if (result && typeof result === "object") {
        if (result.ok === false) {
          addTermLine("out", `[error] ${result.error || "工具执行失败"}`, "err", { sessionId });
        } else {
          if (result.tool_name) addTermLine("out", `tool: ${result.tool_name}`, "info", { sessionId });
          if (result.stdout) {
            String(result.stdout).split("\n").forEach((line) => addTermLine("out", line, "", { sessionId }));
          }
          if (result.result !== undefined) {
            const rendered = stringifyValue(result.result);
            if (rendered) rendered.split("\n").forEach((line) => addTermLine("out", line, "", { sessionId }));
          }
          if (result.tools && typeof result.tools === "object") {
            addTermLine("out", "可用工具列表：", "info", { sessionId });
            Object.entries(result.tools).forEach(([k, v]) => addTermLine("out", `- ${k}: ${v}`, "", { sessionId }));
          }
        }
      } else {
        const raw = stringifyValue(step?.raw_result);
        if (raw) raw.split("\n").forEach((line) => addTermLine("out", line, "", { sessionId }));
      }
      addTermSep({ sessionId });
    });
    showToast("已同步工具调用到终端");
    return true;
  }

  // --- Resize drag ---
  resizerEl.addEventListener("mousedown", (e) => {
    if (!termOpen) return;
    isResizing   = true;
    resizeStartX = e.clientX;
    resizeStartW = termPanelEl.offsetWidth;
    document.body.style.cursor     = "col-resize";
    document.body.style.userSelect = "none";
    resizerEl.classList.add("dragging");
    e.preventDefault();
  });

  document.addEventListener("mousemove", (e) => {
    if (!isResizing || !termOpen) return;
    const dx   = resizeStartX - e.clientX;
    const newW = Math.min(Math.max(resizeStartW + dx, 180), window.innerWidth * 0.65);
    termWidth = newW;
    termPanelEl.style.transition = "none";
    termPanelEl.style.width      = newW + "px";
    scheduleRecalcPinnedSpacerHeight();
  });

  document.addEventListener("mouseup", () => {
    if (!isResizing) return;
    isResizing = false;
    document.body.style.cursor     = "";
    document.body.style.userSelect = "";
    resizerEl.classList.remove("dragging");
    termPanelEl.style.transition = "";
    localStorage.setItem(TERM_WIDTH_KEY, String(Math.round(termWidth)));
    scheduleRecalcPinnedSpacerHeight();
  });

  // --- Session handling ---
  function genSessionId() {
    return "s_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 10);
  }
  function getSessionId() {
    let sid = localStorage.getItem(SESSION_KEY);
    if (!sid) { sid = genSessionId(); localStorage.setItem(SESSION_KEY, sid); }
    return sid;
  }
  function rotateSessionId() {
    const sid = genSessionId();
    localStorage.setItem(SESSION_KEY, sid);
    return sid;
  }

  function normalizeEntryForPersist(raw) {
    if (!raw || typeof raw !== "object") return null;
    const role = String(raw.role || "").trim();
    if (role !== "user" && role !== "assistant") return null;

    const entryType = String(raw.entry_type || "chat").trim() || "chat";
    const allowedTypes = ["chat", "notice", "tool_marker", "terminal"];
    const safeType = allowedTypes.includes(entryType) ? entryType : "chat";

    const terminalKindRaw = String(raw.terminal_kind || "").trim();
    const safeTerminalKind =
      safeType === "terminal" && ["cmd", "out", "sep"].includes(terminalKindRaw)
        ? terminalKindRaw
        : "";

    const content = String(raw.content ?? "");
    if (!content.trim()) return null;
    return {
      role,
      entry_type: safeType,
      terminal_kind: safeTerminalKind,
      content,
      ts: String(raw.ts || toIsoWithOffset(new Date())),
    };
  }

  function enqueueSessionEntries(entries, { sessionId = getSessionId() } = {}) {
    const sid = String(sessionId || getSessionId()).trim();
    if (!sid || !Array.isArray(entries) || entries.length === 0) return;
    const payloadEntries = entries
      .map(normalizeEntryForPersist)
      .filter((x) => !!x);
    if (payloadEntries.length === 0) return;

    sessionPersistQueue = sessionPersistQueue
      .then(async () => {
        try {
          await fetch("/session/events", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              session_id: sid,
              entries: payloadEntries,
            }),
          });
        } catch (e) {
          reportErrorToTerminal(`会话事件写入失败：${String(e?.message || e)}`, {
            source: "session_events",
            sessionId: sid,
            persist: false,
          });
        }
      })
      .catch(() => {
        // keep queue alive after an upstream failure
      });
  }

  function normalizeModelChoice(raw) {
    const key = String(raw || "").trim().toLowerCase();
    return MODEL_ALIAS_MAP[key] || "";
  }

  function getModelLabel(modelId) {
    const id = normalizeModelChoice(modelId) || String(modelId || "").trim();
    const item = modelChoices.find((x) => String(x?.id || "") === id);
    return item?.label || id || "unknown";
  }

  function setModelSwitchBtnUI() {
    if (!modelSwitchBtnEl) return;
    const label = getModelLabel(currentModel);
    modelSwitchBtnEl.classList.toggle("on", !!currentModel);
    modelSwitchBtnEl.title = `当前模型：${label}`;
    modelSwitchBtnEl.setAttribute("data-tip", `当前模型：${label}`);
  }

  function renderModelPanel() {
    if (!modelPanelEl) return;
    const rows = modelChoices.length > 0 ? modelChoices : MODEL_CHOICES_FALLBACK;
    const html = rows.map((item) => {
      const modelId = String(item?.id || "");
      const label = String(item?.label || modelId);
      const active = normalizeModelChoice(currentModel) === normalizeModelChoice(modelId);
      return `<button type="button" class="model-item${active ? " active" : ""}" data-model="${escapeHtml(modelId)}">${escapeHtml(label)}</button>`;
    }).join("");
    modelPanelEl.innerHTML = html || `<div class="records-empty">无可用模型</div>`;
    modelPanelEl.querySelectorAll(".model-item").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const modelId = btn.getAttribute("data-model") || "";
        if (!modelId) return;
        await switchModel(modelId);
      });
    });
  }

  function closeModelPanel() {
    modelPanelEl?.classList.remove("open");
  }

  function toggleModelPanel() {
    if (!modelPanelEl) return;
    const willOpen = !modelPanelEl.classList.contains("open");
    closeTimePanel();
    if (willOpen) {
      renderModelPanel();
      modelPanelEl.classList.add("open");
    } else {
      modelPanelEl.classList.remove("open");
    }
  }

  async function loadModelInfo() {
    try {
      const res = await fetch("/model");
      if (!res.ok) throw new Error(`http ${res.status}`);
      const data = await res.json();
      currentModel = normalizeModelChoice(data?.current_model) || currentModel;
      if (Array.isArray(data?.available_models) && data.available_models.length > 0) {
        modelChoices = data.available_models
          .map((x) => ({
            id: normalizeModelChoice(x?.id) || normalizeModelChoice(x?.label) || String(x?.id || x?.label || "").trim(),
            label: String(x?.label || x?.id || "").trim(),
          }))
          .filter((x) => x.id && x.label);
      }
    } catch (e) {
      reportErrorToTerminal(`读取模型信息失败：${String(e?.message || e)}`, { source: "model_info" });
    }
    if (!currentModel) currentModel = "deepseek-v4-pro";
    if (!Array.isArray(modelChoices) || modelChoices.length === 0) {
      modelChoices = MODEL_CHOICES_FALLBACK.slice();
    }
    setModelSwitchBtnUI();
    renderModelPanel();
  }

  async function switchModel(modelId) {
    const target = normalizeModelChoice(modelId);
    if (!target) return;
    if (normalizeModelChoice(currentModel) === target) {
      closeModelPanel();
      return;
    }
    try {
      const res = await fetch("/model", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: target }),
      });
      const data = await res.json();
      if (!res.ok || data?.ok === false) {
        throw new Error(String(data?.error || `http ${res.status}`));
      }
      currentModel = normalizeModelChoice(data?.current_model) || target;
      if (Array.isArray(data?.available_models) && data.available_models.length > 0) {
        modelChoices = data.available_models
          .map((x) => ({
            id: normalizeModelChoice(x?.id) || normalizeModelChoice(x?.label) || String(x?.id || x?.label || "").trim(),
            label: String(x?.label || x?.id || "").trim(),
          }))
          .filter((x) => x.id && x.label);
      }
      setModelSwitchBtnUI();
      renderModelPanel();
      closeModelPanel();
      showToast(`模型已切换：${getModelLabel(currentModel)}`);
    } catch (e) {
      reportErrorToTerminal(`模型切换失败：${String(e?.message || e)}`, { source: "model_switch" });
      showToast(`模型切换失败：${String(e?.message || e)}`, "err");
    }
  }

  function formatRecordTime(value) {
    const text = String(value || "").trim();
    if (!text) return "N/A";
    const dt = new Date(text);
    if (Number.isNaN(dt.getTime())) return text;
    return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")} ${String(dt.getHours()).padStart(2, "0")}:${String(dt.getMinutes()).padStart(2, "0")}`;
  }

  function renderRecordsList(rows) {
    if (!recordsListEl) return;
    if (!Array.isArray(rows) || rows.length === 0) {
      recordsListEl.innerHTML = `<div class="records-empty">暂无聊天记录</div>`;
      return;
    }
    recordsListEl.innerHTML = "";
    rows.forEach((item) => {
      const recordId = String(item?.record_id || "");
      const messageCount = Number(item?.message_count || 0);
      const node = document.createElement("div");
      node.className = "record-item";
      node.innerHTML = `
        <div class="record-item-title">${escapeHtml(recordId || "unknown_record")}</div>
        <div class="record-item-meta">
          session: ${escapeHtml(String(item?.session_id || "N/A"))}<br/>
          updated: ${escapeHtml(formatRecordTime(item?.updated_at))}<br/>
          messages: ${messageCount} · files: ${item?.has_md ? "md" : ""}${item?.has_md && item?.has_txt ? "+" : ""}${item?.has_txt ? "txt" : ""}
        </div>
      `;
      const btn = document.createElement("button");
      btn.className = "record-item-btn";
      btn.type = "button";
      btn.textContent = "导入替换";
      btn.addEventListener("click", () => importRecord(recordId));
      node.appendChild(btn);
      recordsListEl.appendChild(node);
    });
  }

  async function refreshRecords() {
    if (!recordsListEl) return;
    const keyword = String(recordsSearchInputEl?.value || "").trim();
    recordsListEl.innerHTML = `<div class="records-empty">加载中...</div>`;
    try {
      const params = new URLSearchParams({
        limit: String(RECORDS_PAGE_LIMIT),
        offset: "0",
      });
      if (keyword) params.set("q", keyword);
      const res = await fetch(`/records?${params.toString()}`);
      if (!res.ok) throw new Error(`http ${res.status}`);
      const data = await res.json();
      renderRecordsList(Array.isArray(data.records) ? data.records : []);
    } catch (e) {
      reportErrorToTerminal(`读取记录失败：${String(e?.message || e)}`, { source: "records" });
      recordsListEl.innerHTML = `<div class="records-empty">读取记录失败</div>`;
    }
  }

  function openRecordsPanel() {
    recordsPanelOpen = true;
    recordsMaskEl?.classList.add("show");
    recordsPanelEl?.classList.add("show");
    if (recordsPanelEl) recordsPanelEl.setAttribute("aria-hidden", "false");
    refreshRecords();
  }

  function closeRecordsPanel() {
    recordsPanelOpen = false;
    recordsMaskEl?.classList.remove("show");
    recordsPanelEl?.classList.remove("show");
    if (recordsPanelEl) recordsPanelEl.setAttribute("aria-hidden", "true");
  }

  function toggleRecordsPanel() {
    if (recordsPanelOpen) {
      closeRecordsPanel();
    } else {
      openRecordsPanel();
    }
  }

  function resetTerminalForReplay() {
    termBodyEl.innerHTML = "";
    termInitialized = false;
    initTermContent();
    termInitialized = true;
  }

  function renderImportedTerminalEntry(entry) {
    const kind = String(entry?.terminal_kind || "").trim();
    const content = String(entry?.content || "");
    if (kind === "cmd") {
      addTermLine("cmd", content, "", { persist: false });
      return true;
    }
    if (kind === "sep") {
      addTermSep({ persist: false });
      return true;
    }
    addTermLine("out", content, "", { persist: false });
    return true;
  }

  function renderImportedEntries(entries) {
    resetStageActive = false;
    clearPinnedSpacer();
    messagesEl.innerHTML = "";
    resetTerminalForReplay();
    if (!Array.isArray(entries) || entries.length === 0) {
      showEmptyState();
      return;
    }
    let hasChatBubble = false;
    let hasTerminal = false;
    let lastBotBubble = null;
    let mergeNextAssistantIntoLastBot = false;
    entries.forEach((entry) => {
      const role = String(entry?.role || "").trim();
      const entryType = String(entry?.entry_type || "chat").trim() || "chat";
      const content = String(entry?.content || "");
      if (!content.trim()) return;

      if (entryType === "terminal") {
        hasTerminal = renderImportedTerminalEntry(entry) || hasTerminal;
        return;
      }

      if (entryType === "notice" || entryType === "tool_marker") {
        if (entryType === "tool_marker") {
          clearEmptyState();
          if (!lastBotBubble) {
            const bot = addBubble("", "bot");
            lastBotBubble = bot.bubble;
          }
          appendMarkdownToBotBubble(lastBotBubble, `\n\n${content}\n`);
          mergeNextAssistantIntoLastBot = true;
          hasChatBubble = true;
          return;
        }
        clearEmptyState();
        addSystemNotice(content, { persist: false });
        hasChatBubble = true;
        return;
      }

      if (role === "user") {
        clearEmptyState();
        addBubble(content, "user");
        lastBotBubble = null;
        mergeNextAssistantIntoLastBot = false;
        hasChatBubble = true;
        return;
      }
      if (role === "assistant") {
        clearEmptyState();
        if (mergeNextAssistantIntoLastBot && lastBotBubble) {
          appendMarkdownToBotBubble(lastBotBubble, `\n\n${content}`);
          mergeNextAssistantIntoLastBot = false;
        } else {
          const bot = addBubble(content, "bot");
          lastBotBubble = bot.bubble;
        }
        hasChatBubble = true;
      }
    });
    if (!hasChatBubble) showEmptyState();
    if (hasTerminal) showTerm();
    scrollToBottom();
  }

  async function importRecord(recordId) {
    if (!recordId) return;
    try {
      const res = await fetch("/records/import", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: getSessionId(),
          record_id: recordId,
        }),
      });
      const data = await res.json();
      if (!res.ok || data.ok === false) {
        throw new Error(data?.error || `http ${res.status}`);
      }
      renderImportedEntries(Array.isArray(data.entries) ? data.entries : []);
      addSystemNotice(`已导入记录：${recordId}`);
      closeRecordsPanel();
    } catch (e) {
      reportErrorToTerminal(`导入记录失败：${String(e?.message || e)}`, { source: "record_import" });
      addSystemNotice(`导入失败：${String(e?.message || e)}`);
    }
  }

  async function loadCurrentSessionRecord() {
    try {
      const params = new URLSearchParams({ session_id: getSessionId() });
      const res = await fetch(`/records/session?${params.toString()}`);
      if (!res.ok) return;
      const data = await res.json();
      if (!data?.found) return;
      const entries = Array.isArray(data.entries) ? data.entries : [];
      if (entries.length === 0) return;
      renderImportedEntries(entries);
    } catch (e) {
      reportErrorToTerminal(`读取当前会话记录失败：${String(e?.message || e)}`, { source: "session_record" });
    }
  }

  // --- UI helpers ---
  function scrollToBottom() {
    messagesWrap.scrollTop = getMaxUsefulScroll();
  }

  function getMaxUsefulScroll() {
    const naturalMax = Math.max(0, messagesWrap.scrollHeight - messagesWrap.clientHeight);
    if (!resetStageActive) return naturalMax;

    const resetPill = messagesEl.querySelector(".sys-notice.pinned");
    if (!resetPill) return naturalMax;

    // 扣掉 spacer 占的额外空间：naturalMax 里包含了 spacer 和 #messages 的 padding-bottom，
    // padding-bottom 是输入框留白，要保留；spacer 是人为撑高的，不能让用户滚进去。
    const spacer = messagesEl.querySelector(".sys-pin-spacer");
    const spacerHeight = spacer ? spacer.offsetHeight : 0;
    const pillTop = Math.max(resetPill.offsetTop - 6, 0);
    const contentMax = Math.max(0, naturalMax - spacerHeight);
    return Math.max(pillTop, contentMax);
  }

  let rubberTimer = 0;
  function triggerRubberBand(direction) {
    if (rubberTimer) {
      clearTimeout(rubberTimer);
      messagesEl.classList.remove("rubber-bottom", "rubber-top");
    }
    // 强制 reflow 以便重新触发动画
    void messagesEl.offsetWidth;
    messagesEl.classList.add(direction === "bottom" ? "rubber-bottom" : "rubber-top");
    rubberTimer = setTimeout(() => {
      messagesEl.classList.remove("rubber-bottom", "rubber-top");
      rubberTimer = 0;
    }, 480);
  }

  function scheduleRecalcPinnedSpacerHeight() {
    if (spacerRecalcRaf) return;
    spacerRecalcRaf = requestAnimationFrame(() => {
      spacerRecalcRaf = 0;
      recalcPinnedSpacerHeight();
    });
  }

  function recalcPinnedSpacerHeight() {
    if (!resetStageActive) return;
    const spacer = messagesEl.querySelector(".sys-pin-spacer");
    if (!spacer) return;
    const viewportHeight = messagesWrap.clientHeight;
    const nextHeight = Math.max(viewportHeight - 80, 120);
    spacer.style.height = `${nextHeight}px`;
  }

  function clearPinnedSpacer() {
    messagesEl.querySelectorAll(".sys-pin-spacer").forEach((n) => n.remove());
  }

  function addBubble(text, role, { isCommand = false } = {}) {
    const row = document.createElement("div");
    row.className = "msg " + role;

    const spacer = messagesEl.querySelector(".sys-pin-spacer");
    const prev = spacer ? spacer.previousElementSibling : messagesEl.lastElementChild;
    if (prev && prev.classList.contains("msg") && prev.classList.contains(role)) {
      row.classList.add("same-as-prev");
    }

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "bot" ? "🌸" : "🐱";

    const bubble = document.createElement("div");
    bubble.className = "bubble" + (isCommand ? " cmd" : "");
    if (role === "bot" && !isCommand) {
      bubble.classList.add("md");
      bubble.dataset.rawMd = String(text ?? "");
      bubble.innerHTML = renderMarkdown(text);
    } else {
      bubble.textContent = text;
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    if (spacer) {
      messagesEl.insertBefore(row, spacer);
    } else {
      messagesEl.appendChild(row);
    }
    scrollToBottom();
    return { row, bubble };
  }

  function appendMarkdownToBotBubble(bubbleEl, extraText) {
    if (!bubbleEl) return false;
    const prev = String(bubbleEl.dataset.rawMd ?? "");
    const next = `${prev}${String(extraText ?? "")}`;
    bubbleEl.dataset.rawMd = next;
    bubbleEl.innerHTML = renderMarkdown(next);
    return true;
  }

  function escapeHtml(text) {
    return text
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll("\"", "&quot;")
      .replaceAll("'", "&#39;");
  }

  function safeHref(rawUrl) {
    const url = rawUrl.trim();
    if (/^(https?:\/\/|mailto:)/i.test(url)) return url;
    return "#";
  }

  function renderInlineMarkdown(line) {
    const codeSpans = [];
    let s = line.replace(/`([^`]+)`/g, (_, code) => {
      const token = `@@INLINE_CODE_${codeSpans.length}@@`;
      codeSpans.push(`<code>${escapeHtml(code)}</code>`);
      return token;
    });

    s = escapeHtml(s);
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
      const href = safeHref(url);
      return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    });
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
    s = s.replace(/~~([^~]+)~~/g, "<del>$1</del>");

    codeSpans.forEach((html, i) => {
      s = s.replaceAll(`@@INLINE_CODE_${i}@@`, html);
    });
    return s;
  }

  function parseTableCells(line) {
    let s = String(line ?? "").trim();
    if (s.startsWith("|")) s = s.slice(1);
    if (s.endsWith("|")) s = s.slice(0, -1);
    const token = "@@ESCAPED_PIPE@@";
    s = s.replace(/\\\|/g, token);
    return s.split("|").map((cell) => cell.replaceAll(token, "|").trim());
  }

  function isTableSeparatorLine(line) {
    const s = String(line ?? "").trim();
    if (!s || !s.includes("|")) return false;
    const cells = parseTableCells(s);
    if (!cells.length) return false;
    return cells.every((cell) => /^:?-{3,}:?$/.test(cell));
  }

  function parseTableAlign(cell) {
    const s = String(cell ?? "").trim();
    if (s.startsWith(":") && s.endsWith(":")) return "center";
    if (s.endsWith(":")) return "right";
    return "left";
  }

  function renderMarkdown(text) {
    const source = (text ?? "").replace(/\r\n/g, "\n");
    const codeBlocks = [];

    let body = source.replace(/```([a-zA-Z0-9_-]+)?\n([\s\S]*?)```/g, (_, lang, code) => {
      const langClass = lang ? ` class="language-${escapeHtml(lang)}"` : "";
      const token = `@@CODE_BLOCK_${codeBlocks.length}@@`;
      const html = `<pre><code${langClass}>${escapeHtml(code)}</code></pre>`;
      codeBlocks.push(html);
      return token;
    });

    const lines = body.split("\n");
    const parts = [];
    let inList = false;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trimEnd();
      const trim = line.trim();

      if (!trim) {
        if (inList) { parts.push("</ul>"); inList = false; }
        continue;
      }

      const nextTrim = i + 1 < lines.length ? lines[i + 1].trim() : "";
      if (trim.includes("|") && nextTrim && isTableSeparatorLine(nextTrim)) {
        if (inList) { parts.push("</ul>"); inList = false; }

        const headers = parseTableCells(trim);
        const alignDefs = parseTableCells(nextTrim);
        const aligns = headers.map((_, idx) => parseTableAlign(alignDefs[idx] || ""));
        const rows = [];

        i += 2;
        for (; i < lines.length; i++) {
          const rowTrim = lines[i].trim();
          if (!rowTrim) {
            i -= 1;
            break;
          }
          if (!rowTrim.includes("|") || /^@@CODE_BLOCK_\d+@@$/.test(rowTrim)) {
            i -= 1;
            break;
          }
          rows.push(parseTableCells(rowTrim));
        }

        const thHtml = headers.map((h, idx) => `<th style="text-align:${aligns[idx]}">${renderInlineMarkdown(h)}</th>`).join("");
        const trHtml = rows.map((cols) => {
          const tds = headers.map((_, idx) => {
            const cellText = cols[idx] ?? "";
            return `<td style="text-align:${aligns[idx]}">${renderInlineMarkdown(cellText)}</td>`;
          }).join("");
          return `<tr>${tds}</tr>`;
        }).join("");
        const tbody = trHtml ? `<tbody>${trHtml}</tbody>` : "";
        parts.push(`<div class="md-table-wrap"><table><thead><tr>${thHtml}</tr></thead>${tbody}</table></div>`);
        continue;
      }

      if (/^(-{3,}|\*{3,}|_{3,})$/.test(trim)) {
        if (inList) { parts.push("</ul>"); inList = false; }
        parts.push("<hr/>");
        continue;
      }

      const listMatch = /^[-*+]\s+(.+)$/.exec(trim);
      if (listMatch) {
        if (!inList) { parts.push("<ul>"); inList = true; }
        parts.push(`<li>${renderInlineMarkdown(listMatch[1])}</li>`);
        continue;
      }

      if (inList) { parts.push("</ul>"); inList = false; }

      const headingMatch = /^(#{1,6})\s+(.+)$/.exec(trim);
      if (headingMatch) {
        const level = headingMatch[1].length;
        parts.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
        continue;
      }

      if (trim.startsWith(">")) {
        if (inList) { parts.push("</ul>"); inList = false; }
        const quoteLines = [];
        for (; i < lines.length; i++) {
          const qTrim = lines[i].trim();
          if (!qTrim.startsWith(">")) {
            i -= 1;
            break;
          }
          const m = /^>\s?(.*)$/.exec(qTrim);
          quoteLines.push(m ? m[1] : "");
        }
        const quoteHtml = quoteLines
          .map((line) => (line ? renderInlineMarkdown(line) : "<br/>"))
          .join("<br/>");
        parts.push(`<blockquote>${quoteHtml}</blockquote>`);
        continue;
      }

      if (/^@@CODE_BLOCK_\d+@@$/.test(trim)) { parts.push(trim); continue; }

      parts.push(`<p>${renderInlineMarkdown(trim)}</p>`);
    }

    if (inList) parts.push("</ul>");

    let html = parts.join("");
    codeBlocks.forEach((block, i) => { html = html.replaceAll(`@@CODE_BLOCK_${i}@@`, block); });
    return html || "<p></p>";
  }

  function addSystemNotice(text, { pinTop = false, persist = true, sessionId = getSessionId() } = {}) {
    const pill = document.createElement("div");
    pill.className = "sys-notice";
    pill.textContent = text;
    if (!pinTop) {
      const spacer = messagesEl.querySelector(".sys-pin-spacer");
      if (spacer) {
        messagesEl.insertBefore(pill, spacer);
      } else {
        messagesEl.appendChild(pill);
      }
    } else {
      messagesEl.appendChild(pill);
    }

    if (pinTop) {
      resetStageActive = true;
      // 清掉旧的 pinned 标记，只留最新的重置 pill
      messagesEl.querySelectorAll(".sys-notice.pinned").forEach((n) => {
        if (n !== pill) n.classList.remove("pinned");
      });
      pill.classList.add("pinned");
      // 重建 spacer：在 pill 之后追加一个大占位，撑高 scrollHeight 才能把 pill 滚到顶
      clearPinnedSpacer();
      const spacer = document.createElement("div");
      spacer.className = "sys-pin-spacer";
      spacer.setAttribute("aria-hidden", "true");
      messagesEl.appendChild(spacer);
      recalcPinnedSpacerHeight();

      requestAnimationFrame(() => {
        messagesWrap.scrollTo({
          top: Math.max(pill.offsetTop - 6, 0),
          behavior: "smooth",
        });
      });
    } else if (resetStageActive) {
      // 重置阶段：保持重置 pill 在顶，新 pill 自然显示在其下方
      const resetPill = messagesEl.querySelector(".sys-notice.pinned");
      if (resetPill) {
        requestAnimationFrame(() => {
          messagesWrap.scrollTo({
            top: Math.max(resetPill.offsetTop - 6, 0),
            behavior: "smooth",
          });
        });
      } else {
        scrollToBottom();
      }
    } else {
      scrollToBottom();
    }
    if (persist) {
      enqueueSessionEntries(
        [
          {
            role: "assistant",
            entry_type: "notice",
            content: String(text ?? ""),
            ts: toIsoWithOffset(new Date()),
          },
        ],
        { sessionId },
      );
    }
    return pill;
  }

  function sanitizeMetaText(v) {

  function formatReadableDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    const hh = String(date.getHours()).padStart(2, "0");
    const mm = String(date.getMinutes()).padStart(2, "0");
    const ss = String(date.getSeconds()).padStart(2, "0");
    return `${y}年${m}月${d}日 ${hh}:${mm}:${ss}`;
  }

  function toIsoWithOffset(date) {
    const pad2 = (n) => String(n).padStart(2, "0");
    const y = date.getFullYear();
    const m = pad2(date.getMonth() + 1);
    const d = pad2(date.getDate());
    const hh = pad2(date.getHours());
    const mm = pad2(date.getMinutes());
    const ss = pad2(date.getSeconds());
    const offsetMin = -date.getTimezoneOffset();
    const sign = offsetMin >= 0 ? "+" : "-";
    const absMin = Math.abs(offsetMin);
    const offH = pad2(Math.floor(absMin / 60));
    const offM = pad2(absMin % 60);
    return `${y}-${m}-${d}T${hh}:${mm}:${ss}${sign}${offH}:${offM}`;
  }

  function parseDateTimeLocal(value) {
    const s = String(value || "").trim();
    if (!s) return null;
    const normalized = s.length === 16 ? `${s}:00` : s;
    const dt = new Date(normalized);
    if (Number.isNaN(dt.getTime())) return null;
    return dt;
  }

  function collectTimeMeta() {
    if (timeMode === "none") {
      return { time_iso: "N/A", time_text: "N/A" };
    }

    if (timeMode === "custom") {
      const dt = parseDateTimeLocal(customTimeValue);
      if (!dt) return { time_iso: "N/A", time_text: "N/A" };
      return {
        time_iso: toIsoWithOffset(dt),
        time_text: formatReadableDate(dt),
      };
    }

    const now = new Date();
    return {
      time_iso: toIsoWithOffset(now),
      time_text: formatReadableDate(now),
    };
  }

  function buildRequestMeta() {
    const timeMeta = collectTimeMeta();
    return {
      meta_user_name: sanitizeMetaText(userMeta.name),
      meta_user_id: sanitizeMetaText(userMeta.uid),
      meta_user_perm: sanitizeMetaText(userMeta.perm),
      meta_time_iso: sanitizeMetaText(timeMeta.time_iso),
      meta_time_text: sanitizeMetaText(timeMeta.time_text),
    };
  }

  function setTimeMode(nextMode, { silent = false } = {}) {
    const mode = ["now", "none", "custom"].includes(nextMode) ? nextMode : "now";
    timeMode = mode;

    if (mode !== "custom") {
      timeCustomBoxEl?.classList.remove("open");

      timeCustomBoxEl?.classList.add("open");
      if (timeCustomInputEl && customTimeValue) timeCustomInputEl.value = customTimeValue;

    if (timeModeBtnEl) {
      const icon = mode === "none" ? "⏹" : mode === "custom" ? "🗓" : "🕒";
      timeModeBtnEl.textContent = icon;
      timeModeBtnEl.classList.toggle("on", mode !== "none");
      const tip =
        mode === "none"
          ? "时间注入：关闭"
          : mode === "custom"
            ? "时间注入：自定义"

    timeModePanelEl?.querySelectorAll(".time-item").forEach((btn) => {
      btn.classList.toggle("active", btn.getAttribute("data-mode") === mode);
