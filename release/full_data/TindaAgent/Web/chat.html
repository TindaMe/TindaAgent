  }

  async function ensureUserMetaLoaded() {
    if (userMeta.name !== "N/A" && userMeta.uid !== "N/A") return;
    try {
      const res = await fetch("/user/profile");
      if (!res.ok) return;
      const data = await res.json();
      userMeta = {
        name: sanitizeMetaText(data.name),
        uid: sanitizeMetaText(data.uid),
        perm: sanitizeMetaText(data.perm_label ?? data.perm),
      };
    } catch (e) {
      reportErrorToTerminal(`读取用户信息失败：${String(e?.message || e)}`, { source: "user_profile" });
    }
  }

  // --- Actions ---
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    const sid = getSessionId();

    await ensureUserMetaLoaded();

    clearEmptyState();
    inputEl.value = "";
    autoResize();
    sendBtn.disabled = true;

    const echo = isEchoCmd(text);
    addBubble(text, "user");
    if (echo) { showTerm(); addTermLine("cmd", text.trim(), "", { sessionId: sid }); }
    const useStream = streamEnabled && !text.startsWith("/");
    const typingRow = useStream ? null : addTyping();
    const metaPayload = buildRequestMeta();

    try {
      if (useStream) {
        const bot = addBubble("", "bot");
        bot.bubble.classList.add("md");
        const params = new URLSearchParams({
          message: text,
          session_id: sid,
        });
        Object.entries(metaPayload).forEach(([k, v]) => params.set(k, String(v)));
        const url = `/chat/stream?${params.toString()}`;
        const res = await fetch(url, {
          method: "GET",
          headers: { "Accept": "text/event-stream" },
        });
        if (!res.ok || !res.body) throw new Error(`stream http ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        let streamText = "";
        let donePayload = null;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf("\n\n")) >= 0) {
            const rawEvent = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            if (!rawEvent.trim()) continue;

            let eventName = "message";
            let dataText = "";
            rawEvent.split("\n").forEach((line) => {
              if (line.startsWith("event:")) eventName = line.slice(6).trim();
              if (line.startsWith("data:")) dataText += line.slice(5).trim();
            });

            let payload = {};
            if (dataText) {
              try { payload = JSON.parse(dataText); } catch { payload = {}; }
            }

            if (eventName === "delta") {
              streamText += String(payload.content || "");
              bot.bubble.dataset.rawMd = streamText;
              bot.bubble.innerHTML = renderMarkdown(streamText);
              scrollToBottom();
            } else if (eventName === "reset") {
              const marker = `\n\n> --调用工具中--\n`;
              streamText += marker;
              bot.bubble.dataset.rawMd = streamText;
              bot.bubble.innerHTML = renderMarkdown(streamText);
              scrollToBottom();
            } else if (eventName === "done") {
              donePayload = payload;
            } else if (eventName === "error") {
              throw new Error(payload.message || "stream failed");
            }
          }
        }

        if (donePayload) {
          if (!streamText && donePayload.reply) {
            streamText = String(donePayload.reply);
            bot.bubble.dataset.rawMd = streamText;
            bot.bubble.innerHTML = renderMarkdown(streamText);
          }
          const traced = renderToolTraceToTerminal(donePayload.tool_trace, { sessionId: sid });
          if ((donePayload.tool_steps || 0) > 0 && !traced) {
            showToast("本轮工具调用没有终端输出", "warn");
          }
        }
        return;
      }

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          session_id: sid,
          ...metaPayload,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(String(data?.detail || data?.error || `http ${res.status}`));
      }
      if (typingRow) typingRow.remove();
      if (echo) {
        const reply = data.reply ?? "";
        reply.split("\n").forEach(line => addTermLine("out", line, "", { sessionId: sid }));
        if (Array.isArray(data.tool_trace) && data.tool_trace.length > 0) {
          addTermSep({ sessionId: sid });
          addTermLine("out", "(已跳过重复工具轨迹渲染)", "dim", { sessionId: sid });
        }
        showToast("已输出至终端");
      } else {
        addBubble(data.reply ?? "（无回复）", "bot", { isCommand: text.startsWith("/") });
        const traced = renderToolTraceToTerminal(data.tool_trace, { sessionId: sid });
        if (data.tool_steps > 0 && !traced) {
          showToast("本轮工具调用没有终端输出", "warn");
        }
      }
    } catch (e) {
      if (typingRow) typingRow.remove();
      reportErrorToTerminal(`请求失败：${String(e?.message || e)}`, { source: "chat", sessionId: sid });
      if (!echo) addBubble("请求失败，请确认服务已启动。", "bot");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  }

  // 滚轮越界 → 橡皮回弹（桌面）
  messagesWrap.addEventListener("wheel", (e) => {
    const deltaY = e.deltaY;
    if (!deltaY) return;
    const currentTop = messagesWrap.scrollTop;
    const maxUseful = getMaxUsefulScroll();

    if (deltaY > 0 && currentTop >= maxUseful - 0.5) {
      e.preventDefault();
      messagesWrap.scrollTop = maxUseful;
      triggerRubberBand("bottom");
      return;
    }
    if (deltaY < 0 && currentTop <= 0.5) {
      e.preventDefault();
      messagesWrap.scrollTop = 0;
      triggerRubberBand("top");
      return;
    }

    // 未越界但会跨越 maxUseful：让它滚到边界，剩余触发回弹
    const target = currentTop + deltaY;
    if (deltaY > 0 && target > maxUseful) {
      e.preventDefault();
      messagesWrap.scrollTop = maxUseful;
      triggerRubberBand("bottom");
    }
  }, { passive: false });

  // 触摸/拖拽滚动越界兜底：停手后若超出 maxUseful，平滑吸回
  let scrollSettleTimer = 0;
  messagesWrap.addEventListener("scroll", () => {
    if (scrollSettleTimer) clearTimeout(scrollSettleTimer);
    scrollSettleTimer = setTimeout(() => {
      const maxUseful = getMaxUsefulScroll();
      if (messagesWrap.scrollTop > maxUseful + 2) {
        messagesWrap.scrollTo({ top: maxUseful, behavior: "smooth" });
        triggerRubberBand("bottom");
      }
    }, 140);
  }, { passive: true });

  // --- Init ---
  const savedWidth = Number(localStorage.getItem(TERM_WIDTH_KEY));
  if (Number.isFinite(savedWidth) && savedWidth >= 180) {
    termWidth = Math.min(savedWidth, Math.max(180, Math.floor(window.innerWidth * 0.65)));
  }
  const savedTimeMode = localStorage.getItem(TIME_MODE_KEY);
  if (savedTimeMode) timeMode = savedTimeMode;
  const savedCustomTime = localStorage.getItem(TIME_CUSTOM_KEY);
  if (savedCustomTime) customTimeValue = savedCustomTime;
  setTimeMode(timeMode, { silent: true });
  loadModelInfo();
  streamEnabled = localStorage.getItem(STREAM_ENABLED_KEY) === "1";
  setStreamToggleUI();
  ensureUserMetaLoaded();
  showEmptyState();
  loadCurrentSessionRecord();
  closeTerm();
  inputEl.focus();
</script>
</body>
</html>
